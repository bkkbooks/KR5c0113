body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫大府寺簿兼樞密院編修丁易東校正載營魄章考異河上公作能為章趙實庵作消息至真義章全唐明皇疏前章明縱欲溺倩憍盈故有咎此章明養神愛氣不雜故無疵營魄以下至滌除戒修身所以全德愛人以下至明白示德全可以為君結以生之畜之表玄功之被物也杜光庭曰此章明抱一之利以表前揣鋭之非抱一則神全魄安揣鋭則盈而必覆至於致柔玄覽之妙愛人理國之規同大道生畜之功顯注益玄深之德張沖應曰第五章既關示精氣出入之門而此章又分示精化為氣之説故曰能為者謂精能化為氣也載營魄抱一能無離專氣致柔能嬰兒滌除玄覽能無疵愛民治國能無為天門開闔能無雌明白四達能無知生之畜之生而不有為而不恃長而不宰是為玄德考異一本云載營魄抱一能無乎專氣致柔能如嬰兒乎滌除玄覽能無疵乎愛民治國能無為乎天門開能無雌乎明白四達能無知乎生之畜之生而不有為而不恃長而不宰是謂玄德載營魄一人哉見禇本巳辨之於下能無雌乎一本或作無雌非經義蓋當經中有知其雄能無為乎一作無以為乎又一本作愛民理國能無知乎明白四達能無為乎河上公曰載營魄營魄魂魄也人載魂魄之上得以生當愛養之喜怒亡魂卒驚傷魄魂在肝魄在肺美酒甘肴腐人肝肺故魂靜志道不亂魄安得壽延年也抱一能無離言人能抱一使不離於身則長存一者道始所生太和之精氣也故曰一布名於天下天得一以清地得一以寧王得一以為正平入為心出為行布施為德總名為一一之為言志一無二也專氣致柔專守精氣使不亂則形體能應之而柔順能嬰兒能如嬰兒內無思慮外無政事則精不去也滌除玄覽當洗其心使潔淨也心居玄冥之處覽知萬事故謂之玄覽也能無疵不淫邪也淨能無疵病乎愛民治國治身者愛氣則身全治國者愛民則國安能無為治身者呼吸精氣無令耳聞也治國者布施惠德無令下知也天門開闔天門謂北極紫微宫開闔謂終始五際也治身天門謂鼻孔開謂喘息闔謂呼吸也能無雌治身當如雌牝安靜柔弱治國應變和而不唱明白四達言達明白如日月四通滿於天下八極之外故曰視之不見聽之不聞彰布之於十方焕焕煌煌也能無知無有能知道滿於天下者生之畜之道生萬物而畜養之生而不有道生萬物無所取有為而不恃道所施為不恃望其報也長而不宰道長養萬物不宰割以為器用是謂玄德言道行德玄冥不可得見欲使人知道也王輔嗣曰載營魄抱一能無離乎載猶處也營魄人之常居處也一人之真也言人能處常居之宅抱一清神能常無離乎則萬物自賔也專氣致柔能如嬰兒乎專任也致極也言任自然之氣致至柔之和能若嬰兒之無所欲乎則物全而性得矣滌除玄覽能無疵乎玄物之極也言能滌除邪飾至於極覽能不以物介其明疵其神乎則終與玄同也愛民治國能無為乎任術以求成運數以求匿者智也玄覽無疵猶絶聖也治國無以智猶棄智也能無以智乎則民不辟而國治之也天門開闔能為雌乎天門謂天下之所由從也開闔治亂之際也或開或闔經通於天下故曰天門開闔也雌應而不唱因而不為言天門開闔能為雌乎則物自賔而處自安矣明白四達能無知乎言至明四達無迷無惑能無以為乎則物化矣所謂道常無為侯王若能守則萬物自賔也生之不塞其原也畜之不禁其性也生而不有至是謂玄德不塞其原則物自生何功之有不禁其性則物自濟何為之恃物自長足不吾宰成有德無主非玄而何凡言玄德皆有德而不知其主出乎幽冥唐明皇曰載營魄抱一能無離乎人之始化曰魄既生魄陽曰魂魄則陰虛魂則陽滿言人載虛魄常須營護復陽陽氣充滿則為魂魂能運動則生全矣一者不雜也復陽全生不可染雜故令抱守淳一則無離身乎疏載初也營護也言人受生始化但有虛象魄既生則陽氣充滿虛魄魄能運動則謂之魂如月之魄照日則光生矣故春秋子産曰人始化曰魄既生魄陽曰魂言人初載虛魄當營護陽氣常使充滿人則生全若動用不恆則散陽氣復成虛魄而死滅也莊子曰近死之心莫使復陽故令營護虛魄使復陽生全也抱守純一不令染雜無離乎身則生全矣此教養神也專氣致柔能如嬰兒乎專一沖氣使致和柔能如嬰兒無所分别疏專專一也氣沖和妙氣也人之受生沖和為本若染雜塵境則沖氣離散神不固身故戒令專一沖和使致柔弱能如嬰兒無所耽著乎此教養氣也滌除玄覽能無疵乎玄覽心照也疵瑕病也滌除心照使令清淨能無疵病乎疏滌者洗也除理也玄覽心照也疵病也人之耽染為起欲心當須洗滌除理使心照清淨愛欲不起能令無疵病乎此教人修心也愛民理國能無為乎愛養萬民臨理國政能無為乎當自化矣自上營魄皆教修身身修則德全故可為君也疏愛民者使之不暴卒役之不傷性理國者務農而重穀事簡而不煩則人安其生不言而化矣此無為也能為之乎天門開闔能無雌乎天門曆數所從出開闔謂理亂言人君應期受命能雌柔守靜則可以永終天祿矣又解云易曰一闢一闔謂之變言聖人撫運應變無常不可以雄成而守雌牝亦如天門開闔虧盈而益謙矣疏修德可以為君為君雖承曆數即天門者帝王歷數所從出也開謂受命闔謂廢黜天降寶命以祚有道能守雌柔可享元吉故云能為雌乎明白四達能無知乎人君能為雌靜則萬姓樂推其德明白如日四照猶雖忘功不宰故云能無知乎疏帝王既受曆數臨御萬方若能守雌靜則其德明白如日之照四達天下功被於物不以為功所謂忘功若無知者故云能無知乎生之畜之疏下經云道生之德畜之此云生之畜之者謂人君法道清淨令物得遂其生成效德弘濟令物各盡其畜養故云生之畜之生而不有至是謂玄德令物各遂其生而畜養之遂生而不以為有修為而不恃其功居長而不為主宰人君能如此是謂深玄之德矣疏物得遂生聖忘功用遂生則生理自足忘功則功用常全斯乃無私而成私不宰而為宰也故生而不有者令物各遂其生君不以為己有也為而不恃者令物各得動為而不自負恃為己功也長而不宰者居萬民之上故云長不恃其功故云不宰也如是是謂深玄之德矣杜光庭曰載營魄抱一能無離乎載營載也言人之身神氣所居魂魄所舍以身運載如車載物西升經云身者神之車也既以喻車固當運載矣虛魄者陰氣有象人之形也陽氣無形人之神也形之具矣而陽氣未附則塊然無知如頑石枯木陽氣既降即能運動故以形為魄魄屬陰也以神為魂魂屬陽也凡人有纖毫之陽氣未盡不至於死有纖毫之陰氣未盡不至於仙所以鍊陰氣盡即超九天而為仙仙與陽為徒也鍊陽氣盡則淪九泉而為鬼鬼與陰為徒也故當保守陽魂營護陰魄以全其生抱一者守道也拘魂制魄守道為基令人守道拘制能無離乎虛象者形質始具謂之為象象似也如月之魄照日則光生者天元經云月本陰氣有象而無光曰者太陽之精常循黃道而東行一日一夜行一度有奇一度二千九百三十二里月者太陰之精其狀也圓其質也清稟日之光而見其體日所不照則謂之魄常循黃道東行或出黃道表或入黃道裏行有遲疾其極遲日行十二度十九分之二平行一十三度三十七分極疾日行十四度九分度之十三遲則涉疾疾則復遲二十七日五十二分曰則四百一十七分則遲疾之終也終而復始每月朔與曰同度謂之合朔月疾而日遲故三日哉生魄三曰之外其光漸生二弦之日日照其側人觀其傍故半明半魄晦朔之日日照其表人在其裏故不見月月望之日日月相望人居其間以觀其明故形圓而光滿月望而晨見東方謂之側行遲也月晦而夕見西方謂之曉行疾也天對曰衝其光如日日光不極謂之暗虛暗虛值月則月蝕值星則星亡日月朔望行於中道則值暗虛而蝕日月各周圓三千里徑一千里也人始化曰魄者春秋昭公七年初鄭伯有為政駟帶殺之鄭人相驚曰伯有至矣或夢伯有介曰壬子佘將殺帶明年殺段於是壬子駟帶卒明年公孫段卒鄭人益懼或問子産曰伯有猶能為鬼乎子産曰人生陰曰魄陽曰魂用物精多則魂魄強匹夫匹婦強死而魂魄猶能憑依於人以為淫厲況伯有三世執其政柄而強為鬼神不亦宜乎伯有乃穆公之胄子良之孫子耳之子故曰三世子産立其子良止以撫之乃止近死之心莫使復陽者莊子齊物篇之詞也以其利患生禍陽結遂志有如此者也蓋南郭子綦答子遊天籟之旨爾淳一者淳和也不離者除垢止亂無令雜也老君明此營魄守一之旨以教人養神也上清隱書有鬱儀奔日結璘奔月之道存日月中各有五帝呼日月內諱想五帝形服來降於己乃吞日月之華得其道者與日月同壽又有拘魂制魄之道常以月三日十三日二十三日存心中赤氣變化而呼三魂之名胎光爽靈幽精乃密呪拘魂又以月朔月望月晦之日存鼻端白氣變化而呼七魄之名尸狗伏矢雀陰吞賊除穢臭肺非毒乃密呪制魄各有存念呪術具上清品中久久行之可以輕舉此太上營護虛魄度世長生之道也專氣致柔能如嬰兒乎嬰兒未知孩偶答對專任沖和之氣外無染雜內無思慮隨氣柔弱故沖和不散守道之士當如嬰兒無染雜思慮使神不離身西升經曰哀人不如哀身哀身不如愛神愛神不如含神含神不如守真守真長久長存也又曰神愛人人不愛神是以老君教人養神養氣也滌除玄覽能無疵乎心之照也通貫有無周遍天地因機即遲隨境即馳不以澄淨制之則動淪染欲即滯染欲則萬惡生焉萬惡生則疪病作焉老君戒令洗滌除理翦去欲心心照清淨則無疵病西升經曰生我者神殺我者心故使制志意還思慮者是謂教人修心也愛民理國能無為乎生民者國之本也無為者道之化也以無為之化愛育於人國本固矣政虐而苛則為暴矣賦重役繁則傷性也使之不以時則妨農也不務儉約則賤穀也此教以理國也為君之體以道為基以德為本失道喪德何以君臨此老君教以理國之要也天門開闔能無雌乎修愛民理國之事為垂衣南面之君猶須恭己奉天以順曆數曆數者謂受命之曆五運之數也舜命禹曰天之曆數在爾躬天祿永終謂曆數在躬以承天命故可大寶愛之謂之寶命自天而授故謂受命於天易繫曰聖人之大寶曰位是也天門開則降非常之瑞或黃星動彩赤伏表符紫氣充庭五星聚井流虹貫月大電繞樞然復稟嶽降賢誕星命輔以佐估之故應天順人拯物除害而承曆數以有天下也及乎臨御失所刑政乖宜衆叛親離兵交禍起逆亂生於下氣象見於上曰霄天開山崩川竭災凶蜂起而國亡矣是天門闔也一闢一闔之謂變者易繫云謂開閉相循陰陽遞至倚伏之義也虧盈而益謙者易謙卦虧謂減損盈滿而增益謙退若日中則昃月盈則虧其盈也盈既虧減謙則受益倚伏之勢矣老君戒人君既受命臨人當以雌靜柔和無為清簡之政順膺天數以牧萬方矣又易繫云闔户謂之坤坤陰也闔閉藏也凡物先藏而後出若室之開闔其户故云闔户也闢户謂之乾乾陽也闢吐生也在陽則舒陽能吐生萬物若室之開其户也亦解闔為暗昧闢為昭明也不可以雄成者莊子大宗師曰不逆寡不雄成謂不恃其成而處物先當守雌靜以化也明白四達能無知乎明白慧照也慧照之心照無遠近焕然四達無所隔礙其照如此當思念念心不滯於見猶若無知或務其有知則有所執而失道也人君負獨見之明以御四海其政察察民凋弊矣老君戒之令忘功息照亦猶黈纊塞耳以閉其聽冕旒垂目以杜其明也生之畜之道以通生萬物故云生之德以畜養萬物故云畜之帝王法道體天任物生畜各遂其分各達其情咸得所宜物無失所矣法則也效學也生而不有至是謂玄德人君抱守淳一洗心內照愛人理國動法天時雌靜平和收視反聽體道生物順德養人生物而不有其功為政而不恃其力視聽四達功成不居此理身理國兼愛之道順天之德也玄天也道君曰載營魄魄陰也麗於體而有所止故老氏於魄言營魂陽也託於氣而無不之故易於魂言道聖人以神御形以魂制魄故神常載魂而不載於魄如車之運百物載焉如歲之行寒暑往焉心與天遊六鑿相因外天地遺萬物而神未嘗有所困也豈復滯於魄哉抱一能無離乎天一生水於物為精地二生火於物為神精神生於道形本生於精守而勿失與神為一則精與神合而不離以精集神以神使形以形存神神全而不虧精用而不竭形生而不弊如日月之麗乎天如草木之麗乎土未嘗離也切嘗申之人之生也因精集神體象斯具四達並流無所不極上際於天下蟠於地化育萬物不可為象其名為同帝而世之愚者役己於物失性於俗無一息之頃內存其神馳無窮之欲外喪其精魂反從魄形反纍神而下與萬物俱化豈不惑哉聖人則不然載魄以遊抱一以守體神以靜形將自正其神經乎太山而不變處乎淵泉而不深孰知其所始孰知其所終故曰聖人貴精專氣致柔能如嬰兒乎易曰乾其靜也專揚雄曰和柔足以安物靜而不雜之謂專和而不暴之謂柔嬰兒居不知所為行不知所之不藏是非美惡故專氣而致柔孟子曰蹶者趨者是氣也而反動其心心不足以專氣則氣有蹶趨之不正而心至於僨驕而不可係聖人虛己以遊世心無使氣之強則其靜而不離和而不暴與嬰兒也奚擇故曰能如嬰兒乎孟子曰其為氣也至大至剛以直養而無害則塞乎天地之間老氏之專氣則曰致柔何也至剛以行義至柔以復性古之道術於是乎在滌除玄覽能無疵乎聖人以此洗心則滌除萬行而不有以此退藏於密則玄覽妙理而黜之若是則體純素而不纍過而不悔當而不自得也何疵之有愛民治國能無為乎以仁愛民以智治國施教化修法則以善一世其於無為也難矣聖人利澤施乎萬世而不為愛人功蓋天下似不自己故無為也用天下而有餘天門開闔能無雌乎經曰知其雄守其雌為天下溪聖人體天道之變化卷舒啓閉不違乎時剛柔幾彰惟其所用然未嘗先人而嘗隨人未嘗勝物而嘗下物故天下樂推而不厭能為雌乎於是乎在明白四達能無知乎聰明聖智守之以愚與此同意生之畜之至是謂玄德聖人存神知化與道同體則配神明育萬物無不可者生之以遂其性畜之以極其養無愛利之心焉故曰生而不有無矜伐之行焉故曰為而不恃無刻制之巧焉故曰長而不宰若是者其德深矣遠矣與物反矣故曰是謂玄德天道升於北則與物辨而玄者天之色也聖人之於天道降而為德非玄不足以名之王介甫曰載營魄營止也載乘也如易之下乘剛也精氣為物遊魂為變魂陽也故常動魄陰也故常靜陰者陽之配亦陽之賊魂者魄之輔亦魄之寇惟其魂動而魄常至於止故使魂常載於魄而陽常勝於陰則全其天守矣蓋魂能營魄魄能載魂而不載於魂者有為嗜欲之蔽魂雖在而有生始死矣抱一能無離乎一者精也魂魄既具則精生精生則神從之專氣致柔能如嬰兒乎志者氣之帥氣者適善惡之馬氣之所作志使之然今專守其氣於內而致極其柔能如嬰兒乎言如嬰兒之柔弱也夫嬰兒者終日號而乃嗌不嗄終日視而不瞬目孟子言其氣則謂至大至剛塞乎天地之間老子乃謂專氣致柔何也孟子立本者也老子反本者也故言之所以異滌除玄覽能無疵乎滌除洗心也玄覽觀妙也如月之明如珠之瑩能無疵乎愛民治國能無為乎愛民者以不愛愛之乃長治國者以不治治之乃長惟其不愛而愛不治而治故曰無為夫無為者用天下之有為有餘者用天下之不足然老子方言其反本而曰愛民治國者何也蓋老子為言其反本遂自道而起教所謂吉凶與民同患也易曰聖人以此洗心退藏於密吉凶與民同患是也不惟老子之言若是凡古之聖人皆如此也天門開闔能無雌乎夫萬物由是而出由是而入故謂之天門有開闔則有動靜有動靜則有雌雄惟其守雌以勝雄守靜以勝動故曰天門開闔能為雌乎生之畜之生之道也畜之德也是謂玄德道之在我者德也生而不有為而不恃長而不宰是謂玄德三者歸於無我故謂之玄德蘇潁濱曰載營魄抱一能無離乎魄之所以異於魂者魄為物魂為神也易曰精氣為物遊魂為變是故知鬼神之情狀魄為物故雜而止魂為神故一而變謂之營魄言其止也蓋道無所不在其於人為性而性之妙為神言其純而未雜則謂之一言其聚而未散則謂之朴其歸皆道也各從其實言之耳聖人性定而神凝不為物遷雖以魄為舍而神所欲行魄無不從則神常載魄矣衆人以物役性神昏而不治則神聽於魄耳目困於聲色鼻口勞以臭味魄所欲行而神從之則魄常載神矣故教之以抱神載魄使兩者不相離此固聖人所以修身之要至於古之真人深根固蒂長生久視其道亦由是也專氣致柔能如嬰兒乎神不治則氣亂強者好鬭弱者喜畏不自知也神治則氣不妄作喜怒各以其類是之謂專氣神虛之至也氣實之始也虛之極為柔實之極為剛純性而亡氣是之謂致柔嬰兒不知好惡是以性全性全而氣微氣微而體柔專氣致柔能如嬰兒極矣滌除玄覽能無疵乎聖人外不為魄所載內不為氣所使則其滌除塵垢盡矣於是其神廓然玄覽萬物知其皆出於性等觀淨穢而無所瑕疵矣愛民治國能無為乎既以治身又推其餘以及人雖至於愛民治國一以無心遇之苟其有心則愛民者適所以害之治國者適所以亂之也天門開闔能無雌乎天門者治亂興廢所從出也既以身任天下方其開闔變會之間衆人貴德而患失則先事以徼福聖人循理而知天命則待唱而後和易曰先天而天弗違非先天也後天而奉天時非後天也言其先後常與天命會耳不然先者必蚤後者必莫皆失之矣故所謂能為雌者亦不失時而已明白四達能無知乎內以治身外以治國至於臨變莫不有道也非明白四達而能之乎明白四達心也是心無所不知然而未嘗有能知之心也夫心一而已苟又有知之者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之於物來而應之則已矣又安得知應物者乎本則無有而以意加之此妄之源也生之畜之至是謂玄德其道既足以生畜萬物又能不有不恃不宰雖有大德而物莫之知也故曰玄德吕吉甫曰載營魄夫人之有其身久矣而欲退之以體天之道而不為功名之纍者豈不難哉然亦有道矣人生始化曰魄魄與精為一則寂然而已既生魄陽曰魂魂與神往來而魄旁精出入則魄隙而不營離而不抱矣載者終而復始之意也營者環而無隙之謂也抱一能無離乎雖已為人矣而載營魄抱一湛然無為如其生之始化則能離矣專氣致柔能如嬰兒乎能無離則專氣而不分致柔而無忤而能如嬰兒矣滌除玄覽能無疵乎能如嬰兒滌除悔吝玄覽觀妙凡動我之微我必知之而能無疵矣天門開闔能無雌乎內之滌除玄覽而無疵外之愛民治國而無為則天門當在我而能雌矣明白四達能無知乎不將不迎應而不藏者則明白四達而能無知矣道至於無知則真知也所以人貌而天夫何功名之纍哉是謂玄德生之畜之生而不有為而不恃長而不宰者乃其所以為矣玄德無他天德之謂也陸農師曰載營魄魂為陽陽為動魄為陰陰為止魄者神之佐其動有變而無化魄者精之輔其止有化而無變故魂言遊魄言營遊魂以言其變營魄以言其止能無離乎載營魄所以外運抱一所以內守也故曰載營魄抱一能無離乎載魄所以致運抱一所以致守而內外常合而無離矣然後可以專氣致柔能如嬰兒專氣致柔能如嬰兒乎蓋內守者氣之所以致專外運者氣之所以致柔其守致專其運致柔而其德比於赤子則然後其心可以疏瀹其神可以澡雪而照之於天萬法俱空而無一法之纍也故言專氣致柔能如嬰兒乎而繼之以滌除玄覽能無疵乎滌除玄覽能無疵乎滌者言其洗心除者言其刳心洗之而無不淨刳之而無不虛超然坐視萬法俱空然後可以因空而立法而與民同吉凶之患故言滌除玄覽能無疵乎愛民治國能無為乎其於民也以不愛愛之其治國也以不治治之道無不為矣然後可以寂然不動感而遂通天下之故故常不得已而後起求而後應也故言愛民治國能無為乎而繼之以天門開闔能無雌乎天門開闔能無雌乎天門者無有也精神往來一闔一闢萬物皆出於此皆入於此而其變無窮也天門開闔與衆雌而無雄矣然後可以圓覺普照大通四闢其徹至於無障黜縱其冥至於無知覺故言天門開闔能無雌乎而繼之以明白四達能無知乎明白四達能無知乎載營魄抱一能無離乎愛民治國能無為乎此聖人也天門開闔能無雌乎明白洞達能無知乎此神人也王元澤曰載營魄魄陰物形之主也神之為物廣大通達而不自了者神常載於魄故神反拘於形體此廣者所以狹通者所以滯也欲學此道者常先廓其志氣勿纍於形體使神常載魂而不載於魄則可以抱一而體神矣竊嘗論曰人之既死有升沉之異良由滅神徇形以神從魄故至於淪乎幽陰化為異物也若夫神完之人雖魄之陰滯精與神為一而無所不之矣聖人之死曰神不從魄也其始也亦載魄而已抱一一者精之數不言精而言一者守一則精不搖矣能無離乎學道歸乎復性復性歸乎體神所以不能神者由逐末忘本以物易己故喪精失靈沉為下愚也陰陽之靈曰魂魄魂陽故遊而止我身者以魄為之配也魄陰故營營止也故學者必先寧其志氣使精魄靜一魄止則魂定精一則神全矣一生水水為精人之初生因精集神本自渾全而不能了者常至於離柝隳散其名曰罔兩罔者神不明兩者精不一莊子曰無搖汝精抱一之謂也蓋精神水火之象火無常形因膏顯照神則廓然無體不可致王但當存精而已如增膏而火明培根而葉茂也魂魄精神既不虧耗然後心強氣順不為物使靜則體道作則契理妙而極之則神為一更絶四名矣此學者之至妙萬世聖賢皆由此義求不在外當由心得也專氣致柔能如嬰兒乎人生有三曰精曰神曰氣精全則神王神王則能帥氣矣神衰而不足以帥氣則神作不常使人陷於非道孟子曰志者氣之帥也揚雄曰氣者所適善惡之馬歟師懦而衆悖則師必亡馬怒而御疲則車必敗神不能專氣則喜怒哀樂惟氣所為流陷越佚理固然也古之士無不曉此苟未及此則當清心以防之孔子所謂三戒皆防氣也門人獨顔回能專氣故曰不遷怒氣之暴在陽而陽之發者莫暴於怒於怒可以無遷則非專氣而何人生本具聖質氣佚而不能專故曰壯以往離道彌遠能抱一則神王神王則氣柔氣柔則真全所以與嬰兒同專者有而擅其權之謂滌除玄覽能無疵乎此專氣則性定性定則智明智明則以蕩滌除去而玄覽至妙矣既燭其理則世間萬態同為至妙倘觀一疵則非識理也愛民治國能無為乎如上所説為己之道盡矣然則可以其餘及人也老子之言專於復性有為則非所以使民安性故雖愛治而不尚有為此道之至也天門開闔能無雌乎聖人無心於作精神出入皆應而不唱莊子所謂有物采之者老子於四時當秋其德生金靜一復性者也故其尚如此至於易則先天後天無非道者明白四達能無知乎理無足知知以應物既知至理則自常無知惟能無知故無所不知也如昭然有知則是不知無知之妙何足謂知也切嘗論之聖智下愚本無殊品因愚顯智乃有聖名聖人本心何嘗自聖故明白四達而初無所知乃聖人之知也生之畜之道備如上則造化在我可以生畜萬物矣生而不有道生萬物物之與道常為一體誰有之者為而不恃不得已而為之於已然之時雖有為為之功而超然自喪豈復矜悖哉長而不宰道如上文則可長天下以無為矣雖在物上如標枝豈有分割之功乎是謂玄德玄為妙體德之至也昔舜在側微書稱玄德蓋至德常在於無思無為此篇之義主於無為故雖為長而德尤稱玄此篇自為士以至於體神入聖修身之序盡矣劉仲平曰抱一致一所以精義抱一所以應變反一所以入神故君子之道始於致一用於抱一藏於反一專氣致柔能如嬰兒乎人之生在嬰兒則氣專致一真之至也及其長則情生偽之至也惟其知道者營名則失其真為利則流於偽是謂能復者也天門開闔能無雌乎天門開闔能為雌乎開闔者變化之用也易曰乾以美利利天下不言所利大矣哉謂乾道以大為用也夫然以乾道而變化者亦用乎大而已矣守其雌者蓋言吾所自守云耳夫能守其雌則其用也必大明白四達能無知乎夫欲明白四達而汲汲乎以事平和者不亦小乎故有知小而無知之知矣劉巨濟曰載營魄人之生諸陽為魂諸陰為魄各有名象而藏於肝肺之間下士知之上士見之精與神相依以生而並精出入者魄也與神往來者魂也此篇言載營魄營即魂是也黃帝曰動以營身謂之魂易曰遊魂為變莊子曰其魂不疲皆為魂主經營動作為一身之運為魄則並精出入生化成變而已今百骸九竅具吾形者魄之屬也使非魄以營之則與行尸何以異乎魄不可以無魂猶月不可以無日魄待魂而成營月待日而生光此言魂之用而曰營言魄之體而曰魄也載謂以形載也形車也魄與魂車之積也世固有載魂不載魄載魄不載魂有魂魄兩載之者載魂不載魄上士也載魄不載魂下士也兩載之中士也上士全陽清以浮仙下士浮仙濁以沉鬼中士則修其形者也抱一能無離乎載營魄者其事在乎抱一而已道生一一生水水生精精者一之物也抱一則與精合脫一則與精離矣精至而氣全氣全而神全神全可以制魂焉魄為上士矣夫精者天地萬物所由以生成也然精常嗇人而人常費之竅瀉無度至於中乾以死則其離也非精離之人自離之耳莊子曰不離於精謂之神人故曰能無離乎專氣致柔能如嬰兒乎專氣謂氣不柔致柔謂極和此嬰兒之天也學道者能如此則氣全矣黃帝曰所謂生氣之原謂十二經之根本謂腎間動氣也蓋人鼻口所出入手足所動作皆五穀所養五畜所益五果以助五菜以充醪醴以滋芳草石藥以補瀉和調灑練入脈以為榮栗疾滑利循皮膚以衛皆生氣之别使而已其母則守於腎間萬三千五百之息襲此母故也流於知欲則此氣不專而柔喜怒哀樂形其中少壯死老形其外七尺之軀猶糞壤也嬰兒未知牝牡之合則氣可謂專矣終日號而嗌不嗄則和可謂極矣蓋人委沖和以生而所由以乖戾者不能專氣而反暴之故也全氣之妙理故如此所謂大人不失赤子之心是也滌除玄覽能無疵乎心藏神心譬則鑑也神譬則谷也窮天下之理於一照者心而已然能以神照者其晦冥深眇宜有道焉故曰玄覽人心本自玄覽孰垢使之不明孰礙使之不曠哉惟不能勝物則精離氣衰而神去之神去之則昏厥中物之皆垢也物之皆礙也如人夜行一無覩若此其明也亦自洗之此其曠也亦自去之耳然則玄覽之病非由外至也蓋惟聖人能不假滌除而神照自然非學道之事也莊子所謂達之入於疵也此章以全精全氣全神為學道之根故無離以言養精如嬰兒此言養氣無疵以言其養神也愛民治國能無為乎莊子曰道之真以治身其緒餘以治國家愛民仁也治國政也王侯之事不能無為視以芻狗則得之天門開闔能無雌乎成人事者必因天道故此言天門莊子曰天門無有也萬物出乎無有易曰一闔一闢謂之變蓋天道主變愛民治國因諸天而已何事於雄成乎不得已則亦應焉而已明白四達能無知乎明白知也四達無不知也知自為與為人則可謂知無不知也不退於密能無知以含其聰明則魂魄將恐無以載而精神氣將恐無以全庶幾千二百歲而形不衰可得乎生之畜之生之道也畜之德也謂如上言則非體道德者不能故也生而不有我生之不我有之不我有之則我生非我有也為而不恃生而不為則生理絶雖為矣從而恃之則復喪所為焉長而不宰我生我為足以長物矣無我有長之至也是謂玄德以玄為德安能不有之恃之宰之哉能不有不恃不宰故謂之道也即為既長則道降為德故謂之玄德也玄德者上足以該道者也前章言身退之事而冀親乎身故次以載營魄劉驥曰載營魄至是謂玄德魂陽物也魄陰物也一陰一陽之謂道偏陰偏陽之謂疾陰者陽之配亦陽之賊故以魂載魄而營之使其陰陽調和兩不相傷而德交歸焉然豈他求哉一以致之而已一之為物不二其生物不測非陰非陽不離陰陽可以調和陰陽故載營魄抱一能無離乎聖人抱一不離心無一物渺渺溟溟之內其間守神杳杳凝凝之內其神自真專氣而不雜致柔而不暴所以如嬰兒也嬰兒居不知所為行不知所之終日視而目不瞬終日號而嗌不嗄和之至也聖人以此洗心退藏於密則滌除萬念而玄覽妙理何疵之有此老氏方言其反本而繼之以愛民治國何也蓋一身之設一國之象也聖人以心為君以身為國以氣為民無為而尊君之道也心無為而尊於上萬氣自行百體自治保氣所以愛民全形所以治國無為也則用天下而有餘有為也則為天下用而不足故愛民治國能無為乎無為則無不為天門自開地户自閉天門者精神往來之所天門開闔則神能出入可坐於一席之間神遊於無方之境然神遊不已則神有所不及所以欲其靜而與陰同德也故能為雌乎元神既靜真性自明可以鑑天地可以照萬物然用智不已則智有時而困故明白四達能無知乎所謂聰明聖智守之以愚也慧而不用實智若愚定慧相資知恬交養與天地同其體與造化同其功其道可以生萬物其德可以畜天下故曰生之畜之生之而不有其功為之而不恃其為長之而不為之宰此經所謂功蓋天下而似不自己化貸萬物而民不恃也趙實庵曰初起根宗金火奪形載營魄識天時之有限知外物之無常去彼取此有長生之道焉故繼之以載營魄易曰立天之道曰陰與陽陰陽者相求之物也一身之神曰魂與魄魂魄者相交之道也魂為陽魄為陰魄資陽而生魂因魄而立魂滿而魄生魂消而魄入乃日月往來之數陰陽消息之期兹天之常也書曰哉生魄謂月也生明於東哉魄於西謂一月三十日五六之數也後晦三日前朔三日除六日也上下二弦四六二十四也前後六日合三十日也自初生至上弦有滿之漸則曰魂自十六轉巽位有缺之漸則曰魄漸缺幾晦魄乃亡也是時太陰在艮與日合氣震來受符以鍊生魄至于三日哉生庚地此乃載營魄也雖謂之魄其實魂也謂其有質質自陽來今謂之魄者月屬金也金主肺肺主魄從其體言止云魄也方其生明於西而望東是金奪火也東方木木主震木生火火為陽木為肝肝者陽中之陰肝主魂為陽陽屬火是金得火而成形自初三至望魄中魂滿乃具乾體乾之六位皆言九九陽也陽火也月之圓也乃具乾體金奪火形即四九生金九居離位虛以象月故離為中女女乃象陰又震受庚符西方之坤一變成震三日當初九也八日出辛再變成兊乃九二也至十日乾體既成滿甲東方乾主六甲飛龍在天九三之位蓋陰陽消長見於月也一月三十日三百六十時應一年之數也煉丹必先火候火有從天而得故卦為天符火記取易為凖六十四卦乾坤坎離不預焉止六十卦朝屯暮蒙為首前十五日進至大壯終焉退十五日自晉至未濟終焉火候之進退氣候之推遷以日為準見乎太陰之圓缺也上弦則進下弦則退經載營魄為虎龍交合嬰姹奪神鍊成玉液藥苗初新初九進火慎護之時不可差失故抱一也脫之則亡失之則死使確乎不可拔至于陽胎下投其息自任道乃成也故經不言數而言數不言藥而言藥鉛汞之理盡在此矣次甲亟養六一馴致金虎抱一能無離乎六易者道也易之字日月合體未合則無陰陽既合則配水火此天地自然還丹也自然還丹天地固有不抱亦不脫此言抱者謂人不得同天地之自然以水火金三物託於易象以奪自然之氣運變爐鼎修成至藥故法天地自然以人言之故抱一能無離乎是未許之詞也凡人言抱一孰為一邪以一為有數或者曰麗乎數也一為有迹或者曰泥乎迹也當滅其一以證湛靜此皆滅法而非生生變化之道也故太上曰能知一萬事畢不能知一無一之可知此妙言也以數言之因一有二因二有三以氣言之一為始氣始即先天與道為體與人為命欲立命本非一而何一虛無形散乎萬物今之抱一乃抱陽也性命由此而生焉列子曰易無形乎謂之抱虛而非虛象不可欺謂之抱實而非實道本無情此有無不能以自存乃道之妙也由是則知一即道也道即易也易即陰陽也故一陰一陽之謂道又曰生生之謂易言陰陽相生變易不窮如彼日月離合有度消息自然於是月之初生奪火為養一變而九九即九陽故抱一而不可離也火記曰天有象日月星地有象水火金月雖為金金豈有形乃西方之氣也神和子曰西方無金元借氣北方之氣為水水亦無形南方之氣為火火亦無象此真水真火也故仙經曰黑鉛水虎者天地妙化之根無質有氣紅鉛火龍者是天地之妙用發生之氣有氣而無質蓋人以有形之軀虛一心而奪天地自然之氣取金於月互用水火水火鍊金乃成丹也則知易為陰陽之體一為水火之原乾體是金資火為養欲奪其氣非一不全謂太陰初生即魄也非魂不致其明魂為火非抱一不足以取太陽之氣又以金水兩半而圓滿今不言水而言火以運言太陽水也火記曰星因日月而生金因水火而成故藉三光以明至道之用非徒得象就亦忘形兹其妙乎二喜怒為戒專氣致柔能如嬰兒乎一者陽之始生也如子在母胎以柔守之故謂之專氣所謂聽之以氣也經曰綿綿若存用之不勤此專氣之道也蓋陽之初生以有剛性當慎其初方復之時專以柔御浸而剛長過則失中乃所以致之也致取也取柔以御剛不欲以失其和也月之既望金水兩半上弦如繩平而直也不可差勝和理出於性性與情合陰陽之道焉金之得火體變為乾乾轉巽方變體歸坤五能養一母立牝基經所謂而貴求食於母不可不致柔是故如嬰兒無蹶暴之理也三深明色空滌除玄覽能無疵乎心化而為性利欲之情泯迹而不見性隱而心生妄想之緣觸塗而擁底欲窮道要深察天機外境未忘邪心愈勝蓋大道在虛心而得天機斯瑩淨而明原夫一自無生匪凝然而無由索隱乾從坤變須智徹而可以觀微句嗜欲之昏理乃天機之蹇淺滌除二字務在刳心玄覽之功必先忘己所以水澌流動海瑩天空澡雪精神疏明究竟非玄不覽惟道是從此榮趎問衛生之經顔回契心齋之妙四字言治道愛民治國能無為乎經之大旨在治身治家治國治天下疏之所歸在性宗命宗常道輪貫玄顯單修齊修不能會之則分流以理達之則一致此篇初言載營魄其理在日月往來交合火候藥物進退次以專氣致柔滌除玄覽皆原性命之本至此忽言愛民治國言涉世法何支離邪不然以一身之言心為君也血氣猶民也心淨神和神合則榮衛周流而血氣條達陰陽四時自得其序不馳不驟是猶愛神貴氣一心融和而致無為之道也靈樞曰天地潛冥六元自經此天之自然無為以至治世之道以民為本愛之則子來利之則麇至誠而服之悅而使之不淫其性不遷其德陶陶焉居仁壽之域豈有為哉所以與陰陽合用天地同功其於治道又何間焉五調御剛氣天門開闔能無雌乎柔者不能剛雄者不能雌性也能柔能剛知雄守雌道也一於性而不合於道非聖人也聖人動與道合用與道同莊子曰天門者無有也以無有為開闔則不見為雌之義夫天門者乾也乾以六氣言之至巽己為天門以八卦定位言之戌亥為天門巽為地户即坤也乾至己為純陽可謂雄也而居坤位是不離於雌也當剛之時與柔合德豈不曰能為雌乎戌亥乾之位自午分六氣亥為純坤乾居坤位得非為雌乎此乾坤自然之理故東南巽陽氣所出天門開也西北乾陰氣所入天門闔也又自東辟至巳巳乃未也未為人門所以巽為地户非特正未是也至於人用之亦然凡言能與不能化性而入道也蓋營魄為月坤主月也非鍊四象而入中宫歟蓋道能生物雄則獨陽不生託乎陰陽以生為義故取其母經曰有名萬物之母是為法則陰陽以月為準一月之內自朔既晦乾坤互體而成其道月之初三日再生震震受庚符坤一變為震八日變丁坤再變成兊十五日變乾十六日轉巽乾之一變十六日出辛二十三日乾再變艮平明出丙三十日甲地喪明三變坤沒乙至于晦陽德以虧會陽於艮資陰以養日月煉形陰陽相奪月得魄而生庚日得魂而告朔俱自艮始艮為門闕莊子曰入出而無見其形是謂天門天門者無有也夫乾坤者畫卦則顯象不畫卦則象安在焉六陽為乾氣之變也六陰為坤時之行也乾復變坤乾何有也坤復變乾坤何存也不一其形且何定位一出一入物自乘之故萬物出乎無有無有一無有聖人藏乎是六脫落知見明白四達能無知乎知者自知也見者自見也自知者有所悟因知而發天光自見者有所明因心而探妙本見無所見洞然通照非徒無法也而法法無遺焉陰陽之變化日月之交合乾坤之互用出入之有無了乎一心曲盡其妙則可謂明白矣夫智以自知在內而不在外也見以自見在己而不在人也若以智為謀所謀在物非盜機也以明為見所見在事非了知也當用其光而復歸其明豈可昭昭然如揭日月雖自知自見亦不可以知見自知也楞嚴曰知見立知即無明本解脫知見即為真如聰明其可不詘乎言辨其可不忘乎則知至人之心知之而不言而言者不知矣後總言妙用用一功用在物生之畜之道者天地待是而後生日月者萬物待是而後作陽唱於始易曰首出庶物是也陰成於終無成有終是也萬物由之以生以化故道為物之母生之也德有成之理畜之也非道無以生非德無以畜畜養也物在天地之中道乃涵養之也又曰畜以聚之然一性之大道以具矣非德成之性或虧矣此篇自載營魄以至抱一專氣滌除愛民皆自有為而至無為也何哉天地有自然還丹之道人法金火修成自然之道故以無為終之又天門開闔獨守其母不浮不動若無知者則道盡於此矣魄營則生之成魄則畜之為而至於不為知而自為不知則還全之道生而不有為而不恃長而不宰有無為功焉夫無為則道之妙也二不居其功生而不有為而不恃長而不宰此三句義重明無知字也夫學道者初貴乎忘物次貴乎無心所謂金丹之道與天同功雖存師法而畢竟執天之行不可拂其自然之理也然不可不知不可不為知其至要則反乎無知始於有為終合無為金奪火也豈有取之之心取猶不取也故生而不有為而不恃者存乎陰陽之妙用也豈以其功有所恃邪此道雖用之以陰陽而其運機也陰陽不可測長而不宰言月之初及其圓成也何加手焉楊雄曰聖人以不手焉聖人宜與於斯乎三牒前言不有其德是謂玄德是謂者牒前也總結一章之義讚嘆其微也謂前文露天地還丹之旨乾坤愛鍊之機不測其淵徒為世法豈知藥物備具火候無差造化不能隱其微體用無以出乎此陰符曰知之修練謂之聖人乃玄德也邵若愚曰載營魄至是謂玄德心無定名隨處而立心動則著物著物便見心心動則屬陽其名曰神又名曰心心不動則屬陰其名曰精又名曰性心向外也為視為聽其名曰魂又名曰情心向內也收視反聽其名曰魄又名曰意皆隨處立名總名曰心乃知心者載身之主無不經營本言魄者為魄屬陰陰以靜為法制心為內靜則精魄住精魄住則神魂住精神魂魄混融相合為一謂之抱一抱一雖能治二氣於黃道會二性於元宫攢簇五行合和四象此長生之術未極於道者緣心著一故也老子嘆曰能無離乎離有入無令心廓徹清靜始曰無為此名真心乃大道也如專氣致柔者既言專氣使是用心有心則不得致柔能比如嬰兒無心乎若滌除萬境一心覽玄如玉有疵能有心執玄能無瑕疵乎夫愛民治國之心經營天下之政事彰於迹有迹則有憂而能顯諸仁藏諸用而無為乎天然機解之門心也開闔應務之際能隨順物情而為雌乎心本淨明潔白四方通達緣染知見情解至礙不能虛靜能無知見乎夫一者攀緣之本生滅之根既有一繫著即非無為之道能離抱一之迹方合於玄德玄德者生育之畜養之夫生之者道而不見其有為之者德而不見其恃至於長成而不為主宰是謂玄德故莊子曰通於一萬事畢若無心得一而鬼神報此之謂也王志然曰載營魄至是謂玄德至人以體性抱神為入道之序以寂然至無為體道之用夫載營魄者以雌靜為體柔伏為用控適制御必待陽魂為之配魄則依形而能靜不能動者也魂則載形而能動不能靜者也離合自然唯神是主亦猶卓之有輪轂輻雖具何因自行當其無車之用方其用也是須臾不可得而離之故曰抱一能無離乎嘗試論之神不一之謂罔精不一之謂兩由物而之於罔兩何靈之有蓋以人之有生不明此道自喪己靈殆其將啓手足之際精華耗散魂魄悠揚魂必隨識而散於空魄則隨尸而沉於地舉皆不得其歸真之趣與夫靜曰復命之説不可同日而語施肩吾曰精住則氣住氣住則神往莊子精全則氣全氣全則神全神全則道全三者既全所謂形精復形神俱妙與道合真心志久寧天光自發學者所患乎有學道之心無學道之質有學道之質無學道之心爾畏所失者失其所以治心養性之本故老子設問曰專氣致柔能如嬰兒乎喜怒不形乎色好惡不入乎心諸境對忘不立一塵何疵之有身猶國也國猶身也未聞身治而國不治也國治而身不治者也始於有為終於無為外雖從於有為之末內必保乎無為之本故曰愛民治國能無為乎大易以乾坤為門户谷神以玄牝為門户天地陰陽卷舒啓閉出入開闔不失其時人之有身不失其為天地陰陽之用每順乎天未嘗違天每下於物未嘗先物故曰天門開闔能無雌乎聰明智慧大丈夫之能事達則兼濟天下用之則行舍之則藏不遷怒不二過盛德賢貌終日如愚孔門弟子顔淵一人而已黜聰明墮肢體離形去智同於大通大白若辱明道若昧故曰明白四達能無知乎若然則衆德妙行大備於我是將為造物者同功道生萬物其在我也生之畜之何難之有生之以遂其性畜之以極其養無私愛私利之心故生不有無自矜自伐之心故為不恃無小智小巧之心故長而不宰利澤施乎萬世不為愛人功蓋天下而似不自己孰得而稱之偉哉道足以利物德足以利人行足以利己而又能不自有不自恃不自宰所謂人貌而天天德深矣遠矣廣矣大矣人侔於天而不謂之玄德而何道德真經集義卷之十五
