body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正載營魄章黄茂材曰載營魄抱一能無離乎營動也魄陰也陰屬形形本不能動氣載之而動人能習使氣不離其形是謂抱一不言氣者唯此爲可以生無有二也專氣致柔能如嬰兒乎能抱一矣乆而自能忘形而專養乎炁故不言形凡人所以與物爭者累於形也能忘其形歸於嬰兒則無爭之之患故曰致柔柔者生之徒滌除玄覽能無疵乎夫至此併與形氣而忘之矣洗滌其心慮盡垢除等於太空豈復有疵愛民治國能無爲乎夫學道而至於無爲豈一日之積哉抱一矣致柔矣玄覽無疵矣然後可以至於無爲儻未能是而强欲至於無爲之地夫是之謂坐馳去道益遠國譬則其身也民譬則其神也愛民治國與其身同天門開闔能無雌乎天門𩕄門也今嬰兒腦顖中開闔不住修眞至此可以上通天道故謂之天門雌與牝同明白四達能無知乎無知者無所不知猶人開眼而視無所不見何嘗曰吾有見焉有見有不見謂之眼病有知有不知謂之心病自抱一凡六進而後至於無知是以齧缺問於王倪四問而四不知齧缺因躍而大喜良有以也生之畜之至是謂玄德經凡兩言此矣前者所言道也今之所言德也道降而爲德德之妙者復與道合故謂之玄德程泰之曰載營魄抱一能無離乎一者總萬之名也方喜怒哀樂欲發而未發聰明知慮欲形而未形管萬爲一精粹無離即由道出一之初也道一而已本道而著諸事其可名以德者則固異於道矣由所得之德而分仁義禮智信以名之則原遠而末益分向之著迹而全者今遂列敵爲五而五之支裔又有不可勝數者焉故老子薄之而爲之言曰失道而後德失德而後仁義禮也夫其謂失者非亡逸之謂也去本轉遠則命數愈多益與一戾也是以老子之所最貴有存乎妙徼混同之初而伊尹自言其得則亦屬乎德善克協之地也稽合初終率皆凖一以爲之則也列子之論多岐亡羊也曰惟反同歸一爲無得喪莊子曰德總乎道之所一曰總曰歸則皆從夫命復也故此之體道必以抱一爲首也人之神氣爲魂形體爲魄月之質不受日光者亦命之爲魄此之營魄即易之遊魂而對出者也遊者能輕揚入出而營魂之營則如營舍屯聚然有所拘制而不能自主其運動矣故形神之或升或降最爲一身機要也神能載形則趨向施爲惟我所運若神之不王反爲形體之所屈伸則衰矣今也以神爲卓以形體爲物車行而物乘其上是其神已能載形矣人而能此則意之使形如卓運物欲東而東欲西而西惟所欲之有聽無拒以之抱一殆不難矣特不知其於載形而抱一也能終不舍去以否焉耳故乎之乎之者疑之也以疑辭審諗末者使之循以自省也故莊子論衛生之經曰能抱一乎能無失乎正此意也凡此章皆爲望道已見而守之未堅者言之也若抱一而能不離致柔而能如嬰兒直與道一矣若使老子從此地眞言則疑辭當爲决辭矣凡此章下文設乎以示疑者其義皆類此也專氣致柔能如嬰兒乎列子之形容嬰孩也曰氣專致一和之至也物不傷焉德莫加焉言其生厚而未遷於物也孟子曰大人者不失其赤子之心者也言其雖已交物而不忘其初也合二者而言故惟常德不離者爲能復歸於嬰兒也人之將有爲也氣實奉志而行焉其於致志如風之暢達寒暑也苟惟氣不他用專以致柔及其致之而至則和不傷物者復矣特不知其能及此否耳滌除玄覽能無疵乎玄者窈深不測之謂也玄牝玄德玄同玄覽皆從窈深而形容其地也覽者以瞻視言之也冥冥之中獨見曉焉是其見之窈深者也是見也人皆有之惟其心源不清隨物而往則耳目之官且復蔽翳而何曉之能見也哉南榮趎之問老子曰目之與形吾不知其異也而盲者不能自見老子略舉性情之本以警之趎遂有寤於是退而就舍召其所好去其所惡十日而復見老子老子嘉其能自灑濯也趎之問者目力也而老子所告則性情也趎能灑濯其性情則蔽翳自去得其本矣故夫滌除玄覽者非致力於目也究其何以致翳從而灑濯之則凡其可以見曉者還復其初矣復初而其覽玄矣愛民治國能無爲乎愛民治國必有具以行其意乃能有成則凡立政立事皆其具也既以有具而又戒其作爲者莊子固嘗明之矣曰聞在宥天下未聞治天下也其在宥之說則黜聰明屏賞罰順性命之情而安安之從容無爲而萬物不累焉有超乎紀綱法度之上者矣此其所謂無爲者也故夫務因循者則不能以有爲而求治甚力則常失諸多事故此之致戒猶曰孰能愛民治國而不至於出意作爲也乎夫任理無作則後章之治大如烹鮮者是也是其所以得云無爲也天門開闔能無雌乎莊子嘗指宇宙萬物生死有無出入之地以爲天門則是天之天門也又嘗論道之不可言傳者而曰其心以爲不然者天門不開矣則又以人心爲天門也天之天門既爲生化出入之地故人之天門亦其天機出入之所也造物者之翕張陰陽迭連生化也是爲能制天門之出入者也人之涉世能謹存亡於操舍審當否而迎拒則一身之天門亦能制其開闔矣存養至此固已蓋天下而出其表尚能當可而動不爲物先豈不益善乎明白四達能無知乎明則無所蔽障白則不至黯闇四達者無門無旁四皆通徹也所謂遠在八荒之外近在眉睫之間介然之有唯然之音來干我者我必知之是明白而能四達者也人之能及乎此也患在鋭於用智無事則太察遇事則太鑿也若有得乎道則不然矣未嘗有見也而見因物生蓍龜之智水鏡之明皆其則也苟其持養未及乎此則聰明睿智而愚以守之或能不暴其有也乎生之畜之本無而創有故得云生如道生一一生二者是也因其已生而堅凝之則爲畜如以畜其德者是也凡此章所指自抱一致柔已下皆其執德而求復乎道者也一柔元達之求以德言也無離無疵之是冀則求復乎道也載專滌除之類所以致其德也能致則能生矣一柔元達於我乎居則其能畜者也孝悌之生仁可欲之生信也皆其所謂生也仁既生矣而有以樂之使不去善既信矣有以充之而至實則生而又畜之謂也生而不有本無也而我爲生之顧不肯攬爲己有此體道者之高致也前之生畜以成德也此之不有者有而若無實而若虚不居其成者也爲而不恃莊子所謂當而不自得故不恃也長而不宰高出其上而默連之不明施其宰制之方也若眞付之不宰則孰斡其柄是謂玄德前之八乎而八疑者慮其未能有及也苟皆確乎能之則其德備矣備此八德而又將之以不有不恃不宰則其爲德窈然幽深矣故揆諸衆德而此獨爲玄也德者道之著乎事者也非與道異也謂失道而後德者惡其迹之著耳若上德不德則其迹藏而深矣故凡言玄德者其名固不離德而其深與道等矣莊子設爲孫扁問答曰至人忘其肝膽遺其耳目芒然彷徉乎塵俗之外逍遥乎無事之業是謂爲而不恃長而不宰今汝飾智以驚愚修身以明汙昭昭乎若揭日月而行何暇乎天之怨哉於是從其揭日月者對觀而反求之則玄德之地可想矣論後章之言道生德畜也又極諸不有不恃不宰者正此章之復出而詳盡者也而有異焉此章道德之在人者也後章則夫人交具也於是老氏之言有及乎天地聖人者或時不加别異槩而言之以示天人無二致也此又其一書之通例也不可謂言天則專於天言人則專於人也朱紫陽曰屈子載營魄之言本於老氏而楊雄又因其語以明月之盈缺其所指之事雖殊而其立文之意則一顧爲三書之解者皆不能通其說故今合而論之庶乎其足以相明也蓋以車承人謂之載古今世俗之通言也以人登卓亦謂之載則古文史類多有之如漢紀云劉章從謁者與載韓集云婦人以孺子載蓋皆此意而今三子之言其字義亦如此也但老子屈子以人之精神言之則其所謂營者字與熒同而爲晶明光烱之意其所謂魄則亦若余之所論於九歌者耳楊子以日月之光明論之則固以月之體質爲魄而日之光耀爲魂也以人之精神言者其意蓋以魂陽動而魄陰靜魂火二而魄水一故曰載營魄抱一能無離乎言以魂加魄以動守靜以火迫水以二守一而不相離如人登卓而載載於其上則魂安靜而魄精明火不燥而水不溢固長生乆視之要訣也屈子之言雖不致詳然以其所謂無滑而魂虚以待之之語推之則其意當亦出此無疑矣其以日月言者則謂日以其光加於月魄而爲之明如人登車而載於其上也故曰月未望則載魄于西既望則終魂于東其遡於日乎言月之方生則以日之光加被於魄之西而漸滿其東以至於望而後圜及既望矣則以日之光終守其魄之東而漸虧其西以至於晦而後盡蓋月遡日以爲明未望則日在其右既望則日在其左故各向其所在而受光如民向君之化而成俗也三子之言雖爲兩事而所言載魄則其文義同爲一說故丹經歷術皆有納甲之法互相資取以相發明蓋其理初不異也但爲之說者不能深考如河上公之言老子以營爲魂則固非字義而又并言人載魂魄之上以得生當愛養之則又失其文意獨其載字之義粗爲得之然不足以補其所失之多也若王輔嗣以載爲處以營魄爲人所常居之處則亦河上之意至於近世而蘇子由王元澤之說出焉則此二人者平生之論如水火之不同而於此義皆以魂爲神以魄爲物而欲使神常載魄以行不欲使神爲魄之所載洪慶善之於此書亦謂陽氣充魄爲魂魄能連動則其生全矣則其意亦若蘇王之云而皆以載爲以車承人之義矣是不唯非其文意且若如此則是將使神常勞動而魄亦不得以少息雖幸免於物欲沉溺之累而窈冥之中精一之妙反爲强陽所挾以馳騖於紛拏膠擾之塗卒以陷於衆人傷生損壽之域不自知也其於二子之意何如哉若其說楊子者則皆以載爲哉固失其指而李軌解魂爲光尤爲乖謬至宋貫之司馬公始覺其非然遂欲改魄爲朏則亦未深考此載字之義而失之愈遠矣唯近歲王伯照以爲未望則魂爲明所載似得其理既而又曰既望則明爲魄所終則是下句當曰終明而不當爲終魄矣以此推之恐其於上句文義之鄉背亦未免如蘇氏王氏之云爲自下而載上也大抵後人讀前人之書不能沈潜反覆求其本義而輒以己意輕爲之說故其鹵莽有如此者况讀楚辭者徒玩意於浮華宜其於此尤不暇深究其底藴故余因爲辯之以爲覽者能因是而考焉則或沂流求源之一助也詹秋圃曰載營魄至是謂玄德能爲章謂人能有取於無知無雌乃能終始相忘於無事也廣推愛惠以安民治國者吾能使之不知其所自來天玄也雌牝也天門開闔而能使之不爲雌牝隨聲以相應和此心已各明白四達而能使之泯其知識終始相安是能無爲而無不能爲矣張沖應曰載營魄抱一至是謂玄德魂屬於肝魄屬於肺魂以天之炁而爲魂魄以地之精而爲魄人有此身包載其魂以營守其魄也有能抱天地純一之精炁交感相生不相乖離則專氣致柔而精化爲炁陰消陽長而魄寧魂清寂然其中神如嬰孩塵垢除滌無所揉雜耳聰目明所覽玄矣安有疵病其身哉推而用之以之治國則屬我之精生民之炁而愛民治國自有不可知之妙反而行之天門開闢則百竅不塞而雌魄化爲雄炁雌魄不可得而亂地户潜通則不言而化行明白四達而道滿天下人有不可得而知故曰生之畜之謂之眞炁既生則加畜養之又曰生而不有謂炁生矣不可有虧耗之失又曰爲而不恃謂精化爲炁不可恃其已化而起彫害之心又曰長而不宰謂之生而必養之養之而又加愛護之毋容宰割其炁以害其生則其玄我得之矣是謂玄德張靈應曰人有此身得天之一而有此元炁得地之一而有此元精子時而一陽初動午時而一陰初生把握得此精不失炁不損這我神如何得而不寧也藏精養炁工夫只在子午一升一降時抱負得穩却從漸而入自然日積成功白玉蟾曰載營魄安心抱一能無離乎甚處去來專氣致柔純清絶點能如嬰兒乎混然一片滌除玄覽無心於事無事於心能無疵乎身心如一愛民治國怡神養氣能無知乎無念無爲無思無慮天門開闔心地開明能無疵乎一而不二明白四達一理燭物冰融月皎能無知乎終日如愚生之畜之一心所存包含萬象生而不有心同太虚爲而不恃智周萬物長而不宰泰然無我是謂玄德廖粹然曰載營魄既知其子復守其母抱一靜心能無離乎道不可須臾離專氣致柔用志不分乃凝於神能如嬰兒乎返歸童蒙無欲無爲滌除玄覽不見不聞内外清虚能無疵乎故無病患愛民治國人主以道愛天下吾亦愛神而守神能無爲乎故不妄作天門開闔頂門擘破陽神出入能無雌乎陰鬼自消决無魔障明白四達神光烜赫流盻八方能無知乎自然而然不得而知生之畜之道自生我德亦成我生而不有返本歸根忘形忘我爲而不恃施恩於我不望我報長而不宰長我成我故無害我是謂玄德所謂有道德自成矣陳碧虚曰載營魄抱一能無離乎道家以陽神曰魂魂樂其生陰鬼曰魄魄好其殺魂則遊魄則靜白虎通曰魂者云云也營者營營不定貌故謂魂爲營也舊說曰載乘也營魂也又謂營護陽氣也夫魂爲陽精魄爲陰靈陽精喜動逝故仙書有拘留之術陰靈喜浮惑故仙書有制伏之法使其形體常乘載陽精陰靈抱守太和純一之氣令無散離永保長年矣夫道之抱一如鑑之含明明豈離鑑乎此教人養神也今解曰能無離乎者老氏審問之辭也猶如說戒曰能持否之例是也夫人欲要抱一之術當能心無散離乎若無散離者即是乘載魂魄抱守純一之道也能如嬰兒乎下皆以此義釋之專氣致柔能如嬰兒乎舊說曰專一也任也氣者沖和妙氣也又自然之氣也夫人卓然獨化禀自然沖和妙氣氣降形生自無染雜若乃專任沖妙知見都忘使氣自純和形自柔弱不爲衆惡所害是得嬰兒之全和也此教人養氣也今解曰能如嬰兒乎者言人欲專氣致柔之術當能如嬰兒純和乎若能如嬰兒之純和即是得專氣致柔之術也滌除玄覽能無疵乎舊說曰滌洗也除遣也理也淵覽心照也疵瑕病也夫人當洗滌塵垢除遣五情内外清虚心照萬事瑕疵之病瑩然不生此教人修心也自此上三事約人修身自此下三事勸人治國也經曰修之身其德乃眞修之天下其德乃溥也今解曰能無疵乎者言人欲要洗心除垢冥察内外之事當能自省己躬無有疵瑕之病乎若能無疵瑕之病即是滌除玄覽之法也愛民治國能無爲乎舊說曰愛民者當愛民如赤子臨政不可苛虐賦役不可傷性治國者當務農簡事使民各遂其業而安其生斯無爲之化也今解曰能無爲乎者言人君欲愛養萬民令不傷天性治國務農使無繁細當能清靜無爲乎若能清靜無爲即是愛民治國之術也天門開闔能無雌乎天門者自然之門也自然生太極太極生天地天地生陰陽陰陽生萬物死萬物生死由之而往來故謂之天門開謂散施闔謂歙歛開則生成闔則衰滅雖生萬物而未見其生生者雖死萬物而未見其死死者生生死死而莫見其形得不謂之自然乎能體自然者其唯大人乎夫大人量包宇宙氣含陰陽所爲雌靜則生死王衰不入于胸中雌靜者自然之妙用也此戒治身治國者當以雌靜是守舊說曰天門者北極紫宫之門也天有北極星在紫宫之内宫内又有五帝迭相休王故門有開闔也開則爲泰闔則爲否故春時青帝門開餘門皆闔四時之例如此且五運終始曆數之變興廢不常唯聖人知天知命常守雌靜則不爲變動所傾故永亨元吉也或以治身論者天門謂鼻口也開闔謂喘息呼吸也言人雌靜柔和則氣息深遠綿綿微妙致其精神恬然自在無爲也今解曰能爲雌乎者言天門開闔休王者乃曆數之常唯能雌靜謙下故陰陽不能移寒暑不能變也明白四達能無知乎舊說曰明謂慧照也治身者雖有慧照之心聰明通達若無見聞治國者其德明白如日月之照四達海内當塞聰蔽明能如無知使天下百姓日用不知是謂有道今解曰能無知乎者欲得智慧明白四達天下者先須收視反聽當能常守無知乎若能無知者即是智慧明白四達之原也生之畜之至是謂玄德言修身治國能行上六事即如道之生物不塞其原任其自成而已德之養物不禁其性全其素分而已夫萬物卓爾獨生聖人豈有乎哉羣類各自營爲聖人何恃乎哉且物自長養聖人安所主宰乎哉斯乃忘功忘物洞入冥極是謂淵德也王弼曰淵德者有德而不知其主出乎幽冥也謝圖南曰載營魄至無離乎書曰哉生魄指月十六日也月自既望之後魄生則明死陰初長也人之一身魂爲陽而魄爲陰當陰生之時魄方營營求進而能守一不離則不爲陰所勝矣一者天之玄也陽也施之國家則小人不得以勝君子同一道也專氣致柔能如嬰兒乎黄石公曰柔能勝剛弱能勝强養身之道以柔爲本其氣不專則强暴之陽得以間之當如嬰兒之未孩柔之至也人之多慾必爲强陽所使不可不戒也滌除玄覽能無疵乎經曰聖人雖有榮觀燕處超然則玄覽之謂也垂旒蔽目不欲目與物交蓋外交乎物則内心從之修身之道不見可欲使心不亂滌除其外則接乎吾前皆玄微矣無疵者人欲不得以間天理也愛民治國能無爲乎修身所以爲治國乎天下之本内心清明不爲嗜慾所奪則以之愛民以之治國可以爲無爲事無事矣堯之非心舜之恭己皆此道也天門開闔能無雌乎經曰塞其兊閉其門終身不勤天門指在上乾宫也雌陰也天門開闔貴有常度而陰邪之氣不得以間之則吾身理矣施之國家則闢四門而小人勿用者是也明白四達能無知乎視非以目而以道則明可四達䟽通無蔽而物來能名也私欲間之近在目睫且不及見而況於遠乎能無知者不求知也不出户而知天下不窺牖而見天道此豈可以有知知之乎關尹子曰一情冥爲聖人生之畜之至玄德人偽既銷天理自長施之吾身則積善在身日加益而不自知者也施之天下無一民一物不在生育長養之内而未嘗以功自居此所以爲玄德玄天也宰主也蓋嘗論之陽之有陰陰之有陽不能免也而聖人常欲進陽而退陰豈非陽爲君子陰爲小人乎陰在吾身則足爲吾身之累小人在國家則足以爲國家之害治身治國無二道也是故無思無爲而不失赤子之心不識不知而盡屏外邪之氣則一身可以優游矣推之天下國家復何爲哉茫然天連窈爾神化蓋有不知其所以然而然者豈非玄德乎舜之天德出寧文王之順天理物其謂是乎林鬳齋曰載營魄至是謂玄德營魂也神也魄精也氣也此三字老子之深意載猶車載物也安一載字在上而置營魄二字於下如謎語然魄以載營則爲衆人營以載魄則爲聖人合而言之則營魄爲一離而言之則魂魄爲二抱者合也其意蓋曰能合而一之使無離乎將離而二之乎故曰抱一能無離乎此六字意亦甚穩正要人自參自悟也嬰兒未有聞見則其氣專致者極也柔者順也能如嬰兒專氣致柔則能抱一矣故曰能如嬰兒乎此老子設問之語也蓋曰人能如此乎此下數句皆然蕩滌瑕垢而觀覽玄冥則必有分别之心無疵者無分别也雖蕩滌瑕垢而有不垢不净之心則能抱一矣有愛民治國之功而有無爲而爲之心則能抱一矣陰陽闔闢有雌雄交感之理而無雌雄交感之心則能抱一矣天門即天地間自然之理也此亦借造物以爲喻縁此等語遂流入修養家或有因是而爲邪說者誤世多矣明白四達無所不通也而以無知爲知則抱一矣生之畜之言造化之間生養萬物也造化何嘗視之以爲有何嘗恃之以爲能雖爲萬物之長而何嘗有宰制萬物之心如此而後謂之玄妙之德此章之意大抵主於無爲而爲自然而然無爲自然則其心常虚故以神載魄而不以魄載神此聖人之事以魄載神則着迹矣老子一書大抵只是能實而虚能有而無則爲至道從說横說不過此理范應元曰載營魄抱一能無離乎營魄魂魄也内觀經曰動以營身之謂魂靜以鎮形之謂魄河上公曰營魄魂魄也魂屬陽魄屬陰一者道之一也謂身載魂魄抱道之一頃刻無離人能之乎專氣致柔至能無疵乎專者靜定不撓之義疵黑病也夫嬰兒氣專而和柔謂不撓其炁以致和柔俾常如嬰兒之時人能之乎心不虚則不明不明則不通謂滌除私欲使本心精明如玉之無瑕疵鑑之無塵垢則冥觀事物皆不外乎自然之理人能之乎愛民治國能無爲乎謂抱一專氣滌除等事既以修身明心可推充此道以及人物即愛民治國之本也循自然之理以應事物莫不有當行之路則何以智爲愛民者非區區愛之但不害之即愛之至也治國者非區區治之但不亂之即治之至也人能之乎天門開闔能無雌乎天門者以吾之心神出入而言也心神本不可以出入言然而應物爲出應己爲入出則開而入則闔不可不如是而言也莊子天運篇載正者正也其心以爲不然者天門弗開矣成玄英註亦云天門者心也雌者言其主靜而和柔也亦感而後應之義河上公并蘇註皆作爲雌一本或作無雌恐非經義蓋當經中有知其雄守其雌也理亦當作爲雌謂吾之心即天之心當於一動一靜之際常爲雌柔使神氣和順則陰陽之炁一開一闔亦和順矣明白四達能無知乎明白虚也四達通也謂此心虚明坦白四達皇皇感而後應而常虚無以私意爲之人能之乎蓋此心無爲而無不爲也無爲是本無不爲是末然本末一貫得其本則以一行萬而逐處皆是通乎末則會萬歸一而無時不中但人當守其本則末自歸一爾生之畜之至是謂玄德畜養本也蓋謂萬物皆根於道而生本於德而養然生之而不以爲己有爲之而不恃其功至於長成而不爲之主故萬物各得其所而不知所以然而然是謂玄德也聖人體道而無迹大而化之是以百姓不知帝力玄之德也薛庸齋曰載營魄抱一能無離乎文玄先生曰運載魂魄抱守眞一能不相離乎至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者之交通也然後運載日月之精華呼吸天地之根蒂子母相守猶魚在水此長生乆視之道也王褒謂聚精會神得非有所知乎專氣致柔能如嬰兒乎專一養氣而致骨弱筋柔能如嬰兒乎滌除玄覽能無疵乎能玄覽萬物之化而不能無瑕疵者猶有玄覽在焉耳若能滌除玄覽則無瑕疵矣愛民治國能無爲乎心君也身國也精氣民也君能無爲而治則國以富而民以安其或有爲非徒無益而返害也天門開闔能無雌乎天門開闔元神所以出入也若靜而有其靜則神其窒也明白四達能無知乎神室廓然無一物則明白四達矣或有所知其能明白乎生之畜之至是謂玄德生畜萬物不恃賴其功成長萬物不宰割而用使萬物莫知所謝豈非玄遠之德邪老子之道長於治身除清靜無爲之餘清深隱奥莫之能測者其惟名神載營魄乎古今解義各不相師論理性者譏其小工修鍊者失之粗殊不知此聖人之機要也文人不能騁其辭談士不能利其辯會當耳授心聽志勵力行然後可與釋其義爾休休庵曰載營魄至是謂玄德人之靈明字之曰心曰神神俗謂之魂神氣曰魄前因妄爲勞神而氣衰今知其非息念寢機營養神氣契合情冥大道是謂抱一能永無失乎專一眞氣而致柔順能無念無欲如出胎之嬰兒又當洗滌玄妙見解瑩淨無一點瑕疵乃見了事修身齊家治國平天下能任無爲之道無作之德者内則心情氣順外則民安國治也天門開闔能爲雌乎天者心也門者萬法由是而出開闔者放收也雌者柔也玄機妙用或收善柔和而無剛利之害履踐相應微妙玄通廓達無礙而不自矜自伐兀兀然如無所知者三才任道而生萬物以德畜養雖然生之畜之而不言有其功爲造化之主而不恃其尊萬物承恩皆得生長而不作主任其自然生長成化是謂大道之得也褚伯秀曰載營魄至是謂玄德篇首載字諸解難通蓋以前三字爲句抱一屬下文與後語下類所以費辭牽合嘗深考其義得之郭忠恕佩解集引開元詔語云朕欽承聖訓覃思玄宗頃改正道德經十章載字爲哉仍屬上句及乎議定衆以爲然遂錯綜眞詮因成注解此說明當可去千載之惑蓋古本不分章後人誤以失之道哉句末字加次章之首傳録又訛爲載耳五十三章末非道也哉句法可證今按玄宗道德經亦是作載以載初解杜光庭又以運載解不曾離章作哉不知郭忠恕集中所出合以褚氏引用姑存其說定觀經云動以營身謂之魂靜以鎮形謂之魄魂陽清而升魄陰濁而墜陽動陰靜互成造化二氣寄形推連不能反歸其根日消月殺葉去樹枯矣聖人教使魂魄皆抱于一一者道之所生爲數之始爲物之元在人則性初是也魂魄抱一不離則動靜兩忘去道不達專守其氣使無間斷故能致極乎柔不爲喜怒所動守氣不專則强陽得以間之遇觸而發暴逸散蕩氣非形有神亦不能自存矣可不慎諸如嬰兒言其無知識喜怒純然一團和氣而已此是玄門祕密工夫世傳鍊氣調息法出於此多流入旁門罕得其正道本乎夷恬淡不離日用虚心無爲道自居之而學者多存玄妙之見求諸寥廓之表愈求愈疏滌除去盡歸其本初道體自全何雌之有國以喻身民喻神氣能無以知乎古本如此後文以知治國國之賊可證天門者萬物萬化出入於斯陽開陰闔以神其用聖人密弘此道必以雌靜爲主故燭理明而應物不勞以至明白四達能無以爲乎古本如此俗行河上本愛民下作無爲明白下作無知二字正相反無以爲猶云無所爲恐聰明妨道故教令無爲已上皆治身事到此當以生物爲心生而不有其功爲而不恃其力端居物長不以宰制自尊是謂深玄至妙之德非世人所能測識也牛妙傳曰載營魄抱一能無離乎載者再也營者生也魄者月也抱一者月之始生也夫魄消謂之月盡魄載營謂之月一蓋月之初生始有一點之明月能抱之漸而增長以至於圓滿著明也由是觀之月尚不能離乎一點之明而常抱之而況於他乎此善言從微方成著從一方到萬夫一者道也凡天下事物何莫由斯道也孔子曰道也者不可須臾離也夫人有道則生無道則死曰生曰死在夫能抱一與不能抱一之間耳專氣致柔能如嬰兒乎專者一也氣者體之充也蓋人生天地間呼吸往來而爲命者不過氣而已矣夫所謂嬰兒者天理純全人欲未萌及其既長感物而動人欲漸起以失其固有之良心遂致好惡無節於内聲色知誘於外由是衰相自見也人能一其志無暴其氣則其體和而柔輕而健其猶嬰而處子也列子曰嬰孩也氣專志一和之至也物不傷焉德莫加焉此之謂也滌除玄覽能無疵乎滌者洗滌除者蠲除玄者道也覽者觀也疵者瑕疵謂過失也言爲人之道常洗滌身心蠲除外慮覽觀道妙使爲窮理盡性之人於天地之間可以無大過矣安有瑕疵之稱哉庸常論天心其猶鏡也不滌除不明道猶影也不觀覽不見是以道學君子常加存養省察之功使無少有間斷則明德常明不復爲嗜欲所昏如人之一日沐浴而日日沐浴又無日而不沐浴使其䟽瀹澡雪之功無少間斷則身常潔清而不復爲舊染之污則鑑明塵淨心照道明此則滌除玄覽之說矣愛民治國能無爲乎夫民爲邦本本固邦寧故治國者必先於愛民愛民之道在乎無爲也無爲者不撓也如昔者唐太宗嘗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常於中出於是輕徭薄賦選用良吏自是之後海内昇平人民衣食有餘外户不閉行旅野宿此非愛民治國無爲不撓之說乎天門開闔能無雌乎天門者口也蓋口爲一身之門户人頭圓象天故以口爲天門也開闔者謂呼吸也雌者雌雄也夫開闔呼吸雌雄謂陰陽也陰陽者動靜也易曰一動一靜互爲其根一陰一陽是之謂道能繼之者善也此蓋言人孰能有呼而無吸耶有靜而無動耶故曰天門開闔能無雌乎也眞定經云夫動二以爲陰靜一以爲陽陽一則有變陰一則守常知常悟明抱一契靈坎離交固變化自然此論陰陽不偏枯動靜等對故云天門開闔能無雌乎明白四達能無知乎明者聰察也白者明敏也達謂通也夫聰察明敏之人其能四通而八達不出户可以知天下不窺牖可以見天道其孰謂之無知乎夫知者謂能察四方咨四岳知四民也非明白四達之君不能知之矣如堯之闢四門明四目達四聰是也夫君天下者以四方之耳爲耳而不私其耳故能通天下之志盡天下之情以四方之目爲目而不私其目則天下之明皆我之明也是以明無不鑒聰無不聞其孰謂之無知乎此明白四達之義也生之畜之生而不有生者謂生成也畜者謂長養也不有者謂不自有其功也且如天地也天地生成萬物而萬物未嘗以爲天下之功如聖人也聖人仁育天下而天下未嘗以爲聖人之惠非天地無功聖人無惠也蓋功深而形不露惠博而體不顯是以蒙其功而不知其功受其惠而不感其惠於此見天地聖人之大矣向使天地聖人自矜以爲功則非所謂生而不有也經曰天地不仁又曰聖人不仁此皆生而不有之說也爲而不恃至是謂玄德夫聖人者爲人中之尊然其未嘗矜以自恃蓋聖人制世御俗獨化於陶鈞之上不牽乎卑辭之語不奪乎衆多之口故爲而不恃長而不宰也然聖人未嘗自尊而未嘗不遵聖人之德愈大愈小愈高愈下愈明愈晦此其所以爲聖人也故云玄德易曰謙謙君子卑以自牧也非斯之謂乎楊智仁曰載營魄至是謂玄德營魄者魂魄也當愛養之喜怒亡魂驚悸傷魄安靖則壽命延長人身如船筏屋宇能包載其魂以營守其魄使之歸一不可須臾離也出爲行布爲德專而無二之謂也使一炁柔和抱純素而守之其性如赤子之慕慈母若嬰兒之未孩滌除心垢不染一塵善惡俱泯心意雙亡藏其器而待其時愛民治國喻一身也治身者愛炁即身全治國者愛民則國安其人之自性輝輝朗朗純清絶點内則明徹外則如愚天者本性也門者收放之謂也明白四達者天之明無非日月輝光人之明一性湛然雖然恁麽亦有無知暗昩者易曰闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通生畜之說生陰陽而畜至精向無中生有爲而不自恃長而不宰是謂玄德之妙也中庸曰君子尊德性而道問學致廣大而盡精微極高明而道中庸温故而知新敦厚以崇禮是故居上不驕爲下不倍國有道其言足以興國無道其默足以容詩云既明且哲以保其身其此之謂歟喻清中曰載營魄至是謂玄德鬳齋林氏曰營魂也神也魄精也氣也此三字老子之深意載猶卓載物也安一載字在上而置營魄二字於下如謎語然魄以載營則爲衆人營以載魄則爲聖人合而言之則營魄爲一離而言之則營魄爲二抱者合也人能常合而一之則眞精不散不然則一者離矣故老子痛下鉗椎而曰能無離乎如說戒曰能持否之例是也惟大人不失赤子之心赤子之心良知良能其氣靜而專又能柔順以致之謂無暴其氣也是能合而一之矣滌除邪妄觀覽玄冥豈無瑕疵之可指治國愛民必如文帝躬修玄默是蓋傳黄老之清靜外此則皆有作爲之勞天門開闔乃精氣出入之關純陽用事雌陰也能無雌乎者慮陰氣以乘之耳明白四達固無所不通矣不在乎察察以爲知也毓之養之生機流動而不有其功事卒能應而不恃其長道心常爲一身之主而無宰制羣動之勞是謂之玄妙之德此章是修心養性工夫中有治國愛民之方老子勉時君以無爲自然之治故發爲能無乎之語皆警省之言也三代而下惟文帝知之說天門者北極紫宫之門也天有北極星在紫宫之内宫内又有五帝迭相休王故門有開闔開則爲泰闔則爲否故春時青帝門開餘皆闔四時之例如此或是一說今並存之胥六虚曰載營魄抱一能無離乎人之形備載魂魄猶卓之載物經曰營魄不曰魂魄者蓋魂主動動者能營連一切故曰營魄也内觀經曰動以營身謂之魂靜以鎮形謂之魄抱一能無離乎者非别有箇一可抱使之不離也言其魂魄二義不一者魂則變遊無定魄則固凝不化故教之抱持爲一則魂魄無偏間之失若然者其動也一其靜也一無所往而非一何離之有哉專氣致柔能如嬰兒乎夫精專氣浩極致柔和如嬰兒乎者嬰兒終日不知不識淳全樸全氣專志一骨弱筋柔而握固也滌除玄覽能無疵乎滌謂洗滌其嗜慾之心除謂去其好惡之情玄天也覽照也嗜好既亡天光自發照覽眞源能使無一點之疵則善矣疵病也如或去之有一點不淨乃世世生生沉迷之病根矣已上三節語進志於道者之要已次論國君愛民治國之道也愛民治國能無爲乎愛民治國事分二義一以無爲言者蓋愛民以無爲則民安治國以無爲則國寧夫無爲者非拱默端坐也謂因民之所利而利之其愛博因國之當治而治之其治大此能無爲也通玄經曰夫無爲者不先物爲也又曰因即大作即細如欲以小惠爲愛民以嚴峻刑法爲治國其細也夫天門開闔能無雌乎天門者天下之大本吉凶治亂之所從出造化自然之門户也夫道有通塞時有否泰此造化自然之理猶門户之闢闔不可得而度也知者居雌靜以俟之則無不善否則作雄作倡多見其殆矣明白四達能無知乎人君聰明博識無所不通明白四達也能韜晦其知而委賢受能端拱垂裳國治而心不勞壽長而天下泰生之畜之至長而不宰人君牧民任其自生自養安於無事故曰生之畜之也雖寬之宥之由其生養亦不以爲有其恩上下相忘民受其賜故曰生而不有凡所施爲無非澤利天下及其功成事遂不以爲己有故曰爲而不恃君者兆民之長也居民之長而宰制之令不施民知有其君而已矣優哉游哉故曰長而不宰是謂玄德玄天也君脩若此是之謂與天同德也柴元皋曰載營魄身載魄即車載物也魄識好營擾謹載之常防覆身抱一能無離心不二用則谷神活專氣致柔能嬰兒氣不從鼻散則胎息全滌除玄覽能無疵神不從眼漏則慧志圓愛民治國能無爲主宰不爲形體役則筋骨强天門開闔能無雌闔闢無間斷則不離母明白四達能無知精氣不爲聰漏則心識淵生之畜之善於保養生而不有至是謂玄德常存其體以制其用則不矜而魄安矣故養成聖德蘇敬靜曰載營魄至是謂玄德此章老子本意只在生而不有爲而不恃長而不宰着意却以載營魄抱一爲題營舍也魄氣也魂神也載猶卓之載物營猶舍之居人魄雖爲魂之營舍然魂所欲行則魄無不從猶載之以車而行也此爲魂魄合一魂魄二者當合而爲一不當離而爲二離而爲二則有魂無魄有魄無魂人非其人而死矣老子遂設譬言魂魄抱一五事嬰兒純一柔善其氣專其柔致致極也故能使魂魄合而不離此純固也滌瑕除垢覽觀玄冥則多索疵求若滌除玄覽而不索疵求則能使魂魄合一而不離此無心也愛民治國而能以無爲而爲則清靜自然自能使魂魄合而不離此清淨也天門開闔天理所從出也雌雄交感陰陽相配有其理而無其心則魂魄合一而不離此無欲也明白四達而能若無知無識則藏明於晦自能使魂魄合一而不離此藏明也大抵純固無心清淨無欲藏明則魂魄二者自能抱一魂魄抱一爲生生之源天道以生養萬物爲心而尤以人爲心生之畜之者天道也而魂魄相離則不能生老氏以五事教人而天地生物之仁爲無窮然天道生而不有何嘗自有其生之之功爲而不恃何嘗自恃其爲之之功雖爲萬物之長而無主宰之心是謂玄妙之德以魂魄抱一爲生生之本而以不有不恃不宰爲無容心生養之恩天與聖人一而已矣本一庵居士曰載營魄至是謂玄德魂魄之義先儒辯之詳矣愚按記禮祭義孔子曰魄者鬼之盛也鄭氏注曰耳目之精明爲魄此語最爲簡功朱氏謂營與熒同爲精明光烱之意是營魄者形體之神靈也夫人形生神發耳目鼻口之精明皆本於一性釋氏所謂元依一精明分成六和合者是也惟其爲物所引流蕩忘返是以形弊於外識亂於内忽焉而死魂升魄降不可復合欲其死而不忘難矣故知道者收視返聽迴光返照以復一性之源載者安住而不馳之謂抱者保合而不失之謂一則性也釋氏所謂返流全一六用不行明不循根寄根明發者是也寄根明發載營魄也返流全一抱一不離也此復性踐形之要道非眞修鍊形神長生乆視而已專不雜也致至也嬰兒無知思之誘以動其氣故其氣也專無物我之競以傷其柔故其柔也至人之持氣尚柔者能勉於蹔而不能常必如嬰兒然後爲至也此二者皆反之於有生之初惟滌除玄覽乃神聖之極功蓋滌除塵垢固眞見所自出外物有一塵之不盡則明睿有一毫之未了惟滌除之至使吾心目朗然則洞視萬物淨者固淨穢者亦淨無所揀擇不見瑕疵是爲至也治身既至於是推而治世應物愛民治國其常也天門開闔其變也易所謂一闔一闢謂之變是也爲雌者和而不倡後而不先之義其處常也無有爲之迹其臨變也無先物之心蓋無將無迎安乎自然而已明白四達而能無知則所謂聰明睿智守之以愚也生之畜之者德也生而不有爲而不恃長而不宰是德之而無德之之心乃德之玄也老子此章身治國之道備矣拾遺陸曰載由天也發語之端也石潭曰載營魄抱一能無離營古註以爲魂蓋魂即月之明也魄即月之魄也月受日光以爲明魄必載魂則生而不死抱一者魄與魂合爲一未嘗離也專氣致柔能嬰兒人賦形氣以生陽氣既盛不能自制未免流蕩而失其眞惟能專守其氣而使之柔如嬰兒之雖䘒而未嘗知牝牡之合則善矣即下文含德之厚比於赤子之意滌除玄覽能無疵古說謂心覽於萬事易於感物而動故必滌除外欲而無一毫疵病可也愛民治國能無爲古注謂治身者愛氣則身全治民者愛民則國安含此兩意能無爲者以治身言則上章用之不勤也以治民言則所謂無爲而治也但河上公本作無知却與下段同意當以無爲爲是天門開闔能無雌程泰之謂莊子指宇宙萬物生死有無出入之地以爲天門雌者安靜柔弱能爲雌者言陰陽闔闢雖有生物之功而未嘗自以爲能生物也即生而不有之意明白四達能無知明白四達而能無知蓋此心雖無所不知而未嘗求其知所謂不思而得不慮而知也生之畜之生而不有爲而不恃長而不宰是謂玄德上文載營魄專氣致柔滌除玄覽專以治身言愛民治國天門開闔明白四達則兼以及物言此乃總下三句而言生之畜之萬物各得其所而不知所以然而然是謂玄德也即百姓不知帝力之意道德眞經集義卷之十六
