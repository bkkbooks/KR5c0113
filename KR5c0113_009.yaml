body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正道沖章考異河上公作無源章趙實庵作宣和布化義章唐明皇疏前章明貴尚不行無爲則至理此章明妙本之用在用而無爲首標道沖示至虚之宗物次云挫解明沖用之釋紛結以象帝之先欲令盡知其趣爾杜光庭曰大道之用其用不窮廣包天地細入毫髮澹然自得無虧無盈行之於身則光塵混一運之於内則紛鋭和平綿乎億劫之前乃居象帝之首萬法之内惟道可宗故爲萬有所歸趣矣趣向也張沖應曰此章謂天子至於庶人惟能運行此自然之道則當知無窮無極混元而不可知可已故曰無源道沖而用之或不盈淵乎似萬物之宗挫其鋭解其紛和其光同其塵湛兮似若存吾不知誰之子象帝之先考異或不盈之作或似不盈一作似不盈似或存一作似若存誰之子一作其誰之子河上公曰道沖而用之沖中也道匿名藏譽其用在中或不盈或常也道常謙虚不盈滿淵乎似萬物之宗道淵深不可知也似爲萬物之宗祖挫其鋭鋭進也人欲鋭精進取功名當挫止之法道不自也解其紛紛結根也當念道無爲以解釋和其光言雖有獨見之明當知闇昩不當以擢亂人也同其塵當與衆庶同垢塵不當自别殊湛兮似若存言當湛然安靜故能長存不亡吾不知誰之子老子言我不知道所從生象帝之先道自在天帝之前此言道乃先天地生也至今在者以能安靜湛然不勞煩欲使人修身法道王輔嗣曰道沖而用之至象帝之先夫執一家之量者不能全家執一國之量者不能成國窮力舉重不能爲用故人雖知萬物治也治而不以二儀之道則不能贍也地雖形魄不法于天則不能全其寧天雖精象不法于道則不能保其精沖而用之用乃不能窮滿以造實實來則溢故沖而用之又復不盈其爲無窮亦已極矣形雖大不能累其體事雖殷不能充其量萬物捨此而求其主主其安在乎不亦淵兮似萬物之宗乎鋭挫而無損紛解而不勞和光而不汗其體同塵而不渝其眞不亦湛兮似或存乎地守其形德不能過其載天慊其象德不能過其覆天地莫能及之不亦似帝之先乎帝天帝也唐明皇曰道沖而用之或不盈言道動出沖和之氣而用生成有生成之功曾不盈滿云或似者於道不敢正言也淵乎似萬物之宗淵深靜也道常生萬物而不盈滿妙本淵兮深靜故似萬物之宗主也疏沖虚也謂道以沖虚爲用也夫和氣沖虚故爲道用用生萬物物被其功論功則物疑其光大語沖則道常不盈滿或妙本深靜常爲萬物之宗云或似者道非有法故不正言爾他皆倣此挫其鋭解其紛道以沖和故能抑止銛利釋散紛擾若俗學求復則彌結矣疏挫抑止也鋭銛利也解釋散也沖虚之用物莫之違故銛利之心多擾之事念道沖和白抑止釋散矣此則約人以明道用注云俗學求復者莊子繕性篇云滑欲於欲俗學以復其初言銛利紛擾因欲而生故念道則挫解俗學則彌結矣和其光同其塵道無不在所在常無在光在塵皆與爲一一光塵爾而非光塵湛兮似或存和光同塵而妙本不雜故湛兮似有所存也疏道之沖用於物不匱在光則與光爲一在塵則與塵爲一無乎不在所在常無沖用則可混光塵妙本則湛然不雜故云似或存也吾不知誰之子象帝之先吾不知道所從生明道非生法故無父道者似存乎帝先爾帝者生物之主象似也疏吾者老君自稱也象似也老君云吾見至道沖用生成俱物尋責所以不測由來既無父道之人莫知道爲誰子生物必資道故似在乎帝先注云帝者生物之主易云帝出乎震輔嗣云帝者生物之主興益之宗又解云兆見曰象言此生物之帝能兆見物象故謂之象帝爾杜光庭曰道沖而用之至萬物之宗道常謙虚而不盈滿沖和澄澹處乎其中深玄寂靜爲物之主故物失沖和之道必至敗亡人失沖和之道則至死滅君失沖和之道則政擾民離臣失沖和之道則名亡身辱是以知沖和之道萬物恃之以安爲萬物之宗矣語其及物之功則光明遠大求其妙本則深靜常虚道非有法者不可正言其有而物皆有道也倣准效於此不敢正言也挫其鋭解其紛理國用沖和之道則無銛鋭之情以傷於物無勞擾之事以傷於人不傷於物則萬國來庭四夷嚮化兵革不起怨爭不興不尚於拓土開疆凌弱暴寡矣不傷於人則使之以時賦役輕省家給人足矣理身者解紛挫鋭外無侵競内抱清虚神泰身安恬然自適矣約人以明道者明人必資於道也莊子繕性篇云俗學以求復其初者言人既理性於俗矣而欲以俗學復性命之本所以求者愈非其道也俗學則彌結者銛鋭之心紛擾之事不以道挫而解之則拘於俗學彌加結固不可解也俗學者徇俗之學非日損之道也和其光至湛兮似或存沖和之道散被群生汎然坦然物無不在可謂和光同塵矣光者明淨也塵者混亂也有道之士不介然標異與衆同也匱乏也道雖散被群生至妙之本凝寂沖虚常不乏絶故云常存也吾不知其誰之子象帝之先帝者萬化厥初即有主宰形象肇立牧之以君故言象帝大道沖用能生萬化故在象帝之先也老君大聖豈不知至道之宗本耶設此疑似之詞用曉迷方之俗爾亦如上大道不可正言義也帝出乎震易繫辭也震東方卦也少陽之氣生化之源今以太子居東宫少陽之位御極爲出震之期蓋取象天地生育萬物之始也兆見曰象者無形曰氣兆形曰象生物之首也萬物之首象帝居先大道復在象帝之先言其高遠也然夫至道不終不始孰知其先哉亦强爲之容爾易曰帝出乎震萬物生也齊乎巽萬物潔齊也相見乎離聖人以南面向明而理也致役乎坤萬物致養也說言乎兊萬物所悦也戰乎乾陰陽相薄也勞乎坎萬物所歸也成言乎艮萬物終始也夫萬物出乎震而終乎艮終而復始循化無窮而象帝者在此出震之先道復先於象帝故能爲生化之王天地之元也人君體道用心志無滿溢淵然澄淨以御萬方外無銛鋭之爭下絶紛擾之事和天光而燭物含塵垢以居尊其無爲之化可齊乎象帝矣宋道君曰道沖而用之或不盈道有情有信故有用無爲無形故不盈經曰萬物負陰而抱陽沖氣以爲和萬物之理偏乎陽則强或失之過偏乎陰則弱或失之不及無過不及是謂沖氣沖者中也是謂太和高者抑之下者舉之有餘者取之不足者補之道之用無適而不得其中也注焉而不滿酌焉而不竭既以爲人己愈有既以與人己愈多道之體猶如太虚包裹六合何盈之有淵兮似萬物之宗莊子曰鯢桓之審爲淵止水之審爲淵流水之審爲淵淵虚而靜不與物雜道之體也惟虚也故群實之所歸惟靜也故群動之所屬兹萬物之所係一化之所待也故曰似萬物之宗然道本無係物自宗道故似之而已挫其鋭至同其塵锐則傷紛則離挫其鋭則不爭解其紛則不亂和其光莊子所謂光矣而不耀是也同其塵莊子所謂無物委蛇而同其波是也内誠不解形諜成光而舍者與之避席豈和其光之謂歟飾智以驚愚修身以明汙昭昭乎若揭日月而行豈同其塵之謂歟聖人挫其鋭則處物不傷物物亦莫之能傷也解其紛則不謀爲用智不斲烏用膠萬物無足以撓其心者若是則無泰色無驕氣和而不流大同於物以通天下之志無入而不自得也湛兮似或存心若死灰身若槁木之枝泰定之中天光自照惛然若亡而存油然不形而神此其道歟吾不知其誰之子象帝之先象者物之始見帝者神之應物物生而後有象帝出而後妙物象帝者群物之始而道實先之莊子所謂神鬼神帝生天生地是也視之不見聽之不聞摶之不得有乎出而莫見其門孰知之者故曰吾不知其誰之子象帝之先王介甫曰道沖而用之或不盈道有體有用體者元氣之不動用者沖氣運行於天地之間其沖氣至虚而一在天則爲天五在地則爲地六蓋沖氣爲無氣之所生既至虚而一則或如不盈字說沖氣以天一爲主故從水天地之中也故從中又水平而中不盈而平者沖也淵兮似萬物之宗淵深也道之爲物淵深而能萬物不應於物而物自恃以生又能供萬物之求故曰似萬物之宗似者不敢正名其道也挫其鋭至同其塵鋭者火之形紛者絲之形挫其鋭圓成也解其紛靜一也和其光不皦於上同其塵不昧於下湛兮似或存湛靜也言其道湛靜雖不見其迹然又似或存吾不知其誰之子象帝之先吾不知道是誰所生之子象帝之先象者有形之始也帝者生物之祖也故繫辭曰見乃謂之象帝出乎震其道乃在天地之先也蘇潁濱曰道沖而用之至萬物之宗夫道沖然至無耳然以之適衆有雖天地之大山河之廣無所不遍以其無形故似不盈者淵兮深渺吾知其爲萬物宗也而不敢正言之故曰似萬物之宗挫其鋭至湛兮似或存人莫不有道也而聖人能全之挫其鋭恐其流於妄也解其紛恐其與物構也不流於妄不構於物外患已去而光生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其棄萬物也如是而後全則湛然其常存矣雖存而人莫之識故曰似或存耳吾不知誰之子象帝之先道雖常存終莫得而名之然亦不可謂無也故曰此豈帝之先耶帝先矣而又先於帝則莫或先之者矣吕吉甫曰道沖而用之或不盈道者生於沖而用之而已矣沖則和合矣故曰道沖而用之或似者皆疑而不斥之辭也以其沖虚而能資物也故曰不盈淵兮似萬物之宗故虚心弱志而常使民無知無欲而已惟其如此故淵兮似萬物之宗而求其爲宗者固不得也似之而已挫其鋭至同其塵然則何以保得道哉挫其鋭解其紛和其光同其塵而已心出而入物爲鋭挫其鋭而勿行物至而交心爲紛解其紛而勿擾鋭挫而紛解則知常之明發乎天光光者塵之外在光不皦故和之而不别塵者光之内在塵不昩故曰同之而不異湛兮似或存夫惟如此則所謂宗者湛兮似或存矣淵兮者言乎其深也湛兮者言乎其清也或不盈非可以爲定虚也似或存者非可以爲定存也吾不知誰之子象帝之先虚盈存亡吾無所容心則安能知其所自生者哉見其生天神帝而已故曰吾不知誰之子象帝之先蓋有吾有知誰而道隱矣吾不知誰則亦不知吾矣此眞道之所自出也生天以先象神帝以始帝則其爲形祇之先可知矣陸農師曰道沖而用之或不盈道者用之以沖則雖遍法界而不見其盈淵兮似萬物之宗深不可識而爲萬物之宗師言或似者言之不敢正也列子所謂疑獨莊子所謂疑始是也挫其鋭至同其塵不與物競故曰挫其鋭不與法縛故曰解其紒不皦其昩故曰和其光不遁不離故曰同其塵湛兮似或存有似乎有而非有有似乎無而非無無所從生而又象乎帝之先也故曰湛兮似或存吾不知誰之子象帝之先湛者淵之容形乃謂之體見乃謂之容故始言淵兮而終之以湛兮也吾不知誰之子象帝之先終不可得而名之故曰吾不知誰之子象帝之先帝者生物之主也王元澤曰道沖而用之或不盈道充塞無外贍足萬物而未嘗有故曰或不盈若虚若實謂之沖沖者陰陽之中而以虚爲德者也道之用於物者中道之應於事者虚此方言其用故曰沖雜說萬物負陰而抱陽沖氣以爲和則沖者陰陽之和也陰爲虚陽爲盈道之體則沖而其用之則或不盈其體沖也故有欲無欲同謂之玄其用之不盈也淵兮似萬物之宗道生萬物而體未嘗離物自物之散殊而觀之則似爲之宗耳淵者深而不測也人本足於此道欲體之者不可以他求當挫鋭解紛和光同塵則當自存矣雜說以其淵深而常生於物也故曰似萬物之宗挫其鋭至同其塵挫其鋭者鋭挫則渾然矣鋭火之形是也解其紒者不與物構而坐觀其復則性命定而紛亂解矣和其光者挫鋭解紛則性情定而自然充實光輝矣既有光則要不異於物而與之和同易曰蒙雜而著同其塵者道乃性之常奚足珍尚故至人有道而不自異於塵雜說彼鋭則挫之紛則解之光則和之塵則同之非有也非無也湛兮似或存人能如上四事則道湛然存矣存而定有之則非道也似或者不可定有之謂吾不知誰之子象帝之先即今所稱道之中體蓋有所出矣雖有所出而廓然無象故曰不知誰之子也象有形之兆帝有物之尊象帝至矣而道更在其先劉仲平曰道沖而用之或不盈所謂沖者不高不下不深不淺不左不右不先不後不遠不近不出不入沖而已沖者道之體也其應物則常由於虚虚則無所於盈此道之用也故曰道沖而用之或不盈淵兮似萬物之宗以夫沖者其體也故無乎不在而萬物莫不宗我而後存故曰淵兮似萬物之宗挫其鋭至湛兮似或存以夫用之或不盈者其用也故亦無乎不爲而在於鋭則挫其鋭在於紛則解其紛在於光則和其光在於塵則同其塵而似或存於萬物之間也故曰挫其鋭至湛兮似或存吾不知誰之子象帝之先蓋其體也在有無之先有無者所謂象也其先則亦無有無者也其用也在有之先有爲者所謂帝也其先則無爲之爲也故曰吾不知其誰之子象帝之先雖然無有無者才得之子則生無者其父也生無者其父則生乎所謂生無者則祖矣自此已往則不可致詰矣無爲之爲於用也才謂之子則使爲者亦其父也使爲者其父則使乎所謂使爲者則祖矣自此已往亦不可致詰矣劉巨濟曰道沖而用之或不盈道也者以沖氣爲用虚而和和則能應物以生故曰不盈或者不正言其有之謂淵兮似萬物之宗淵深也道也道之體也虚則能應能受能深萬物之生成一出於道則非俄而可測也於用言或故於體言似挫其鋭至同其塵銳言道之利也紛言事之多也事曰以紛而非道以解之使散事何以勝乎然非挫鋭則亦不能解蓋太鋭則有所不入猶今解結者不利錐光言其道之昭也塵言俗之昏也俗曰以昏而非道以同之使自昭焉則異俗爲高何所頼於道乎然非和光則不能同塵也蓋太昭則無以容其塵故也莊子所謂與人並涉意亦是也湛兮似或存虚則深深則止止則合體用爲有在焉湛止貌也世之亂以事俗多者無窮而已唯道能解而同以救事俗之冥冥則可謂無所不在矣而實非有去也似或者兼上二者爲辭吾不知誰之子象帝之先道出於無則道者無之子也而曰吾不知者道之極雖老氏不敢正言其有也象者形之兆帝者生之主雖萬物之母不尸其生而尸之以象帝則道出於無象帝又出於道矣無猶父也道猶子也象帝猶孫也莊子曰太極之先前章言治故次之以道沖也劉驥曰道沖而用之或不盈至象帝之先道無乎不在亦無乎不爲沖而用之其用不窮雖充塞天地彌滿六虚而不見其盈也衣被萬物而不爲主萬物歸之而不知主故其爲萬物之宗也天下莫能知莫能見淵兮似之而已淵者微妙元通深不可識之謂也然則坐進此道者當如何哉挫鋭解紛而已挫鋭者挫其鋒鋭而以柔弱自處謂知雄守雌知白守黑也解紛者解其紛亂而以虚靜自居謂除垢止念靜心守一也夫如是則泰定之中天光自照和其光使不耀於己同其塵使不異於人煉虚無之體成自然之眞湛然常寂若亡而存故湛兮似或存視之不見其形聽之不聞其聲莫之其始莫之其終不可得而名故吾不知誰之子象帝之先象者有形之始帝者生物之祖故以爲喻以其先天地生而覆載天地也故次之以天地趙實庵曰初疑獨二一以和爲用道沖而用之自爲無爲則無不治矣而繼之以道沖而用之者道非不爲寔有爲也雖有爲而見無爲之功者用中也天下之事貴於平和苟能用中則上不至於太過下不至於甚卑此帝王用大中之道也故顯有爲以爲治治至中和則所謂太平也太平豈有象乎歸之無爲也然此章先言用而後言妙妙者不敢正示也故經有一或二似或之者疑之也似之者亦擬之之辭也謂道本無形實無定體今且用之以中者是道亦從制從法也道若從制從法則一定而不易既有所定則不能泛應烏從而妙哉道則神動而天隨故或似之而已御註曰沖者中也中者中和之氣也其本自一至二自二至三一爲天二爲地三爲人氣從一而分三清升爲陽陰降爲地陰陽交感中氣生焉經不云中而曰沖者何也天一在下天數一也一從坎起坎爲水也囟門在頂囟字圍五五即土也在五氣則水土同包在囟門則泥丸所屬蓋五五爲十十爲物母一即五焉其中有信則包於元首天五曰中而從水有和理焉故沖者中也是謂太和經曰其中有精精即一也其中有信信則五也今言用中者道以氣爲用氣之在物則信也氣所以包裹六極今天地内外皆以一氣而包之既包内外則盈也盈則太過故有制命者存焉所以範圍天地之化而不過過則以沖爲用也蓋可知矣夫中也者天下之大本和也者天下之達道二其道守中或似不盈謂道無常體以體爲體不可正名夫盈不可乆也用九者所以知變焉柢既平無咎在坎者則或未盈焉或不盈者其在也敦窮其在其深也敦測其淵天一性也其果在中乎天五命也其果遠一乎故淵兮似萬物之宗擬議者且不得而當也三不主故常淵兮似萬物之宗虚無者道之體晦冥者道之色淵虚者道之原恍惚者道之用無體而體洪纖皆其體無色而色玄黄皆其色藏於淵虚而用之不窮故曰淵乎其居且敦爲正位邪凡以無體爲體無色爲色而已而欲窮其所自來敦測其奥凡以似之而已故曰道不當名次正申妙用一損靜晦隨挫其锐解其紛和其光同其塵四者皆人事也以人事未離乎道用道以中而應之也御註曰以通天下之志無入而不自得也今夫四者應在外而用在内皆性分之事也挫其鋭一氣生人充足四體氣之在我莫不充焉苟不養之以平和之以性則爭有時而作作則盈於外而爲太剛太剛則傷物知此者凡遇剛爲敵則自抑也故曰挫其鋭自挫其鋭也解其紛物盈天地之間無非事者萬機之務事來干我我必知之盛之以一則靜而止焉隨之以動則和而流焉靜而止之則明矣隨而流蕩則溺矣故解紛者一而止之也和其光光者明之散内誠不解形謀成光光之在我如揭日月而行欲以我之明而勝人之明曾未知人之光亦照我之光矣不若相忘乎道術奚彼此之異邪同其塵人之生未嘗無上下之分有之則幾乎辨無以自有則幾乎同故不同者上下之分也同之者德性之事也大凡君子之所同同乎性分而已矣語曰君子和而不同小人同而不和二體虚而應湛兮似或存物之盈也在事爲過水之盈也在器則溢非過非溢湛然而已湛明也喻道之體道非事也亦非水也謂之明而非明謂之幽而非幽及感而遂通似或存耳後明無始二一顯無宗吾不知其誰之子出自太虚也太虚無名父其誰邪二獨立窈冥象帝之先此章先言用後言妙是因用而顯妙也及顯妙又在夫吾不知其誰之子象帝之先御註曰象者物之始見帝者神之應物有象與物豈道也哉其上文但初言用次言治心至於不盈或存皆正言道之大體也不盈者非極數而盈也似萬物之宗者非自以爲事任也湛兮似或存者有無不能以盡之也然後象帝不得而先焉是誰之子不可識也邵若愚曰道沖而用之或不盈至象帝之先虚無大道化生一氣一氣分而爲陰陽陰陽生化禀一炁爲主乃知一炁處陰陽之中故曰沖氣夫大道以沖氣而用之也如天覆地載日照月臨冬寒夏暑春生秋斂皆沖氣之用沖氣者有而無形無而有精天地之間或不盈不虧淵兮似萬物之宗學人欲見沖氣者當挫其心之鋭鋭息則志休故能解其事之紛志閑少欲則善和其光與物無爭則能同其塵内外無染湛兮其惟一心也雖不見其跡又似或存釋氏喻爲慧燈朗月術家以爲大藥金丹孟子以謂浩然之氣言至大至剛以直養而無害塞於天地之間其爲氣也配義與道老子指湛兮似或存者乃大道所化之一氣曰吾不知誰之子此象萬物之帝在陰陽之先王志然曰道沖而用之或不盈至象帝之先夫天地之大萬物之多通天下之一氣何所適而非道人處域中得陰陽之正沖和委順中以爲人與天地並生與萬物同體且用之得其中則謂之中道得其常則謂之常道沖者中也無過不及時適其中沖融恢廓周流無極注焉而不滿酌焉而不竭挺乎仁義之分通乎性命之情昩者不知故老子諄諄于是而學者常恐失其所性養之正靜則與陰同德動則與陽同波或散或殊或斂或止以至言默事必有君言必有宗宗者宗此者也用者用此者也況道生萬物而道未嘗離物物亦未嘗離道譬之百川不同同歸于海衆說不同同歸于道道之爲物惟恍惟惚常寓之於有無之間固不可指其物象於一定之辭故曰淵兮似萬物之宗或曰湛兮似或存用之或不盈之類是也挫其鋭解其紛者莊子曰聖人處物而不傷物而物亦莫能傷鋭者有此不待挫而自挫何鋭之有聖人虚己以遊世淡然無極衆美從之不與物交涣若冰釋紛者有此不待解而自解何紛之有嗚呼古之學者與今之學者故有間言古之至人不就利不遺害不榮通不醜窮不藏是非美惡内直則與天爲徒外曲則與人爲徒充實光輝光矣而不耀初無間斷崖異之說所謂光者未嘗不和塵者未嘗不同豈汲汲而欲和同之哉亦猶列子居鄭國四十年人無識者國君卿大夫視之猶衆庶也老子謂鄰國相望鷄犬之音相聞民至老死不相往來可謂安時處順得其宜矣若夫有物混成先天地生寂兮寥兮獨立不改老子自謂吾不知誰之子象帝之先無狀之狀無物之象者則知生天以先象未始有始未始有物者則知神帝以始帝吾不知吾則吾而謂誰也此非大道之所自出其能若是者哉學者所宜知所先後力探而敦索之焉黄茂材曰道沖而用之至象帝之先一陰一陽之謂道沖者陰陽和氣也而用之或不盈者虚故能應也淵兮似萬物之宗者靜可以宗群有也挫其鋭者不與物競也解其紛者各有條理而不亂也和其光者藏諸身也同其塵者混於俗也湛兮似或存者常存而不壞也吾不知其誰氏之子象帝之先耶道是已道本無名或謂化工或謂造物或謂象帝之先皆强名也程泰之曰道沖而用之至萬物之宗沖者盈之對謙沖幼沖大盈若沖沖氣爲和皆以不極乎盈爲義莊子之喻道曰充滿天地夫且充且滿則其盈也盈也者道之無乎不在者也既貴盈矣而又貴乎沖益用道者固當如此也如曰知雄守雌知白守黑是兼有其雄而能居其雌兼有其白而能處其黑是皆不於盈乎爲居而於减乎其處夫是以謂之沖用也莊子曰彫琢復朴無爲名尸無爲謀府無爲事任無爲知主盡其所受乎天而無見得亦虚而已夫一性之天能盡有之而若未嘗有得焉是沖其盈以求及乎虚者也故謀府也事任也知主也凡涉迹而實者固皆無所不能而常不肯究爲也是非惡其盈而求以虚之者乎天下萬物生於有有生於無則無者萬物之宗也既已用道則是道且將出而爲德而德亦且分者乎仁義禮矣則安可正以命之爲無也於其不容無者而求其近焉則惟沖以殺之而已或之者疑之也似之者不敢主言也或不盈者非誠有所缺少也疑之而已萬物之宗則無之未出爲有者是矣不盈者未能遽及乎無也則似之而已此皆推其在人者而配乎道以言之也挫其鋭解其紛鋭才智之外形而有芒角者也紛事之節目繁會而盤錯者也莊子之謂膠膠擾擾者是也挫其鋭則渾厚而不暴露解其紛則易簡而不支離和其光善信充實而至於光輝宇泰定者發乎天光其爲光固有淺深而弸中彪外理則一也若體道之盈而見之於用則其光昭若日月人將莫之能親固光矣而不曜者求以同乎物也莊子推原舍者避席起於形諜成光其竝和光設戒也乎同其塵塵者在地非土在空非氛以配世事則其浮游汙雜者是也於此而能與之同則白可入涅而袒裼裸裎者所不能浼也若夫飾智以驚愚修身以明汙則反乎此矣湛兮似或存鋭挫紛解則應物而不見其功光和塵同則混俗而無以自表乍而觀之道若不屬斯人矣徐而察其湛然無雜者則道未嘗不在也大盈若沖正其地也後章於守雌守黑皆言常德不失者又與此語相發明也既曰似又曰或者亦從人所不能盡見者言之也若望而驚其辨捷敏給則直才且智耳非道也吾不知誰之子象帝之先道之無者實母天地而莊子廣之曰神鬼神帝生天生地則是道也者固嘗先乎天帝矣天下有始以爲天下母既得其母以知其子則凡萬有之出於道者皆其子也此章言道之用共舉前章之元且無者而被之於人也人之於道苟能沖之使不盈晦之如或有則其所藴或幾於無矣若人也吾不知誰能子之歟擬其等倫殆且爲天帝之先矣甚言深乎德而偕乎道世自無能上之者也揣切其至尚或先乎天帝也論世之有爲者患其智力锐遲不能及事耳而老教則掩抑蓋藏恐其或露故其自處者爲柔爲弱爲雌爲黑爲辱爲卑賤爲孤寡爲受垢爲下流爲不敢先此非獨遇事之際期其物我不忤而已也蓋有深於此者焉道本於無而任道者皆涉於有苟其居有而行有是爲以膏濯膏秪益其垢無由及潔故必本無以運有而求殺有以近無也行之以柔而宿之於虚雖未遽無而其於無也亦幾矣其謂得母可以知子知子而復當守母良有以也蓋從無可以觀有而由有可以通無表裏實常相符也又曰弱者道之用天下萬物生於有有生於無是其以弱代强者知夫有之當復於無也首章立有無二名以總大道之要而此章對出沖盈以總用道之情人之體道而能及此則天地且不能子而由無入元由元出妙無所不可矣詹秋圃曰道沖而用之至象帝之先無源章言道以沖淡用之使不至於盈溢而淵深潜涵毓以爲萬物宗主猶必挫其鋒鋭而質樸解其紛亂而條理然後可與和合光照混同塵俗則此道淵浩澄湛不見涯涘爲無源我不知其所從生豈在主宰象帝之先而迎之不見其首歟張沖應曰道沖而用之至象帝之先地法天天法道道法自然蓋自然之道流行無間無形無迹其道沖虚運用不息時春則和時夏則熱時秋則清時冬則凍而陽施陰布不見其偏盈也人囿此血肉之軀禀此陰陽之氣上頂其天下履其地中有自然有能沖虚此道而運行之或致於不盈滿偏失者則其道淵微而身與天地爲一矣萬物烏得而不相宗哉故志鋭矣則退以挫之毋使介推勇於火死鉏麑勇於樹亡事紛矣則務簡以解之毋使激六國以攻秦兼多務以死亮和其光不恃己之明以滅人之明當如日月並明而無闇昩之失同其塵不恃己之潔以黜人之潔當如珠玉墜泥而無窺害之危則此心湛然澄清無滓不致紛擾而道以之常存也故同天地以享年而吾不知誰之子先天地以立道而所以象帝之先張靈應曰勇鋭害氣之本紛冗喪精之原自明則易傷其神自傲易損其身欲學道者使當謹此見鋭便挫見紛便解與衆光相和與衆塵相同則氣不害精不喪神不傷身不損以遂長生之望德經玄德章復舉此四者蓋欲至藏道有德之地亦當謹此也白玉蟾曰道沖而用之或不盈虚中淵兮似萬物之宗心也挫其銳斂神解其紛止念和其光藏心於心而不見同其塵混心於物湛兮似若存存神於無吾不知誰之子象帝之先廖焠然曰道沖而用之道氣本浩然無之以爲用或似不盈淵兮如水之澄深無滿而無溢似萬物之宗靜則如海納百川動則百川來赴海挫其鋭念頭欲起與之一刀慧刀無利刃能斷絶群魔解其紛萬慮頓除一絲不掛滌除玄覽浴養金丹和其光返照内觀欲歸其明要知産藥根源處蟾光日夜照西川同其塵心身一如形神合德坎離顛倒術龍從火裏出五行不順行虎向水中生湛兮似或存純朴靜定性天朗徹吾不知誰之子攘故不識自家面目這箇畢竟唤做什麽象帝之先太上自然根深元不動何處不稱尊陳碧虚曰道沖而用之或不盈沖虚也又中也或不定之辭也又常也言道以沖虚爲用夫和氣沖虚故爲道用王者得沖虚之用故萬乘遺其富匹夫得沖虚之用故環堵忘其貧雖身在廟堂之上心同巖穴之下躬服芻牧之陋不異軒冕之華此深得沖虚之用而常不盈滿也嚴君平曰爲沖者不沖爲和者不和不爲沖和乃得沖和沖以虚爲宅和者無爲家能虚能無至沖有餘能無能虚常與和俱斯眞得大道沖和之用而不盈滿者也中者所用在於和道也或者不敢建言其道也淵兮似萬物之宗淵深靜也兮者深歎詠道之辭也明此沖虚之道不虧不盈體性凝湛深不可測故謂之淵也夫不測之理非有非無難以定名故寄言似也群生日用注酌湛然體含萬象害惡斯保動植咸歸故爲萬物之宗挫其鋭解其紛挫抑止也又折其鋒曰挫鋭銛利也又進也解釋散也紛多擾也言銛利進趣功名之人當念道沖虚抑止貪妄而不自見也或憤憍奔馳内外紛擾能體道淵靜釋縛解紛湛爾澄清以復其性紛河上公作忿田結恨也謂陰賊瞋恚忿恨牢結若存道沖和乃涣然冰釋也和其光至湛兮似或存夫虚極之道以沖和爲用其所施用無乎不可在光則能和其光與光而不别在塵則能同其塵與塵而不異應物則且混於光塵歸根則湛然不染尋其妙本杳然而虚約其施爲昭然而實故曰湛兮似或存吾不知誰之子象帝之先吾者老氏自稱也象似也我觀至道杳冥沖用不測匠成萬物今古常存道既無祖無宗誰敢言孫言子彷彿深思似出乎天帝之先矣謝圖南曰道沖而用之至萬物之宗道以沖虚爲用愈足若不足故未嘗見其有滿盈之處道以淵深爲度物無不容洪纖高下納之於中故曰萬物之宗萬物莫不尊道也挫其鋭至湛兮似若存挫其鋭者外無圭角也解其紛者内無膠擾也和其光者洞徹表裏也同其塵者混合流俗也湛兮漠兮道其在兹矣視之不可見聽之不可聞故曰似若存吾不知誰之子象帝之先道在天地天地法斯道者也道在萬物萬物母斯道者也越穹壤窮古初不知道之所從出者誰乎是不可得而知也放像而言則在天帝之先矣蓋嘗論之有始者未始有始者未始有夫未始有始者也昔者混淪之初昏昏默默聖人强而號之曰太易則曠蕩彌冥周流無竟者也曰太初則胞胎混沌有無合并者也曰太始則或感而彰若存若亡者也曰太素則非濁非清非陰非陽者也蓋至乎太極而後函三爲一萬物之樸無一不具自斯以往生生有不窮者矣然皆爲道所生非能生道可以父吾道而不可得而子也可以君吾道而不可得而臣也然則道果無所從出乎曰道法自然則生是道者非自然而誰吾故曰未始有夫未始有始者也林鬳齋曰道沖而用之至象帝之先沖虚也道體雖虚而用之不窮或盈或不盈隨時而不定也不曰盈不盈而曰或不盈纔有或字則其意自見此文法也淵者美也似者以疑辭贊美之也萬物之宗即莊子所謂大宗師也言此道若有若無苟非知道者不知之故曰似萬物之宗挫其鋭言其磨瓏而無圭角也解其紛言其處紛擾之中而秩然有條也光而不露故曰和其光無塵而不自潔故曰同其塵湛然微茫而不可見也若存若亡似有而似無故曰湛兮似若存即恍兮惚其中有物是也吾不知誰之子者亦設疑辭以美之也象似也帝天也言其在於造物之始故曰象帝之先曰象曰似皆以其可見而不可見可知而不可知設此語以形容其妙也范應元曰道沖而用之至萬物之宗沖虚也和也淵者深也似者道不可以指言也謂此道虚通而用之又不盈以其無形也然而淵深莫測似萬物之尊祖也挫其鋭至湛兮似或存人能用道以挫情欲之鋭解事物之紛瑩心鑑而不炫其明混濁世而不汙其眞則道常湛兮似乎或在也吾不知誰之子象帝之先老子言我不知道所從生似在天帝之先也薛庸齋曰道沖而用之或似不盈道之爲用注焉而不滿酌焉而不竭淵兮似萬物之宗道體淵靜雖爲萬物之宗萬物不知其所以爲宗故曰似之挫其鋭至同其塵體道者挫其鋒鋭解其紛亂和其光而不耀同其塵而不昩湛兮似或存湛兮存乎萬物之表而不流莊子曰物物而不物於物也吾不知其誰之子象帝之先五太之先誰其子之休休庵曰道沖而用之至象帝之先深廣虚明謂之沖造道者致虚極盡玄妙然後發用則不爲物礙亦無盈滿之相淵深無所不容爲萬物之宗也不可太剛剛則鋒鋭傷物不可太柔柔則昏弱多事無能决當剉其鋭解其紛用中和之妙混聖而無影同凡而絶迹妙體湛寂虚明無比衆目不能睹如無隨縁應感而有準故云似或存老子讚曰吾不知誰之子者特言此道自然而然虚明靈妙在萬象主之先有矣帝者主也褚伯秀曰道沖而用之或似不盈至象帝之先夫道神鬼神帝生天生地不可以形相求不可以言議索以虚而運無乎不在故可以御天下之實應天下之感似盈天地間而未嘗盈也蓋道包元氣而未見然朕兆已存其中有生天生地之理本至虚也而用之由人彌綸萬化惟人造至虚之地然後能用此道以無契無何盈之有淵兮深靜而神明出焉萬化生焉物生於有有生於無其所宗即無也既出而爲物則與無其間似之而已世人執有泥跡觸途成礙教以挫鋭則無傷於物解紛則自全其我和光而不與之異同塵而不與之流則湛兮似或存者可見雖見之明信之篤不知此物從何而生是誰之子也天之主宰謂之帝此物又似居帝之先尊而又尊無復可尊矣此章凡十句而疑辭者五或議聖人見道的而燭理明何談道多疑若此蓋有定形則有定名言之有在究之可極既强名曰道字之曰大是不可得而名又惡可指定而言若事物之拘滯一隅而無所變通即莊子云惛然若亡而存油然不形而神萬物畜而不知此之謂本根聖賢談道例若此非靳而不言至此不容聲矣使學者深造豁解如醉得醒聖訓諄諄無隱乎爾牛妙傳曰道沖而用之或似不盈沖者中也且道之爲體包含造化孕毓乾坤起四大以居先籠萬法而獨冠道之爲用可謂大矣然其只云沖者是不自滿也由是而觀不盈之義豈不宜乎太上說此以勸人謙沖則亦自無滿而必溢之理也如三皇五帝之時有勸戒之器名曰宥巵孔子見之使弟子取水灌之其中則正其盈則覆孔子造然革容曰善哉持盈者此古先明哲以爲至誡嘗置之座側蓋體道之用於沖也非斯之謂歟淵兮似萬物之宗夫萬物之宗者道也蓋道生天天生地地生萬物所以稱爲宗也夫道爲萬物之祖宗可謂尊之至矣然其只云似者是不自尊謙辭也此舉喻世人使之常用謙沖則自無高而必危之理也易曰有大而能謙必豫是也是故君子多聞約而守之多志質而晦之精知略而行之是以處上而人莫不重處前而人莫敢害是以天下樂推而不厭夫何故哉以其謙沖故也挫其鋭挫者抑也锐者鋒鋩也如人之氣鋭者或有激於中則形之於口世謂之唇鎗舌劍有時傷人甚於鋒鋩故善人君子則於人何所不容常反求諸己乃挫折其鋒鋩抑其鋭氣使不致於傷人此則挫鋭之說也解其紛紛者紛競解者自懲也夫兩喜必多溢美之言兩怒必多溢惡之語蓋不平之氣忿然於其中則溢惡之語勃然見乎外兩相抗拒故謂之紛競也故大人君子常懲忿窒慾自不致於爭競也和其光光者謂聰明才性也和者謂韜晦之也夫韜之者使聰明不彰也晦之者使才性不露也如孔子大聖也於鄉黨則似不能言者顔子大賢也於終日則不言如愚此皆和光之說也嘗聞諸先哲曰我聰明矣聰明於我何有哉我賢能矣賢能於我何有哉苟於此矜而恃之則我已小矣吾惟降吾氣於謙和合吾心於端莊順吾神於肅穆蒭堯可咨庶人可謀而左右卿大夫皆吾所禮也而不知我之爲尊彼之爲卑耳易曰君子以蒞衆用晦而明此之謂也同其塵塵者謂暗昧愚魯也同者謂同仁一視也夫同仁者謂無他暗我明之分一視者謂無伊魯此賢之别大率爲人之道貴以賤爲本高以下爲基故大人君子常韜光徇俗晦迹混塵知天下之不可上也故下之知衆人之不可先也故後之温恭慎德使人慕之執雌持下人莫踰之内藏我智不示人技我雖尊高人弗我害江河雖左長於百川以其能自卑耳易曰以貴下賤大得民也斯非和光同塵之謂歟湛兮似或存湛兮謂無或存言有盖道之爲體似無似有若存若亡故云湛兮似或存也所以古先明哲體道有無故常挫鋭解紛和光同塵也然則體道爲義云如何耶道之爲說其體無方其用無窮性之所有不虧不缺得之於人生而靜之初形之於感而遂通之際養於喜怒哀樂之未發得於意必固我之俱無凝然而正湛然而明惚然而太虚之無塵恍然而若四時之有約無爲而無不爲此湛兮似或存之說也吾不知其誰之子象帝之先吾者老子自稱誰者無名可擬子者謂道象者如也帝人也且如天地萬物之形其生也有自來其可以言母子獨道之一字虚無自然生無所自固宜太上稱吾不知其誰之子也且道之爲義極乎不聞不見之境則道之妙者爲難名藏於無聲無臭之天則道之至者爲難知推之於前則不見其始之合引之於後則不見其終之離敦知其誰之子哉象帝之先者蓋老子歷爲帝師古帝曾問老子道爲誰之子太上所以云象帝之先者言象如帝之未主已先是何面目是何光景也楊智仁曰道沖而用之至象帝之先道沖而用之者剛健純粹虚而不盈也故道爲萬法之深淵人可行之挫其剛鋭解其紛紜和於中而順於外同其波而隨其流專心内持使元炁上下沖和降心猿無令走失體性湛然眞常不動有若無實若虚明徹表裏獨露堂堂吾不知其誰之子象帝之先古云還識這箇麽今古應無墜分明在目前喻清中曰道沖而用之至象帝之先道譬則海也道惟虚故受海惟大故容道體本虚用之者不越沖虚而已或不盈一語就下文說方見得明天地間之至大者莫如海道實似之淵乎深哉美其能容也江漢朝宗百川赴焉不舍晝夜而不見其少盈或不盈者人常疑其不盈也然則其用安在藏鋒斂鍔於不露之天非挫其銳乎釋紛離俗於是非之外非解其紛乎和其光者不察察以自耀也同其塵者不皎皎以自潔也湛然二字鬳齋林氏以爲微茫而不可見之謂道本無形於恍兮惚兮之間指眞空爲實有故曰似若存道超乎器形之表吾不知誰氏之子而能克肖之清源劉驥曰象者有形之始帝者生物之祖有子字方下得象字象肖也猶繼世象賢之謂也胥六虚曰道沖而用之至萬物之宗沖虚也宗本也夫至道沖虚人皆具有用之則彌滿天地乃至飲食起居莫不顯見而曰或不盈者謂其無形狀可見而言之也用言其動也淵兮言其靜也若水之停流謂其靜也淵深明靜鑑照無窮爲萬物之宗本人乃萬物之一也經曰似而不曰爲似即爲也且不欲直言之矣挫其鋭至似或存此一段語蓋以丁祝知道者便不可止乎知而已必須摧挫其鋭利追圖之志解釋其紛亂之情和融炫耀之光混同塵世之俗四者皆爲知道者之病須力去之方除得淨始可言沖虚至道湛然常存矣似或即常也吾不知其誰之子象帝之先象似也老君謂沖虚至道吾不知其所由生然究其極似未天帝以先卓然獨立矣李是從曰道沖而用之至象帝之先夫道者沖深潜行而爲用之或不盈者無出其外也淵兮似萬物之宗者心清若淵觀照萬物往來形影映現業識所生由此宗有也挫其鋭解其紛者挫折其萌動之尖銳解開其怨結之紛亂也和其光同其塵者和順時俗所見之光同其時俗所欲之塵也湛兮似若存者返心内照澄湛清平見其眞性似若不離常存定也柴元臯曰道太極沖中虚而用之或不盈體虚則用不竭比如井虚不曾滿終日取用不竭況道乎淵兮似萬物之宗如萬水朝東量不可測挫其鋭解其紛道體道用如此沖妙則自己底剛鋭紛爭外來底剛鋭紛爭皆能挫解矣和其光同其塵身中既沖虚則外貌必和同順境矣湛兮似若存體虚則用處常不昩吾不知誰之子不昧底是誰應用象帝之先太極以前那箇蘇敬靜曰道沖而用之至象帝之先道在天地間無一不有無一不在本爲盈滿然道有理而無形人以沖虚而用之則有時疑其不盈或云者疑之也沖虚用之即後章知雄守雌之意莊子曰雕琢復朴無爲名尸無爲謀府無爲事任無爲知主此道盈而用之以沖虚也萬物之宗宗祖也萬物自無而生淵深也其淵深不可測爲萬物之祖不盈則未能遽及乎亦似之而已既曰或又曰似正以道非不盈用之以虚則虚非眞虚故曰或曰似鋭才之露圭角者挫之使無紛爭之處繆擾者解之使散和其光明之弸中彪外也和之而不使露同其塵土之浮游汙雜也同之而不欲異湛清也若存若士而似乎清不清也此皆沖虚用道吾不知此爲誰之子象肖也帝天也其肖象實居天帝之先乃太極也太極虚無也道本大極生天地然後生萬物萬物自無而生即用之以沖虚亦當然而然也首章以有無二名總道之要此章沖盈對立總道之用則由無而玄由玄而又玄妙不可及矣拾遺圓師曰在光同光在塵同塵秉文此章首尾言道挫鋭解紛和光同塵下知者不言章言人體道者絶待玄同亦非與俗雷同也諸子旁證曰莊子夫道有情有信無爲無形可傳而不可愛可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深先天地生而不爲乆長於上古而不爲老石潭曰道沖而用之或不盈淵乎似萬物之宗沖虚也虚則不盈虚而不盈則不露不露則深矣故以淵乎言淵者深也雖云不露而實爲萬物之宗焉似者不敢指定之意言道不可名也宗乃祖宗之宗實萬物之所自出也言物自道出也挫其锐解其紛和其光同其塵湛兮似若存此皆虚而不盈深而不露之意挫其鋭無圭角也解其紛無外物之擾擾也和其光光藏而不見於外也同其塵人不知其爲皎皎也此皆淵深而不露之意湛兮似若存湛澄徹也似若雖存而似未嘗存也吾不知誰之子象帝之先道爲物之所出爲物之祖宗也不知此道又爲誰之子乎蓋就宗字上又生此說謂道亦有所宗也而繼之曰象帝之先者帝天帝也象似也似乎在帝之先也蓋有名雖爲萬物之母而無名實爲天地之始天地自我出則道爲帝之先矣此言不但爲萬物之祖宗又爲天地之祖宗也此章皆指道體而言非指體道者而言道德眞經集義卷之九
