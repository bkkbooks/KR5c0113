body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正持而盈之章考異河上公作運夷章趙實庵作觀退爲進義章唐明皇疏前章明至人善行柔弱故無尤此章明凡俗溺情憍盈故有咎首標持盈揣鋭示其難保次云金玉富貴戒在貪求結以名遂身退令忘功而不處也杜光庭曰前章舉水爲喻顯明修學之行此以持盈爲首更彰貪滯之非欲使忘功退身以符至人之美爾張沖應曰夷者謂太空虚明而無采色人不可得而窺之也人之運通雖如太空虚明益使夫人不得而窺之則藏其神而不害其身矣持而盈之不如其已揣而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道考異嚴遵楊孚王弼並同古本河上公曰持而盈之不如其已盈滿也已止也持滿必傾不如止也揣而鋭之不可長保揣治也先揣之後必棄捐金玉滿堂莫之能守嗜欲傷神財多累身富貴而驕自遺其咎夫富當賑貧貴當憐賤而反驕恣然必被禍患也功成名遂身退天之道言人所爲功成事立名迹稱遂不退身避位則遇於害此乃天之常道也譬如日中則移月滿則虧物盛則衰樂極則哀生王輔嗣曰持而盈之不如其已持謂不失德也既不失其德又盈之勢必傾危故不如其已者謂乃更不如無德無功者也揣而鋭之不可長保既揣末令尖又鋭之令利勢必摧衂故不可長保也金玉滿堂莫之能守不若其已富貴而驕自遺其咎不可長保也功成名遂身退天之道四時更運功成則移唐明皇曰持而盈之不如其已執持盈滿使不傾失積則爲累悔吝必生故不如其已已止也疏持執也盈滿也已止也言人心貪愛求取無厭執守保持更令盈滿積財爲累悔吝必生故聖人戒云不如休止揣而鋭之不可長保揣度也鋭銛利也揣摩鋭利進取榮名富貴必憍坐招殃咎故不可長保也疏揣量度也鋭銛利也凡情滯溺貪求榮利故揣量前事銛鋭欲心以撖人怨坐招殃咎故不可長保也金玉滿堂莫之能守此明盈難乆持也疏假使貪求不已適令金玉滿堂象既有齒而焚身雞亦爲儀而斷尾且失不貪之寳坐貽致寇之憂以其賈害豈云能守此覆釋持盈也富貴而憍自遺其咎此明鋭不可揣憍由心生故咎非他與也疏富則人求之故便欺物貴則人下也故好凌人憍奢至而不期殃咎來而誰與因憍獲咎憍自心生故云自遺爾此覆釋揣鋭也功成名遂身退天之道功成名遂者當退身以辭盛亦如天道盈虚有時則無憂患矣疏此舉戒也夫滿則招損謙便受益惟彼天道尚不常盈故功成者隳名遂者虧欲求長保未聞斯語當須忘功與名退身辭盛如彼之天道不失盈虚則無憂責矣杜光庭曰持而盈之不如其已持盈之喻凡有四義一者堅持欲心至於盈滿二者保持世財至於滿盈三者執持惡行至於盈滿四者持權恃禄至於盈滿大凡知進忘退不念善道執滯不迴以至盈滿者皆當有報欲心盈滿者得羸疾傷生報世財盈滿者得攻劫侵奪報惡行盈滿者得刑厄殘害報權禄盈滿者得傾覆淪滅報所以老君戒之不如休止不休不止斯報必驗揣而鋭之不可長保夫王者锐於開疆拓土則人怨國亡人臣锐於貪利圖名即身危禍及縱或苟得安能長乆況進無所補退有憂患故云不可長保金玉滿堂莫之能守假令明能揣度鋭解貪求金玉珍奇滿堂潤屋必致攻奪之害豈能保而守之乎況人生有限情欲無厭既不救其死亡豈得保乎金玉象有齒而焚身者春秋襄公二十四年晋范宣子爲政諸侯之弊重鄭人病之二月鄭伯如晋子産寓書於子西以告宣子曰子爲晋國四鄰諸侯不聞令德而聞重弊憍也惑之憍聞君子長國家者非無賄之患患無令名之難夫諸侯之賄聚於公室則諸侯貳若吾子頼之則晋國貳諸侯貳則晋國壞晋國貳則子之家壞何没没也將焉用賄夫名德之輿也德國之基也有基無壞無亦是務乎有德則樂樂則能乆詩云樂只君子邦家之基而有令德也夫恕思以明德令名載而行之是以遠至邇安無寧使人謂子子實生我而謂子浚我以生乎象有齒以焚其身賄也宣子悦乃輕弊是行也鄭伯朝晋爲重弊故也雞斷尾者春秋周景王子子朝之傳篇孟適郊見雄雞自斷其尾歎曰犧牲之用存乎全而肥碩今自斷其尾使己不全冀免爲犧之用雞之保其身也如此況於人乎貪利而忘其身志不及雞矣不貪之寳者鄭人有得玉獻於子罕曰此寳也將以獻之子罕曰汝以玉爲寳我以不貪爲寳我若取玉俱喪寳矣不如兩全之遂不受玉致寇者易解卦九三詞曰負且乘致寇至負者小人之事也負檐於物合是小人乘者君子之器也今小人捨負檐而乘車是小人而乘君子之器矣故竊盜之人思奪之矣富貴而憍自遺其咎財多曰富故人求之位高曰貴故人下之滿而不溢所以長守富也高而不危所以長守貴也諺曰富貴不與憍奢期憍奢自至憍奢不戒凌侮於人人以報之禍將及矣遺與也咎非外來由自己憍慢致之爾故云憍自心之生也若能貴而不危富而不溢人無咨怨灾害不興安國修身斯爲至矣憍矜也功成名遂身退天之道禦灾除患曰功富貴尊榮曰名功既成矣名既遂矣而不知退者鮮不及禍夫何故哉寵則有辱盛則有衰亢極則悔高鳥盡而良弓藏狡免死而獵犬烹勢使然也范蠡扁舟而脱禍大夫種固位而喪身此之謂矣日中則昃月滿則虧暑往即寒來春榮則秋落天道然也人能體盈虚於天道忘成遂之功名子房絶粒以優游疏廣解印而高尚固無上蔡華亭之追痛矣況乃居九五之位而臨億兆之人光宅萬方廊廡四海而不守持盈滿堂之戒乎宋道君曰持而盈之至不可長保盈則溢矣鋭則挫矣萬物之理盈必有虧不知持後以處先執虚以馭滿而湛溺滿盈之欲是增傾覆之禍有不如其已物之變無窮吾之智有盡前識者道之華愚之始也揣物之情而鋭於近取則智有時而困可長保乎金玉滿堂至自遺其咎金玉富貴非性命之理也外物不可恃而有者也寳金玉者累於物累於物者能勿失乎莫之能守富貴而驕則害於德害於德者能免於患乎故曰遺其咎聖人不拘一世之利以爲己私分不以王天下以爲己處顯夫豈金玉以爲寳富貴之足累乎故至富國財并焉至貴國爵并焉其貴無敵其富無倫而道不渝功成名遂身退天之道功成者隳名成者虧日中則昃月盈則食物之理也聖人睹成壞之相因識盈虧之有數超然自得不累於物無復驕盈之患非知天者敦能與此故曰功成名遂身退天之道四時之運功成者去之是天之道知進而不知退知存而不知亡知得而不知喪能勿悔乎伊尹曰臣罔以寵利居成功王介甫曰持而盈之不如其已抱持其器之盈者必易覆揣而鋭之不可長保揣摩其物之鋭者不可長保金玉滿堂莫之能守堂者虚而受物者也金玉滿之則是盈矣故不能守富貴而驕自遺其咎大富貴不期於驕而驕自至所以遺咎患也功成名遂身退天之道夫聖人功既成名既遂則身退之者矣此乃天之道也夫天之道高者抑之下者舉之又曰天道虧盈而益謙書又曰謙受益滿招損之謂也蘇潁濱曰持而盈之至不可長保知盈之必溢而以持固之不若不盈之安也知鋭之必折而以揣先之不如揣之不可必恃也若夫聖人有而不有尚安有盈循理而後行尚安有鋭無盈則無所用持而無鋭則無所用揣矣金玉滿堂至身退天之道日中則移月滿則虧四時之運功成者去之天地尚然而況於人乎哉吕吉甫曰持而盈之不如其已持所以防溢而盈之則重溢也如欲勿溢則如勿滿揣而鋭之不可長保揣所以慮失而鋭之則重失也如欲勿失則如勿鋭金玉滿堂莫之能守滿而不溢所以長守富也持而盈之則金玉滿堂莫之能守矣富貴而驕自遺其咎高而不危所以長守貴也揣而鋭之則富貴而驕自遺其咎矣功成名遂身退天之道然則何以免此患哉法天之道而已蓋功成名遂身退天之道此所以無私而成其私也封人之告堯曰退已其法天之道之謂也王元澤曰持而盈之不如其已持而盈之有意於有所以失之唯忘有有之爲有而有之以無有則無失無溢矣揣而鋭之不可長保揣者巧於度情鋭者利於入物且事物無盡而吾持一身以遇其變則持鋭之工有時困矣豈可長保乎故聖人因時乗理而接之以無我則其出無方而可應不窮也金玉滿堂莫之能守寳外物而守之所守非所有也豈能外乎富貴而驕自遺其咎驕生於恃外恃外之人何足筭乎四者皆以有物與爲驕者何異然自持盈而下每失彌甚功成名遂身退天之道寒暑相推物極則反陰陽代運天道固然而世之愚者一遭其變一犯其名則終身有之詔以爲己曾不知造化之密移吉凶之倚伏故終至於坐蒙憂患無以自存惟聖人不然藏金玉而不寳居富貴而不榮凡物之來寄者如陰影集身窅然不知其在彼耶在我耶然則豈持盈以爲揣鋭以爲工乎苟非無我之妙其何以與於此天之道大矣而莫尚乎是劉巨濟曰持而盈之不如其已言力持而滿之求必富者也滿而能虚則何所事持有不勝持則覆矣故曰不如其已已止也揣而鋭之不可長保言情度而入之求必貴者也鋭而能鋭則何所事度有不勝度則數矣不可長保非謂可以幸保謂雖得之必失之也金玉滿堂莫之能守此申不如其已之義堂奥足以藏金玉而守者也其害在滿苟非天殃必有人禍富貴而驕自遺其咎此申不可長保之義富貴則慢生慢生則過生以驕與人則以名自與矣功成名遂身退天之道利人曰功聞譽施身曰名功譬則富貴之實也名譽則富貴之華也功欲就名欲達夫富貴功名聖賢之不免然而不傾敗其苟滿非以其時得也其利入非以揣得也而又能虚守之不驕保之則身退是已蓋據功成名遂之基衆人以此進而聖賢以此退則非體天道者能若斯乎日月代明四時代叙天之道也前章言上善若水則可以處富貴故次以此篇章也劉驥曰持而盈之至身退天之道大道甚爽而民好徑以其貪生之厚惑於有爲以要近功不知自然之妙用執持以致其盈盈則虧矣故不如其已揣度以成其鋭鋭則挫矣故不可長保金玉滿堂累於物也累於物則欲之者多故莫之能守富貴而驕害於德也害於德則攻之者衆故自遺其咎聖人處富貴之極而無盈滿之累者以其功成名遂而身退也豈持其盈而揣其鋭乎日月代明四時代叙功成者退天之道也聖人法天之道所以難進而易退捨諸人而求諸己故次之以載營魄趙實庵曰初四不居四一非至虚之道持而盈之不如其已一身不難治大道不難窮不難者在乎識心而已心者本無也始也因愛而生身四大之所聚五藴之所集血氣依倚百體互成皆因妄念而有也今既識心百骸九竅六臟骸而存焉吾誰與爲親詔而有之皆惑也以心執妄惑則生焉以心識虚妄自破矣聖人知其然則曰我既有身身已是妄外物儻來我忘外物身與外物二者兼忘誠忘之中天光内發不知物之忘我我之忘物虚室生白道自來矣烏睹所謂持盈者耶持盈則有物也有物則去道遠矣經持而盈之盈則器之滿也持則手之用也無中取有以實充虚傾之則不忍執之則不忘其行也步不能揚塵其坐也身不敢側視勞神苦心在於一器物未有損身已焦勞妄計偏執有如此者蓋不以身觀之身本無身物焉所寄我自忘我物奚爲焉舉其親者疏者可知能已之者是名解脱二銛利自傷揣而鋭之不可長保性欲靜不靜則吉凶悔吝生氣欲平不平則憤怒愛欲起敵物之心必務求勝不動則不獲欲其獲則靜者起而爲爭矣不利則不入欲其利則平者銳而致銛矣傷廉而得豈能保乎蓋知靜者則息爭不爭則與物無傷和平則自寧自寧則與神爲守不以利累形不以養傷身批大却導大竅與一世而得淡漠之中此古人存生之德也豈可覬覦小利𦍕狠狼貪見利而忘身貪權而取竭坐取危亡之道哉不知此者如彼晁錯削諸侯之地國未富而身亡鄧艾起東吴之征議未及而先死皆鋭之傷也可不戒哉三非性固有金玉滿堂莫之能守善求道者求諸己善守德者得所得不求道則無以爲德不立德則無以明道顛沛於是造次於是則外物不可得而入也道德既亡所保在外山節藻棁峻宇雕墻非金玉以實之則不稱其善矣金玉者純陽之精也世所寳焉凡得此以爲富者非可乆之道也徒能潤屋而不能潤身能致盜而不足致福故好利爲膏肓之疾致富爲豪縱之由儻來之寄何所必哉四君子戒輕富貴而驕自遺其咎洪範五福一曰壽二曰富而終不言貴蓋富則貴可致矣莊子曰至富國財并焉至貴國爵并焉能致富貴亦隨之彼千金之子坐不垂堂雖欲不驕其可得邪勢使之焉爾若能於富貴而先之以禮施之以仁行之以義雖富貴亦何足以累德邪有良貴者勝之矣驕所以害德害德者能免於患乎子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也彼范氏之儻見辱於丘開而終以自沮虞氏因腐鼠而中俠客誤以致傷斯皆素有驕人之色者也後番其退一大名無久居功成名遂聖人之於事每每思之至也當其有大物而持盈之持終日戒不如無物而不戒故持而盈之不如其已無爲者易有爲者難有爲不免智慮先焉智慮所出焉能與物無敵焉敵則求勝我勝則彼敗矣揣而鋭之是豈長保之策邪於金玉而不累心處富貴而不驕物皆人之難能者也是有之不若無之爲之不若已之二體天而行身退天之道日昃之離不鼓缶而歌則大耋之嗟凶與天爲徒者功成名遂耶退矣彼曰烏得而累邪邵若愚曰持而盈之至身退天之道居高名厚利如持而盈滿之器常懷傾昃之憂不如其已則無太過之累由不滿則易持也揣而鋭利之勢不可長保金玉滿堂莫之能守富貴而驕生驕慢則過起此非天殃自遺其咎然何以免此患是以聖人觀四時之運如春生化功成名遂至夏則身退不居此天之道也王志然曰持而盈之至身退天之道形而上者謂之道形而下者謂之器制之形器之内有盈必有虧有盛必有衰持而守之常恐其自盈自盈必有傾覆之禍所以古人爲之於未有治之於未亂睢盱戰兢唯懼失所以修省之方禮義廉恥四維之常居其實不居其華每處其厚不處其薄易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙之爲美至矣哉其本在此其末在彼執古之道未嘗不貴其謙要其極致戒之在溢所謂持而盈之不如其已故持盈不如保盈揣鋭不如挫锐揣者度物之情鋭者入物之利鋭不可利利不傷物孟子所謂函人唯恐傷人矢人唯恐不傷人此其所宜揣而挫之不宜揣而銳之者也其進锐其退必速其可長保乎亦其義也外物不可必人或認爲己有故聖人引而闢之且富與貴是人之所欲金與玉是人之所貴苟知積而不知散知取而不知與是亦與大盜積者也至有横一己之私卒世無厭忘性命本源之養反害乎身死而弗覺者多矣何愚之甚老子特言之曰甚愛必大費多藏必厚亡所以達人知富貴果不足以全吾生不拘一世之利爲己私分不王天下爲處顯至富國財并焉至貴國爵并焉霄壤異分小大由之而身貴富之地而心泊然未嘗以一物芥啻胸次雖金玉滿堂未嘗驕吝動與吉會何咎之有有身之患固亦大矣視履考詳所貴無咎既無咎則凶悔吝何自有焉夫知進而不知退知存而不知亡知得而不知喪能無悔乎功名苟遂而或自驕自恃自矜自伐天下孰不與之爭功者矣易曰知進退存亡而不失其正者其唯聖人乎皇天無私唯德是輔天地陰陽造化萬物四時行焉歲功成焉功成者去天何言哉人能體此則與天地合其德與日月合其明與四時合其序與鬼神合其吉凶天且弗違而況人乎故經曰功成名遂身退天之道也學者其敢不勉之哉黄茂材曰持而盈之至不可長保道無執也而欲其虚持而盈之其可乎道無體也而欲其圓揣而鋭之其可乎此皆在於非道非道早已又安能長保金玉滿堂至自遺其咎金玉如所謂被褐懷玉非世間金玉也富貴如所謂知我者希則我貴矣非世間富貴也古之人有所得於中天下事物不足以動其心重内而輕外也貴己而賤物故已至於驕晋嵇康之徒相與清談崇尚玄妙非無得於道而以陵人傲物卒致於禍宜乎老氏以爲戒也功成名遂身退天之道功者無功之功非世所謂功也名曰無名之名非世所謂名也功成名遂而身退觀諸四時之序亦可以見天道老莊列子范蠡四皓安期生東方朔古之有道者也史皆不載其所終豈非道成而退人莫得而知耶程泰之曰持而盈之不如其已功名富貴極其分量是之謂盈盈之上不可復加則有覆溢而已耳與其兢兢執持引而上之求致其極何如泯滅此念留餘地以舒盈溢也故曰不如其已也揣而鋭之不可長保以禄位不盈爲念則進取惟恐其或鈍故先事揣度有見焉則鋭於有爲人之趨操及此者豈不或遂然揣在我中在彼億而屢中其中者幸也中雖屢而有不可屢者存焉是不可必而强必之者也奈之何欲以其每揣而幸中者之爲常也故曰不可長保金玉滿堂至身退天之道貨財已聚不能保而有之者以滿而驕驕而敗也察盈虚之相襲棄功名而不有是與天爲徒者也不驕不足以言之論四時之運成功者退此即老子之謂天道也然世人聞之如不聞者利成功之可居而不見虚盈之實理也齊景公顧戀國邑之富以死爲悲晏子笑之曰使古而無死則太公威公常守之君將被簑笠於壠畝何暇念死乎以其迭處之迭去之而至於君也而獨流涕是不仁也夫其爲此言也是推四時之運遞相盈虚者而致之生死得喪者也故列子極論生化之相催也曰生者不得不生化者不得不化又言損盈成虧之相對也曰物損於彼者盈於此成於此者虧於彼夫化者不得不化爲方生者之無以生也此之盈成若無取於彼而彼必虧損者不彼之損此將何所資藉以致其盈成也由此言之迭去迭處正老氏之論謂功成名遂而身當必退者也且夫功名者職業之有成者也富貴者爵禄之所聚焉者也合天下論之一世之爵禄固有定數則職業之託乎人亦不出乎此世之人也若使有才有智者常得而專之則師師藹藹者將無地以受其來也故方來者至而已成者退正四時之不容不相代謝者也是以道家之於天下其初固不肯輕任人責而其終亦不肯乆居成功也如張良園綺之徒至能下視簫韓之禍辱而竊笑焉則皆有見於此者也若夫上之而爲聖人則又大矣曰與天地合其德與四時合其序進退存亡自不失正則又非畏盛滿而求安全者可得而匹矣詹秋圃曰持而盈之至身退天之道運夷章運用也夷平也持而極於盈溢揣而極於尖銳金玉廣積而滿堂富貴奢靡而自驕皆非平夷之道皆取禍敗之由安平亦在運之而已是必功已成名已遂而身即勇退揆之天道本如是不可知進而不知退也張沖應曰持而盈之至身退天之道日盈則昃月盈則闕暴雨則不可以終日也天道猶此而況人乎人知夫天道惡盈而持謙挫鋭而勿長故所持諸己者盈矣則疾爲自止之思而每進貪財位以取傷神害身之禍所揣諸人者鋭矣則速爲挫鋭之思而勿長惡害人以招報怨陷身之危忘盈而不知止則金玉滿堂適爲召害莫能守矣富貴驕縱揣而鋭之適遺咎矣此石崇所以不能守金玉以受刑張華所以不能保富貴以王法形分神散精炁何劫復聚人身難得因此不還皆盈鋭之失耳故佐天下而有功立此身而有名世皆奇之矣又當反其奇易生怪信易生疑樂易生悲退其身以避之此陰陽升降之道也故曰天之道白玉蟾曰持而盈之無欠無餘不如其已放下身心揣而鋭之貴欲無爲不可長保謹而勿失金玉滿堂儉視儉聽裕然有餘莫之能守終日如愚富貴而驕潜心勿用自遺其咎寂然不動何咎之有功成名遂月到天心處風凉水面時身退天之道退有餘地廖粹然曰持而盈之爲道之人不能自滿莫如其已莫若守已自有長策揣而鋭之不得妄起念頭須要一刀兩段不可長保免致後患金玉滿堂不貴外財惟愛自寳莫之能守若能保守豈不妙哉富貴而驕不貪奢華榮華自至自遺其咎我若無爲何咎之有功成名遂以道守己水到渠成不得執著身退退藏於密天之道乃合天道自然而然從前到家人不曾檯一歩陳碧虚曰持而盈之不如其已盈滿也已止也夫執持滿盈之物而不知謙損者必見其傾覆矣慎其傾覆之禍不如早圖其休止也此垂誡也嚴君平本作殖而盈之謂積其財寳也揣而鋭之不可長保揣度也又治也鋭銛利也言人但知銛利欲心而貪趣富貴殊不揣度妄情思治憍恣禍患之來不可長保嚴君乎曰富貴之於我猶登山而長望也名勢之於我猶奔電之忽過也言不可長保也鴻烈解曰白公勝得荆國不能以府庫分人七日石乞入曰不義之得又不能布施患必至矣不能與人不若焚之無令人害白公弗聽也九日葉公入乃發太府之貨以與衆出高庫之兵以賦民因而攻之十有九日而擒白公夫國非其有也而欲有之可謂至貪矣不能爲人又無以自爲可謂至愚矣譬白公之嗇也何以異於梟之愛其子也故曰持而盈之不如其已揣而鋭之不可長保也金玉滿堂莫之能守此明盈難反持理之必然也夫金玉滿堂徒爲潤屋然而巨盜至則負匱揭篋擔囊而趨雖有智者莫之能守故象有齒而焚身雞畏犧而斷尾禽獸尚如此人何不思之富貴而驕自遺其咎遺與也富則人求之故便欺物貴則人下之故好陵人欺陵日恣殃咎必來非自與而何嚴君平曰金玉之與身而名勢之與神若冰若炭勢不俱存故名者神之穢也利者身之害也養神之穢積身之害損我之所成而益我之所敗得之以爲利失之以爲害則彼思慮迷而趣舍悖也又曰益我貨者損我神生我名者殺我身患生於我不由於人福生於我不由於天陸希聲曰持大器而滿盈雖懼之不如早止居大位而亢極雖憂之不如早退揣勢利而鋭意雖得之不可永保貪金玉而滿堂雖有之不能長守貴而驕則得其禍富而驕則益其過驕生乎心咎自於己豈可怨天尤人乎功成名遂身退天之道此結義也夫大功既成顯名已遂而不知休退者何人哉且高鳥盡而良弓藏狡免死而獵狗烹勢使然也惟體天道之盈虚知進退存亡者至人哉謝圖南曰持而盈之至不可長保甚哉滿盈之念一毫不可萌也易一盈而四損一謙而四益天地人鬼之心亦可見矣持者持守其在内者也揣者揣摩其在外者也在内有盈溢之志則易以驕人盈者必虧故不如其止在外者有芒鋭之未去則易以傷物鋭者必折故不可長存此聖人之所以不爲大不爲高也金玉滿堂至自遺其咎金玉至寳人誰不愛然積不能散所喪必多富之與貴人誰不欲然驕泰輕人讎者必衆咎誰執乎功成名遂身退天之道人生斯世用功不能及物君子恥之没世而名不稱君子恥之功既成矣名既遂矣則能事畢矣奉身以退知止不殆天道代謝自然而然者也蓋嘗論之天有四時功成者退名亦造物之靳子既成且遂不能全身遠害退處暇佚貪榮冒寵禍將尋之是蓋未知有消息盈虚之理進退存亡之道陽亢則悔陰窮則戰乾坤不免而況於人乎黄帝所以屈廣成之問子房所以從赤松之遊是或一道也林鬳齋曰持而盈之至身退天之道此章只言進不如退故以持盈揣鋭爲喻器之盈者必溢持之則難不如不盈之易持已者勿盈之意也揣治也鋭銛也治器而至於極銛極鋭無有不折不若不鋭者可以長保富而至於金玉滿堂必不能長保居王公之位而至於驕盈必遺其咎故欲全其功保其名者必知早退乃爲天道功成名遂是隨其大小而能自全者故曰成曰遂若不知自足則何時爲成耶何時爲遂耶范應元曰持而盈之至不可長保滿則溢矣欲持而固之不如其止锐則挫矣欲揣而利之豈可長保金玉滿堂至自遺其咎貪財而輕命則物在而身亡矣富貴而驕奢則喪身而殃後矣河上公曰富當拯貧貴當憐賤而反驕恣即禍患也功成名遂身退天之道陰陽運行功成者退天之道也人當效天故自古及今功成名遂而身不退者禍每及之老子之言萬世龜鑑如子房者乃合天之道也薛庸齋曰持而盈之不如其已宥坐之器滿則覆雖持之無益也不若已其所持而使中且正也揣而鋭之不可長保人之圭角不假磨礱則動必有傷雖揣之不可保也金玉滿堂莫之能守石崇臨市曰奴輩利吾財耳莫之能守也富貴而驕自遺其咎韓信有多多亦辨之對而復示王於齊是自遺雲夢之禍耳郭汾陽二十四考中書令富貴壽考哀榮終始人臣之道無缺馬復何咎之有功成名遂身退天之道范蠡子房固知其道矣大夫種李斯豈知其道乎休休庵曰持而盈之至身退天之道持盈揣銳達士不爲也持守待滿足者當知盈必有虧徒費心力不如且止揣磨待鋭者鋭必有折不可長保金玉滿堂莫之能守光陰有限無常迅速人間富貴皆夢幻爾或處富貴當深思猛省乘時進道修德入聖超凡若或無知恣情驕奢者自昩其道自取其咎功成名遂者早宜保身退歩結果收因乃可合天之道從赤松子遊者張良也褚伯秀曰持而盈之至身退天之道持物而盈滿喻貪進不止故戒以不如已而勿爲揣摩其銛銳爭利冒患故告以不可長保無傷奔競之徒忘生殉利至于金玉滿堂寧不蹈爲富不仁之轍凡乆處富貴無禮以防之則驕奢蠱其心淫縱敗其性人非鬼責將無所逃是皆始於盈不知止長惡稔禍終於滅身郿塢金谷之事可鑑然則持者勿使盈盈者不必持可也愚夫知而弗戒甘蹈禍機君子於此則權其重輕爲之進退亦未嘗舍功名而弗爲但當明天理之倚伏察人事之可否知其功成名遂有物忌之退身藏密以畜其德斯有以見天爵之尊回視世間利禄不足浼矣四時之運成功者退儻違是理錯亂天經況人事乎竊觀古今英豪不少而保晚節難可爲太息惟見幾知足之士乃能免患生前流芳身後先哲有云若無舉鼎拔山力爭得回頭冷處看信哉牛妙傳曰持而盈之不如其已持謂誡也如所持之物盈滿則必溢也由是觀之與其滿而盈溢曷若誡而已之處夫中庸則自不至於盈溢也故云不如其已昔者孔子觀於魯桓公廟有欹器焉問守廟者曰此何器也守廟者曰此名宥坐之器孔子曰吾聞宥坐之器虚則欹中則正滿則覆古先明君以爲至誡斯非不如其已之謂乎揣而鋭之不可長保揣者試也鋭者剛强也試之而見其剛强者必不仁也孔子稱不仁者不可以乆處約不可以長處樂是也古人有言曰與善人交如霧露中行雖不濕人時時有潤與惡人處如刀劍之中立雖不傷人時時有害且衣冠不正人尚若將浼焉望望然去之況剛强之人而可與之長保哉孟子曰舜有天下選於衆舉皋陶不仁者遠矣湯有天下選於衆舉伊尹不仁者遠矣蓋不仁者知不可與其長保守故云揣而鋭之不可長保也金玉滿堂莫之能守金玉者天下之重寳也雖滿堂屋彼自貴耳於我何益於事功哉此即莫之能守之義也天尊曰世人以富貴外物爲眞寳事一旦五天使者無常殺鬼執其魂去華堂邃宇不復居處高車大馬豈得相隨金玉珍寳乃爲他玩此即莫之能守之說也富貴而驕自遺其咎富貴者尊榮也驕者傲慢也遺自取也咎悔吝也古人有言曰富貴者驕人乎貧賤者驕人乎諺言富貴不驕人其驕自來傲孔子曰君子泰而不驕小人驕而不泰且不安泰處即是悔吝也書曰盤樂怠傲是自求禍也禍福無不自己求之者斯非自遺其咎之說歟如昔者周家仁厚故成八百年之治隋煬肆行驕奢海内怨叛盜賊蜂起天下大亂旋至滅亡非自取而何耶太上曰禍福無門惟人自召此之謂也功成名遂身退天之道如身在廟堂名書竹帛其可謂功成名遂者矣其知求退掛冠不仕斯名身退也夫身退不盈者乃天之道也如張良事漢高位列侯不敢當三萬户但云封留足矣既而不仕從赤松子遊非身退而何耶范蠡事越王勾踐以霸乃曰大名之下不可乆居乃解相印泛海而行此二子者其可謂功成不居名遂身退得天道不盈之說可不賢哉楊智仁曰持而盈之至身退天之道持而盈之者日盈則昃月盈則虧修眞學道亦然九三陽長二八陰消鉛汞産成至寳火候炁足退而不行若不知止必有大辱故不如其已蓋持滿則盈不如止也其或未然必有貪心揣而鋭之何可長保金玉滿堂莫之能守富貴而退藏乃合天道也疏廣謂受曰吾聞知足不辱知止不殆功遂身退天之道宦成名立如此不去懼有後悔而驕嗜慾必傷神氣是自遺其咎也功成而不恃名遂而不彰道備喻清中曰持而盈之至身退天之道滿招損謙受益時乃天道政此章之意也器之滿者必覆善持者莫若知止器之銛者必折又從而揣磨之終不可以長保借物爲喻所以欲人之知進知退也金玉滿堂可以巳矣又從而貪多務得焉雖有此金玉莫之能守𤋱天富貴宜知止矣又從而驕矜自肆焉是自遺其咎也日中則昊月盈必虧天地盈虛與時消息功成名遂此身知退豈非順天道之自然乎范蠡覇越而扁舟五湖魯仲連下聊城而辭千金之謝却帝秦而逃上爵之封張子房顛嬴蹶項而飄然從赤松子遊皆足以高出秦漢人物之上此功成而不居其功者也易曰君子見幾而作不俟終日數子有焉胥六虚曰持而盈之不如其已天下之事執持而極其滿亦必有傾覆之患故勉之曰不如其已已止也謂不如及早止之則善矣權勢尤甚揣而銳之不可長保夫道求則得之舍則失之是求有益於得也求在我者也今用心揣度銳志進圖縱獲所欲非道德仁義之所致去古人有益於得遠矣不可長保不亦宜乎金玉滿堂莫之能守金玉天地至寳天下共愛之雖堆滿華堂其貪心未足者誠莫之能守也夫豈知爲大盜積者乎富貴而驕自遺其咎侯王天下之至富至貴者能以謙卑自牧天禄長享若以驕矜天下自與其身爲禍害也又誰咎歟功成名遂身退天之道功名古今聖賢之重大者唯成遂而知退乃能保之此有大德之務豈區區小知之所能乎故曰身退天之道如春生夏茂秋實冬落而復退歸于根矣柴元皋曰持而盈之不如其已持乆必厭倦揣而銳之不可常保進銳必退速金玉滿堂莫之能守有聚必有散富貴而驕自遺其咎驕傲必招禍功成名遂身退天之道盈虚消息天道之常知足者斯合天道蘇敬靜曰持而盈之至天之道四時之運成功者退此天道也正以四時不容不代謝也此章老子本意在功成名遂早退著意滿盈必溢銛銳必折器盈而持不如已之而勿執錐銳而揣不可保其乆不折揣者銛之使愈銳也金玉滿堂盜賊之招不能保守富貴驕傲禍咎乃至理之必然老子爲此言蓋欲人知足不辱知止不殆人在世間不過欲圖功名而已功既成名既遂身便可退此天道惡盈而好謙也不然持盈揣銳富貴而驕不知止足殆辱必隨之本一庵居士曰持而盈之至天之道盈則必溢銳則必折慮其溢而以力持之不如不盈之不必持也慮其折而以手揣之不如不銳之不必揣也盈以勢位言銳以才智言金玉滿堂以才智言富貴而驕以勢位言功成以勢位言名遂以才智言夫金玉可喜可慕之物藏之室猶懼難保而況於堂寘之堂且不可而況於滿如是雖視以離朱衛以賁育亦將爲盜所奪矣喻人之才智矜滿衒露必將爲物所敗此盛名之所以難居也富貴易危難安之也謙退自處猶懼不免況重之以驕縱是孽非天作禍不外來一一皆己自遺耳此大功之所以難保也惟智者於功成名遂之時則身退所合於天之道也退兼二義自勢位言則爲閉退自才智言則爲謙退天道即易所謂虚盈益謙之類傳所謂四時之運功成者退也晋人謂林公可謂金玉滿堂亦指才智而言世以守財釋之淺矣後章聖人被褐懷玉豈亦真玉耶諸子旁證又子老子曰以不義得之又不布施患及其身不能爲人又無以自爲可謂愚人無以異於梟愛其子也故持而備之不如其已揣而銳之不可長保石潭曰持而盈之不如其已揣而銳之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道矜持自滿不若止也揣摩而有圭角不可以長保也金玉滿堂有時而去不可以爲長守之物也富貴而驕自遺其咎位高則謗生家富則盜窺也故功成名遂身必先退則可以無咎蓋盈者必虧息者必消天之道也易之謙曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙書曰滿招損謙受益時乃天道即此章之意先儒曰老子得易之謙信矣道德真經集義卷之十四
