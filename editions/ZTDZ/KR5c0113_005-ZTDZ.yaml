body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正天下皆知章考異河上公作養身章趙實庵作眞常融攝義章唐明皇疏前章明妙本生化入兩觀之不同此章明樸散異名因萬殊而逐境逐境則流浪善化則歸根故首標美善妄情次示有無傾奪結以聖人之理冀速遺淳之由杜光庭曰夫悠悠衆趣蠢蠢群生涉境起情去道逾遠聖人憫其忘返啓此妙門前明兩觀之殊自無而入有此標六者之惑因事以相傾能知逐境之非不隨流浪之變則可以言虚心實腹之漸矣張沖應曰道先乎身而包乎天地也人體此自然之道而行之則神存精固勿與物逐不逞其才不貪其名畏益就損因近懼遠則萬禍潜消而身得其養矣故養身所以次于體道之章此河上公之釋也天下皆知美之爲美斯惡已皆知善之爲善斯不善已故有無相生難易相成長短相形高下相傾音聲相和前後相隨是以聖人處無爲之事行不言之教萬物作焉而不辭生而不有爲而不恃功成而不居夫惟弗居是以不去考異故有無至相隨一作有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨萬物作焉而不辭一無焉宇一作萬物作焉而不爲始功成而弗居夫惟弗居弗一作不一無而宇是以不去一作不處河上公曰天下皆知美之爲美自揚己美便顯彰也斯惡已有危亡也皆知善之爲善有功名也斯不善巳人所爭也故有無相生見有而爲無也難易相成見難而爲易也長短相形見短而爲長也高下相傾見高而爲下也音聲相和上唱下必和也前後相隨上行下必傾也是以聖人處無爲之事以道治也行不言之教以身師導之也萬物作焉各自動也而不辭不辭謝而逆止生而不有元氣生萬物而不有爲而不恃道所施爲不恃望其報也功成而弗居功成事就退避不居其位夫惟弗居夫惟功成不居其位是以不去福德常在不去其身也此言不行不可隨不言不可知矣上六句有高下長短君開一源下生百端百端之變無不動亂王輔嗣曰天下皆知至前後相隨美者人心之所進樂也惡者人心之所惡疾也美惡猶喜怒也善不善猶是非也喜怒同根是非同門故不可得偏廢也此六者皆陳自然不可徧舉之明數也是以至之事自然已足爲則敗也行不言之教至爲而不恃智慧自備爲則僞也功成而弗居因物而用功自彼成故不居也夫惟至不去使功在己則功不可乆也唐明皇曰天下皆知至不善已美善者生於欲心心苟所欲雖惡而美善矣故云皆知己之所美爲美所善爲善美善無主但是忘情皆由對執有無分别難易神奇臭腐以相傾奪大聖較量深知虚妄故云惡己疏天下者舉大凡言凡在天覆之下也美者心所甘美也善者身所履行也言天下之人皆知己心所甘美者爲美己身所履行者爲善故論甘則忌辛好丹則非素共相傾奪竟起是非皆由興動於欲心所以遞成乎美惡聖人知美惡無主但是妄情妄則不常故云惡已已語助也注云神奇臭腐莊子云所美爲神奇所惡爲臭腐是也故有無相生疏此明有無性空也夫有不自有因無而有凡俗則以無生有無不自無自有而無凡俗則以有生無故云相生而有無對法本不相生相生之名由妄執起亦如美惡非自性生是皆空故聖人將欲究其迷滯是以歷言六者之惑難易相成疏此明難易法空也此以難故彼成易此以易故彼成難亦如工者易於本而難於陶甄匠易於埴而難於木故云難易相成若同其所難則無易同其所易則無難難易無實妄生名稱是法空故能了之者巧拙兩忘則難易名息亦如美惡無定故也長短相形疏此明長短相空也以長故形短以短故形長故云長短相形亦如鳧脛非短以鶴之長故續之則憂鶴脛非長因鳧之短故斷之則悲見長短相形猶如美惡既無定體是皆妄生形相旣空名亦空故特未定也高下相傾䟽此名高下名空也高下兩名互相傾奪故稱高必因於下又有高之者稱下必因於高又有下之者又高則所高非高又下則所下非下如彼代間凡諸名位遞爲臣妾亦復無常是皆空故故無定位音聲相和疏此名和合空也五音相和成曲者誰總衆聲則能度曲如代間法皆和合成即體非眞是皆空故將欲定其美惡豈云達觀之談前後相隨疏此明三時空也日夜相代代故以新如彼投足敦爲前後則前後之稱由相隨立名名由妄立詐識其神過去未來及以見在三時空故旋旋遷改亦美惡無定名也六者相違遞爲名稱亦如美惡非自性生是由妄情有此多故是以聖人至之教無爲之事無事也寄以事名故云處不言之教忘言也寄以教名故云行也䟽是以者說下明上也夫飾智詐者雖拱默非無爲也任眞素者雖終日指揮而未始不晏然矣故聖人知諸法性空自無矜執則理天下者當絶浮僞任用純德百姓化之各安其分安分則不擾豈非無爲之事乎言出於己皆因天下之心則終日言未嘗言豈非不言之教耶萬物作焉而不辭令萬物各自得其動作而不辭謝於聖人疏作猶動作也辭謂辭謝也言聖人善化無事無爲百姓不知爰遊爰豫各自得其動作而不辭謝於聖人故擊壞鼓腹而忘帝力人忘聖功也生而不有至不居令物各遂其性不爲己有各得所爲而不負慎如此太平之功成矣猶當日慎一日不敢寧居疏今物各得成全其生理聖人不以爲己有令物各得其營爲聖人不恃爲己功如此太平之功弘濟日遠猶宜慎終如始不敢寧居此聖人自忘其功也云日慎一日尚書文也夫惟不居是以不去夫惟不敢寧居而增修其德者則忘功而功存故勿居而不去䟽彼聖人者稠直如髮慎終如始本末不衰未嘗寧居而逸豫是以日新其盛德忘功而功不去光宅而天下安故云夫惟弗居是以不去杜光庭曰天下皆知美之爲美至斯不善已天下之人知道者稀常俗者衆知修身者寡徇物者多皆知美善爲是而莫能爲皆知不善與惡爲非而莫能革故聖人歎之故云惡已不善巳夫戴仁仗義抱道守謙忠孝君親友悌骨肉非美善之行也皆知之矣而不能爲反於此者乃不善之行也皆知之矣而不能革況於修無爲之道乎故可歎也妄者非眞實之義也因境起念隨物生情不守道循常即爲妄矣神奇臭腐者莊子知北遊篇黄帝謂知曰萬物一也是其所美者爲神奇所惡者爲臭腐臭腐復化爲神奇神奇復化爲臭腐故曰通天地一氣耳聖人貴一也此明神奇臭腐物之偏性百氏殊學九流異門遞執是非互生臧否理身理國能無爲任物一以貫之臭腐神奇自然無二矣故有無相生老君歎彼常徒迷正道妄生對執滯此幻情故明此義以祛其執執者著也執有即斥無執無則斥有執難則斥易執易則斥難執短即斥長執長即斥短執高即斥下執下即斥高執後即斥前執前即斥後有此執故皆非宄竟故經云執者失之但無偏執自契中道便入玄妙正觀之門難易相成夫難因於易非易無以知其難夫易因於難非難無以彰其易循環倚伏遞爲之用審而明之於難無滯於易無執即可以語其齊物通乎中道矣工者巧技之稱也陶者和土爲器也各擅其伎則爲易更而使之則爲難也長短相形夫物之形也有短長之相夫事之興也有難易之法化之起也有有無之變俱自然也若拘常俗之見則長者不得不長短者不得不短有無難易在兹乎滯之則爲執通之則爲道惟有道者能無滯爾鳧鶴之喻亦莊子駢拇篇之辭也謂各自有正不可以此正彼而損益也此斥世人不任自然之㫖也高下相傾夫高下之設名形勢位性智才業萬殊之中皆有高下則不獨拘於名位也但高忘其高下忘其下各安其分守以天常則無傾奪之事矣臣者男子之卑稱妾者女子之卑稱卑伏於人故稱臣妾疏指名位之說蓋以廣戒群情也言尊卑之道各安其分不相傾奪則保其始終若棄卑而慕其尊名厭下而圖其高位不安素分禍敗隨之故經曰知足不辱知止不殆可以長乆可不戒哉音聲相和夫天地噫氣而衆籟作焉律吕和合而衆樂生焉聲之作也美惡隨之故有安樂怨怒哀思惉隠之别也然此别者人事强而隨之政化因而應之於達觀之士忘其善惡矣隨變責實謂之妄情美惡都忘方爲達道達道之士雖天地之大萬物之殷猶無有也樂記曰凡音之起由人心生心感於物而形於聲聲相應故成變變成方謂之音比音而樂之及干戚羽旄謂之樂故哀心感者其聲噍以殺樂心感者其聲嘽以緩喜心感者其聲發以散怒心感者其聲粗以厲敬心感者其聲直以廉愛心感者其聲和以柔是以先王慎其所以感故禮以導其志樂以和其心政以一其行刑以防其奸禮樂刑政其極一也音聲之道與政通矣宫爲君商爲臣角爲民徵爲事羽爲物五者不亂則無惉懘之音也理世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂遞相凌謂之慢鄭衛者亂世之音比於慢桑間濮上者亡國之音其政散其民流夫知聲而不知音者禽獸也知音不知樂者衆庶也唯君子能知樂審聲以知音審音以知樂審樂以知政不知聲者不可以言音不知音者不可與言樂知樂者幾於禮矣子夏對魏文侯曰鄭音好濫淫志宋音無女溺志衛音趣數煩志齊音傲僻驕志四者害於德非正聲也舂秋晏子對齊景公曰先王之濟五味以和五聲以平其心以成其政聲亦如味矣一曰氣須氣以動也二曰體舞象文武也三曰類風雅頌也四曰物以四方之物成器也五聲者宫商角徴羽也六律者黃鍾大簇姑洗蕤賔夷則無射也六吕者夾鍾林鍾仲吕應鍾南吕大吕也律主於陽吕主於陰也七音武王伐紂所製也自午及子製七日爲七音八風八方之風也東方曰明庶東南曰清明南曰景風西南曰凉風西方曰閶闔北方曰廣莫西北曰不周東北曰融風也九歌者六府三事九功之歌也清濁小大短長疾徐哀樂剛柔遲速高下出入周流以相成也以相濟也君子聽之以平其心心平德和而後幾於道矣舜作五弦之琴以歌南風䕫始製樂以賜諸侯理國之道以音而知理亂故吴公子季札歷聽三代古今之樂而知其興廢也修身之士𨳲視返聽以聽無聲然後可與言道矣前後相隨前後之别生於變動也不變不動誰後誰先既有相隨乃分前後達觀之士泯爾都忘世間之法彰其别耳投足者舉歩之謂也歩之舉也孰後孰初明於此者乃絶前後之竟矣老君傷憫世俗流蕩不遺爭起妄情忘其中道歷指六事以化愚迷耳夫中道者非陰非陽無偏名也處天地之間傲然自放所遇而安了無功名而反乎道本雖堯桀之殊生死之變是非之别壽夭之異榮賤之隔哀樂之感動古今之遞代皆忘之也不知堯桀之殊忘美惡也不知死生之變忘有無也不知是非之别忘難易也不知壽夭之異忘長短也不知榮賤之隔忘高下也不知哀樂之感動忘音聲也不知古今之遞代忘前後也處乎無是之鄉立乎不疾之途遭之而不違過之而不守調而應之以德偶而應之以道也益之而不加益損之而不加損此了乎中道之士忘前後之别忘變動之機矣是以聖人至之教夫聖人者與天地合其德日月合其明四時合其序鬼神合其吉凶謂之聖人也略而言之凡有五種第一得道之聖太上老君諸天大聖是也第二有天下之位兼得神仙之聖伏義黄帝顓頊少昊堯舜是也第三有天下之位而無得仙之聖殷湯文武是也皆廓清六合不言昇天矣第四博贍之聖無天下之位者周公孔子制作禮樂垂範百王而無九五之位而皆具天地合德之美也第五有獨長之聖而無博贍之名亦不具上衆美者謂伯牙師文爲鼓琴之聖子卿綏明能棋之聖鍾期延州知音之聖韓娥秦清謳歌之聖龔叔文摯智洞之聖離朱師曠視聽之聖張芝鍾繇草書之聖今經中明者指言理天下之聖也理天下之聖垂衣裳恭己南面而已矣何爲哉所謂處無爲之事也原天地之美達萬物之理順四時之行君無爲於上物自化於下可謂行不言之教也理國如此則人安其居樂其俗與道合矣萬物作焉而不辭聖人之於萬物也萬物自古而固存豈待爲之而後存哉物自得其生盲動作也爰遊爰豫太玄經之詞言上既無爲其下自遂故閒暇也擊壤者壤土也莊子馬蹄篇云赫胥氏之時民含哺而嬉鼓腹而遊也不知帝力者王充論衡曰堯之爲君蕩蕩乎人無得而名有年五十者擊壤於路鼓腹而歌曰鑿井而飲耕田而食日出而作日入而息帝何力於我此衆庶之忘聖功也生而至不居夫聖人處物不傷於物物遂其生物遂其生聖人不有之而恃其功任自然也處至順也夫功者王功曰勳輔成王業若周公也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若夏禹也理功曰績制法成理若咎繇也戰功曰多尅敵出奇若韓信也生成萬物者玄功也其功深遠曰玄也功成而不居所以全無爲之功也日慎一日已具疏解言聖人有及物之功不自伐自恃惟恐失其所以隳其功故曰加慎不敢寧息爾寧安也慎謹也聖人無爲其功廣大物遂其性不失其宜天清於上地寧於下四海平一泰然而寧是太平之謂也夫惟至不去夫惟者發句之語也謂上不有不居之事也夫聖人威加四海而不爲有澤被萬物而不爲惠功格天下而不爲己德冠四時而不爲主忘懷於至道合志於虚無處上而人不重處前而人不害天下樂推而人不厭故其志不去矣王者不妄於喜怒則刑賞不濫金革不起矣不妄於求取則賦歛不厚供億不繁矣不妄於愛惡則用捨必當賢不肖别矣不妄於近侍則左右前後皆正人矣不妄於土地則兵革不出士卒不勞矣不妄於萬姓則天下安矣物得其分不恃其功無爲不恃之利信哉博矣稠直如髮詩小雅都人士篇之詞也言情性密緻操行正直如髮之本末無隆殺也道君曰天下皆知至斯不善已道無異相敦爲美惡性本一致敦爲善否有美也惡爲之對故曰天下皆知美之爲美斯惡已有善也不善爲之對故曰皆知善之爲善斯不善已世之所美者爲神奇所惡者爲臭腐神奇復化爲臭腐臭腐復化爲神竒則美與惡奚辨昔之所是今或非之今之所棄後或用之則善與不善奚擇聖人體眞無而常有即妙用而常無美惡善否蓋將簡之而不得尚何惡與不善之能累哉故有無相生至前後相隨太易未判萬象同體兩儀既生物物爲對此六對者群變所交百慮所生殊塗所起世之人所以陷溺而不能出者也無動而生有有復歸無故曰有無之相生有涉險之難則知行地之易故曰難易之相成長短之相形若尺寸是也高下之相形傾若山澤是也聲舉而響應故曰聲音之相和形動而影從故曰前後之相隨陰陽之運四時之行萬物之理俄造而有倏化而無其難也若有爲以經世其易也若無爲以適己性長非所斷性短非所續天之自高地之自下鼓宫而宫動鼓角而角應春先而夏從長先而少從對待之境雖皆道所寓而去道也遠矣是以聖人至之教處無爲之事莊子所謂無爲而用天下也行不言之教易所謂以神道設教而天下服也爲則有成虧言則有當愆曾未免乎累豈聖人所以獨立乎萬物之上化萬物而物之所不能累歟萬物作焉而不辭至不去萬物並作隨感而應若鑑對形妍醜畢現若谷應聲美惡皆赴無所辭也故曰萬物作而不辭自生自化自形自色各極其高大而遂其性孰有之哉故曰生而不有𩐎萬物而不爲利澤及萬世而不爲仁覆載天地彫刻衆形而不爲巧故曰爲而不恃四時之運功成者去天之道也聖人體之故功蓋天下而似不自己認而有之亦己惑矣故曰功成不居有居則有去古今是也在己無居物莫能遷適來時也適去順也何加損焉故曰夫惟不居是以不去王介甫曰天下皆知至不善已夫美者惡之對善者不善之反此物理之常惟聖人乃無對於萬物自非聖人之所爲皆有對矣故有無相生至相隨有之與無難之與易高之與下音之與聲前之與後是皆不免有所對唯能兼忘此六者則可以入神入神則無對於天地之間矣宇說無從大從亡蓋大者有之極也有極則復此於無者矣老子曰有無之相生是以聖人至之教聖人觀有之有對於是處無爲之事行不言之教聖人未嘗不爲也蓋爲出於不爲聖人未嘗不言也蓋言出於不言生而不有至功成不居生之而不有其生爲之而不恃其爲功成而不居其功此三者皆出於無我惟其無我然後不失已非惟不失己而又不失人不知無我而常至於有我則不惟失己非惟不失已而又不失人功成則居居則與去爲對聖人不居上之三者然後道之常在於我而不去也蘇潁濱曰天下皆知至前後相隨天下以形名言美惡其所謂美且善者豈信美且善哉彼不知有無難易長短高下聲音前後之相生相奪皆非其正也方且自以爲長而有長於我者臨之斯則短矣方且自以爲前而有前於我者先之斯則後矣苟從其所美而信之則失之遠矣是以聖人至之教當事而爲無爲之之心者當教而言無言之之意者夫是以出於長短之度離於先後之數非美非惡非善非不善而天下何足以知之萬物作焉至不居萬物爲我作而我無所辭我生之爲之而未嘗有未嘗恃至於成功亦未嘗以自居也此則無爲不言之教其爲美且善也豈復有惡與不善繼之哉夫惟至不去聖人居於貧賤而無貧賤之憂居於富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也吕吉甫曰天下皆知至斯不善已天下皆知美之爲美善之爲善而欲之知惡與不善而惡之然自道言之則雖美與善皆離乎道矣自出於道言之則雖惡與不善皆非道之外也由是觀之則美斯惡善斯不善豈虚言哉故有無相生至相隨天下之物生於有有生於無是之謂有無之相生難事作於易而易亦由難之故無難是之謂難易之相成有鶴脛之長而後知有鳧脛之短有鳧脛之短而後知有鶴脛之長是之謂長短之相形以高爲是則百谷爲川瀆之源則高有以傾乎下以下爲是則川瀆爲百谷之歸則下有以傾乎高是之謂高下之相傾黃鍾爲君則餘律和之餘律爲君則黃鍾和之是之謂音聲之相和自秋冬而望春夏則春夏前而秋冬後自舂夏而望秋冬則秋冬前而舂夏後是之謂前後之相隨是以聖人至之教聖人處無爲之事無爲也無事則無心聖人無心以百姓心爲心行不言之教無言也無言則言出於不言雖事不涉爲之之迹雖教不發言之之意故事濟而教行萬物作焉而不辭至不居功名雖高豈有無滿之累乎將使人反常復朴與天地爲徒與造化爲友也夫惟至不去不居則去爲對此道之常在我豈有遷去哉陸農師曰天下皆知至不善已美至於無美者天下之眞美也善至於無善者天下之眞善也眞美斯離天下皆知美之爲美眞善斯散天下皆知善之爲善故有無相生至相隨有無者以言乎其道難易者以言乎其德長短者以言乎其體高下者以言乎其位聲音者以言乎其交感前後者以言乎其始終此勢之然也是以聖人至之教夫聖人處無爲之事行不言之教者將以使人冥於眞善混於眞美復歸于樸而與天地與造化爲友者矣萬物作焉而不辭至不去萬物之息與之入而不逆萬物之作與之出而不辭王元澤曰天下皆知至不善已道本無物物有妄情自相分别此溺於轉徙之流而不能自出故耳然溺而不出者不由厭離而樂著所以惡不善也故惡與不善美善之隨也當其美善之時蓋已惡且不善矣俟其隨而後悟則亦悟之晚也雖然至人所謂美善未離乎惡與不善而惡與不善未嘗離乎美善也天下之愚不足與此故所謂美善常惡與不善也新說此言美惡善不善相逐而妄者溺於美善不如有惡與不善也唯聖人超然遠覽知美之有惡善之有不善未嘗有所溺也故有無相生至相隨離道而我我則有彼彼我既分觸類爲二矣此六對者物之所以不齊而喜怒哀樂生死之變更出迭入而不能自止者也凡此皆不冥夫陰陽之本而隨其末流自性分别執一廢百以妄爲常故耳此篇第二與莊子齊物論相似篇有叙篇可以理推是以聖人至之教聖人無心以百姓心爲心雖事而未嘗涉爲之之迹雖教而未嘗發言之之意故事以之濟教以之行而吾寂然未始有言爲之累而天下亦因得以反常而復朴也夫惟無累故雖寄形陰陽之間而造化不能移彼六對者惡能擾之哉萬物作而不辭萬物並作聖人各盡其性而無所辭以吾心寂然無去取故也苟懷去取之慮則物之萬態美惡多矣烏能不辭哉生而至不居有我則居居則遷矣夫惟至不去形名巳降莫不代謝惟道無體物莫能遷聖人體道故充塞無外而未嘗有物應接萬變而未嘗有心如是則豈以適然之事攬以爲功而固有之哉夫然後離六對之境絶美惡之名越生死流處常住法也持此心以涉世則功名雖高豈有亢滿之累乎劉仲平曰天下皆知至不善已天下皆知吾美之爲美則美不足其終也反謂惡而已矣天下皆知吾善之爲善則善不足其終也反謂不善而已矣是以聖人至之教惟聖人處無爲之事行不言之教使天下不知吾有善與美之所以然者此其道教人而不去也夫惟至不去夫惟不居是以不去者言與爲成故此舉斷以不居也不去謂處六對之間爲獨立也哉民冥無知旣以流於六對而於六者又絶而去之不以事教爲應則民何賴乎唯不居功則雖不去之其善救大矣莊子曰因萬物而不去劉巨濟曰天下皆知至不善已妙名立則美善生矣徼名立則惡不善生矣美名立則惡生矣善名立則不善生矣皆道之失也善惡之性雖立而名名字字未始有極也俗學不能知然而知所好方以爲美也而惡因之以爲善也而不善因之聖人雖不能絶於善惡亦不能離善惡而獨立然能以美爲惡以善爲不善亦能以惡爲美以不善爲善莊子曰所美者爲神奇所惡者爲臭腐臭腐復爲神奇神奇復爲臭腐故有無相生至相隨得鹿者俄失之失馬者俄得之得失無端相生之類也水者不車陸者不舟巧拙無端相成之端相成之類也冥靈朝菌壽夭無端相形之類也王公乞人貴賤無端相傾之類也夢飲酒者旦而哭泣哀樂無端相和之類也嬰孩少壯老耄死亡無端相隨之類也此六對者皆因於善惡爲名字言未知有極者也惟見曉於㝠㝠之中則能知之知之則齊之是以聖人至之教善惡既分則有六對爲民宜無知則其爲貴大矣同民患者於是有事又有教焉遠爲之而事成者無爲之事也近言之而教行者不善之教也有事有教特以救俗而已反與之同流將爲六對者之所浮沉尚何以爲貴乎莊子曰至言去言至爲去爲萬物作而不辭此申不言之義委萬物於自造而不能說故曰作而不辭既作則生既生則教行焉爲舉之以無我故曰生而不有以辭屬言者蓋令萬物則口不能無費者也夫惟至不去爲而不恃功成不居者此申不爲之有爲則事成有事則功成侍爲於前則功居於後矣劉驥曰天下皆知美之爲美至是以不去混沌未判萬象同體二氣既分物物爲對既謂之美則純樸已殘必有惡爲之對旣謂之善則性情已離必有不善爲之對美或爲惡善或爲不善是猶有無之相生難易之相成長短之相形高下之相傾聲音之相和前後之相隨此六對者可否相因終始反覆非天下之至正也昔之所是今或非之今之所棄後或用之是猶美之爲美善之爲善特未定也經所謂正或爲奇善或爲妖是矣且天下之理有爲則有成虧有言則有當愆皆未免乎累是以聖人處無爲之事行不言之教所以能遺物離人而獨立乎萬物之上不與物爲對而物無能偶之者列子所謂疑獨莊子所謂獨有者是矣無爲之事則至爲去爲而冥冥之中獨見曉焉不言之教則至言去言而無擊之中獨聞和焉聖人體道在己其用心不勞其應物無方萬物皆往資焉而不匱故萬物並作隨感而應則與之作而不辭任萬物之自生而不有其生任萬物之自爲而不恃其爲功蓋天下而似不自己化貸萬物而民不恃故功成不居有居則有去故夫惟弗居是以不去功成而不居其功其不欲見賢耶故次之以不尚賢趙實庵曰初序六對之縁一謂非正性天下皆知至斯不善已老子之言道德妙在首篇自常無以至於常有則恍惚之中有象與物一以貫之又自玄之又玄分頓漸之義要妙盡乎此矣然八十一篇義理相貫其義皆有攸緒自物離妙門則常道常名者交融於美惡之地故繼以天下皆知章夫道降而爲物常即道之體體者所以備衆用用之豈能一於常故逐物之性則有遷在物之情必有變常者不可以自常美者不可以常美情變不一而善惡相反矣詩云習習谷風以陰以雨采葑采菲無以下體言天地之情不能常和萬物之性不能常善美惡者非道也亦非性也是情立知見也凡立知見無非是欲欲之心只知美之爲美不知美者返而爲惡矣知善之爲善不知善者返而爲不善矣此見乎常道常名者流而爲事物故曰事以繼道是章自善惡相返至于六對不齊先引事而顯理次去累而返眞所謂以事顯理者謂美惡善否六對不齊無非事者至於聖人處無爲之事則因事而見理由塵而入覺是理者非聖人其能乎聖人以獨智照明超然於萬形之上去彼流動之域自處無爲之地凡天下之有是者豈能累我哉此去累而返眞夫無則無爲無爲而已有則興事事從有興聖人豈恐然自立於無事之地哉隨變所適治之而已經義至此漸云治道凡言治道必該方内之教然後明治之之理故平有納無雖儒者之譏議室斯通矣屬聖人之獨知經所以先言善惡顯之事相次舉六對以明因縁二對待之境故有無相生難易相成故之字牒前文美善相返嘆其美惡善否如此後正標六者對待有無理也難易事也長短才也高下勢也聲音律吕也前後新故也夫萬物出於機而入於機百昌生於土而返於土出機入機者自至無之中受命而來及其返也返入於無此以性言也百昌生於土自有形而逮夫無形旣生於物又化爲土未離有有也此以形言也蓋有無同出於道之一性出則爲有入則爲無若春夏之居先秋冬之躡後成始成終互隱互顯對待境中第一義也故曰有無之相生此理也難易之相成事無易也積難成易事無難也積易成難夫創業難也守成易也以創業比守成創業雖難因而返易何以明之以有道伐無道所謂飢者易爲食渴者易爲飲如湯武弔民伐罪是也以守成比創業守成則易因而返難何以明之守成之君如執滿器使心定志平不可以不靜而鎮之動即傾覆謂不知定心平志返爲難矣故守成之君無如成王也若夫易知則有親易從則有功特言易而不言難而能易者難在其中矣天下之勢其孰不然蓋易其難則致難難其易則有易故曰難易之相成兹事也長短之相形物生於天地之間同禀乎一氣得其氣之全者形之長得其氣之弱者形之短故古之人多長七尺今之人不過五尺古之人長而魁偉者一氣之降也今之人短小而削弱者一氣之浸微也豈徒事之變耶人亦然爾雖間復不齊蓋不能純如此也故天人之形有定數也相形者用之有宜也材用適於大匠之手各當其宜人才置諸聖人之選各稱其德性長非所斷鶴脛是也性短非所續鳧膝是也故長者不可短短之則悲短者不可續續之則憂自然之理也獨性之在人無長無短平等而已若物之在人固不一矣傳曰龜長於蛇不以形言而以理言陰虧於陽不以氣言而以德言有若防風之骨以專車噍僥之民長尺五何其不齊也夫寸短而尺長非寸不能致尺棟脩而栱短非栱不能以安棟相形之謂也此固以材言高下之相傾天高而地下陽上而陰下山高而澤下上下者勢也位也位之高其勢不得不高位之下其勢不得不下然天覆下地仰上二者無相傾陽在上陰在下二者無相傾惟山高澤下有相傾也山高而澤下有從水而言者曰百谷爲川瀆之源則高以傾乎下以下爲是則川瀆爲百谷之歸又以相傾之勢言之高岸爲谷深谷爲陵亦相傾之理也何以言之岸高也岸穴而爲谷谷窪也窪者陷而復平平者崇而爲陵千年之後安知陵不爲岸乎岸不爲窪乎相傾者凡以勢而言聲音之相和言樂也禮以導中樂以導和樸散之後民失性情非禮以節之則亂非樂以和之則傷故樂之興音聲之作也樂記曰凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂樂者音之所由生也其本人心之感於物也是故哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其憂心感者其聲和以柔六者非性也感於物而後動是故先王慎所以感之者故禮以導其志樂以和其聲政以一其行刑以防其奸禮樂刑政其政一也所以同民心而出治道也凡音者生人心者也情動于中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣宫爲君商爲臣角爲民徵爲事羽爲物五者不亂則無惉之音矣律吕者配於十二月矣夫五音起於五行五行配於五臟肝主怒肺主悲脾主思心主喜腎主恐五臟所主不同五聲相感亦異以喜召喜其聲亦喜以悲召悲其聲亦悲内有所感外有所應情志之所感也故有聲音相和焉故音聲以律吕言也前後之相隨日之徂也不復有一日月之所繫焉年之徂也不復有一年歲之所統焉幻之遷也不復有諸幻身之所紀焉今之往也不復有于今時之所遞焉回首視之立致今古春夏先而秋冬後四時之運未嘗暫止新者復故故者復新循環無端前後相逐禍福相倚而不忒形影相弔而不離兹前後之理以新故而言之觀夫有無之相生事物之變也若同乃虚虚乃大復何出没焉難易相成也持而盈之不如其已復何憂患焉長短之相形形之不齊也無形者數之所不能窮孰齊孰不齊焉高下之相傾上爲皇下爲王得吾道之所一也物莫能遷孰傾敦不傾焉爲聲音之相和寧如大音希聲者聽之所不能入乎前後之相隨寧如處陰休影者迹之所不能辨乎兹非體道而立乎萬物之上者敦能與於斯則知聖人者有物安足以繫之次離患守眞一以常反照是以聖人處無爲之事是以字牒前起後前言六對不齊於此義中略分二門一者謂物之不齊六對相仍二者物之相待有和合相以不齊而齊之是有爲也以對待而和合之是膠固也於對待不齊之中獨超然自得即聖人也聖人則盡其性者也盡其性則才與道并不能盡其性則有聖人之才而無聖人之道有其才而無其道則巧巧則人爲有其道而無其才則質質則不化惟才與道并是謂全德適時應變變而不窮然後能明無爲之道能明無爲之道善處無爲之事善處無爲之事能行不言之教凡寓形於宇内者不能逃乎事處位乎至貴者不可勞乎心蓋心與事并則失無爲之理身與事遠則失善處之能聖人者處乎一堂之上而供萬事之求豈可以身遠乎事哉必曰虚心應變而已彼六對者雖自外來以理觀之寔自心至且以心起情事與情合事與情合則對待之境紛紛錯錯無時而已是未知因其固焉付之自爾彼物有自然之性吾則因而治之彼物有不說之理吾則默而相之乃所謂不行而知不見而明者也若夫天無爲以之清而福善禍淫之理明矣地無爲以之寧而承天效法之情著矣由是觀之天地豈無事耶處之無爲而已二以誠化物行不言之教夫不言之教者聖人以誠化天下也以誠化物則觀而化也上之化下如風行地上豈俟言哉莊子謂兩無爲相合是也易曰聖人以神道設教化至於神則不疾而速不行而至若孟子所謂聖而不可知之謂神又正者一而止之也凡我之正物莫不正故曰其身正不令而行其身不正雖令不從此皆不言之教也雖然以誠化物以身率人皆治天下者之事也若夫不言而謂之教者尚有諄諄之意殆夫若不知其所以然而然者得其自然也非聖人敦可語於斯乎故觀不及豫終南戒襄公之詩曰錦衣狐裘顔如渥丹其君也哉三運量不匱萬物作焉而不辭前言六對不齊聖人以獨智見覺破幻歸眞自處無爲之地坐制紛拏次云萬物作而不辭顯道之用何謂顯用無爲即不動也今也萬物有作物自何來還從無出雖云生者自生化者自化道未嘗主之又何以言不辭既言不辭則來者不拒矣如是則萬物實道生之聖人主之豈不曰來干我者我必知之在權實二相所論萬物爲權聖人爲實實故不移權以相顯是則天下爲聖人所有聖人未嘗有天下使其容心適足自累虚以照之常應常靜又何辭焉四化出自然生而不有前言作而不辭是順物之理任之生化自若也次言生而不有聖人虚心以應物豈以生者爲我有耶易曰乾其靜也專天地含陰陽陰陽生萬物道旣不主聖人其尸之乎則知聖人者主道而不主物主物則雜其心也莊子曰道不欲雜雜則多其是之謂乎此皆明無爲之理也五不任智力爲而不恃前二句言無爲此言有爲無爲即有爲之本也經曰爲無爲則無不治今此明爲而不恃者言不矜伐也向所謂作而不辭者物在範圍之内故作者不可辭次言生而不有者致物於空虚之地故生而不有此顯聖人處無爲之中而未嘗不爲也自有爲而至無爲則天下既以治矣百官旣以職矣君臣父子既以序矣朋友旣以信矣禮義既以明矣刑罰既以清矣百工既以具矣四夷既以服矣百姓旣以定矣聖人於此不歸其功然則歸之誰耶聖人作之初無心成之亦無心蓋一切塵縁本無自性聖人之心亦虚而已此言大聖之道也若夫爲一事曰仁行一事曰義從以矜伐於人不過霸者之事而已又豈與隆古比治哉六神化不留功成不居道無定體因物以爲體常無一心因心而爲心響之發也其在聲物之生也其在色至于手執足行夢思覺想前念未滅後念復興是心本無縁塵而作聖人覺此其誰居乎然則功成者居其位也居其位而不去者是泥迹於有爲也泥迹於有爲宜其膠固而不解若是則豈有道者之心哉語曰旣得之患失之苟患失之無所不至矣又況出治之聖人乎聖人則不然體天而行也比夫四時之運功成者去去則無繫矣易曰乘木舟虚不特去者而然其在位之心亦若是而已苟爲不然則道有去留矣今所謂功成不居者進退有道也易曰知進退存亡而不失其正者其唯聖人乎夫乾之亢陽用九之義是也居天下之廣居孟子之言是也大名之下難可乆居鴟夷子之言是也二邊俱不立中道不須安釋氏之言是也内觀起火十月脱胎眞人之言是也知此者非聖人而疇克焉哉三牒前顯常夫惟弗居是以不去所言去者名與位也所不可去者獨立而不改也道德眞經集義卷之五
