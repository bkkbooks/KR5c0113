body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正天地不仁章考異河上公作虚用章趙實庵作大化公行義章唐明皇疏前章明妙本沖用在用而無爲此章明偏愛成私偏私則難普首標芻狗萬物示天地之兼忘次喻橐籥罔窮明用虚而不撓結以多言數屈欲令必守中和杜光庭曰夫以仁爲仁則有執不以仁爲仁則無私帝王之視群生猶天地之視萬物萬物自生自化天地不以爲功群生爰居爰處帝王不以爲惠任妙氣以鼓鑄任玄化以生成乃爲至化矣若言其仁惠理或自窮何者天地之仁大矣草木有冬榮夏枯帝王之仁大矣刑法有投荒用鉞未若不以仁爲仁之大也運彼沖和守其清靜爲理身之要妙矣張沖應曰虚者空也太虚無象運行兩間無聲無臭而所用則成此萬物所以生而無窮也人能達此虚而用之則道無不成者矣天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地之間其猶橐籥乎虚而不屈動而愈出多言數窮不如守中考異虚而愈出一作俞出河上公曰天地不仁天施地化不以仁恩任自然也以萬物爲芻狗天地生萬物人最爲貴天地視之如芻草狗畜不責望其報也聖人不仁聖人愛養萬民不以仁恩法天地行自然以百姓爲芻狗聖人視百姓如芻草狗畜不責望其禮意天地之間天地之間空虚和氣流行故萬物自生人能除情欲節滋味清五藏則神明居之也其猶橐籥乎橐籥中虚空人能有聲氣虚而不屈動而愈出言空無有屈竭時動摇之益出聲氣也多言數窮多事害神多言害身口開舌舉必有禍患不如守中不如守德於中育養精神愛氣希言王輔嗣曰天地不仁以萬物爲芻狗天地在自然無爲無造萬物自相治理故不仁也仁者必造立施化有思有爲造立施化則物失其眞有思有爲則物不具存物不具存則不足以備載矣地不爲獸生芻而獸食芻不爲人生狗而人食狗無爲於萬物而萬物各適其所用則莫不贍矣若惠由己樹未足任也聖人不仁以百姓爲芻狗聖人與天地合其德以百姓比芻狗也天地之間至動而愈出橐籥之中空洞無情無爲故虚而不得窮屈動而不可竭盡也天地之中蕩然任自然故不可得而窮猶若橐籥也多言數窮不如守中愈爲之則愈失之矣物樹其惡事錯其言不濟不言不理必窮之數也橐籥而守數中則無窮盡棄己任物則莫不理若橐籥有意於爲聲也則不足以供吹者之求也唐明皇曰天地不仁至百姓爲芻狗不仁者不爲仁惠也芻狗者結草爲狗也犬以守禦則有弊蓋之恩今芻狗徒有狗形而無警吠之用故無情於仁愛也言天地視人亦如人於芻狗無責望爾嘗試論之曰夫至仁無親孰爲兼愛愛則不至適是偏私不獨親其親則天下皆親矣不獨子其子天下皆子矣是則至仁皆爲親乃至親也豈兼愛之乎疏仁者兼愛之自也芻狗者謂結草爲狗以用祭祀也今天地至仁生成群物亦如人結草爲狗不責其吠守之用不以生成爲仁恩故云不仁也則聖人在宥視彼天下百姓亦當如此爾注云弊蓋之恩者禮記孔子云弊蓋不棄爲埋狗也不獨親其親禮運文也天地之間其猶橐籥乎橐者韜也籥者笛也橐之鼓風笛之運吹皆以虚而無心故能動而有應則天地之間至物無私者亦以虚無無心故也虚而不屈動而愈出橐籥虚而不屈撓動之而愈出聲氣以況聖人心無偏愛則無屈撓之時應用不窮可謂動而愈出也疏橐也謂以皮囊鼓風以吹火也籥笛也言天地能芻狗萬物者爲其間空虚故生成無私而不責望亦由橐之鼓風笛之運吹常應求者於我無情故能虚之而不屈撓動之愈出聲氣以況人君虚心玄默淳化均一則無屈撓曰用不知動而愈出也多言數窮不如守中多言則不酬故數窮屈兼愛則難遍便致怨憎故不如抱守中和自然皆足矣疏多言者多有兼愛之言也多有兼愛之言而行則難遍故數窮屈不遂是知不如忘懷虚應抱守中和則自然皆是也不酬者酬答也謂空有其言而行不酬答也杜光庭曰天地不仁至百姓爲芻狗古之祭法有爲人用者皆象其形以列籩豆之間故有芻狗之設矣夫犬以吠守今芻狗無吠守之用天地之視萬物聖人之視百姓亦如芻狗不責其吠守之能不以仁恩之爲仁不責其報不彰其仁是以不仁矣人於狗也有弊蓋瘞埋之恩今於芻狗亦無此恩矣明聖人不以兼愛爲仁也弊蓋者禮記檀弓篇曰仲尼之畜狗死使子貢埋之子曰吾聞之弊帷不棄爲埋馬也君之路馬死埋之以帷弊蓋不棄爲埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉恐其首直委於土也不獨親其親者禮運篇云大道之行天下爲公不獨親其親不獨子其子汎愛於物推公而行不爲偏愛也天地之間至動而愈出橐乃皮囊以鼓風籥乃竹管以運氣橐鼓風無籥不能運籥運氣無橐不能鼓兩者相須而行以明天地爲橐五氣爲籥含虚運動以生萬殊而無屈竭矣人君虚心用道臣佐體君行化如天地運五氣以不竭則政無屈撓四海和平也動之愈出聲氣言無窮也淳化均一者淳和之德用被萬品曰用不知者易繫辭云萬方百姓曰用頼用此道以得生而不知道之功力冥昩不以功爲功百姓用之而不知也屈竭也撓亂也多言數窮不如守中多言多敗多事多害言之多也謂或不應故有窮屈矣理國多言謂政令多出朝令夕改則謂數窮也理身多言其失可知也故一言之失駟馬不追況多言之失寧無辱乎夫言者離堅合異反白爲黑防人之口甚於防川不可不慎也不如默守中和於國不煩其政令於身不召其恥辱愛氣希言守德於中行不言之教斯爲美善矣宋道君曰天地不仁至百姓爲芻狗恩生於害害生於恩以仁爲恩害則隨至天地之於萬物聖人之於百姓輔其自然無愛利之心焉仁無得而名之束芻爲狗祭祀所用過則棄之彼萬物之自然而百姓之自治曾何容心哉天地之間其猶橐籥乎橐籥虚而能受而能應故應之而不窮有實其中則觸處皆礙凡道爲一偏在物爲一曲虚而不屈動而愈出虚己以遊世則泛應而曲當故曰虚而不屈迫而後動則運量而不憒故曰動而愈出聖人出應帝王而無言爲之累者此也多言數窮不如守中籥虚以待氣氣至則嗚不至則止聖人之言似之辨者之囿多言而未免乎累不如守中之愈也慎汝内閉汝外收視反聽復以見天地之心焉此之謂守中王介甫曰天地不仁以萬物爲芻狗天地之於萬物聖人之於百姓有愛也有所不愛也愛者仁也不愛者亦非不仁也惟其愛則不留於愛有如芻狗當祭祀之用也盛之以篋衍巾之以文綉尸祝齋戒然後用之及其既祭之後行者踐其首脊樵者焚其支體其天地之於萬物當春生夏長之時如其有仁愛以及之至秋冬萬物彫落非天地之不愛也物理之常也聖人不仁以百姓爲芻狗且聖人之於百姓以仁義及天下如其仁愛及乎人事有終始之序有死生之變此物理之常也此亦物理之常非聖人之所固爲也此非前愛而後忍蓋理之適然耳故曰不仁乃仁之至莊子曰至人無親大人不仁與此合矣天地之間至動而愈出道無體也無方也以沖和之氣鼓動於天地之間而生養萬物如橐籥虚而不屈動而愈出多言數窮不如守中出言則有方有體大言所以明道也有言則有指指則不能無過故多言則數窮故不如守中以應萬變蘇潁濱曰天地不仁至百姓爲芻狗天地無私而聽萬物之自然故萬物自生自死死非吾害之生非吾仁之也譬如結芻以爲狗設之於祭祀盡節以奉之夫豈愛之時適然也既事而棄之行者踐之夫豈惡之亦適然也聖人之於民亦然特無以害之則民全其性死生得喪吾無與焉雖未嘗仁之而仁亦大矣天地之間至動而愈出排之有橐與籥也方其一動氣之所及無不靡也不知者以爲機巧極矣然橐籥則何爲哉蓋亦虚而不屈是以動而愈出耳天地之間其所以生殺萬物彫刻衆刑者亦若是而已矣多言數窮不如守中見其動而愈出不知其爲虚中之報也故告之以多言數窮不如守中之不窮也吕吉甫曰天地不仁以萬物爲芻狗天道冥於象帝之先而不知誰之所自出則體此道者仁足以名之哉夫仁人心而已矣天地體此道者也無所事仁以萬物爲芻狗全義芻狗者祭祀之用也受之則無所用不可闕矣猶之天地之於物也無心於物而似乎無所愛若夫春生夏長則似乎有所愛聖人之於民亦若是也聖人不仁以百姓爲芻狗聖人體此道者也無所爭仁以百姓爲芻狗芻狗之爲物無所爭仁而畜之者也萬物與天地同體者也百姓與聖人同體者也天地聖人自視猶芻狗則其視萬物百姓亦若是而已天地之間至動而愈出則生之畜之長之育之何所事仁哉夫惟不仁是之謂大仁然則天地之間其由橐籥固可見矣蓋橐籥之爲物惟其虚而不屈所以動而愈出也多言數窮不如守中則人也體此道者言出於不言而已言無言知言之所以言矣則多言數窮不如守中之爲務也陸農師曰天地不仁以萬物爲芻狗天地之於萬物聖人之於百姓泊然無係而不滯於仁適則用之過則棄之而已故云芻狗之爲物其未陳也盛之以篋衍覆之以文繡其既陳也行者踐其首樵者爨其軀所謂適則用之過則棄之者也天地之間至動而愈出天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗與世推移與時運徒而不拘於已陳之迹不膠於既踐之緒矣故能入則鳴不入則止而知橐籥焉故曰天地之間其猶橐籥乎虚而不屈動而愈出多言數窮不如守中虚而無屈無所屈也動而愈出有所示也無所屈而有所示者神也虚而無所屈動而有所示故能赴物之感言出如此而未始有窮也若夫述古人之土梗語先王之芻狗屈於已陳之迹膠於既殘之緒欲以有爲於日徂之世此其所以多言數窮不如守中之愈也此一篇與莊子芻狗之意大略同焉王元澤曰天地不仁以萬物爲芻狗芻狗祭祀所用方其用也隆禮致敬以事之及其已事則棄而捐之等於糞壤其隆禮致敬之時非不以至誠也然而束芻爲狗耳實何足禮敬乎雖不足禮敬而加禮敬者又非以偽也夫萬物各得其常生死成壤理有適然而天地獨爲之父母故不得無愛而原天地之心亦何係累哉故方其愛時雖以至誠而萬物自遂實無足愛者及要其終則糞壤同歸而已豈留情乎聖人不仁以百姓爲芻狗仁者人也以人道愛物之謂仁彼人貌而天者何足以名之故聖人親親而仁民故獨言百姓若其道則與天地一矣而有人之形故任各異天地之間至動而愈出橐籥虚以應物感則應應而不藏天地之於萬物聖人之於百姓應其適然而不係累於當時不留情於既往故此橐籥之無窮也虚而不屈者虚其體也動而愈出者動其用也多言數窮不如守中非言則窮矣舉言則爲可知且聖人之事言而不爲者也守中所以應萬變劉仲平曰天地不仁以萬物爲芻狗仁者惻隱以致其愛也夫芻狗之爲物惻隱以致其愛可也不惻隱以致其愛亦可也蓋方其盛以篋衍巾以文繡尸祝齋戒然後將之者若有惻隱以致其愛也及其身脊見踐於行者又見爨於樵者而無復有用散亂埃滅則漠然無惻隱以致其愛也天地於萬物亦然方其雷風鼓舞兩露滋濡覆載包函嫗照宇育欲生者使之生欲成者使之成而有形者必立有性者必遂若有惻隱以致其愛也及其霜霰冰雪酷烈慘毒折屈摧敗而陽不敢進日不敢烜大者毁小者絶剛者缺柔者滅又無惻隱以致其愛也故曰天地不仁以萬物爲芻狗矣聖人不仁以百姓爲芻狗非特天地之於萬物也聖人之於百姓亦然方其感之以恩擾之以教恩涵惠霑愷悌勞來噢噢呴呴若保赤子者若有惻隱以致其愛也及其罪大則殺罪小則刑支解屠裂牽磔焚棄偃仆於市朝狼籍於原野而崇城有馘耳之痛紂都有流血之多又無有惻隱以致其愛也故曰聖人不仁以百姓爲芻狗天地之間至動而愈出以其無心於愛與不愛也此天地之所以能神也蓋神者有所示而無所屈也以其無所屈也故如橐籥之虚而不屈以其有所見爲無爲可知也發於身而爲言見於事而爲故或云或爲其實一也何則言爲之體如是而已不知此則言不出於不言言不出於不言則異乎槖籥之虚動矣其多而數窮不亦宜乎孔子曰夫今之歌者其誰乎知此則知言出於不言矣言出於不言人莫不然也然而不能者以其心不麗乎有則麗乎無不麗乎取則麗乎舍不能適與道相當也不有不無不取不舍而適與道相當者是之謂守中守中而不已則如橐籥之動而愈出故曰天地之間其猶橐籥乎虚而不屈動而愈出者聖人法天地者也多言數窮不如守中言者所以應物也蓋法天地而出爲聖人矣固不免乎以言應物也然言而多則非所謂當於理而止也非當於理而止則不可以推而行之也惟守乎中則其言不多也亦不少也常當於理而止也於是乎可以推而行之而不數遭其窮矣故曰多言數窮不如守中夫守乎中者其言不多也亦不少也然而老氏專惡夫多言何也曰老氏之所明者道也道常無言然而常有言者道不得已也故可以言以其常無言也故言之少者去道易也近而言之多者去道爲尤遠故專惡夫多言也劉巨濟曰聖人不仁以百姓爲芻狗莫慘於兵刑而雖盛德不能去之則因其理而已或言萬物或言百姓其言各有序也天地之間至動而愈出此申言天地也天地之兩間能虚故入則止虚者橐籥之體也不屈則以虚故也橐籥之用也橐以風動籥以氣動動而後應此其所以愈鳴也多言數窮不如守中天地以虚應萬物而無所言聖人亦以虚應百姓而風波之來非言不筌持不以多勝而已易曰尚口乃窮中之體一可以守者也中之爲用虚可以應者也猶天地之謂間乎丞相新說曰聖人不仁以百姓爲芻狗靜而不汙潔而不垢其祭祀足以隆禮而致恭者芻狗之爲物也始之將用則被之以文繡盛之以篋衍及其已用則行者踐其首樵者爨其軀不膠其所愛不泥其所有通則用之與時宜之過則棄之與物從之而天地聖人之仁豈離乎此哉蓋天之體不能生生而生生者眞君也而眞君未嘗生地之體不能化化而化化者眞宰也而眞宰未嘗化則出顯諸仁故凡在天地之間形物聲色也皆制於我而物不得以疏及夫已生已化則入而藏諸用故物有分之類有群各以附離而忘有於我而物不得以親雖然天能生而不能成地能成而不能治聖人者出而治之也是故體顯以爲仁而其出也同吉凶之患故凡萬物之生皆輔相而不失其宜體藏以爲用而其入也雖聖人不與之同憂故泯迹冥心而視物以異嗚呼聖人之於天地又豈以仁憂累其心者歟故物之出與之出而不辭物之入與之入而不拒生而不有爲而不恃長而不宰功成不居萬物有以稱亦有以憾而老子所謂天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗其言豈離乎此哉後學者專孑孑之仁而忘古人之大體故爲人則失於兼愛爲己則失於無我又豈知聖人不失己亦不失人歟與時推移與物運轉而天地之間其猶橐籥乎故動而愈出則正己而無我者所以應物而非以敵物虚而不屈則無己而喪我者所以絶物而非所以成物噫天地聖人之道其仁以百姓萬物爲芻狗者可以一言而盡矣劉驥曰天地不仁至不如守中天地之於萬物聖人之於百姓因其自然付之自爾無愛利之心故言不仁是猶束芻爲狗祭祀所用適則用之過則棄之無容心焉虚而待物者也太虚運一氣使天地如橐籥橐也鼓之以生火籥笛也吹之以成音其體則虚而不屈其用則動而愈出是何異於天動以陽地靜以陰陰陽鼓擊不息而造化在其間者乎人之形體法象天地化契陰陽亦如橐籥之爲器也此言天地則人在其中矣天地得一氣之妙而運行不息聖人得一氣之妙而升降無窮其道杳然難言哉若求之於多言則泥古人之糟粕弊精神於蹇淺非徒無益也故多言數窮不如守中守中者内保之而外不蕩也無思無爲寂然不動而守之於中如天地橐籥之無心自然運用以其有眞君存焉眞君者天谷元神也故次之以谷神趙實庵曰前引二一天之至公天地不仁以萬物爲芻狗混一性於大同敦仁敦不仁以私愛而在物有義有不義仁之生而義之殺本乎天運之自然仁爲恩而害隨至見乎人事之返復經言不仁大仁而已大仁無私至公而已當生即生陽和之始物當殺即殺金氣之肅如謂時運即殺之不可留謂生死之有定數震動則萬物昭蘇兊交則衆用彫落雖生之而衰相以啓雖殺之則生意又明此天之公者如斯而已若乃當生即殺當殺即留此非天道之公行是亦人爲之私愛以公平私天地之正以私害公邪侈之行道者爲之公所以言及天地不仁而喻以芻狗天地之心於此可見是以聖人之治體天法道絶仁愛之私正賞罰之令立仁與義何容心焉御注曰恩生於害害生於恩以仁爲恩害則隨至凡所以絶私愛也是故聖人不仁以百姓爲芻狗俾後世聖人與道同流同應變不滯莊子曰仁常而不成又曰不多仁恩是也老子以天地之仁配於道也道大故不私即非五常之仁爲可及也此意指世之仁義爲小也不然何以謂多言數窮不如守中乎故喻之以芻狗即聖人用不仁之爲仁也能體不仁之仁即體天而同乎道也二聖人體天聖人不仁以百姓爲芻狗聖人之治百姓也無私之用與天地同次喻二一就體舉喻天地之間其猶橐籥乎御注曰橐籥以虚而能受受而能應蓋道以無爲體以虚爲用以道體之無則能泛應也以理觀之虚則能運量也道以至虚而泛應不知其自來人以無心而運量誰測其所以天地之間不上不下用氣於中猶橐籥之動也二橐籥之用虚而不屈動而愈出二子列子曰子奚貴虚虚者無貴也以虚爲貴則有礙於中以其本虚而已非虚可貴然虚之可貴者在動而愈出以橐籥觀之虚故貴矣雖橐籥觀之虚非貴矣聖人無心物來則應應而不窮凡所以當而不失也謂之規矩則與之爲規矩謂之權衡則與之爲權衡彼其自得之以爲用也吾誰名之哉雖然應帝王者體道爲心在事則曰無心在物則曰無有其如禮義法度何而有義禮法度者吾亦豈與之爲名彼因之以爲用者且自名矣吾不自名焉豈得屈即其愈出而愈有愈應而愈多者謂此後至理存焉多言數窮不如守中二此篇自道沖爲用至橐籥虚應終又結之以多言數窮不如守中較之前章猶是以言爲中也老子以橐籥喻聖人不言言則迫而後動感而後應以其無心也易曰言行君子之樞機樞機之發榮辱之主也亦取其適當而已守中者無過也非徒無過而有法孔子曰中庸之爲德也故言不可不慎君平曰言出則患入言失則亡身韓子曰亦慎於水火夫道本無言不得已而言則應之有常是也夫欲有言豈得已哉故三緘其口聖人所以示象焉學者求聖人之意邵若愚曰天地不仁至不如守中天地任自然之道謂之至仁苟非至仁而有親疏焉春生非仁也秋殺非不仁也棄用因時以萬物爲芻狗聖人以一心爲德故以百姓心爲心賞善非仁也罰惡非不仁也隨民任事賞罰因時故以百姓爲芻狗之喻莊子云至仁無親大仁不仁夫惟不仁是謂大仁天地之間謂四方上下也其猶橐籥乎橐籥中虚其用在無而故不屈槖以鼓風籥以運吹動而愈出若乾坤之開闔老子欲多言數窮其理不如守中中者虚也以心處虚其用無盡王志然曰天地不仁至不如守中大道無心於天地而天地待是而後生天地無心於萬物而萬物亦待是而後起有天地然後有萬物且人處萬物之最靈者莫不皆禀賦自然初無愛利之心以仁爲恩不亦小乎天地無情焉視萬物亦猶芻狗爾而天地且未嘗責萬物之報而萬物亦未嘗知天地所以生生之恩而大恩自生焉聖人無情焉而聖人未嘗責百姓之報而百姓未知帝力於我何有哉則大仁自成焉天地之於萬物聖人之於百姓而自成其上下之序曾何容心也推之無厭日用不知安所事仁哉且芻狗之爲物潔而不汙祭祀之用方其用時亦猶太廟之犧牲衣以文繡致敬如神初無責愛之私及其用已等於糞壞亦非厭棄之故汲汲於用舍之間是聖人有心也邪故天地聖人自視猶芻狗則其視萬物百姓亦若是而已矣吹嘘元氣鼓動群有如橐焉如籥焉迫而後動應而不藏虚而不屈動而愈出喻如道之應物萬變未始有窮化聲之相待亦如人之有情人能弘道非道弘人聖人之言不囿於辯言之足則終日而盡道言之不足終日言而盡物言辯貫穿默該至理其或燭理不深言不明道益辭固多去道彌遠須有惠施之舌懸河之口考之大義一何有焉曾不若默識而深造之爲愈故曰十語九中不如一默多言數窮不如守中黄茂材曰天地不仁至百姓爲芻狗天地之於萬物無傷而已任之自遂聖人之於百姓無擾而已任之自生任之自生故民無不生任之自遂故物無不遂此其爲仁甚大方其任之自也若無顧愛之心故謂天地聖人不仁譬之芻狗以芻爲狗供於祭祀已陳而去之何顧愛之有申韓之學遂竊以爲刑名其慘刻甚矣問之則曰聖人之治天下無所顧愛其說蓋起於此豈不失老子之意哉天地之間至不如守中天位乎上地位乎下人所能知也陰陽密運造化潜移人所不能知也今以橐籥喻之天地之道幾無爲藴矣虚無體也故不屈動不已也故愈岀老子之道初無内外悟芻狗之說則可以忘形體知橐籥之理則可以煉精炁此宜不言而喻言則必窮唯守中爲得之程泰之曰天地不仁以萬物爲芻狗結芻爲狗當祭則用已事而棄是芻狗之時貴時賤者也天地之生化萬物而遞相代謝實其似之稻秀而麥枯瓜生而薺死麋鹿之解角也春冬相反鴻燕之賔去也南北相避物之種性有萬不同者於此而皆可類推也此之性非彼之性則此之宜非彼之宜也居其總者苟有心於爲仁其將敦爲乎爲此則妨彼利一而遺百其爲仁亦勞而小矣槩運一氣與物爲時使根性與之相直者自生自化自形自色自消自息而天地若無預焉此不仁之仁也聖人不仁以百姓爲芻狗聖人無心而用大正以取法於天地也是故未嘗曲愛一人而無一人不受其德也莊子用此推之而曰至仁無親當使我忘天下而天下亦自忘我此正不仁之仁既加被冒而世人不知其德者也非眞相忘也又曰聖人之愛人也人與之名不告則不知其愛人也是亦澤及萬世而不自知其爲仁者也是謂不仁之仁也若夫擇物施愛惠不出乎意鄉之外是直虎狼而不啗其子者耳不仁之仁非其得預也孟子曰殺之而不怨利之而不庸民日遷善遠罪而不知爲之者則其施置之方也謂耕鑿嬉游皆非帝力則其效之成者也天地之間至動而愈出橐治鞴也籥其管也管之在樂則爲羽籥在關鍵則爲管籥在冶器則爲橐籥至其爲管則一而已也橐也者吸氣滿之而播諸冶鑪者也管也者受此吸而嘘之所以播也一嘘一吸之象即陰陽迭運而爲四時者矣故天地之間寒暑相推而爲四時生死遞代而成今古正猶橐籥之嘘吸也賈誼以天地陰陽萬物之造化而配之冶鑄義正出此也一嘘一吸之迭起是一作一復之相催者也神奇之必爲臭腐臭腐之復爲神奇是芻狗之時貴時賤者也其曰天地之間猶橐籥者言凡受形於兩間莫非由此之嘘之吸以爲張歙也莊子之論物初曰陰陽交通成和而物生焉消息滿盈一晦一明日改月化日有所爲而莫見其功生死始終相反乎無端而莫知其所窮夫陰陽交而物皆資生是物初也作復者即生化之有迹者也消息滿虚者陰陽之動而司橐籥之嘘吸者也改化生死者物之迭爲芻狗者也老子借橐籥芻狗以言其理莊子則直傳諸事也多言數窮不如守中諸家皆謂此中爲中庸之中蘇黄門獨不然曰此其籥之虚而處中者其說是也老氏務成一家言凡六經紀道之名悉已易而他之六經之謂中者即老氏命以爲善者也通一書固未嘗言中也然則此之謂中如域中弓中環中皆命物而名其地也非如中庸之中造極而命其理也則此之守中正指橐籥之中以爲之守如曰樞始得其環中以應無窮也言者先事而有所稱說如曰某事其德皆吾之所能爲也然此特其自言之耳而措之於世或當或否或順或逆未可必也不待其當然而先形諸言則億之而中者固或可屢而億之不中者亦不勝其多也其勢自至於數窮也若其守中待感者初若遲鈍而要諸其終决不至窮也故曰不如守中論天地之間猶橐籥則居於天地之兩間者其作其復皆仰冶工之鼓也冶工者即主執造化者也其能虚之以聽化工之操縱則陰陽消長之源是其地也凡有形之物虚則通通則可以致變實則窒窒則塊然而已耳橐之能吸也籥之能嘘也皆以虚也非橐之虚則無以納其吸非籥之虚則無以效其嘘也橐籥常虚則能受生生者之生以爲作而受化化者之化以爲復也是蓋借橐籥中空之地以明不窒之可以有受也夫惟不窒故播氣者得以入之也動者發橐籥之機而鼓之使作即其能操縱生化者也惟其虚而不屈也故能受其有而出之於世也陰陽之氣隱乎太虚而形於有感感之而應則能出其無以爲有矣橐籥非太虚也以其虚而有受受而不留者有萬物出機入機之象故此機不息則作復無已也是故寂然不動者乃能感而遂通也論橐籥之妙即幾於谷神矣而不能與之齊同者谷神能自制有無而橐籥之嘘吸則有待於化工也動之而出則與自受而自應者有間也故此章既出橐籥而後章則言谷神也詹秋圃曰天地不仁至不如守中虚用章謂天地不以偏私惠愛爲仁而以萬物爲芻狗聖人不以偏私惠愛爲仁而以百姓爲芻狗蓋芻足以牧馬牛狗足以護家宅是皆有用之物人所資以爲用天地之間其猶橐籥中虚而可扇動生風乎故雖中虚而不屈折此爲虚用之妙迨扇風而愈動愈出其妙有難名言未若確守中虚則爲用不可窮也張沖應曰天地不仁至不如守中仁之爲道廣大而不可得以形容也故孔子所以罕言老子所以不居罕言者謂其不可得而形容而罕言也不居者謂其不可得形容而不居也天地不以仁自居故能覆能蓋而萬物生長於其中不知其所以生長聖人不以仁自居能包能容而百姓安養於其中不知其所以安養皆視之如芻檗狗畜愛之植之惟恐損朽而無所介其心以蒂報也天地之所以不仁聖人之所以不仁者即此一元之炁運乎上下猶橐囊之能包管籥之能吹周流無窮包藏無極雖虚焉吹之而不致於屈乏廣焉動之而愈見其有爲仁之爲道廣大也如此是以孔子有曰天何有言哉四時行焉則天地萬物之心又何有聲音於其間人欲學道充此天地之仁而乃尚乎其言則舌勞神亂精廢炁虧數者皆窮矣斯曰不如守中當守此方寸布仁於物而不發見其迹也白玉蟾曰天地不仁無心以萬物爲芻狗任其自然聖人不仁以天地之心爲心也以百姓爲芻狗尚自忘我豈有他哉天地之間心也其猶橐籥乎運而不息虚而不屈用之無窮動而愈出純一不已多言數窮如何說得不如守中盡其在我廖粹然曰天地不仁天地本於人若其自返本以萬物爲芻狗則視萬物象爲無知之物在人亦當克己如此也聖人不仁人主亦根於仁自返本而歸根以百姓爲芻狗則棄萬姓於無用之物如在吾人亦當復禮也天地之間範圍之内其猶橐籥乎其於天地則虚空焉此我身則臭皮袋也虚而不屈放之則滿六虚歛之不盈一握動而愈出元炁沖然源源不竭多言數窮與之一默守口如瓶不如守中抱元守一無窮無盡人若如此道炁存也陳碧虚曰天地不仁至以百姓爲芻狗芻草也謂束芻爲狗古人以用祭祀除祓不祥用已而棄之言常之時不甚愛及乎棄之亦不爲憎也故芻狗因神明而成且神明無用於芻狗也夫無用則無私無私則無恩是以天地無恩而大恩生聖人不仁而大仁成不仁者謂無情於仁愛非薄惡之謂也故天地無情視萬物如芻狗不責萬物之報也聖人無情視百姓如芻狗不責百姓之報也蓋天地之自然也嚴君平曰天高而清明地厚而順寧陰陽交通和氣流行洎然無爲萬物自生焉天地非傾心移意勞精神務有事悽悽惻惻流愛加利布恩施厚成遂萬物而有以爲也此所謂天地不仁以萬物爲芻狗也明王聖主秉道統和清靜不改一以變化神明默達與道同儀天下應之萬物自化聖人非竭智盡能擾心揉志損精費神不釋思慮徨徨顯顯人生事利領理萬民而有以爲也此所謂聖人不仁以百姓爲芻狗也天地之間至動而愈出橐者也謂以橐鼓風而吹火者也籥者笛也言天地之間虚空無爲生物無私以喻聖人之心虚廓淵靜應世不逆若橐之懷風鼓之以成器物籥之舍聲吹之而調音律應用不絶而終不可屈也以況聖人無私無心而不事愛利也嚴君平曰天地釋虚無而事愛利則變化不通物不盡生聖人釋虚無而事愛利則德澤不普海内不井恩不下究事不盡成何則仁愛之爲術也有分而物類之仰化也無窮操有分之利以授無窮之勢其不相贍由川竭而益之以泣也又曰蟣蝨動於毛髮則寐爲之不安蚊蝱著於皮膚則精神騷動思慮不通外傷蜂蠆之毒則中心爲之慘痛未害於耳目則百節爲之不用此言愛利之存于胸中豈得無屈撓純和耗蠹血氣乎多言數窮不如守中多言者謂多有兼愛之言也多則施行難徧故數窮屈而不遂若法天地之虚靜同橐籥之無心抱守中和其自然皆足矣亦在乎不言之教也鴻烈解曰王壽負書而行見徐馮於周徐馮曰事者應變而動變生於時故知時者無常行書者言之所出也言出於知者知者藏書於是王壽乃焚其書而舞之曰多言數窮不如守中謝圖南曰天地不仁至於芻狗萬物受天地之氣以生百姓受聖人之恩以成謂之非仁不可也而榮枯成敗付物自然死生禍福惟人所召天地聖人於此一無心焉謂之不仁非不仁也蓋不得以用其仁矣芻狗者祭餘之物聽其自成自壞而不復屑意焉爾天地之間至不如守中天地人物之理自然而然故陰陽二氣往來於虚空之中初無間隔如橐籥然無底曰橐有孔曰籥橐之中虚氣所流通不可屈折籥之有孔聲所振動愈出不窮此皆自然而然人物之在天地間始終變化亦自然而然故多言則屢窮不可致詰也不如守一中之理理至中而止天地聖人百姓萬物皆不外此中蓋嘗論之萬物萬民同此一氣天地間人同此一心天地何心以生物爲心也聖人何心以愛民爲心也然生之於始而不容不變於終愛之於初而不得不異於後何則立天之道曰陰與陽立人之道曰仁與義發生陽也而不能無肅殺之陰愛養仁也而不能無割制之義理勢然也芻狗微物然方其養祭則惟恐一體之不全及其既祭則委之無用摧毁决裂有不能免人物之在天地間均賦同禀其生皆可愛而成形之後散殊不一栽者培之傾者覆之善者祥之惡者禍之各隨其分而異焉于斯時也天地生育之恩聖人愛養之德有不可得而全之者謂之不仁不得以盡其仁也矣天地以中虚橐籥萬物聖人以中道酬酢萬民故蔽之一言而曰不如守中中也者其至公無私之謂乎其無過不及之謂乎林鬳齋曰天地不仁至不如守中生物仁也天地雖生物而不以爲功與物相忘也養民仁也聖人雖養民而不以爲恩與民相忘也不仁不有其仁也芻狗已用而棄之相忘之喻也三十八章曰上德不德是以有德不仁猶不德也莊子齊物曰大仁不仁天地曰至德之世相愛而不知以爲仁亦是此意芻狗之爲物祭則用之已祭則棄之喻其不著意而相忘爾以精言之則有所過者化之意而說者以爲視民如草芥則誤矣大抵老莊之學喜爲驚世駭俗之言故其語多有病此章大㫖不過曰天地無容心於生物聖人無容心於養民却如此下語涉於奇怪而讀者不精遂有深弊故曰申韓之慘刻原於芻狗百姓之意雖老子亦不容辭其責矣籥者橐之管也橐籥用而風生焉其體雖虚而用之不屈動則風生愈出愈有天地之間其生萬物也亦然橐籥之於風何嘗容心天地之於生物亦何嘗容心故以此喻之況用之則有風不用則無亦有過化之意數猶曰每每也守中默然閉其喙也意謂天地之道不容以言盡多言則每每至於自窮不如默然而忘言子曰子欲無言天何言哉四時行焉萬物生焉亦此意也但聖人之語粹而易明此書則鼓舞出入使人難曉或者以爲戒人之多言則與上意不貫矣如此看得破非惟一章之中首末貫串語意明白而其文簡妙高古亦豈易到哉范應元曰天地不仁以萬物爲芻狗仁者愛之理謂天地生育其仁大矣而不言仁其於萬物譬如結芻爲狗以祭祀其未陳也盛以篋衍巾以文綉非愛也乃時也及其已陳也行者踐其首脊樵者取而爨之非不愛也亦時也夫春夏生長亦如芻狗之未陳秋冬凋落亦如芻狗之已陳皆時也豈春夏愛之而秋冬不愛哉氣至則萬物皆不知其所以然而然也聖人不仁以百姓爲芻狗聖人體此道以博愛其仁亦至矣而不言仁其於百姓亦如天地之於萬物輔其自然而不害之使養生送死無憾不知帝力何有於我哉天地之間至動而愈出囊底曰橐竹管曰籥冶煉之處用籥以接囊橐之風炁吹鑪中之火屈者曲也音辯云俞羊朱切傅奕引廣雅云益也漢史有民俞病困天地之間虚通而已亦如竹管之接炁虚而不曲也氣來則通氣往則不積譬彼橐風之愈動則此籥炁之愈出鑪中之物既各成器而橐籥未嘗言仁愛也多言數窮不如守中萬物之多百姓之衆聖人不過推此一道而博愛之豈區區言仁也倘多言仁愛而不能體道則空有其言而無實效故多言則數窮也不如同天地守中虚之道而無偏曲則萬物自然各得其所也豈有窮哉薛庸齋曰天地不仁至百姓爲芻狗天地生萬物而無心於萬物聖人養百姓而無心於百姓天地之間至動而俞出橐籥不爲物撓而虚其中則愈動而聲愈出矣天地所以能生化萬物而不窮者亦以其虚而能運也多言數窮不如守中惠施之口談不若顔子之心齋也休休庵曰天地不仁至不如守中芻狗者祭祀用草結龍以朱匣盛之綉巾覆之祭畢棄之天地聖人任無爲之妙生育萬物不望報恩亦不爲主任萬物自化如芻狗焉是以似不仁天地之間空虚如鞴囊一氣運行生育萬物人心虚明亦如是也靈機一動妙用不竭是謂虚而不屈動而愈出橐者鞴橐也籥者管也鼓風吹運之器雖以是而喻造化之妙然言多去道遠矣縱大辯才數數舉其喻然譬喻之數有窮此道實無可喻不如無言守中虚之妙可以見徹造化褚伯秀曰天地不仁至不如守中仁神道之具體立天地心續生民命猶元之於乾總衆德而大備陶萬類以無遺在人則成己成人博愛善救皆其用也天地具自然之仁超言象之表聖人體天推仁所以恢帝道而成治功經乃下二不仁字何耶蓋謂不顯其仁猶云上德不德正言若反也借喻束芻爲狗以供祭祀未祭則彩飾愛敬祭已則棄置踐踏適成適毁非關愛惡以眞燭幻物理可知凡天地間動植飛泳生成消息不出乎一氣流行無異束芻成狗踐狗還芻何容心之有聖人於百姓聽其營爲而生道自遂莊子所謂大仁不仁是也天地之間其猶橐籥亦言其無心自運橐鼓風籥通氣喻仁之流行猶陰陽呼吸而不暫停爲人爲物者咸受其鼓鑄焉唯其中虚無屈塞所以運動氣愈出此理妙合造化何在多言自取窮屈不如守身中橐籥究自己天地豈無生萬物之理哉或以躁人辭多釋之與上下文義不貫此章大義在守中二宇至理幽玄惟學者力行以求驗一身中有一乾坤在人體之而已矣牛妙傳曰天地不仁以萬物爲芻狗夫天地大德曰生生生不息之謂仁仁者天地生成之德也而云不仁者是天地不自有其德也萬物者盈天地之間品類也芻狗者如古先明王郊祀必束芻爲狗以爲祭具所謂芻者茅也夫茅之爲物薄其用可重也狗者畜也其位乎戌而應乎乾故古人束茅爲狗以爲祭具意其重也天地以萬物爲芻狗是亦不輕於萬物也或者以天地視萬物如芻草狗畜之無知不責望其報也此說不通蓋萬物與天地分一氣而生但得夫形之小者若天地果視萬物如芻草狗畜之比則是天地其自專大果不仁耶庸所見如此明者鑑之聖人不仁以百姓爲芻狗夫聖人者備物致用百世師也故百姓戴之如同日月仰之如同父母然其稱云不仁者不自居其仁謙尊也亦猶夫聖孔子不居之義也百姓者民也民與聖人均禀一氣同生於天地之間但貴賤窮達不同耳聖人以百姓爲芻狗者是亦不輕於民也他說以爲聖人視夫百姓如芻草狗畜之無知不望其報也此說恐誤夫人者與天地並位三才鼎立豈可視如芻草狗畜之類哉孟子曰君之視臣如手足則臣視君如腹心君之視臣如犬馬則臣視君如國人君之視臣如土芥則臣視君如寇讎若聖人果以百姓如芻草狗畜之比則是聖人果不仁哉與我同志者切希鑒之天地之間至動而愈出橐者鼓屬籥者管籥笛之屬猶如也動用也夫天地之間虚空以四時五行爲用其橐籥爲物亦其中空虚以五音六律爲用故云天地之間其猶橐籥也老君曰夫橐籥之器在其用也虚實有無方圓大小長短廣狹聽人所爲不與人爭善人在於天下也譬如橐籥乎非與萬物交爭其德常歸焉以其謙虚無爲故也此蓋言天地以虚受爲生成之德任物自然從民所欲不與物爭猶橐籥之任人所爲音律也多言數窮夫言者心之聲也在心爲志發泄爲言數者頻數窮者悔吝也蓋多言則多過故云數窮也古人有言曰一言而喪邦此上多言之人也一言而致凶此中多言之人也一言而致辱此下多言之人也故天有卷舌之星人有緘口之銘言不可不慎也語云君子欲訥於言而敏於行良爲是也昔孔子觀周入后稷之廟右階有一金人三緘其口而銘其背曰古之慎言之人也戒之哉無多言多言則多敗無多事多事則多患詩云敬爾威儀慎爾出話此之謂也不如守中中者樞機也守者謹也且夫日月者天之文也山川者地之文也言語者人之文也然言語在口譬含鋒刃不可動也如弦機未發則猶可止矢一離弦雖欲反之不可得也繫辭曰言出乎身加乎民行出乎邇見乎遠言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎此即不如守中之義也易曰括囊無咎無譽蓋言謹也非斯之謂歟楊智仁曰天地不仁至不如守中天地不仁視萬物如芻狗者天地施化不以仁恩任自然也不責望其報聖人亦如之謂學道之士不著一毫物欲所累體若太虚湛然常寂著天地之間坎離運用乎其中橐籥發揮乎宇宙元炁升降於黄庭塞兊垂簾含光默默虚而不屈守以沖和不可輕動動而愈出古云全身放下一念不生若多言數窮則有損而無益不如守中乆矣純熟自然打成一片矣儒曰聖人之道仁義中正而已蓋天地聖人視萬物如芻狗者不著於一切也廓然人以配天地其猶橐籥乎虚而不屈動而愈出至簡至易豈難知哉故多言數窮不如守中君子黄中通理不失其正矣喻清中曰天地不仁至不如守中天何言哉四時行焉百物生焉天地生物而不自以爲仁忘乎物也不識不知順帝之則帝力何有於我哉聖人養民而不自以爲仁忘乎民也芻草也謂束芻以象狗莊子天運篇曰芻狗之未陳也盛以篋衍巾以文繡及其已陳也行者踐其首脊樵者取而爨之言貴之於未祭之先賤之於既禱之後即是而喻蓋存神過化之意云爾蓋嘗讀柳子郭橐駞傳而於養樹得養人之術矣橐駞之種樹也勿動勿慮去不復顧其蒔也若子其置也若棄父之於子曷嘗自以爲恩哉其薛也若子生之養之不自以爲仁也有其所有者也過而執忘其所有者過而化其置也若棄既祭之芻狗也天地之間鼓之動之一橐籥耳橐者鞴也鼓風之具籥者管也風之所自出虚其中而不屈其用愈動而愈出愈出而愈有其來無端其出無窮天地聖人之仁亦猶是也天地之道不可以言盡而聲色之化民末也故曰多言數窮不如守中守中默然而自存也胥六虚曰天地不仁至不如守中天地之大德曰生而以萬物爲芻狗者覆之載之聽其生者自生而枯者自枯天地無所與此天地不有其仁而以萬物爲芻狗者仁之大矣芻狗之設未祭則貴敬之既祭則委棄之非容心也時適然也故聖人引之爲喻聖人體天地容養百姓寬之宥之由其生者自生長者自長耕食織衣家富國安而聖人無所與此亦聖人不有其仁而以百姓爲芻狗也天地之間一氣蒸陶萬物生化古今不息其猶橐籥之器中間空虚鼓動之聲氣愈出也此贊美聖人之德蕩蕩乎仁養百姓不爲己有夫何然哉亦虚而已矣是以應感天下之動無有窮極也若不體天地不仁之實察然自好縣法作刑飾以文言示民從化違天悖理鬼怒人怨乃疾取窮極之道故勉之曰多言數窮不如守中多言者謂飾以文言辭多理寡不如及吾之中默識窮行謹守不失天下觀風而化不言之教寧有窮乎修身亦法此矣柴元皋曰天地不仁以美利利天下而不言所利以萬物爲芻狗芻茅也縛如狗狀以祭享初縛時誠潔甚嚴祭已則棄之而不顧造物之心亦如芻狗之始終從其自然聖人不仁聖人體天地亦不言所利以百姓爲芻狗惟恐一夫失養亦如初束茅之謹一毫不敢忽天地之間至橐籥乎橐無底囊籥三孔笛皆虚其中兩間之氣一闔一闢即此二物人身呼吸亦然養民底一呼吸間不似天地使民失所脩身體用亦然虚而不屈其體無礙動而愈出其用不窮多言數窮不如守中若自矜其仁尚口乃窮矣孰若虚中存神體天地乎蘇敬靜曰天地不仁至不如守中結芻爲狗祭則用之祭已則棄是芻狗之用所過者化天地雖生萬物而不自以爲仁聖人雖養萬民而亦不自以爲仁亦猶芻狗當祭則用祭畢則棄過化相忘何嘗自以爲仁橐冶鞴也籥其管也管在樂爲羽籥在關鍵爲管籥在冶器爲橐籥其爲管一而已橐吸氣滿之播諸冶爐者也管者受此吸而嘘之所以播也一嘘一吸之間即陰陽迭運而爲四時也即生生不窮之機也陰陽交而物皆資生消息盈虚是陰陽之動而司橐籥之嘘吸者也以虚受嘘吸之氣而未嘗屈屈折也嘘吸之氣動而愈出未嘗見其損折而息也橐能吸籥能嘘皆以虚也若窒則實矣夫唯不窒故播氣者得以入之天地一大爐鞴也造化一大冶工也萬物陰陽嘘吸之氣自生自遂自消自長何嘗以爲仁或者見天地生萬物之功盡言以論天地之功不知天地不容以言而盡多言每每自至於窮極則不如默默忘言但守橐籥虚中而思之則其生生之不窮皆陰陽之氣自然而然也本一庵居士曰天地之於物聖人之於人未嘗煦煦然仁之也亦惟使之自生自化無以害之而已猶以芻爲狗祭則奉之已則棄之非有好惡之私也時適然耳況乎消息盈虚乃理之常雖天地聖人如之何哉惟使之遂其生若其性無横風暴雨以摧折之無舛政逆令以迕遏之則其仁也亦至矣橐籥之爲物一張一翕惟其虚而不屈是以動而愈出消息盈虚相爲終始亦若是而已先儒謂乾坤動靜不翕聚則不能發散即此意也又以此理推之語默之間多言所以數窮有張而無翕也守中則能虚而不屈所以不窮也拾遺陸曰萬物資天地而生天地無取於萬物也百姓仰聖人而治聖人無假於百姓也猶芻狗因神明而成神明無用於芻狗也夫惟無用則無私無私則無恩是以天地無恩而大恩生聖人不仁而大仁成故百姓不辭德於聖人萬物不謝生於天地何以知其然哉吾觀天地之間猶橐籥之無心也橐籥無心故其聲不屈其氣愈出天地無心故生成而不息故爲治不在多言多言而無實則動數窮矣未若無爲無言乃守中之術也諸子旁證莊子曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳行者踐之樵者爨之而已將復收於篋衍必反爲怪今夫子取先王已陳之芻狗是不將鄰乎行者之踐樵者之爨也惜哉文子老子曰天地之道以德爲王道爲之命物以自正至微其内不以事貴故不待功而立不以位爲尊不待名而顯不須禮而莊不用兵而强故道立而不教明照而不察道立而不教者不奪人能也明照而不察者不害其事也夫教道者逆於德害於物故陰陽四時金木水火土同道而異理萬物同情而異形智者不相教能者不相受故聖人立法以導民之心各使自然故生者無德死者無怨天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗夫慈愛仁義者近狹之道也狹者入大而迷近者行遠而惑聖人之道入大不迷行遠不惑常虚自守可以爲極是謂天德石潭曰天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地以生物爲心而謂不仁何哉天地以其心普萬物而無心也聖人以天地生物之心爲心而亦曰不仁何哉聖人以其情揆萬事而無情者也芻狗祭祀之物說見莊子以萬物爲芻狗其成其壞時焉而已物各付物生者自生而不知其所以生也聖人之於百姓亦使之自生自養自作自息而已以其皆無容心故曰天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地之間其猶橐籥乎虚而不屈動而愈出天地之間所以生生而不窮者蓋猶橐籥之能出風也虚而不屈天地生萬物而不屈於萬物也言不爲萬物所役使也動而愈出風未嘗窮也天地之生萬物亦未嘗窮也多言數窮不如守中多言數窮謂若以多言形容天地聖人天地聖人不可得而形容也數窮謂雖多言之終有所窮也既形容之不可則不如虚中自守而有以得天地生生之本也道德眞經集義卷之十
