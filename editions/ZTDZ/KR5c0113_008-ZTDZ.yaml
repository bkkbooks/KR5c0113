body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正不尚賢章邵若愚曰不尚賢使民不爭至爲無爲則無不治矣夫不尚賢能者恐人矜智王所好者謂之風民樂隨之謂之俗上矜賢智下心競趣不尚賢使民不爭其名故也食之爲貨務資贍養豈貴珍其難得貴乎難得民必深藏凡人之情與之則不受藏之必竊奪治世非不用貨不貴珍奇難得之貨者使民不爲盜故也下民不見名利可使欲心不亂其民自治是以聖人之治不尚賢使民無知無知則自虚其心心虚則能容萬物故云實其腹不貴貨使民無欲無欲則自弱其志志弱則不隨境轉故云强其骨常使民無知則虚心無欲則忘境心境兩忘無所攀縁萬事俱息使夫有智者而不敢爲聖人爲無心之爲則天下無不治矣王志然曰不尚賢使民不爭至則無不治矣夫語道而非其序非道也語道而非其道安取道莊子九變之序五變刑名可舉捨是若倒道而行迕道而說者人之所治安能治人驟而語刑名者由未知所以爲學爲治之本意歟且名者實之賔名實既定乎内外之分天下之人爵因任而已豈有賢者棄之野而不用者哉而老子謂不可尚之之意其有深㫖焉故莊子曰舉賢則名相軋尚賢則起爭之一端以至天下大駭智詐是非頡滑解垢儒墨畢起其不可尚者如此聚天下之貨財養天下之民人而民熙熙然擊壞而歌鼓腹而遊物物而不物於物烏可竊竊然而貴之哉老子謂不可貴之之意其亦有謂以天下之萬物職職芸芸各有所繫焉既有時而成必有時而毁既有時而貴必有時而賤付之自爾詎可容心哉人欲貴之者唯必得是求求之不得將决性命之情以爭之以至攘奪覬覦靡所不至豈秪爲盜而已此蓋上有所好下有必甚者焉經曰不見可欲使心不亂孔子云富貴是人之所欲至如目擊耳聞鼻嗅舌嘗侈情動心皆謂之可欲苟欲之無饜者雖天地之大萬物之多不足以供其求君子之所欲者名也小人之所欲者利也舉天下賢不肖皆不見可欲之欲則心常寂然何亂之有所以聖人常虚其心不爲一物之所囿常實其腹不爲一物之所礩内觀其心廓然無有外觀其形與物委蛇而同其波遠觀其物物無其物故志弱而有用骨强而有立志之所之有所操則有所守焉腎主藏志而骨者腎之餘弱其志則精不摇而骨强矣心主藏神而腹者心之宅虚其心則神不虧而腹實矣由是萬化生乎身精神生乎道以此治人事天常使民無知無欲使夫知者不敢爲也唯其如此則無不治矣莊子曰同乎無知其德不離同乎無欲是謂素樸素樸則民性得矣若然者天下焉知賢之可尚不可尚貨之可貴不可貴者黃茂材曰不尚賢至使心不亂方且和其光惟恐人之知何賢之可尚故民不爭不爭者各安其性之自然方且窒其欲惟恐物之擾何貨之可貴故民不爲盜不爲盜者取足於身而有餘不見可欲非閉其目而不之見也物之交於吾前而動於吾心者甚多將不知見其可得乎惟能見其無有可欲之處然後不足以亂吾心何者毛嬙麗姬天下之美也人莫不欲之而魚見之深入鳥見之高飛麋鹿見之决驟推此以言誠無見其有可欲者則心不亂矣是以聖人之治至實其腹南郭子綦隱几而坐仰天而嘘嗒然自喪其偶能養其心至此則可謂之虚矣一飽之外雖有珍羞百味列於其前惟恐其不亟徹而去此腹所以欲其實也經曰聖人爲腹不爲目弱其志自强者有志今乃弱其志何也自强則可以進乎道弱則可以到於日損之地矣强其骨老子之道深乎强强故曰强梁者不得其死今强其骨何也戒乎强者惡其與物爭也强其骨者自强也夫道獨立不改非自强者安能致乎常使民無知無欲老子以治國治民況於其身所謂使民即是其身無知無欲非頑然如木石之無所欲也其始也不能無知去其知至於無知其始也不能無欲去其欲至於無欲則自非有道君子其積所至其孰能之使夫知者至則無不治矣夫道自然豈可以智爲之惟能爲無於無所爲斯可矣程泰之曰不尚賢使民不爭至使心不亂其人賢矣表而出之以暴耀天下則必有恥其不若而强與之爭故莊子曰舉賢則民相軋也貴難得之貨則必有棄業趨利而不惜爲盜者故曰貨財聚然後睹所爭也爭且盜皆其睹可欲而生心者也若上之人藏好惡而不示下之人無所趨以爲利則凡其可欲者不復見前心自不亂而爭盜自息此老氏正本澄源之道也蔣閭勉之言治曰必拔公忠之屬而無可私民孰敢不輯勉之此言蓋堯舜以來舉善而教不能凡致治者之所共也而季轍譏之曰若子之言則其自爲處也危其觀臺多物將往投迹者衆蓋譏其表而出之則昭昭乎如觀臺之招物也則見可欲而往焉以爭者多也然則見賢而不尚豈其無别哉泯迹以息爭忌焉耳矣凡老氏之教所欲藏用自晦者其意皆類此也見之讀如現上之人出而示之之謂也是以聖人之治至强其骨常時存想者爲心臨事欲爲者爲志腹所以飲食也骨所以負任也老氏書有寓言有實言此之腹也骨也誠即其實而命之也後章曰民之饑以其上食税之多是其當實而虚之者也又曰民之難治以其智多此惡其强而求以弱之者也庚桑子之居畏壘也其臣之畫然知者去之其妾之挈然仁者遠之不使其心得有仁知焉是求以虚也擁腫之與居鞅掌之爲使擁腫鞅掌非骨强而耐負荷者不在數也此其立庚桑之則而譏堯舜之舉賢任知者然也常使民無知無欲民之有知則智多而難治者是也其有欲則睹可欲而爭且盜者是也老氏之貴無爲也欲以無事處天下而使天下亦安於無事也莊子之言治效曰同乎無知其德不離同乎無欲是謂素朴素朴而天下之性得矣使夫知者不敢爲也使民無知無欲將以愚之也而其中有桀黠不受愚者是所謂智也智則不復可愚矣於是舉天下皆順吾教則皆無知無欲矣無知無欲則安土樂業不可誘之爲亂矣雖有智者知其無與附和則亦意消而不敢復爲故曰使民重死而不遠徙雖有甲兵無所陳之正其自謂可復結繩者由此其致也莊子取是語而託之上古曰古之人在混茫之中與一世而得澹漠焉當是時也萬物不傷群生不天人雖有智無所用之正明此也爲無爲則無不治矣既曰無爲矣而又有夫爲無爲者焉則豈委事功而不作也哉以無爲爲居而以無事行之是之謂爲無爲也我以無爲鎮之而下以無知無欲應之所謂無爲而民自化無事而民自富者也則安有不入於治也詹秋圃曰不尚賢使民不爭至則無不治矣安民章所言不欲尊尚賢人使民不狂僣而爭名不貴珍貨奇寳使民不爲盜竊不見可欲紛華盛麗使心不生妄亂是以聖人治民乆欲與之相安在我必虚其心而去嗜欲常使斯民無知無欲雖知亦不敢爲則爲無爲而無不治安矣張沖應曰不尚賢使民不爭至則無不治矣老子出乎上古其風淳俗厚人皆質樸曰以無爲名利俱忘聲色不作五神不亂蓋自上古降民改而皇皇改而帝帝改而王官以鳥名繼以龍名又繼以王侯卿大夫以美名之則虚名日盛而世所尚者行權之賢是以比干爭而死夷齊不能爭而隱以激紛紜征戰之苦又自鑿山耕海鑽石淘沙良金美玉惑之未已奇珍怪寳惑世愈甚世所貴者罕獲難得之貨是以虞氏懷玉而喪國石氏藏寳而喪家以成滅身傾德之禍又自笙簧之淫聲逆耳子女之淫色迷目異味逆口異香逆鼻異服逆身神昏精亂而以所欲之形狀畢露是以商亡以長夜之飲陳破以後庭之曲以起弑逆暴亂之階皆此三者之故也故上古聖人所以治乎其人者無他不尚行權之賢不貴難得之貨不縱可欲之惑則上行之而下效之斯無以動人心之爭之盜之亂者矣故虚心下而不爲三者之所拘實腹運道而不爲三者之所耗弱其志而不尚不貴不欲强其骨而常健常康常寧人有以觀我之無爲則自然無知無欲矣或有知者欲尚其賢欲貴其貨欲華其五鬼心鼻口耳身欲亦不敢爲也故人皆爲其所無爲而人無不治者矣張靈應曰心不虚明如何得其旡沖和以實其臟腹志不卑弱如何得其精膠固以强其筋骨心常虚而炁不虧志常弱而精不耗這腹便充實骨便堅强更有何趨蹶夢遺之患大凡人一時趨蹶皆炁不沖和中來寢夢遺失皆精不膠固中出要皆炁不沖和只是心不虚精不膠固只是志不弱白玉蟾曰不尚賢爲子當孝爲臣當忠使民不爭飽不思食不貴難得之貨黃金與土同價使民不爲盜如意無他不見可欲耳目之間心實在焉使心不亂去即唤回是以聖人之治虚其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治矣廖粹然曰不尚賢有道之士不務榮華使民不爭默識如愚無爭三昩不貴難得之貨觀世財如灰塵不貪而不欲以内丹爲至寳自愛而不自貴使民不爲盜知是不欲不見可欲外不著物内不自見使心不亂同太虚空如如不動是以聖人之治主上以道治國吾亦以此修身虚其心以虚爲身以無爲心實其腹神炁沖然清淨自守要將坎位中央畫點化離宮腹裏陰弱其志專炁至柔頑然不動强兵戰勝功成後霹靂俄然岀地雷强其骨潜形於身而不出藏神於心而不見水火抽添丹就日金筯玉骨自堅强常使民無知無欲國安民富更無他吾之子孫亦無事使夫知者省得此理不敢爲也何嘗妄作爲無爲道常自然則無不治矣子能知一萬事畢也則豈不快哉陳碧虚曰不尚賢使民不爭夫人君之謙下雌靜不矜尚已之賢能則民之從化如風靡草柔遜是守何有爭乎經曰我無爲而民自化我好靜而民自正又解曰人君靜大臣明刑不避貴澤不隔下賢不肖各當其分則士無爭矣若人君依違大臣回佞雖尚賢求士則外忠内僻情毒言和之才至至則姦僞生而交爭起嚴君平曰盛德者爲主微劣者爲臣賢者不萬一聖人不世出夫天生之賢匪由尚出也又曰譬如使駑馬驊騮並馳於夷道鴻鵠鶉鷃雙翼於青雲則賢不肖可知矣此乃自然非由尚也故曰不尚賢使民不爭不貴難得之貨使民不爲盜難得之貨謂金玉珠犀也言上化清靜民務耕織藏金於山捐珠於淵不利貨財不近貴富則民無貪盜之心矣又解曰驪龍夜光之珠金玉錦繡之玩君王不貴臣民無貪盜賊於何而有語曰苟子之不欲雖賞之不竊也鴻烈解引神農之法曰丈夫力壯而不耕天下有受其饑者婦人當年而不織天下有受其寒者故身自耕妻自織以爲天下先其導民也不貴難得之貨矣不見可欲使心不亂可欲者謂外物或情令人生可尚愛欲之心也而曰不見者非遠絶不見也謂不以見爲見而爲無爲也若乃人君見外物而無可尚愛欲之心者是不爲色塵所染亂則性原清靜恬澹而復其眞一矣人君能守乎眞一則使民心不亂而淳樸之風可致矣嚴君平曰世不尚賢則民不趨不趨則不爭不爭則不爲亂世不貴貨則民不欲不欲則不求不求則不爲盜世絶三五則民無喜無喜則無樂無樂則不淫亂此自然之數也鴻烈解曰令君子佩請飲楚莊王莊王許之子佩疏揖北面立於殿下曰昔者君王許之今不果往意者臣有罪乎莊王曰吾聞子具於疆臺疆臺者南望料山以臨方皇左江而右淮其樂忘死若吾薄德之人不可以當此樂也恐留而不能反故曰不見可欲使心不亂傅奕音義曰古本作使民心不亂河上公開元御本作使心不亂亦通是以聖人之治虚其心大聖人之治先治其身然後及于家國也虚其心者謂無邪思也不役心逐境泊然内寂嗜欲頓消神物自定則其心虚矣莊子曰虚室生白吉祥止止謂心虚則純白自生福慶留止也實其腹夫聖人道德内充五神安靜憺泊自足貪愛不生故曰實其腹弱其志志者心之事事在心曰志欲令舉心行事當守謙靜柔弱則道全矣强其骨骨者體之幹夫淳和足則體潤精神壯則骨强亦自然之理也常使民無知無欲聖人所以常修身虚心者欲令百姓反樸守淳悗然自化也語曰苟正其身矣於從政乎何有使夫知者不敢爲也民雖有貴尚之知飾偽之迹者然已被其清靜之風淳樸之化而自灰心槁體不敢與動有爲之欲心也爲無爲則無不治矣爲無爲猶言行無爲之道也無爲者謂不越其性分也性分不越則天理自全全則所爲皆無爲也物物無爲則貴尚貪求之心泯然都忘故淳風大行誰云不治謝圖南曰不尚賢至使心不亂任賢使能人君當然之事但不當有好尚之名好尚之名立則小人將假託賢者之名以爭之矣難得之貨物之無益而反貴之重之無好下甚則有盜思奪之者矣可欲之境事之無補而耳目與接反動其心則將有變亂其所爲者矣在上意向豈可不謹是以聖人至其骨虚其心則不使人欲入於内實其腹則不使天理餒於中弱其志則意向不流於驕伏强其骨則躬行不憚於勤勞此所以爲聖人之治常使民至不治矣欲生於知無知則無欲矣故上以無知無欲化則下以無知無欲應或未能使之無知而其間有矜知逞能者亦必陰消潜化而俾之退聽於不敢爲之地此所謂知者乃私心血氣之知非良知也若使敢爲必至害治故在上者爲之以無爲則在下者無不治矣蓋嘗論之民之於上不從其令而從其所好意向之不謹則視儀聽唱必有甚者古之聖人誠意以正心正心以修身修身以治國平天下精神念慮密運於一堂之上而風聲氣習奔走於四方萬里之遠應感一機不疾而速後世人主窮情極慾摩所不爲而反歸咎於天下之難化人情之難馴吁亦惑矣林慮齋曰不尚賢使民不爭至則無不治矣尚矜也我以賢爲矜尚則必起天下之爭禹惟不矜天下莫與汝爭能便是此意我以寳貨爲貴則人必皆有欲得之心其弊將至於爲盜此二句發下面可欲之意也人惟不見其所可欲則其心自定不見可欲使心不亂此八字最好虚其心無思慕也實其腹飽思食也弱其志不趨競也强其骨養其力也言太古聖人但使民飽於食寸無他思慕力皆壯而無所趨競故其民純朴而無所知無所欲雖其間有機巧之心者所知雖萌於心而亦不敢有作爲也聖人之治天下也如此而聖人於世亦無所容心其爲治也皆以無爲爲之所以無不治也不見可欲使心不亂言聖人之教其民如此使者使其民也不尚賢不貴難得之貨皆恐有以動其欲心也動其欲亦不止此二事但以二者言之耳老子憤末世之紛紛故思太古之無事其言未免太過所以不及吾聖人也范應元曰不尚賢使民不爭尚好也賢能也又說文多才也爭競也謂偏尚才能之人則民必競習才能以爭功名而不反求自然之道也且小才小能可用於人而不可用人務才而不務德非君子也人君不偏尚小才小能之人而民自不爭不貴難得之貨使民不爲盜難得之貨謂金玉之類儻貴之則民愛其物而患其無以至爲盜是以聖人之治至强其骨治理也理身以理天下也上無貴尚則民不妄想人欲去也兹不亦虚其心乎上懷道德則民抱質樸天理存也兹不亦實其腹乎上守柔和則民化而相讓氣不暴也兹不亦弱其志乎上無嗜欲則民化而自壯體常健也兹不亦强其骨乎能如是則可使民無知無欲也此四句有專就修養上解者然前後文皆有正己化民之意常使民無知至不敢爲也蓋民知貴尚見可欲則有爭有貪而爲亂故常宜使之無妄知無妄欲而使夫智巧之人不敢妄爲也爲無爲則無不治矣聖人無貴尚之迹而不見可欲循自然之理以應事物莫不有當行之路則爲出於無爲也爲出於無爲則事無不成物無不和乃無不爲矣薛庸齋曰不尚賢使民不爭至使心不亂不尚世俗之賢則民不致爭矣不貴難得之貨則民不爲盜矣不見可欲之事則使心不亂矣是以聖人之治至强其骨聖人治國猶治身虚其心則德大有容矣實其腹則境土不貪矣弱其志則治道尚柔矣强其骨則股肱不惰矣常使民無知無欲至則無不治矣同乎無知其德不離同乎無欲是謂素朴能使民若此雖有智者不敢爲也夫無欲而天下足無爲而萬物化淵靜而百姓安非無爲之治乎休休庵曰不尚賢使民不爭至則無不治矣抱道行不言之教者中虚外順無所好惡是以不尚賢不貴難得之貨有所好尚者情識使然也未免使人生能所生貪求或爭功或爲盜進道育德者又當一念不生致于虚極微妙玄通然後自已靈明不亦貴重若有可愛可欲之念則忘情作惑亂眞心矣是以聖人修身齊家治國平天下虚其心無我而量寬其無爲而物自化以道爲懷實其腹也弘無諍之德弱其志也力行此道强其骨也能如是者使其識滅而無所知情亡褚伯秀曰不尚賢使民不爭至則無不治矣古人所寳性賢見賢思齊此云不尚何耶爲時人多尚己賢以啓爭嫉亂所由生惟其不尚己賢斯能識天下眞賢非謂棄賢於野而不用也世道交喪所謂賢者未必眞尚者未必誠君衒求賢之名士負自賢之志以詐逆詐淪胥于惡而賢爲虚器矣於家國乎何濟訓以不尚己賢是澄清源流而開四海來賢之路也貨之於天下貿遷有無以給民用此云不貴者特謂難得之珍奇寸珠尺璧南金大貝聲色禽獸玩好之物無益於家國無補於饑寒上好下承殘暴以取鼓動天下之貪心上下相交盜矣若夫流行泉布絲麻粟帛民資以生養者未嘗一日廢是謂不貴異物賤用物適宜利用家給户足亦何盜之有後世貪奢敗度利欲蝕心天下滔滔如出一律惟學而知道界限分明必不至越分苟求玩物喪志食取充饑衣務適體室廬蔽風兩吉凶稱有無所享有限所求易足心無企羡何所動亂哉上不尚賢則下不爭名上不貴貨則下不爭利上不見可欲使民心不亂是皆原於心虚不受物故可欲無自入焉心虚則元神居腹實則元氣聚志好强而使之弱所以召和骨任勞而使之强所以有立虚心弱志使民無知實腹强骨使民無欲則雖有知者亦不敢以有爲干上之無爲在上能主無爲之道行其所無事則天下事無不可爲者末句古本作無不爲矣義長於治牛妙傳曰不尚賢使民不爭夫賢者明敏聰慧才能也不尚者不自矜尚謙辭也既謙則光矣天下何爭之有哉是故君子不自大其事不自尚其功讓於賢卑己以尊人蓋自卑則民敬尊之先儒有言曰我賢能矣賢能於我何有哉我崇高矣崇高於我何有哉我尊於人矣而我寧自尊哉苟於此振而矜之則我之不賢矣若我之不賢則人將拒我非爭而何耶此不尚賢使民不爭之說也不貴難得之貨使民不爲盜如夜光之珠明月之璧斯可謂難得之貨也苟子之不欲雖賞之不竊天下何盜之有耶故儒有不寳金玉而忠信以爲寳者昔宋人以玉遺子罕子罕曰我以不貪爲寳子以玉爲寳以與我皆喪寳也却而不受此可謂不貴難得之貨之說也莊子曰絶聖棄智大盜巧止擿玉毁珠小盜不起此非使民不爲盜之謂歟不見可欲使心不亂夫心者一身之主也欲者意之所遷也大凡目有所見則必心有所思心有所思則必意有所爲意有所爲則是之謂欲也夫欲之所蔽心而得而清矣豈不亂耶樂記云人生而靜天之性也感於物而動性之欲也故大修行人常謹外視使不見可欲之事則自然身心清靜煩惱不侵毋致於亂也孟子亦曰養心莫善於寡欲此之謂也是以聖人之治虚其心聖人者淵懿聰明者也其能繼天體道故常虚其心也所謂虚心者遣其實也蓋天下無心外之理而聖人有窮理之心凡天下之理皆吾心之所有也惟虚以養之使無一毫私意撓乎其間則天地之奥皆可以察之也老君曰身之虚而萬物至心之無而和氣歸此聖人治身虚心之義也實其腹夫實腹者非飽膏粱充實其五臟也謂積精累氣以成其眞也是以聖人故常尊其氣貴其形寳其命愛其神使眞境長守生氣有精九户不塞體得生神此聖人之治也老君曰我命在我不屬天地我不視不聽使神不出身與道同乆吾與天地分一氣而治自守根本夫根本者即神氣精之說實其腹之謂也弱其志弱者謂持也志者氣之帥也氣體之充也今夫蹶者趨者是氣也善存養者常於平旦未與物接之時其氣清明之際常持其志無暴其氣使浩然充塞不致梏亡則庶幾三百六十骨節之間無諸滯礙也孟子曰苟得其養無物不長苟失其養無物不消孔子曰操則存捨則亡出入無時莫知其鄉惟心之謂歟此弱其志之說也强其骨夫强其骨者謂握固趺足升腰凸胸此修行之道也蓋聖人之治先虚心以造其理又實腹以固其精復弱志以存其氣令强其骨以行其道然夫强其骨之道可無說耶蓋大修行人行功既畢乃退火抽鉛使元氣自尾閭夾脊上關透入泥丸氣化爲津從上腭出滿口含津凡三叩齒分爲三嚥以意送之丹田復以周天火候養之是名玉液還丹此則强其骨之說也常使民無知無欲無知者淳也無欲者朴也淳朴者無爲也常使民者謂聖人先能服行然後使民無知無欲淳樸無爲也蓋以其昭昭方可使民昭昭也如玄古之君天下無爲也蓋上無爲則下亦無爲也君猶風也民猶草也草上之風不偃天下無之然夫無知之俗淳樸之風玄古至德之世是也莊子曰至德之世不尚賢不使能上如標枝民如野鹿端直而不知以爲仁相愛而不知以爲義實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳孝子不諛其親忠臣不謟其君此可謂淳朴之俗也然則先自上以風化下故云常使民無知無欲也使夫知者不敢爲也謂上古之世風淳無君臣父子夫婦三綱之可知無仁義禮智信五常之可見同焉皆得而不知所以得誘然皆生而不知所以生同與禽獸居族與萬物並惡知其君子小人哉同乎無知其德不離同乎無欲是謂素朴而民得性矣設使淳散朴之人特達聰明之士雖有其知無所用矣故曰使夫知者不敢爲也爲無爲則無不治矣夫帝王之德以天地爲宗以道德爲主以無爲爲常無爲也則用天下而有餘有爲也則爲天下用而不足無爲者天地之平道德之至也明此而南面堯之爲君也明此而北面舜之爲臣也以此而處上則帝王天子之德也以此而處下玄素聖王之道也以此而退居閒遊江海山林之士服以此而進爲撫世則功大名顯而天下一故云爲無爲則無不治矣楊智仁曰不尚賢使民不爭至則無不治矣不尚賢者富貴非所欲爵禄非我有上不朝天子下不謁公卿如是有不爭之德不貴難得之貨者奇珍異寳良金美玉皆外物耳我心坦然民心怡怡外不見欲内心不亂蓋明了之人見亦非見縱横自在古云我若無心於萬物不妨萬物常圍遶聖人之行虚其心而不挂一物實其腹而養乎至精弱其志而常處謙和强其骨而養吾浩然我心淳淳民心朴朴無欲無知使夫知者不敢爲也無爲而無不爲則無不治矣書曰顔子罷肢體黜聰明離形去智不尚賢也簞食瓢飲在陋巷人不堪其憂回也不改其樂不貴難得之貨不爲盜不見欲心不亂是矣頤以養正謙卑而尊此聖人虚心實腹弱志强骨無知無欲無爲而無不治矣喻清中曰不尚賢使民不爭至則無不治矣不尚賢使民不爭即汝惟不矜天下莫與汝爭能之意也不貴難得之貨使民不爲盜即苟子之不欲雖賞之不竊之意也不見可欲使心不亂此一語乃太上教人最喫緊處子貢出見紛華盛麗而悦見可欲而心亂也入聞夫子之道而樂不見可欲而心不亂也達磨少林面壁九年亦是此意賢訓如我獨賢勞之賢大抵事事有求勝之心皆謂之賢如好大喜功窮兵黷武每每欲加於前人非特矜尚智力而已漢文慕黄老之清靜卑辭厚禮和親遠人而曰朕高皇帝側室之子不尚賢也齊高帝曰使我治天下十年當使黄金與土同價不貴難得之貨也大抵好色人之所欲也富貴亦人之所欲也犬馬聲色子女玉帛峻宇雕墻皆足以啓人之欲心惟目無所睹于外則心自不摇于中聖人之治天下豈有他道哉納之於無思無慮之域虚其心也而八口之家必使之無饑蓋慮盜賊起於貧乏也化之以寬柔以教之政弱其志也而必使之勞其筋骨以趨事又慮其飽食逸居而無教也虚實弱强四字是子母字實其腹强其筋骨乃聖人詳致曲慮處以此而治但見斯民游於不識不知少思寡欲之天雖有智巧亦無所施是皆聖人之治以無爲爲之天下其有不治者乎胥六虚曰不尚賢使民不爭夫有國須得其賢輔共治之不得則無以致其治夫不尚賢非不任賢也不尚之而巳若上啓尚賢之門則下有爭進之心故曰不尚賢使民不爭不貴難得之貨使民不爲盜夫貨財天下人皆欲得在上者貴之愛之在下者雖欲而難於得也難於得則窺竊之私明於中耳如在上者視貨財若土苴不貴不愛使民無難得之求彼焉有盜賊之心乎不見可欲使心不亂此有二說一作見宇論謂國君不見其可欲示民民心自定上見可欲下民效之焉得其心不亂歟作見字論謂以修身言聲色玩好充滿眼前不見有所欲者心之定也如見有所欲惡得不亂歟是以聖人之治至强其骨是以古聖人治國必先治身欲治身必先虚其心者不以人欲擾之心自虚矣虚靜也心靜則氣定矣氣定則腹自充實矣故虚其心實其腹弱其志者謂與物無競也無競則神氣和悦而血液盈盈髓滿骨强此養生之正必信之徵以之治國則國富民安又奚事焉常使民無知無欲至無不治矣民之欲其有不可免者欲使無知無欲何如然謂人君不尚賢不貴貨不見可欲上行下效如草從風民性反淳各安其分衣足食飽逍遥而遊又何知何欲歟然上行之篤民有未化雖有知欲亦不敢施其爲者化者衆也爲無爲則無不治者謂人君尚賢貴貨見可欲三者之爲而誠能無爲者天下自治矣故曰爲無爲則無不治矣蘇敬靜曰不尚賢使民不爭至則無不治此章老子本心只在不見可欲使心不亂一語上著意賢者人之勝於人者也人之勝於人而我崇尚之則不勝者必起而爭較難得之貨至寳也我貴寳物則民起竊盜之心此季康子患盜子曰苟子之不欲雖賞之不竊即此意也大凡民心不見可欲中心自不擾亂易之艮曰艮其背不獲其身行其庭不見其人無咎釋者曰艮止也人之欲心每止於目所不見背無所見之處有見則欲心生欲心生則不可止艮其背不獲其身不得見其身也目且不得見其身則欲心自然不生雖庭除之近而不見所行之人以艮其背也出見紛華而悦則中心擾亂外物不接心無所亂自無過咎此即老子不見可欲使心不亂也老子託言古聖人之爲治務使民心虚腹實志弱骨强心虚者不使外物亂其心也腹實者但欲民飽食而已志弱者使民不見可欲而無爭競也骨强者但欲民有力以負荷也民無知無欲則淳朴務實自成風俗其間雖有智巧桀黠者百中無一淳樸多而桀黠少尚何敢出而爲亂至今山林之民與市廛之民便敦朴智巧不同無他市廛之民多見可欲山林之民不見可欲故也此聖人所爲皆安靜無爲自無不治不尚賢不貴寳皆使民不見可欲心自不亂豈若後世賞功勸能而激天下之爭重貨殖財而起天下之盜皆非無爲安靜之治也拾遺秉文曰虚心實腹即上不尚不貴不見使民無知無欲是也知無所慕不敢爲也或云虚心養道雖於義無害非此章本指諸子旁證莊子曰至德之世不尚賢不使能上如標枝民如野鹿端正而不知以爲義相愛而不知以爲仁實而不知以爲忠當而不知以爲信蠢動而相使不以爲賜是故行而無迹事而無傳韓非子宋之鄙一人得璞玉而獻之子罕子罕不受鄙人曰此寳也宜爲君子器不宜於細人用子罕曰爾以玉爲寳我以不受子玉爲寳是鄙人欲玉而子罕不欲玉故曰欲不欲而貴難得之貨文子大丈夫恬然無思淡然無慮以天爲蓋以地爲車以四時爲馬以陰陽爲御行乎無路遊乎無迹出乎無門以天爲蓋則無所不覆也以地爲車則無所不載也四時爲馬則無所不使也陰陽御之則無所不備也是故疾而不摇遠而不芳四肢不動聰明不損而昭明天下者執道之要觀無窮之地故天下之事不可爲也因其自然而推之萬物之變不可救也秉其要而歸之是以聖人内修其本而不外飾其末厲其精神偃其知見故漠然無爲而無不爲也無治而無不治也所謂無爲者不先物爲也無治者不易自然也無不治者因物之自然也石潭曰不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂上章既申無名之義此章又申無欲之義尚賢則名爲可欲而民爲之爭矣貴難得之貨則利爲可欲而民將盜之矣惟不見名之可欲則名不亂其心不見利之可欲則利不亂其心欲之可亂其心者固不止此姑以二者例其凡耳林膚齋以不尚賢爲不自矜黃茂材解以不見可欲爲不見世間有可欲者二解尤勝是以聖人之治虚其心實其腹弱其志强其骨欲不亂其心則心虚矣心不爲欲所奪則中有主而實矣故曰實其腹志不外慕則其志弱矣其志雖弱一氣不爲志所動而骨益强故曰强其骨常使民無知無欲使夫知者不敢爲也無知無欲則雖有知無所用其知爲無爲則無不治矣聖人之治爲無爲而已而能使民不爲可欲之所亂所謂無不治也前章自無名中來此章自無欲中來而皆歸於無爲蓋無爲所以體道也道德眞經集義卷之八
