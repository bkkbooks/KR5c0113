body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正不尚賢章考異河上公作安民章趙實庵作至神獨化義章唐明皇疏前章明萬殊逐境善化則歸根此章明貴尚不行無爲則至理首標不尚絶矜徇之跡次云聖理示立教之方結以無爲明化成而復樸也杜光庭曰大聖人爲理賢人輔之魚水相資安得不用上自二五之主至于霸王之君開國建功仗賢爲本不尚者矜徇誇衒之行也賢人用則人自理矜衒用則怨爭興不尚矜誇自無怨爭不貴乎麗容珍貨則人無貪求乃合乎聖合虚資腹無知無欲之尚矣張沖應曰安者治也民即人也此章蓋謂王侯大人反身入道有以養其身則表正影從而人皆以無爲爲本斯無不治安者矣不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂是以聖人之治虚其心實其腹弱其志强其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治矣考異使心不亂古本作使民心不亂無不治傅奕孫登作無不爲古本同河上公曰不尚賢賢謂世俗之賢辯口明文離道行權去質爲文也不尚者不貴之以禄不貴之以官使民不爭不爭功明返自然也不貴難得之貨言人君不御好珍寳黃金棄於山珠玉捐於淵使民不爲盜上化清淨下無貪人不見可欲放鄭聲遠美人使心不亂不邪淫不惑亂也是以聖人之治說聖人治國與治身同也虚其心除嗜欲去煩亂實其腹懷道抱一守五神也弱其志和柔謙謙不處權也强其骨愛精重施髓滿骨堅常使民無知無欲反朴守淳使夫知者不敢爲也思慮深不輕言爲無爲不造作動因循則無不治矣德化厚百姓安王輔嗣曰不尚賢至使心不亂賢猶能也尚者嘉之名也貴者隆之稱也惟能是任尚也曷爲唯用是施貴之何爲尚賢顯名榮過其任下奔而競效能相射貴貨過用貪者競趣穿窬探篋没命而盜故可欲不見則心無所亂也是以聖人至實其腹心懐智而腹懷食虚有智而實無知也弱其志强其骨骨無知以幹志生事以亂常使民無知無欲守其眞也使夫知者至無不治矣智者謂知爲也唐明皇曰不尚賢使民不爭尚賢有迹循迹則爭興使賢不肖各當其分則不爭矣疏尚崇貴也賢才能也言君崇貴才能則有迹徇迹而失眞失眞必尚賢之由循迹起交爭之弊不若陶之玄化任以無爲使雲自從龍風常隨虎則唐堯在位不乏元凱之臣伊吕升朝自得台衡之望各當其分人無覬覦則不爭也不貴難得之貨使民不爲盜難得之貨謂性分所無者求不可得故云難得夫不安本分希效所無旣失性分寧非盜竊欲物任其性事稱其能則難得之貨不貴性命之情不盜矣疏人之受生所禀有分則所禀材器是身貨寳分外妄求求不可得故云難得人不安性分希慕聰明且失天眞盡成私盜今使賢愚襲性能否因情既無越分之求自輕難得之貨皆得性已誰爲盜乎故莊子曰不仁之人竊性命之情而饕富貴又解云以人君不貴珠犀寳貝則其政清靜故百姓化之自絶貪取人各知足故不爲盜矣不見可欲使心不亂旣無尚賢之迹不求難得之貨是無可見之欲而心不惑亂也疏希慕聰明是見可欲欲心興動非亂而何今既不崇貴能亦不妄求越分則不見可欲之事而心不惑亂也是以聖人之理疏說聖人理國理身以爲教本夫理國者復何爲乎但理身爾故虚心實腹絶欲忘知於爲無爲則無不理矣虚其心心不爲可欲所亂則虚矣疏夫役心逐境則塵事汨昏靜慮全眞則情欲不作情欲不作則心虚矣莊子云虚室生白謂心虚則純白自生也故曰虚其心實其腹道德内充則無矜徇亦如屬厭而止不生貪求矣䟽腹者受足則不貪欲使道德内充不生貪愛故云實其腹屬厭而止者春秋閻没汝寬諫魏武子詞也欲以小人之腹爲君子之心屬厭則足而不貪也弱其志心虚則志弱疏志者心之事事在心曰志欲令心有所行皆守柔弱故知心虚則志弱矣强其骨腹實則骨强疏骨者體之幹既其道德内充常無貪取不貪則腹實腹實則骨堅强也常使民無知無欲常使人無爭尚之知無貪求之欲疏聖人所以虚心實腹之教者常欲使百姓無爭尚之知貪求之欲令其自化爾使夫知者不敢爲也清靜化人盡無知欲適有知者令不敢爲也䟽無知無欲者己清靜矣則使夫有知者漸陶淳化不敢爲徇迹貪求而無爲也爲無爲則無不治矣夫於爲無爲而人得其性則淳化有孚矣疏夫得其性而爲之雖爲而無爲也且絶尚賢之迹不求難得之貨人因本分物必全眞於爲無爲復何矜徇既無聲而無臭人固不識而不知淳風大行誰云不理杜光庭曰不尚賢使人不爭徇迹者矯妄之謂也尚賢之㫖既興矯妄之人必至何者賢難知也詐而疑信佞而疑忠豈易辨哉經云智慧出有大偽是則上好智下應之以偽上好賢下應之以妄不若正身率下無爲御人陶以太和化以清靜則佐理之賢自爲其用矣乃雲龍風虎之謂也雲從龍風從虎者易乾卦孔子解九五之辭九五飛龍在天能廣感衆物故水流濕火就燥云從龍風從虎各隨其類自相應感以況帝王升九五之位萬國來庭云聖人作而萬物睹本乎天者親上本乎地者親下此言水是陰若流於地必就濕處火是陽若焚於薪必就燥處言此二物無識無情爲氣相感尚猶如此又龍是水畜雲是水氣龍吟則景雲起虎是威猛之獸風是振動之物虎嘯則谷風生此二物是有識有情與無識無情者因氣類同亦相感如此況聖人降世飛龍在天聖賢相須萬物交感故廣其事爾唐堯在位者帝堯號陶唐氏姓伊祁名放勛帝舜有虞氏顓頊之後喬牛之孫瞽瞍之子母曰握登生舜於姚丘因爲姚氏名重華元凱之臣者即八元八凱也昔高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸忠肅恭懿宣慈惠和天下之人謂之八元高陽氏有才子八人蒼舒隤鼓禱戭大臨龍降庭堅仲容叔達齊聖廣淵明允篤誠天下之人謂之八凱此十六族齊其美不隕其名堯不信用舉舜爲堯臣舉八元使布五教于四方舉八凱使主后土台衡之望者天子置三公之官以象三合也不貴難得之貨使民不爲盜人之生也禀天地之靈得清明沖朗之氣爲聖爲賢得濁滯煩昩之氣爲愚爲賤聖賢則神智廣博愚昩則性識昏濛由是有性分之不同也老君謂孔子曰易之生人及萬物鳥獸昆蟲各有奇偶謂氣不同而凡人莫知其情唯達道德者能原其本焉文子云清氣爲天濁氣爲地和氣爲人於和氣之間有明有暗故有賢有愚愚欲希賢即越分矣暗欲代明即妄求矣此爲竊性命之情而饕貴富莊子駢拇篇之詞也夫貴富所以可饕猶有篙之者若乃無可尚之迹則人安其分將量力受任豈直决己效彼以饕竊非望哉人君不貴珠犀寳貝之貨不息貪人人各自足斯可謂不爲盜也不見可欲使心不亂希慕羡望也性識有限而羡望聰明是爲越分名之爲欲又修道之士初階之時願行未周澄鍊未熟畏見可欲爲境所牽乃栖隱山林以避囂雜及心泰志定境不能誘終日指揮未始不晏如也所謂小隱於山大隱於未能絶欲恐境所牽乃栖遁山林以避所見及其澄心息慮想念正眞外無撓惑之縁内保恬和之志雖營營朝市名利不關其心碌碌世途是非不介其意混迹城市何損於修眞乎是以聖人之理天眞皇人謂黄帝曰未聞身理而國不理者夫一人之身一國之象也胸腹之位猶宫室也四支之别猶郊境也骨節之分猶百官也神猶君也血猶臣也氣猶民也知理身則知理國矣愛其民所以安國也希其氣所以全身也民散則國亡氣竭則身死亡者不可存死者不可生所以至人銷未起之患理未病之疾氣難養而易濁民難聚而易散理之於無事之前勿追之於旣逝之後子勗之焉虚其心惟道集虚虚心則道集於懷也道集於懐則神與化遊心與天通萬物自化於下聖人自安於上可謂至理之代矣虚室生白者莊子人間世篇之詞也室者心也視有若無即虚心也心之虚也純白自生純白者大通明白之貌也内觀經云夫心者非青非赤非白非黄非長非短非圓非方大包天地細入毫芒制之則止放之則狂清靜則生濁躁則亡明照八表暗迷一方人之難伏惟在於心所以教人修道即修心也教人修心即修道也心不可息念道以息之心不可見因道以明之善惡二趣一切世法因心而滅因心而生習道之士滅心則契道世俗之士縱心則危身心生則亂心滅則理所以天子制官僚明法度置刑賞懸吉凶以勸人者皆爲心之難理也無心者令不有也定心者令不惑也息心者令不爲也制心者令不亂也正心者令不邪也淨心者令不染也虚心者令不著也明此七者可與言道可與言修心矣實其腹夫心者嗜好無窮腹者含受有足心無窮故虚之腹有足故實之心虚則衆欲不生腹實則貪求自止懐忠信抱質朴可謂德充於内矣舂秋者魯史記之名也註閻没汝寬諫者舂秋昭公二十八年晋魏獻子舒爲政以其子戊爲梗陽大夫今晋陽也冬梗陽有獄戊不能斷以其獄上於獻子訟人之大宗以女樂爲賂魏子將受之戊謂魏子二大夫閻没汝寬曰主以不賄聞千諸侯者受梗陽之賄貪莫甚焉吾子必諫皆許諸退朝待于庭饋入魏子召二大夫食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰惟食忘憂吾子置食之間三歎何也同辭而對曰他人賜二小人酒不夕食饋之始至恐其不足是以一歎中置自咎曰豈將軍食之而以不足是以再歎及饋之畢願以小人之腹爲君子之心屬厭止是以三歎魏子辭梗陽之賄獻謚也疏云武子則武子名顆謚曰武閻没汝寬二大夫諫武子之音願以小人之腹爲君子之心腹則易足心則難滿欲其息貪不受梗陽之賄小人腹飽猶知厭足君子之心亦宜然矣春秋美之魏氏納諫所以興也弱其志詩序曰在心爲志夫心之所起爲志所行爲事心旣柔弱則無險躁紛競之事皆處和平矣事和平則爲理之本强其骨弱其志則廉柔不犯於外强其骨則堅固有備於内爲道之者筋骨堅强百疾不能侵矣腹實則骨强和氣充也理國者政清則民靜費省則力豐民靜者志弱之謂也力豐者骨强之謂也常使民無知無欲貪求則爭起有知則事興爭欲既無清靜自化矣使夫知者不敢爲也下化於上猶風之偃草淳和普洽則皆返無爲也爲無爲則無不治矣無爲之理其大矣哉無爲者非謂引而不來推而不去迫而不應感而不動堅滯而不流捲渥而不散也謂其私志不入公道嗜欲不枉正術循理而舉事因資而立功事成而身不伐功立而名不有若夫水用船砂用肆泥用橇山用樏夏瀆冬陂因高而田因下而池故非吾所謂爲也乃無爲矣聖人之無爲也因循任下責成不勞謀無失策舉無遺事言爲文章行爲表則進退應時動靜循理美醜不好憎賞罰不喜怒名各自命類各自用事由自然莫出於己順天之時隨地之性因人之心是則群臣輻凑賢與不肖各盡其用君得所以制臣臣得所以事君此理國無爲之道也無聲無臭者詩大雅文王篇也言天道難知耳不聞聲音鼻不聞臭芳儀法文王之事則天下自信而順也不識不知者詩大雅皇矣篇言人不識古不知今順天之法而行之者此言天道尚誠實貴性於自然不尚賢貴貨即合於此矣宋道君曰不尚賢至使民不爲盜尚賢則多知至於天下大駭儒墨畢起貴貨則多欲至於正晝爲盜日中穴坯不尚賢則民各定其性命之分而無所夸跂故曰不爭不貴貨則民各安性命之情而無所覬覦故不爲盜莊子曰削魯史之行鉗楊墨之口而天下之德始元同矣旅獒曰不貴異物賤用物民乃足不見可欲使心不亂人之有欲至於决性命之情以爭之攘奪誕謾無所不至伯夷見名之可欲餓於首陽之下盜跖見利之可欲暴於東陵之上其熱焦火其寒凝冰故其心則潰亂僨驕而不可繫至於聖人不就利不違害不樂壽不哀夭不榮通不醜窮則敦爲可欲欲慮不萌吾心湛然有感斯通止而無所礙動而無所逐也物孰能亂之孔子四十而不惑孟子四十不動心蓋得於此是以聖人之治至常使民無知無欲谷以虚故應鑑以虚故照橐籥以虚故能受耳以虚故能聽目以虚故能視鼻以虚故能齅有實其中則有礙於此聖人不得已而臨范天下一視而同仁篤近而舉遠因其固然付之自爾何容心焉堯之舉舜而殛鯀幾是矣心虚則公聽並觀而無好惡之情腹實則心足平泰而無貪求之念豈賢之可尚而貨之足貴聖人爲腹不爲目腹無擇而容故也志者心之所知骨者體之所立志强則或徇名而不息或逐貨而無厭或矜其能或伐其功其玄道益遠骨弱則行流散徙與物相刃相靡胥淪溺而不反聖人之志每自下也而人高之每自後也而人先之知其雄守其雌知其榮守其辱是之謂弱其志正以止之萬物莫能遷固以執之萬變莫能傾不壞之相若廣成子者千二百歲而形未嘗衰是之謂强其骨莊子曰同乎無知其德不離同乎無欲是謂素樸素樸而民性得矣聖人之治務使民得其性而已多知以殘性命之分多欲以汨性命之情名曰治之而亂孰甚焉故曰常使民無知無欲使夫知者不敢爲也辨者不敢騁其辭勇者不敢奮其忮能者不敢矜其材智者不敢施其察作聰明矜機巧滋法令以盡其衆聖人皆禁而止之此所謂使夫知者不敢爲也九德咸事俊乂在官豈以知爲鑿也行君之命致之民而已爲無爲則無不治矣聖人之治豈棄人絶物而恝然自立於無事之地哉爲出乎無爲而已萬物之變在形而下聖人體道立乎萬物之上總一其成理而治之物有作也順之以觀其復物有生也因之以致其成豈有不治者乎故上治則日月星辰順其序下治則鳥獸草木各遂其性王介甫曰不尚賢使民不爭論所謂不尚賢者聖人之心未嘗欲以賢服天下而所以天下服者未嘗不以賢也群天下之民役天下之物而賢之不尚則何恃而治哉夫民於襁褓之中而有善之性不得賢而與之教則不足以明天下之善善既明於己則豈有賢而不服哉故賢之法度存猶足以維後世之亂使之尚於天下則民其有爭乎求彼之意是欲天下之人盡明於善而不知賢之可尚雖然天之於民不如是之齊也而況尚賢之法廢則人不必能明天下之善也噫彼賢不能養不賢之敝孰知夫能使天下中心悦而誠服之賢哉齊桓公問於管仲曰仲不幸而至於不可諱則惡乎屬國桓公賢易牙而仲以爲易牙於己不若者不比數之無若隰朋者上忘而下畔愧不若黃帝而哀不已若夫使其得上忘下畔之人而尊之於上則孰有尚賢之弊哉或曰彼豈不謂是耶特以弊而論之爾不貴難得之貨至使心不亂尚賢則爭輿貨難得則民爲盜此二者皆起於心之所欲也故聖人在上不使人不尚賢不貴難得之貨不見此二者則能使心不亂而巳矣尚賢則善也不貴難得之貨爲盜惡也二者皆不欲何也蓋善者惡之對也有善則必有其惡皆使善惡俱忘也世之言欲者有二焉有可欲之欲有不可欲之欲若孟子謂可欲之謂善若目之於色耳之於聲鼻之於臭是不可欲之欲也字說谷能受也欠者不足也能受而能當患不足者欲也老子曰不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂此老子不該不偏一曲之言也蓋先王不尚賢亦非不尚賢不貴難得之貨亦非不貴難得之貨不見可欲亦非不見可欲雖然老子之所言形而上者也不尚賢則不累於爲善不貴難得之貨則不累於爲利惟其如此故能不見可欲孟子曰可欲之謂善夫善積而充之至於神及其至於神則不見可欲矣是以聖人之治至强其骨夫虚其心所以明不尚賢實其腹所以不貴難得之貨强其骨所以明不見可欲夫人之心皆有賢不肖之别尚賢不肖則有所爭矣故虚其心則無賢不肖之辨而所以不尚賢也腹者能納物者也能納物則貴難得之貨矣貴難得之貨則民爲盜矣腹既實則雖有難得之貨亦財聲色而已凡所可欲者皆爲欲弱其志所以無求强其骨所以有立惟其無求也故不見可欲而有立矣無所求而有所立君子之所貴也惟其能貴於此則無不治矣常使民無知無欲虚其心弱其志使民無知也寔其腹强其骨使民無欲也使夫知者不敢爲也民貪其莫皆無知無欲雖有知者亦不敢爲也爲無爲則無不治矣有爲無所爲無爲無不爲聖人爲無爲則無不治矣蘇潁濱曰不尚賢使民不爭至强其骨尚賢則民恥於不若而至於爭貴難得之貨則民病於無有而至於盜見可欲則民患於不得而至於亂雖然天下知三者之爲患而欲舉而廢之則惑矣聖人不然未嘗不用賢也獨不尚賢耳未嘗棄難得之貨也獨不貴之耳未嘗去可欲也獨不見之耳夫是以賢者用而民不爭難得之貨可欲之事畢效於前而盜賊禍亂不起是不亦虚其心而不善腹之實弱其志而不害骨之强也哉今將舉賢而尚之寳貨而貴之衒可欲以示之則是心與腹皆實也若舉而廢之則是志與骨皆弱也心與腹皆實則民爭志與骨皆弱則無以立矣常使民無知無欲至不敢爲也不以三者衒之則民不知所慕澹乎其無所欲雖有智者無所用巧爲無爲則無不治矣即用三者之自然而不尚不貴不見所謂爲無爲也吕吉甫曰不尚賢使民不爭聖人知夫美斯惡善斯不善而我無容私焉故雖摩天下之爵因任而已而賢非所尚也民之爭常出於相賢知賢非上之所尚則不爭矣故曰舉賢則民相軋不貴難得之貨使民不爲盜聚天下之財者養人而已而難得之貨非所貴也民之盜常出於欲利知貨非上之所貴則不爲盜矣不見可欲使心不亂孔子曰苟子之不欲雖賞之不竊君子之所欲者賢也小人之所欲者貨也我皆不見其可欲則心不亂矣然則不尚賢者非遣於野而不用也不貴難得之貨非委之地而不收也内不存諸心而外不遺其迹而已矣是以聖人之治至强其骨心藏神而腹者心之宅虚其心則神不虧而腹實矣骨藏志而骨者腎之餘弱其志則精不摇而骨强矣常使民無知無欲至則無不治矣智者知賢非上之所尚而貨非上之所貴而爲之非所利故不敢爲也夫唯如此則無爲無不治矣陸農師曰不尚賢使民不爭絶聖棄智民利百倍絶仁棄義民復孝慈此所謂不尚賢使民不爭不貴難得之貨使民不爲盜絶巧棄利盜賊無有此所謂不貴難得之貨不見可欲使心不亂民不見善之可欲則無爭之亂矣不見利之可欲則無盜之亂矣是以聖人之治至則無不治矣心者有知而擇腹者無知而容志者有欲而動骨者無欲而立是故聖人之治虚其心實其腹弱其志强其骨虚其有知實其無知故能常使民無知弱其有欲强其無欲故能常使無欲王元澤曰不尚賢使民不爭賢者出衆之稱尚之則民夸企外慕爭之端也不貴難得之貨使民不爲盜民衣食足而性定矣妄貴難得之貨則其求無已必至爲盜蓋民之失性由妄生分别此篇務在齊物使民復性不見可欲使心不亂昩者妄見可欲所以爲心之潰亂惟聖人能知諸物皆非眞實故萬態一視而無取舍之心是以心鏡常夷物豈能亂之是以能不尚賢不貴貨也是以聖人之治至强其骨心虚則無所分别此申不尚賢之義腹實則無所貪求此申不貴貨之義志强則夸企而爭勝志弱則無營於外此又申不尚賢之義骨强所以自立自立則外物不能遷此又申不貴貨之義常使民無知無欲知則妄見欲則外求二者既除性情定矣自不尚賢而化之可使至於無欲使夫知者不敢爲也智足以亂衆者禁而止之爲無爲則無不治矣爲無爲非無爲也爲在於不爲而已期於復性故也切嘗論之三代之後民無不失其性者故君子則志强而好善求賢無已小人則骨弱而慕利逐貨不厭志强則多知骨弱則多欲或有知或有欲雖所趣不同而其徇外傷本一也惟聖人不然弱其志則非所見者卑而求近以爲無所求而道自足也强其骨非以自立而爲賢將以勝利欲而尊德性也夫然後名不能移利不能溺而性常定矣劉仲平曰不尚賢至使民不爲盜不尚賢使民不爭不貴難得之貨使民不爲盜古之道也後世聖人亦可以復諸此乎曰難得之貨不貴之易也於其所謂賢而無以上之難也時也然而尚賢有道惟賢然後尚之而莫之貴也由是天下信之而亦至於勿爭書曰不寳遠物則遠人格不貴貨也所寳惟賢則邇人安尚賢也遠人格民不爲盜也邇人安使民不爭也不見可欲使心不亂可欲者善也所不欲者不善也聖人之道人者以可欲得之則無欲矣可欲者窮理也無欲者盡性也可欲者可語人以始而不可求人以終終以可欲亦歸於不善而已老子曰不見可欲使心不亂可欲者善也故曰天下皆知善之爲善斯不善已知善之所以爲善者不可不深知此也是以聖人之治至則無不治矣虚其心則愛惡息愛惡息則志平一而同乎道虚其心弱其志所以養神實其腹强其骨所以嗇精而常使民無知無欲也劉巨濟曰不尚賢使民不爭古者聖人作其道足以哀民之瘼方斯之時賢未尚也世衰聖人不作知尚賢爲世所尚又未必賢則徒厲民以食之而使民窮以不肖亦安得無爭者乎莊子曰至德之世不尚賢不貴難得之貨使民不爲盜古者賤貨定衣食而已世衰上貴貨專利而使民窮於不足亦安得而無盜乎然非尚賢則亦不能致貨蓋爲君辟土地充府庫古之民賊而今之良臣也不見可欲使心不亂目前諸欲以適情爲可則不能不見也以不見之則其心定矣尚賢不貴貨者皆可飲之事也是以聖人之治至强其骨虚其心者以尚賢貴貨出於世衰非聖人之治故也虚其心則畢萬物己足治矣何俟於賢乎實其腹者經曰身與貨孰多蓋養精以實腹則所有非所有也何事於貨乎弱其志者志者心之使也養神則心虚心虚則神定神定則無所用而弱矣强其骨者骨者體之幹也養精則腹實腹實則精盛精盛則骨强而立常使民無知無欲凡民知欲不能自無能使之無而已虚心弱志使無知故也實腹强骨使無欲故也又使民常則善矣蓋有知則恥不尚賢而爭有欲則思貨而盜使夫知者不敢爲也使民常則固善矣不能使民常則亦必有知者焉使夫知者不敢爲可也使不敢爲則固亦道矣不言欲者欲生於知而已爲無爲則無不治矣爲無爲謂使敢爲者不敢爲也敢爲者不敢爲則無知無欲之得安其性此其所以治也前章言聖人以事教爲應爲尚賢貴貨皆事教之緒餘故次以不尚賢此章言聖人治身以化民使至於無知欲則賢與貨固外物也後世尚賢貴貨既不可廢而爲上者苟能虚心弱志則雖徇利實徒厲民以食之事矣實腹强骨則難貴貨必無損下益上寳珠玉以殃身之事矣夫如是則治於人者食人人孰使之爭有餘不足分定而止敦使之盜崇寧八註曰不尚賢使民不爭至則無不治矣人生而靜天之性也感物而動性之欲也蓋聖人在上不尚賢不貴貨使民不累於爲善不累於爲利也心不虚則亂腹不實則有欲志不弱則有剛骨不强則不立實其腹則無嗜欲矣孟子曰行有不慊於心無是餒也又云人無饑渴之患心爲患也莊子曰嗜欲深則天機淺淺則困矣弱其志無暴其氣又云士尚志而此謂弱志者何也孟子方以士人言之故進之老子以反本言之故退之劉驥曰不尚賢使民不爭至則無不治矣不尚賢則忘名忘名則民無所夸跂故不爭不貴貨則忘利忘利則民無所覬覦故不爲盜不見可欲則使人息其愛欲之心故不亂三者既除性情定矣然後可以虚其心實其腹虚其心者物我兼忘也實其腹者精神内守也物我兼忘則欲慮不萌而志自弱矣精神内守則形體充實而骨自强矣弱其志則貴乎無知强其骨則貴乎無欲故常使民無知無欲也無知無欲則見素抱朴而造於道矣聖人之道虚無自然不可爲也爲者敗之執者失之故使夫知者不敢爲也爲無爲則其爲出於不爲自然之妙用無不治矣此莊子所謂遊心於淡合氣於漠順物自然無容私焉而天下治以其得大道沖虚之用也故次之以道中趙實庵曰初舉不設智巧一去文辨不尚賢使民不爭前章以聖人無爲之功而治天下至於功成不居是得眞常之用也豈假外鑠於我哉所以聖不必絶不知有所謂聖也智不必棄不知有所謂智也蕩然無心而已矣觀夫三代已還不知有所謂無爲者也故千里裹糧親賢以圖治矣老氏傷其不探本也故繼之不尚賢夫任大也不必任小有聖也不必有賢大則體道之無爲聖人之事是爾小則任智而矜誇賢者之事是爾故大聖有作治本無爲使天下之民各安其性命之情而絶企慕誇爭之心易所謂乾道變化各正性命者是也性命既正則純純當常機心不作賢與不肖孰能辨哉我欲無爲愚其耳目我欲成治一其良心智端起而機僞生巧意作而爭心起及其變也豈勝治哉蓋中人之性可上可下以道化之則歸乎純以賢誘之則進乎爭爭心相仍民性遷矣雖欲任賢而禁民之多知曾不知正容悟道冶容誨淫故不尚賢者至神獨運也上古之君不聞有佐義農之代亦所未聞至於黃帝有坂泉之戰而始有風后力牧之臣問治生之道則有更區歧伯之師厥後聖道尚存而求賢已切詩云南有嘉魚則樂與賢南山有臺則樂得賢至于簡兮刺不用賢丘中有麻刺賢人放逐狡童刺不與賢人圖事則知大樸既散之後賢者不可不尚也老子欲還純返樸於衰周之世故以不尚賢爲言無他使民純樸則不用爭使民賤物則不好貪凡以救當時之弊而已然則尚賢使能先王正禮義法度也不尚賢不使能老子則欲清靜無爲也迹雖不同其於爲治則一也所以抱甕灌園發子貢之所問耕田不仕爲伯成之所逃又馬蹄胠篋宜蒙人之所指二除愛利不貴難得之貨使民不爲盜不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂此一節謂之三法通玄義前二句言治法後一句言治己先得治己之道然後可以治民治民者以正也正則不邪不邪則無欲無欲則心虚心虚則不亂不亂則萬物服萬物服則智謀不用矣奚以賢爲貨者交利而俱贍人我之養畢足而止金玉雖貴不能濟飢以道化之其分各足無使賤者僣於貴貧者强於富苟有奔競則越性命之情而矜誇奇物此必在乎人主敦尚素樸不務榮觀天下之民不約而化如漢文還千里馬晋武焚雉頭裘則天下貴貨之心在矣是知至治不在三器韓子有言要道存於四維賈生極論至於治己以無欲則心間無事無事則生定矣至于巧者不敢矜其智能者不敢矜其才孰能投其所好哉昔之人主不體至道務以欲利勝已而奸臣得以投其所好未有不由是而亡也太甲曰欲敗度役耳目者欲所爲也荀卿亦曰由欲謂之道盡嗛也從人所欲不爲節限則天下之道盡於快意聖人之治苟能去欲而虚心則夫神天明照知四方未足爲遠也三正性情不見可欲使心不亂謂不以一物爲累其心者則其心自無矣凡稱見者非獨眼見六根皆見因見即欲多欲亂心心固不淨且眼爲六根之首以眼爲見根眼本爲見見所爲塵審物爲境耳雖曰聽聽實耳見見所爲塵審物爲境鼻雖曰臭臭實爲見見所爲塵審物爲境舌雖曰味味實爲見見所爲塵審物爲境身雖曰觸觸實爲見見所爲塵審物爲境意雖曰識識實爲見見所爲塵審物爲境此名六根六根生六塵六塵對六境謂之三六十八界輪轉生死之因縁也所覺不同同謂之覺所見不同同謂之見六欲所取本同一心從心所分三界唯識六根取境藏之於意意亦是心心爲藏識六根謂之六識上有六七兼之爲八七識者爲六識般運業境而歸八識七識亦名意八識執三藏謂能藏所藏執藏能與染淨所知諸法爲依止是故名爲種子七識八識同名曰意亦名曰心故此六欲染亂一性性者心之生心實性也自無始已來使我不得歸入正道由汝六識取受無厭使此心終日營營流轉愛風未嘗暫止其疾俛仰之間再撫四海之外如風中燈焰不停故如風中亂絲不整故夫既一心不理是心隨境轉轉轉不休心神耗動日趍妄境化爲異類無由返本欲之害性可不慎歟蓋欲非一日而積也性非一日而染也中有無明爲己主宰自無始已來至今日也且如初入包胎縁不淨境業報曰因愛即生初入包胎從愛中來愛中有欲逐生此心至於嬰孩之時雖情未開喜怒已生於心矣速至能别人事六欲所起分裂六處受用一境欲生一心所起境既無量心亦無邊惟彼一心不知所住是欲勝而心亂故也是故三界初上六天名曰欲界第一太皇黃曾天人六色根俱染太明玉完天人一欲根麤淨五欲根麤染清明何童天人二欲根麤淨四欲根麤染玄胎平育天人三欲根麤淨三欲根麤染元明文舉天人四欲根麤淨二欲根麤染上明七曜天人五欲根麤淨一欲根麤染以上六天謂之欲界太眞科曰初下二天果報尚麤猶以身交爲欲次二天以執手爲欲第五天以口說爲欲第六天以眼視爲欲今縁六欲感此六天凡一根麤淨上進一天六欲總超上登色界自此以性一切銷盡方登無色界天凡稱無色是無欲也蓋修行之始去欲爲難自六趣以至於爲人自人道以至於爲聖超證之門以漸消也經曰少私寡欲易曰懲忿窒欲經言其漸易言其損雖然學者之所修固如是也而與物委蛇而同其波者又非起心而絶之無根也孰塵也無塵也孰境也通乎此則眞人哉次爲治之要一牒前證治本一是以聖人之治前三句爲三法通玄義後四句爲四事成治義是以字牒前起後謂聖人能知此三者又在虚心實腹弱志强骨是使聖人行道也皆言之有緒矣不尚賢絶巧智也不貴貨絶珍異也不見可欲寧心也此三者爲治世之基基不立則何以求安乎學之爲王者事其以乆矣此三者聖人亦常聞之矣聞之則志於行之也又行之在乎四事矣故曾子曰尊其所聞則高明矣行其所知則光大矣所謂光大者行此四事也一曰虚其心二曰實其腹三曰弱其志四曰强其骨二湛然無物虚其心虚其心者虚有四說焉三說非一說是一曰如太空之虚二曰如空谷之虚三曰如虎在丘之虚四曰以一爲虚夫大空之虚空谷之虚丘虚之虚皆非也此非空非谷非丘之可比也乃一之虚也若夫以其心如太空之虚則獨覺之人厭離煩惱使一毫不累於心坐觀虚空空極渺漫無能作爲豈出治之聖人守此爲虚哉此其一也又以空谷之空爲虚此特山之有之穴空而已空谷傳應以虚感聲聲出亦虚兩虚相合能應而已雖然以谷況心一無所作響則應之豈不善喻經亦曰谷神不死凡言谷神谷中有神也非特空谷而已谷而無神則所謂神靈者果何物乎我呼彼應是和也豈有人君之治和而不唱者哉不唱而和則失常矣此谷虚不可以比出治聖人之心此其二也字說曰虚在丘則虚丘虚則人不敢進夫王者之事以天下爲一家不獨親其親不獨子其子皆欲愛利之至於四海咸使歸向豈特如虎之在丘絶物爲虚邪此三也今之所言治者以一爲虚是也夫一在坎則實在離則虚水火之相生精神之運用不可須臾離也故聖人精神之運心術之動法諸水火有不測之神一本也道生一一爲虚不生而爲有生之宗無用而爲衆用之祖一況君也其在象則三畫而成乾三三兩兩之則三才變通也自一自三而六至於三百八十四爻一無不在矣一即神也以虚泛應虚固無用其果不用乎聖人之道役人也不爲人所役役物也不爲物所使一而不二制命也漢策曰命非聖人不行一而不紊靜之至也靜而不變道之常也不變而變道之用也物變我靜守乎一也我靜物動觀其復也則知一者无爲也無爲而無不爲也帝王之心通乎三玄以行四事孰謂虚無爲不治哉此一爲虚是也三道備純乾實其腹八卦以坤爲腹化爲五材者在地成形而坤則藏之故爲腹又背爲陽腹爲陰以其主藏則藏往者是也土主意出而爲新也歸而爲往也皆主藏之以其多藏故曰實腹又以坎離二象觀之坎實其中有實腹之象離虚其心有虚心之象坎剛離柔則心腹爲剛柔也經曰人法地易曰立地之道曰柔與剛然實者非虚以通之則不神故曰黄中通理若夫虚者不履實際則不至清淨覺地御注曰虚心則公聽並觀而無好惡之情公生明是也離爲火火文明聖人南面而聽天下實腹則贍足平泰而无貪求之念容乃公也坤爲腹腹主容聖人中正以觀天下是也向之所論虚心實腹顯聖人出治之用也夫虚實之用在人爲事也在卦爲坎離也在氣爲陰陽也用之爲人事如彼其言也用之爲坎離法故不同也且陽實而陰虚鍊丹之法使二八陰消九三陽長陽純則仙陰純則死坎以内外爲陰離以内外爲陽火上水下則未濟降火就水則既濟從天地之道自子至午變純陽自午至亥變純陰自然之運也故曰天地以順動此乃循常施化也及在人身豈不隨天地之爲陰陽邪凡隨天地之爲陰陽是未得制之之法也不免與造化爲流人而已不知制命在我者也凡陰陽之道順之則死逆之則生太白山人曰五行顛倒術龍從火裏出五行不順行虎向水中生此逆也逆則生太率論之本非逆也乃和會也致之似逆歸之曰和太上曰水火比於道之眞體水火之用是以術而制之使夫坎中之一補離之虚心變離爲乾其道成矣若虚心未實離坎徒迷眞人曰陰坎徒迷一陽離五見形是也平叔曰點化離宫腹裏陰極而論之在得一也旣得一在火候也非火候數足豈能補之或曰經不及是止論聖人之治此何以及之不知五千言長生之宗也出可以治世入可以登仙安期生策士也張子房王佐也期不用於楚良成功於漢二人皆登仙是出處有道也昧者豈及於斯乎四柔順自守弱其志孟子曰志者氣之帥也御注曰志强則或徇名而不息或逐貨而無厭今夫蹷者趨者是氣也氣可使之和和則内以安神外不逆物苟不和也豈免攫拏而傷物暴扞以戾人非氣之自使志實使之也故曰志者氣之帥老子以懦弱謙下爲表言夫志不得不弱然則以治道論之志意不大識量不遠豈足以當大事乎必須剛也剛則决柔豈特剛而不柔邪柔以返剛聖人體天一剛一柔迭相因也不夬則不决决則乾道成也又剛過而不中過則有悔也乾元用九乃見天則夫能用九者弱志之謂也楊雄曰見善明用心剛夫見善則明道也明道於我則志氣自大矣在君子則謹守其志深藏若虚故以弱而守之也苟不能以弱而守之則氣暴而不純凡養氣之道柔順爲本經曰豫若冬涉川猶若畏四鄰使内不犯外猶之處子不然則喜怒交攻而傷其和矣長生之宗莫慎於此胡不觀乾之九五飛龍在天剛得位也進不可極極則有悔矣大有之上九宜其剛而不中也然且履信思乎順故自天祐之吉無不利也雖然時也而性在其中矣若夫弱志以守一自非聽之以氣者必反是矣五立德明道强其骨向所謂不尚賢也下爲能知也虚心已下四者爲能行也至於强其骨尤見其能者也何以言之骨强則有立易曰信以發志也主信則有立又曰天行健君子以自强不息體乾之道則行而無所礙動而無所逐信以主之也無信則不立此又至剛至大者之所能行也蓋自虚心實腹弱志以養之至於此則所謂善養吾浩然之氣充塞乎天地之間确乎其不可拔也孰能禦之經曰强行者有志此自養之以柔然後能至剛也易以先剛而後柔老子以先柔而後剛用之各有其道也夫腎爲一水一石水柔也喻志石强也喻骨凡自柔至於剛而酌然可見者一陽生於至陰之中柔極而剛也一陰生於至陽之中剛極而柔也若是乃知剛柔之迭用也若守之而不行則曰自晦自晦者豈能利天下後世哉聖人觀天之道豫以順動風雷雲雨施於天禮樂刑政施於人内且不剛焉自立矣是以骨强則有立弱以守之正以行之者也如有所立卓爾則異乎棖也欲矣觀夫天下學道之士多矣有知之者知之而不能守守之而不能行無他焉是欲利之心勝而清虚之道難反强其志而弱其骨也譬如多積貨財闔户守之不能貿遷何由富矣御注曰骨强則行流散徙言無中下矣惟自强不息者爲能體此三政化所及常使民無知無欲此一句總結前義下一句示以法也常使民無知無欲則是重明向上不尚賢不貴貨不見可欲以至虚心實腹弱志强骨言聖人出治天下有此七者誠無他焉使民無知無欲是也尚賢則多知至於天下大駭儒墨畢起責貨則多欲至於决性命之情以爭之攘奪誕謾無所不至見名之可欲見利之可尚皆失道者也惟聖人爲能去此三者民自無知也亦無欲也惟民生厚因物有遷蓋以上之人作聰明務機巧而爲之誨也及其已甚刑法不足以齊之董子曰法出而奸生令下而詐起此昔之在位者教之不善風俗漸染之深未可一日而化也今雖欲以法而禁之令而申之彼其奸惡之心尚在當以道化之則可也法始乎伏義而成乎堯大備乎成周而智巧盡矣故曰周衰而道微可知也老子作經意在乎此雖然豈止爲當時而作將以爲萬世之蓍龜及其亂也何異乎戰國是尚賢貴貨多欲之過孔子曰民可使由之不可使知之堯聞童謡曰不識不知順帝之則苟在上之人多知多欲而欲其無知無欲是不可也猶之惡醉而强酒誠不若以至誠而化之純朴以守之在上者如愚在下者無知即莊子謂上如標枝民如野鹿何威福之用哉刻意尚行離世異俗民始疑矣二牒前智巧无施使夫知者不敢爲也經曰將以愚之民之難治以其智多莊子曰天下有道聖人成焉天下无道聖人生焉多知多欲爚亂天下至於民失常性又欲以刑威而禁之兹又大亂之本也秦之毒天下智巧勝矣不能用仁義而以刑威欲治天下恩不及民故其忘速矣然民豈无知也可使藏之而不用惟上之人不啓其端則下之人有知而不敢爲也陰符經曰絶利一原用師十倍其此之謂也若使夫知之者敢爲則紛拏不足而禁矣一至于此雖欲誅之有不勝誅者矣故曰我无爲而民自化四顯無爲之功一化行无彰二爲无爲此一句總結一篇之義以明聖人出治雖无爲而未嘗不爲無爲則絶物有爲則近事所謂事非道也而事實出於道矣使爲之而不見爲之之迹治之而不顯治之之功斯善矣且如之何使爲而不見爲之之迹治之而不顯治之之功乎易曰寂然不動感而遂通夫不動者性也感而遂通者情也性本无爲道之體也道之爲性其實无形有極而作則天地至於萬物无不由兹而出焉傳曰萬物職職皆從无爲殖是道也出於聖人之心而應次二之神潜天而天潜地而地无非精神之運動者也夫見於精神之運動者則有爲也運而不見其迹者本无爲也且不爲也天下一日二日而萬機其可置而勿論乎勿論則不治若事事而治之物物而察之則又勞矣勞則墮墮則不治矣凡爲之之道豈免仁以仁之義以宜之禮以體之信以質之恩以愛之刑以威之哉若出治而略此數者且欲求治又不可得也上古不用禮法義皇巳用結繩大率上古之時民純事簡无爲之功易可見也若謂後世只可有爲不可无爲則是道不可行也惟體道之聖人能通乎此易曰其道甚大百物不廢惟不廢一物也道實有爲之及乎求道也道本无爲矣兹所謂爲无爲者是也嘗試論之无爲者内聖也有爲者外王也内聖則淵乎其虚外王則興事造業以淵虚之心而爲事業則事出於道道本於虚有爲无爲混而无迹豈俟他哉是篇歸之不尚賢欲聖人之獨化也獨化則神矣有能不親賢道而致无爲自然者大聖之治也若需賢佐者則迹也請以神觀大聖之教人也摇蕩人心使之成教易俗其朴徐徐其覺于于无事而萬物化无爲而百姓定此神也請以迹觀堯襌舜舜命九官阜陶曰知在知人知人則哲能官人安民則惠又曰百工惟時庶續其凝則朝廷既治可以率天下矣至於仲虺之稱湯用人惟己皆須賢以爲輔佐也又曰旁求俊乂而共成天下之治則智者爲之謀能者爲之使君逸臣勞此見乎迹是君能任人以成无爲之治也彼無所待聖之无爲也此有所待因賢而致无爲也蓋得賢則治失賢則亡不尚者存於大聖人也世嘗謂老子之道語類鴻荒非用中之道其何以云有爲爲則是不廢中庸也二道契自然則無不治矣如上則見無爲之功矣至於无爲則與道爲一道德眞經集義卷之七
