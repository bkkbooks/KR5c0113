body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正谷神章考異河上公作成象章趙實庵作靈根善養義章唐明皇疏前章明兼愛成私偏私則難普此章明至虚而應其應則不窮首標谷神寄神用以明道次云玄牝辯玄功之母物結以綿綿微妙示虚應則不勤勞也杜光庭曰神者陰陽不測之謂也虚而能應感而遂通或以谷養爲言養神則契乎不死或以響應爲說應物則如神不窮玄牝則吐納元和鍊神鍊氣形氣長乆天地齊靈綿綿永存長生之道也張沖應曰人生天地間一吸一呼皆此精炁所由往復也鼻受陽而成象口受陰而成象人無口鼻則陰陽精炁不能升降上下而象不能成矣此章開悟陰陽升降之㫖谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤河上公曰谷神不死谷養也人能養神則不死也神謂五藏之神也肝藏魂肺藏魄心藏神腎藏精脾藏志五藏盡傷則五神去矣是謂玄牝言不死之有在於玄牝玄天也於人爲鼻牝地也於人爲口天食人以五氣從鼻入藏於心五氣清微爲精神聰明音聲五性其鬼曰魂魂者雄也主出入人鼻與天通故鼻爲玄也地食人以五味從口入藏於胃五性濁辱爲形骸骨肉血脉六情其鬼曰魄魄者雌也主出入於口與天地同故曰爲牝也玄牝之門是謂天地根根元也言鼻口之門是乃通天地之元氣所從往來綿綿若存鼻口呼噏喘息當綿綿微妙若可存復若無有用之不勤用氣常寬舒不當急疾勤勞也王輔嗣曰谷神不死至用之不勤谷神谷中央無谷也無形無影無逆無違處卑不動守靜不衰谷以之成而不見其形此至物也處卑而不可得名故謂天地之根綿綿若存用之不勤門玄牝之所由也本其所由與極同體故謂之天地之根也欲言存邪則不見其形欲言亡邪萬物以之生故綿綿若存也無物不成用而不勞也故曰用之不勤唐明皇曰谷神不死谷者虚而能應者也神者妙而不測者也死者休息也谷之應聲莫知所以有感則應其應如神如神之應曾不休息欲明至道虚而生物妙用難明故舉谷神以爲喻說也是謂玄牝玄深也牝母也谷神應物沖用無方深妙不窮能母萬物故寄谷神玄牝之號將明大道生畜之功也疏谷神者明神之應聲如道之應物有感即應其應如神神者不測爲名死以休息爲義不測之應未嘗休息故云谷神不死玄深也牝母也谷神之應深妙難明萬物由其茂養故云是謂玄牝玄牝之門是謂天地根深妙虚牝能母萬物萬物由出是謂之門天地有形故資禀爲根本矣疏玄牝之用有感必應應物由出故謂之門天地有形之大者爾不得玄牝之用則將分裂發洩故資禀得一以爲根本故云是謂天地之根根本也綿綿若存用之不勤虚牝之用綿綿微妙應用若存其用無心故不勤勞也杜光庭曰谷神不死是謂玄牝谷神之義響應養神分爲三别第一謂谷之含虚有聲則應道之體無修之則得第二謂神無形有祈則赴感道無象修之則長存第三謂響在谷無聲則不應道在身不修則不成不死者非謂死生之死是休息之死若謂養身解之則爲死生之死一謂養神則長生不死二謂響應無休歇爲休歇之死夫玄天也於人爲鼻牝地也於人爲口元和之氣慧照之神在人身中出入鼻口呼吸相應以養於身故云谷神也又天之五氣從鼻而入其神曰魂上與天通地之五味從口而入其神曰魄下與地通言人養氣則與天爲徒乆而不已可以長生陽鍊陰也食味則與地爲徒乆而不已生疾致死陰鍊陽也老君令人養神寳形絶穀食氣爲不死之道故云玄牝門天地根也玄牝之門是謂天地根非獨人資玄牝運氣乃得長生天地之大亦須資道氣運養乃能清寧無改矣下經云天無以清將恐裂地無以寧將恐發天地失道尚有傾淪發洩之變況於人身而不守中存一乎綿綿若存用之不勤天地任氣自然故長存也人鼻口呼吸當綿綿微妙若可存復若無有不當煩急勞倦也理國之道政令所行亦當寬以濟猛猛以濟寬所以政寬則民怠令猛則民殘能以清寧之道以理天下人無動用勤勞之事則下民親附祚曆延長綿綿常存若瓜瓞葛虆之長永也故云綿綿若存用之不勤也宋道君曰谷神不死有形則有盛衰有數則有成壞形數具而死生萬物之理也谷應群實而常虚神妙萬物而常寂眞常之中與道爲一不麗於形不墮於數生生而不窮如日月焉終古不息如維斗焉終古不忒故云不死是謂玄牝萬物受命於無而成形於有谷之用無相神之體無方萬物所受命也玄者天之色牝者地之類萬物所成形也谷神以況至道之常玄牝以明造物之妙玄牝之門是謂天地根莊子曰萬物有乎生而莫見其根有乎出而莫見其門而見之者必聖人已故於此言玄牝之門是謂天地根天地者萬物之上下也物與天地本無先後明大道之序則有天地然後有萬物然天地之所從出者玄牝是已彼先天地生孰得而見之綿綿若存用之不勤自本自根自古以固存如火之傳不知其盡也夫是之謂綿綿若存茫然天造一氣之自運倏爾自化委衆形之自殖乾以易知坤以簡能非力致也何勤之有王介甫曰谷神不死是謂玄牝谷者能虚也能容也能盈也能應也有此四德不知所以然故謂之神有其神則不死死則不生不生故能生生而不見其迹牝取生物之意生物而不見其迹故謂之玄易曰太極生兩儀是亦玄牝之謂也玄牝之門是謂天地根其門則天地所由生之本也謂之有則若存而已綿綿若存用之不勤綿綿者遠而不絶之辭天道之體雖綿綿若存故聖人用其道未嘗勤於力也而皆出於自然蓋聖人以無爲用天下之有爲以有餘用天下之不足故也蘇潁濱曰谷神不死是謂玄牝谷至虚而猶有形容神則虚而無形也虚而無形尚無有生安有死即謂之谷神言其德也謂之玄牝言其功也牝生萬物而謂之玄焉言見其生之而不見其所以生也玄牝之門是謂天地根玄牝之門言萬物自是出也天地根言天地自是生也綿綿若存用之不勤綿綿微而不絶也若存存而不可見也能如是雖終日用之而不勞也吕吉甫曰谷神不死是謂玄牝谷有形者也以得一故虚而能盈神無形者也以得一故寂而能靈人也能守中而得一則有形之身可使虚而如谷無形之心可使寂而如神則有形與無形合而不死矣古之人以體合於心心合於氣氣合於神神合於無其說是也合則不死不死則不生不生能生生是之謂玄牝玄者有無之合牝者能生生也玄牝之門是謂天地根道之生天地由此而已故曰云云綿綿若存用之不勤以爲亡耶則綿綿而未嘗絶以爲存耶則惡睹其存哉若存而已若亡而非絶若存而非存則吾之用之存亡無所容心脗合之而已何勤之有哉陸農師曰谷神不死是謂玄牝生生者不生殺生者不死谷神者玄而以容以應玄牝者妙而以雌以雄故曰谷神不死是謂玄牝玄牝之門是謂天地根玄牝者生天生地是也所謂玄牝之門者其子由之而生不得見之是也故曰玄牝之門是謂天地根莊子曰有乎生莫見其門此之謂也綿綿若存用之不勤有似乎是而又似乎非是也有似乎存而又似乎非存也其行未嘗有間其用未嘗有爲故曰綿綿若存用之不勤易曰往來不窮謂之通莊子曰且然無間謂之命而老子亦曰神無以靈將恐歇蓋往來不窮而無間無歇者神而已矣是之謂綿綿谷神者言其用玄牝者言其體王元澤曰谷神不死是謂玄牝谷應而不窮神化而不測萬物受命於我而未嘗生未嘗死者谷神也言神則極矣而加谷者且言能虚能盈而又能容以應也以其活而不敝故但稱不死谷神受命而玄牝賦形自爲陰陽以成天地然本一物也始由其受命故曰谷神由其賦形故曰玄牝玄牝之門是謂天地根玄牝體陰而一體之中又自有陰陽稱門異於户也萬物由此門以出而不得見故曰玄牝之門綿綿若存用之不勤綿綿谷引而不絶之謂神牝生生不盡而若有若無不可定有用之不勤者動而愈出何勤之有劉仲平曰谷神不死至用之不勤谷者虚而能容能應玄者妙之門牝者柔靜幽深有和而無竭有納而無出谷與神未嘗生未嘗死而獨曰谷神不死者蓋言不死則不生可知矣綿綿若存用之不勤謂之用若存而已用之不勤者無用之用也劉巨濟曰谷神不死是謂玄牝神之爲神其虚不屈其應不窮而莫見其迹故以谷爲象而曰谷神谷虚而應故也蓋有生則無不死者唯不死以生生生不死則能生生矣常無欲是也不死則謂之神生生則謂之牝其貫一也故曰是謂玄牝牝母也加玄焉則道是也如玄覽玄同玄德之類玄牝之門是謂天地根玄牝以生出爲鄉猶之門也天地流形本於玄牝猶之根也唯常無欲能不生不死故謂無爲神既有生則有母故謂神爲玄牝既出則有形故謂玄牝爲天地根無即道是也道即天地是也綿綿若存用之不勤綿綿者生出不絶貌不絶則其生之緒若有存焉而實非有存也若者亦不正言其有之謂也如蠶爲繭如蛛爲網别之不窮求之不得也用之不勤者謂神用之非人用之也所以不勞者虚而應前特言以爲應則安能不勞乎前章言橐籥之喻故次以谷神此章雖至道爲諭而養身之神亦無以異此蓋精全則氣全氣全則神全神全則不死不生矣劉驥曰谷神不死至用之不勤靈樞經曰天谷元神守之自眞言人身中上有天谷泥丸藏神之府也中有應谷絳宫藏氣之府也下有靈谷關元藏精之府也天谷者元宫也乃元神之室靈性之所存是神之要也聖人則天地之要知變化之源神守於元宫氣騰於牝府神氣交感自然成眞眞合自然與道爲一而入於不死不生故曰谷神不死是謂玄牝玄天也牝地也人之形體法象天地所以靈樞以天谷泥丸元神之室爲元宫以絳宫關元精氣之府爲牝府玄牝者神氣之所要會也靈樞以鼻爲元門亦謂之天門口爲牝門亦謂之地户元門引氣上通於天牝門納食下達於地故是謂天地根天地謂玄牝也聖人運用於玄牝之内造化於恍惚之中綿綿者不絶之貌若存者順其自然而存之神久自寜息乆自定性入自然無爲妙用何勤之有故用之不勤是謂深根固蔕長生久視之道故次之以天長地乆趙實庵曰初舉道要二一虚中宅靈谷神不死道降而爲氣氣住而爲胎胎結而爲神神升而曰仙故道爲修生之法從無入有有即氣母是也形爲神之舍養形可以存神氣爲神之母有氣可以住子則氣母二字眞長生之本也經曰谷神不死是謂玄牝玄牝者即谷神也谷神引氣下歸玄牝論其本則先玄牝而後谷神人之生自壬至癸而兩腎爲之始終故也原其用則先谷神而後玄牝人之呼吸自兩鼻而丹田爲之受納故也氣自谷神綿綿而不徹用之於至微也其乆則氣止玄牝不復引於谷神是爲胎息氣在玄牝如子在胎不假呼吸呼吸自内故其法始於綿綿若存而終以呼吸不外爲胎仙也諸說以鼻爲玄口爲牝鼻入清口吐濁又曰閉地户即知在鼻而不在口也又曰口鼻非玄牝而玄牝在下田蓋不從其出入之門而言也强分之爾谷神亦曰神廬玄牝亦曰丹田黄庭曰呼吸廬間入丹田經曰谷神不死是謂玄牝玄牝之門是謂天地根度人經曰開明三景是謂天根三景即玄元始氣是也此云氣母其後生天生地列爲三辰亦曰三景有内外故也玄牝是内谷神御注曰谷應群動而常虚神妙萬物而常寂亦猶前云橐籥虚以待氣凡以明大道之體如此其本謂谷中有神即虚中有神也是養靜而致之也非若空谷之空黄庭曰虚中恬淡自致神夫性以心爲用心以性爲神動在機守在氣希夷之象者道也道之體者虚無之一氣也一氣之爲用者性也性也者谷神也一氣靜者性也性靜則萬化安一氣動者情也性動則萬化生聖人守元神於天谷天谷者空洞之間也空洞者虚無之界也氣清性淨變化萬物之根也正元君以宫室言以谷爲天谷天谷者泥丸宫也泥丸宫者虚無之室也人能守神五氣自來朝見下行玄牝玄牝者天地升降之道路也由是觀之則知一氣上下通流在天谷則爲金精在玄牝則爲玉液又曰玄牝既定百息其氣過靈關上動天門下沉地户可謂妙道靈樞曰玄牝上通天谷下達地户然自養氣至於住氣多入少出則見於震時多出少入見於離卦日没收之乾卦鍊之此學者日用採取之法也住而不出不入故云胎息一升一降而爲龍虎此又煉丹之法也氣一而已法有不同故神仙之事不可一塗而取也胎息論以氣住神在則爲神仙可得而考焉二牒前正指是謂玄牝鼻有兩竅下通於腎腎有二門玄爲陽牝爲陰兩腎亦然日用之功在一左一右次指流歸原玄牝之門是謂天地根御注引莊子曰萬物有乎生而莫見其根有乎出而莫見其門而見之者必聖人而已此善言也夫道之於天地萬物之於乾坤生者自生化者自化性者自性命者自命孰爲根邪孰爲門邪以自然言故不知其所以然而然也以眞宰言豈無門無根邪而見之者必聖人而已無見者不得其門而入無門者不識生生之根此事在天機非聖人孰能與於此故曰知之修鍊謂之聖人夫玄者一也牝者母也一自虚生牝以動合求陰者陽承陽者母一不期生而生自者矣母不期合而情自感矣易曰水流濕火就燥雲從龍風從虎此必然之理也故自乾坤交合於亥一陽始壬於西北壬爲陽水合丁之陰火而生丙丙爲陽火合辛之陰金而生庚庚爲陽金合乙之陰木而生甲甲爲陽木合己之陰土而生戊戊爲陽土合癸之陰水而生壬此爲夫婦之義也人有兩腎左陽右陰左爲腎右爲命門方壬之肇懷命門初具有命門然後生心心生血法丁生丙心生肺肺生皮毛法辛生庚有肺然後生肝肝主筋法乙之生甲有肝然後生脾脾生肉法己生戊脾生腎腎生骨髓法癸生壬有腎則與命門合而爲二由是觀之自天元一氣爲根既以爲一矣且得無名乎有名萬物之母也在乾則始而亨者也始者元始也乃統天則知乾統元氣也出則爲陽入則爲陰谷神之所以呼吸玄牝之所以收藏萬物受命於此也豈無根而植無門而出邪欲見之者即此而見矣是故自一氣而分陰陽天地得此以大也始於壬而生五臟人身得此以成也其在天地有所可得而知即以人身二氣升降呼吸喘息有所合也惟深機者能之三明調御之法綿綿若存用之不勤受命於陰陽者不離陰陽之數委形於生殺者不能逃生殺之權蓋人之生也禀於常數天地之理也用數制人凡用數而不知數之有窮則中道夭閼者有之得數而超數於事物之外則長生不死者有之孰爲數邪一三五七九二四六八十是也數從何來起於黄宫天元一氣是也故人身法一天地上下八萬四千里二至之所交坎離之運用一呼脉行三寸一吸脉行三寸呼吸之間脉行六寸一晝夜一萬三千五百息其半陰其半陽自亥至巳營氣行陽二十五度行陰二十五度合十二時漏水百刻之數消息盈虚以成歲功以和五氣無先之以太過無後之以不及則陰陽適平也苟失其平則五氣乖沴在天則爲勝復在人則亂五藏由是而諸疾生焉凡所以用之在能與不能爾經曰綿綿若存者綿綿者一氣也引一氣於谷神之間極使微弱耳不聞其聲毫不覺其動似無而有似有而微故若存也如是則營衛常調六脉不過清濁升降不失其時喘息呼吸不致其暴孟子曰持其志無暴其氣亢倉子曰體合於氣氣合於心心合於神神合於無御注曰自本自根自古以固存如火之傳不知其盡也凡氣合於神則陰陽不得以制命易曰陰陽不測者是也生殺不得以用權莊子曰彼爲生殺非生殺者是也皆在用之不勤若夫居天地之内有乖陰陽之數者是不能專氣也外物所誘反爲氣奪也又安知所謂盜機者乎故天地長乆者由是而致焉邵若愚曰谷神不死至用之不勤谷以喻虚虚者道也神者道化之一氣乃無中之有也虚神無形本自無生而亦無死故云谷神不死虚乃生之本謂曰玄神爲化之元謂曰牝谷神者是謂玄牝也萬物皆從玄牝之門出是謂生天地根以觀谷神綿綿若存用之者以神合虚而不在勤勞措意功力能爲也王志然曰谷神不死至用之不勤夫玄牝以天地爲根萬物有乎生而莫見其根夫易以乾坤爲門萬物有乎出而莫見其門其見之者必曰聖人歟經曰谷神不死是謂玄牝夫谷者有形者也中含虚故能應神者無方者也中體性故不虧玄者天之象牝者地之象通乎晝夜之辨極乎陰陽之原冥乎性命之機達乎死生之變隨一氣造化升降綿綿而不絶谷常虚而受命於天神常寂而賦形於地一出焉而生一入焉而化莫不皆本之於自然其本未始有生原其所以生者來無所從其本未始有化驗其所以化者去無所至莊子所謂未嘗死而未嘗生者是也列子曰有生生者有形形者有聲聲者有色色者有味味者生之所生者死矣而生生者未嘗終形之所形者實矣而形形者未嘗有聲之所聲者聞矣而聲聲者未嘗發色之所色者彰矣而色色者未嘗顯味之所味者嘗矣而味味者未嘗呈無知也無能也無不知也無不能也而吾之所欲學者必欲學夫未嘗終未嘗有未嘗發未嘗顯未嘗呈之之妙體陰陽乘變化旁日月挾宇宙上與造物者游下與外死生無終始爲友趣是而得生者必曰玄牝嚮是而得不死者必曰谷神夫是而欲不死不生者未之有也莊子曰性脩反德德至同爲初眞人息之以踵其息深深謂之綿綿若存用之不勤者嗚呼此道甚易知甚易行而人莫能知莫能行者何也以學者未明深根寧極出生入死之妙妙通乎此可以宫天地府萬物遂於大明之上至彼至陽之原也入於杳冥之門至彼至陰之原也得夫天地陰陽之至賾則知玄牝谷神之所歸矣黄茂材曰谷神不死是謂玄牝谷體虚虚能養神神常存故不死谷神之道妙不可傳乃從而爲之說曰是謂玄牝玄者妙道之門牝者生物之祖玄牝之門是謂天地根玄爲妙道之門牝爲生物之祖求之吾身果何物乎求之不可得則求之生吾身者果何物乎天地與吾同生於玄牝知其生吾身者則知天地之根矣經曰深根固蔕長生乆視之道即此是已綿綿若存用之不勤綿綿相繼之謂也綿綿若存亦所以形容不死之道上士聞道勤而行之今乃用之不勤何也勤者有時而不勤用之不勤者無適而不勤與道合矣其爲勤莫大焉程泰之曰谷神不死老氏有取於谷者多矣曰曠兮其若谷以其廣也曰谷得一以盈言其有所受之也曰爲天下谷曰江海能爲百谷王皆以其善下也惟此章特出深況曰神曰不死曰若存此其至理所寓深妙而有功用不與他語之喻谷者同也諸家無他發明獨以虚言夫谷之虚也固可以爲神而虚非也從其不死也若存也而想其所至則一虚不足以盡其形容也唐明皇釋之曰有感而應其應如神則正以應聲出響爲義也諸家因明皇之既發此指也而後始能踵之以附出其見前此未白也夫聲之生響與形之生影其理一也然影之寫形也不一其他日也月也水也火也凡有光則有影故欲推影之起者求諸日月而莫之得則移而求之水火亦可明也若夫聲之出也則與影異放乎野則散觸乎山則窒惟谷也外曲而中空聲其入之回復掩冉始能和附以爲之響故舉天下之大萬物之多而能出響於無者則惟此谷而能有此神也洪纖疾徐長短多少隨感出應一一肖似苟不於此乎取神而安所得神哉惟知夫神之屬此而後不死且若存者皆可得而推矣始大昌之得此理自以爲當而未敢深主及得列子引黄帝所言以發揮老語而後確乎其無疑也列子之言生化也全引黄帝谷神本語以證夫生生化化之相續即谷之所以能神也不死也若存也皆命此也已又申言萬物生死皆出機入機且援黄帝遺語以明之而曰形動不生形而生影聲動不生聲而生響無動不生無而生有其理之所配與前語正合故大昌意黄帝此之二義本是一章特列子話言偶有更端遂亦析而二之也讀者當合其話言之異以求其脉絡所貫乃有明也若夫谷之能神則可得而推矣當其空也在道則無也及其聲之觸也則夫應感而能有者也有者動爲復自進退之漸而言之則爲消爲息也此易老之所同言而老氏則常探夫易之所不肯盡者而既言之故越消息而言有無也有無也者又其制消息之機而不自囿於消息之數者也故作復之證則爲芻狗消息之機則爲橐籥而生化之原則爲谷神此其淺深之辨也詹秋圃曰谷神不死至用之不勤成象章言凡物谷養神氣則生生不滅是謂天主陽爲玄地主陰爲牝玄牝爲品物生育之門是謂根於天地而生物成象無窮已也張沖應曰谷神不死至用之不勤我有此身禀天之氣含地之精即此五臟之神也鼻者氣之升降所係口者精之運行所關氣五十一動息從鼻而爲之升降精一刻凡七十四運從口而爲之運行則谷神得此精氣所養而不死也是謂玄牝故也玄牝之門者乃鼻爲天氣之門口爲地精之門運動有常則腎不虚海不塞而天地之所以根也誠能息其精氣綿綿如常用之無窮享年爲無已矣此乃男女通行之法切宜詳味而養之則成眞入聖皆以之也不然精耗氣虧谷神無所養則顔無光采而氣化雄精化雌神化鬼即謂三尸者也人生于世身有此妙而不能保養之惜哉張靈應曰玄爲天屬陽而爲元氣牝爲地屬陰而爲元精元氣以子時而升此一陽生也由腎宫從左道流入五臟卯時與精會於腹入肝是謂春陽分也巳時至天門鼻爲出入之門而升於頂至午時降居右道入骨絡復還腎宫元精以午時而升降此一陰生也由命元從右道流入骨絡酉時與氣會於背入肺是謂秋陰分也亥時至地户口爲出入之門而升於頂至子時降居左道入五臟復還命元精與氣一升一降玄牝交合不虧不盈則神居天谷守衛此形而後可以見調理不死之方白玉蟾曰谷神不死此心本無老死是謂玄牝同此一天玄牝之門念頭動處是謂天地根惟心綿綿若存只是如此用之不勤無爲而已廖粹然曰谷神不死空氣在身爲神之母子母相養形神長生是謂玄牝萬物之母玄牝之門生生化化衆妙之門是謂天地根萬象之本綿綿若存左右逢原這是本來面目之爲用之不勤周行不殆綿亘古今不消用力陳碧虚曰谷神不死是謂玄牝夫大人以太虚爲空谷以造化爲至神空谷至神乃道之體用豈有死乎不死之理既而深冥又能母養故曰是謂玄牝或谷喻天地神喻大道今說者以山谷響應爲喻不其小哉且人能懷豁無方法太虚之廣存任神眞資造化之靈自然形與道合何死之謂乎如是則冥然茂養物受其賜也故曰玄牝河上公章句谷音育訓養也人能養神則不死神謂五藏之神肝藏魂肺藏魄心藏神腎藏精脾藏志夫人能清靜虚空以養其神不爲諸欲所染使形完神全故不死也若觸情躭滯爲諸境所亂使形殘神去則何道之可存哉玄牝之門是謂天地根夫太虚造化萬類之以出入既有出入之名故謂之門且根者本也天地雖大不能逃其有形有形之類咸以虚空太和爲其根本故曰是謂天地根河上公曰不死之道在玄牝玄天也於人爲鼻牝地也於人爲口天食人以五氣從鼻入藏於心五氣清微爲精神聰明音聲五性其鬼曰魂魂者雄也主出入人鼻與天通故鼻於玄也地食人以五味從口入藏於胃五味濁辱爲形骸骨肉血脉六情其鬼曰魄魄者雌也主出入人口與地通故口爲牝也根者元也言鼻口之門乃是通天地之元氣所從往來也且上言谷神不死者勸人養神之理此曰玄牝之門者示人鍊形之術也故形神俱妙者方與道同也夫人有身有神則有生有死有生有死不可言道也流動無常豈得言靜也若乃空其形神忘其物我是以出無根故氣聚不以爲生入無竅故氣散不以爲死不死不生其谷之神也生死無常其浮動之物也幽深雌靜湛然不動其玄牝之謂也綿綿若存用之不勤綿綿不絶之貌此結上養神鍊形之義也夫養神則深妙冥極清靜虚空綿綿若存感物而起無有絶時也鍊形則呼吸太和導接血氣飲難終之泉咀延年之草使其支節通暢而不勤勞也此方可與天地同根衆妙共門也謝圖南曰谷神不死至用之不勤經曰谷得一以盈神得一以靈天地有之人亦有之陳希夷曰山自天之上而墜故觀艮畫則知山自天來人之首象天頂曰崑崙鼻口山根神藏其間是曰谷神一身之主宰也實未嘗死玄牝者指乾坤二元而言乾爲首坤爲腹二元之氣升降往來在乾曰玄在坤曰牝玄牝即二元之氣二元即谷神之主也邵康節詩云一物元來有一身一身還有一乾坤正謂此爾門則指兩鼻也天地清寧之氣自人之鼻而入流布身中乾首坤腹胥此養之故謂之根是氣之入綿綿不絶若存者順其自然而存之不必勞力也故曰用之不勤或者過於閉其氣非徒無益而又害之蓋嘗論之太極肇分人與天地並立爲三此三才之道也首爲天腹爲地心居其中吾身之三才也康節詩曰天向一中分造化人從心上起經綸心居首腹之中以彌綸上下使玄牝升降精神往來吾身可以常存矣存養既深體認既熟則惚兮恍兮其中有象恍兮惚兮其中有物窈兮冥兮其中有精三者可識矣視之不見名之曰夷聽之不聞名之曰希搏之不得名之曰微三者可想矣知其雄守其雌知其白守其黑知其榮守其辱三者可存矣反觀内察天地與我相似其曰谷神不死老氏豈欺我哉林鬳齋曰谷神不死至用之不勤此章乃修養一項功夫之所自出老子之初意却不專爲修養也精則實神則虚谷者虚也谷神者虚中之神者也言人之神自虚中而出故常存而不死玄遠而無極者也牝虚而不實者也此二字只形容一箇虚字天地亦自此而出故曰根綿綿不已不絶之意若存者若有若無也用於虚無之中故不勞而常存即所謂虚而不屈動而愈出是也晦翁曰至妙之理有生生之意存焉此語亦好但其意亦近於養生之論此章雖可以爲養生之用而初意實不專主是也范應元曰谷神不死是謂玄牝谷神猶言虚靈也不死猶言無極也玄牝言其生物而不見其所以生也謂虚靈無極此乃生物之牝而不見其所以生故曰玄谷神二宇傅奕云幽而通也司馬温公曰中虚故曰谷不測故曰神蘇曰谷至虚而猶有形谷神則虚而無形也虚而無形尚無有生安有死邪謂之谷神言其德也謂之玄牝言其功也牝生萬物而謂之玄焉見其生之而不見其所以生也玄牝之門是謂天地根門者指陰陽也以其一闢一闔往來不窮而言也陰陽者以道之動靜而言也動而曰陽動極而靜曰陰動極而靜靜極復動開闔不忒生育無窮根者謂天地本於此也人能於此心之初得之則知天地之根無根之根也玄牝之門無門之門也谷神不神之神也豈有窮盡哉綿綿若存用之不勤謂谷神之在天地綿綿密密而無極也然視之不可見聽之不得聞用之不可既故曰若存天地用之而四時行百物生未嘗勞也谷神在人亦然綿綿密密生生無窮以爲本無孰主此身以爲本有竟居何所故曰若存善用之者未嘗勞也何有終窮哉此章宜深體之或有專就修養上解者然必須認得谷神方可薛庸齋曰谷神不死至是謂天地根谷者神所居神者形所載以形養氣以氣含神不死之道也神本無死賦于形而有死雖死而未嘗死也谷神因玄牝不死天地以玄牝爲根玄牝者内焉而藏精外焉而調息一開一闔一呼一吸呼則至於深根吸則至於固蔕於是有神入焉離斗輾歷天廷騎日月披雲霧騰騰乎會歸于大有之室亦猶姑射山有神人居焉綿綿若存用之不勤綿綿調息似有若無用之要不至勤勞爾休休庵曰谷神不死至用之不勤虚明謂之谷靈妙謂之神虚明靈妙無窮謂之不死即玄牝也玄者大道也牝者母也一氣生於虚明之中然後分清濁立天地故云玄牝之門是謂天地根妙道無爲一氣運行不絶是謂綿綿若存應時應機利生濟物不勞而辦故云不勤虚明靈妙在人曰心心爲萬法王能生育天地運行日月玄機妙用任運無窮隨縁應感不勞而辦悟明者不言而知已褚伯秀曰谷神不死至用之不勤谷虚而善應神靈而無方人能以至靈之物藏至虚之所則隨感而應應已無迹生尚不知死乎何有玄謂道妙難測牝乃化育之地其爲用也妙萬物而能生生是之謂不死此發明虚心養神之道借天地造化爲言始於虚心而任化終於無心而化自己出凡物之生本莫不由斯故稱門焉莊子云天門者無有也萬物出於無有以易言即太極以人言即性初乃一化之所待萬理衆甫之都會也人人具足而放不知求則谷非其谷神不自神如天地萬物何夫形者生之含氣者生之元神者生之制三者住而生道昌身中玄牝見矣綿綿守而無失若存恍惚之間則亦何勤之有此章語簡意深猶孟子論浩然之氣在人充養而後見通身是道悟者自得非語言所能盡也前輩議方外談道多詳其精而略其麤有上達而無下學混元置此章於美惡賢貨橐籥之後亦該貫而無間但語極玄奥學者憚其高遠而不敢即今不揆淺陋僣於影外描影云谷神猶無極玄牝猶太極綿綿法太極之氤氲布化而生道不息也谷神言其體玄牝言其化綿綿言其用人能反求諸身則自已天地之根不言而喻今世之養生家其論亦以谷神玄牝爲主但泥於形質取諸心腎上下口鼻呼吸之間此皆後天之土苴耳至於天地根萬物宗者皆遺而弗究何足以明谷神之妙哉按列子稱黄帝書云乃全載此章蓋古有此語混元亦述而不作之意牛妙傳曰谷神不死是謂玄牝谷者養也神者上藥三品中之一也玄牝者鼻之左右孔也故大修行人有胎息法從外玄牝通内玄牝導引太和眞氣注想丹田乆而行之則其身長存故云不死也玉清胎元内養經云胎元妙道以外玄牝合内玄牝以外眞神補内眞氣聚集天之萬寳我胎之元精使神生於胎氣戀於神心君潜御氣息調匀綿綿若存而不息用之不窮而見功谷神不死合我眞宗此之謂也玄牝之門是謂天地根夫玄牝之說有内有外外則前已釋過内則乃口口相傳之機不記文字所以張平叔悟眞篇有曰玄牝者非心非腎非肝非肺非脾非三焦非膀胱非丹田然則審何所耶又曰玄眞玄牝眞牝玄牝都來共一竅然此奥理不遇明師終是難知愚嘗讀道藏修行論有曰玄牝者居二腎之間號稱神室乃神明所會之府精氣交感之區人之命門故稱天地根蓋人身號小天地也綿綿若存用之不勤此言胎息導引之法不緊不緩若存若亡之間任其鼻息綿綿來往不待驅而使之故云用之不勤也玉帝心即經云上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日通靈出入玄牝若亡若存綿綿不絶固蔕深根人各有精精極成神神合有氣氣合體眞神依氣生精依氣盈其聚則有其散則零三品一理妙不可聽一得永得自然身輕太和充溢骨化寒瓊此之謂也楊智仁曰谷神不死至用之不勤谷神者天谷元神也鴻濛始判先有此神與太虚同體與天地同生神之來則生神之去則死然生亦未嘗生也死亦未嘗死也爲陰陽之主爲萬靈之尊淵淵浩浩日月不得此則不能耀明五行不得此則不能發生萬物不得此則不能長育其不死者玄牝也玄爲眞陽牝爲眞陰上通於天下蟠於地周流六虚上下無常在丹爲眞鉛汞在易爲坎離在象爲龍虎人能修之坎離消長於一身風雲發泄於七竅眞炁薰蒸而無寒暑純陽流注而無死生是謂玄牝之功也且門者乃日月之門户也非心腎非口鼻非泥丸非臍下非臍中一寸二分圓如環者非夾脊雙關非心上一穴非閉炁而行之若執此則謬之甚矣何不返觀天地之根乎易曰寂然不動者誠也感而遂通者神也玄牝之門也動而未形之間者幾也天地之根也誠精故明神應故妙幾微故幽誠幾曰聖綿綿若存用之不勤喻清中曰谷神不死至用之不勤老氏一書治國愛民修心養性服氣鍊神精粗畢舉本末兼該此章大槩主於修養當合儒道之書而互相發明之自儒家之說言之谷者虚也神者虚中之神也自道家之說言之谷天谷也神者一身之元神也元神所住之宫其空如谷而神居之故謂之谷神泥丸宫是也神存則生神去則死谷神之所以不死者由玄牝也陽神爲玄陰息爲牝神氣交感自然成眞與道爲一而入於不死不生故曰谷神不死是謂玄牝黄帝陰符經曰口通五臟出者重濁之氣屬陰謂之地根鼻通六腑出者輕清之氣屬陽謂之天根口鼻二者陽神陰息往來之門故曰玄牝之門是謂天地根聖人運用此氣於升降之頃存鍊此氣於呼吸之間綿綿續續勿令間斷存者順其自然而存之神乆自寜息乆自定未嘗至於勤勞迫促故曰用之不勤儒道之書共歸一揆列子全引此章指爲黄帝曰則老氏之言似有所自或人謂人身中自有一竅非口鼻也非心腎也非穀道也其要未易言俟與談玄者商之胥六虚曰谷神不死是謂玄牝谷取其虚神言不測不死謂常存也言虚谷之中其中有神陰陽不測古今常存故曰谷神不死以其不死是以謂之玄牝玄遠也牝生也謂自古以來不知其幾億萬年深遠難測其生生之理無有窮盡故曰玄牝玄牝之門是謂天地根門通出也根本也謂玄牝之門天地由兹而出萬物由兹而生乃天地萬物之根本綿綿若存用之不勤綿綿者微而不絶言玄牝之體也不勤者玄牝之功用也謂玄牝之門自古迄今微而不絶雖視之不見其生生之妙用顯若存焉耳曷嘗見其有辭勞乎此章從首至末只是一谷神聖人鋪舒如此奇哉噫此一谷神人自生至老須臾不可離者其容狀功能與此更無毫分差忒信之者不勞餘力領解將去若生擬議鷂子已過新羅李是從曰谷神不死至用之不勤谷神不死是謂玄牝者谷乃空虚也天地大谷也山澤小谷也神乃靈性神在空虚藉氣而響山澤無情呼之應嗚我神非形賴氣而聲不死者常存不亡也玄靈心也牝意氣也心用未發而人不知曰玄氣化未成而事不見曰牝玄牝之門是謂天地根者用捨出入放去收來之門道從此一氣而生天地萬物人從此一心而生出用在萬事機發所由之根本也綿綿若存用之不勤者繼續不斷常存不亡也施用徐緩勿可動勞傷損神氣也柴元皋曰谷神不死是謂玄牝谷虚也不死常惺惺也萬念動底根本物欲昏了時便見虚時便活玄牝之門是謂天地根乾闢坤闔出入處綿綿若存用之不勤眞人息以踵不勤也常人息以喉勤也必有事焉而勿正心勿忘勿助長此不勤之用也非乾坤易之門邪蘇敬靜曰谷神不死至用之不勤此章以養氣爲言者河上公張沖應皆以玄牝爲鼻口鼻口爲呼吸出納之門根元也言鼻口乃通天地元氣所從往來綿綿不絶其微妙若無又若存氣得其養則用之不勞餘力自然長生乆視至唐明皇方以谷之應聲莫知所以有感則應其應如神老子書中取谷爲喻不一也曰曠兮其若谷曰谷得一以盈曰爲天下谷曰江海能爲百谷王皆以其能下也惟此特曰谷神不死曰綿綿若存從其不死若存而求之則能下不足以盡之必如明皇應聲出響爲義方可盡不死若存之意夫影響一也影之寫形日月水火也若夫聲之出響發於野則散觸乎山則窒惟聲出於空谷則能出響於無而若有神然後知其不死若存者眞爲不妄黄帝曰形動不生形而生影聲動不生聲而生響無動不生無而生有則谷之能神信可推矣當其空也則無也及其聲之觸也則應感而能有者也有觸斯應此其不死而若存之神也玄者妙也牝者應而不倡谷之藴響待聲是不倡也苟聲不感則響之應終不出聲出則響應神妙如此是謂天地根天地生於太極太極本於無無能生有有生於無響能應聲即無能生有不謂之天地根而何故前章言無名天地之始而此言天地之根根與始一也綿綿者前響已絶後聲再觸其應如故故以若存言之谷神不亡若用而愈有似勞如實不勤動以其虚以其無虚能生實無能生有非神而何若夫養氣之說又是人推廣以爲言也吴環中曰谷神不死至用之不勤環中吴埈曰老子一書中寓僊意魂常養魄不耗散而水火交其說甚異愚聞之師曰谷神先天一氣神氣歸虚玄牝念頭動處假神托用非口鼻也玄陽也牝陰也眞陰眞陽也莊子云萬物莫不有生而莫知其根有乎出而莫知其門然天地之所從出者玄牝是已金丹大藥其要不出乎精神魂魄意神火也精水也乃眞一之精魂木也魄金也意土也五行非土不成潔意以養氣養氣以凝精凝精以姤神四象和合打成一片工夫純熟專氣致柔乆則凝結綿綿若存不可間斷用之不勤晝夜一致自然之理古僊隱顯其言體之爲陰陽擬之爲鉛汞喻之爲日月效之爲男女比之爲龍虎曰震兊曰坎離曰金砂甲庚丙壬戊己水火君臣子母嬰兒姹女刀圭金木温養主賔浮沉沐浴生殺刑德戰闘圓缺抽添文武炎凉進退斤兩等語皆玄牝上事故立象以寓言欲人之自得也只可身上討不可身外求豈不聞虚靜先生神御氣氣留形不須雜術自長生之㫖乎今學道者雖識藥材無下手處既知下手不識法度於玄牝上茫然莫知神者生之本形者神之舍神全則氣全氣全則精全精全則形全形全則神旺神旺則氣靈氣靈則神徹始與道爲一神虧則精不復精弊則魄不寧公讀書豈不曉物交物之際每膠擾於旦晝夜寐之時視聽言動之間又復來往於耳目心思之所不及此古昔上仙屏棄利欲超出物表雖是剛毅壁立萬仞然後能之苟神不能御氣氣不能固形既不能安其居又自毁壞其宅欲求一得永得之妙難矣子聞師語心悟神會笑而不言師索酒滿泛歌楚詞一章道可受兮不可傳其小無内兮其大無垠無滑而魂兮彼將自然豈氣孔神兮於中夜若虚以待之兮無爲之先一揖而去予因暇日吟三頌以自警未必邪魔果若重來向伸前說癡夢謝仙舉火本同心楊子江頭看一閧獨運之時正好看霏霏霏霏不爲難自有青銅三二百時時澆善語喉乾雨不雨風不風無疑無慮笑烘烘團欒看取丹砂地獨自開來獨自封又一詩云下手莫教遲金丹有甚疑一團和氣定火候謹差池四象纔和合靈機自可窺欲知眞妙處孤月照潭時月屋刊石潭所註道德經埈僣易附此章于谷神章後悟眞先生詩曰莫怪天機都漏泄爲縁學者太迷蒙呵呵本一庵居士曰谷神不死至用之不勤谷虚而有形谷而神則有而無也玄深而無體玄而牝則無而有也有而無所以不死無而有所以能生此亦形道之體也推其出之自曰門厚其生之本曰根首章言天地萬物而此不言萬物者有天地則有萬物根者所以生生不窮則物在其中矣人能體道於身綿綿若存則谷神玄牝亦將在我而道不可胜用矣綿綿無而非無若存有而非有不勤不勞也若曰取之左右逢其原爲耳老子之意大抵推本道妙於天天地萬物之初反之於身體而存之孟子之過化存神谷神近之釋氏之眞空妙有玄牝近之綿綿若存則釋氏之無作止任滅孟子之勿正勿忘勿助長而必有事焉者也拾遺秉文曰此章言道無爲無形生天生地自古以固存河上公曰玄牝爲口鼻養生者尚之何其小哉諸子旁證列子其言曰有生不生有化不化不生者能生生不化者能化化生者不能不生化者不能不化故常生常化常生常化者無時不生無時不化陰陽爾四時爾不生者疑獨不化者往復往復其際不可終疑獨其道不可窮黄帝書曰谷神不死是謂玄牝玄牝之門是謂天地之根綿綿若存用之不勤故生物者不生化物者不化自生自化自形自色自智自力自消自息謂之生化形色智力消息者非也石潭曰谷神不死是謂玄牝此段有兩說有以谷神爲谷虚之生響若有神者此以理言也有以谷神爲天谷之神謂吾身之神居於天谷中者此以氣言也雖若兩說其實一也何則虚中之神此道也天谷中之神亦此道也虚谷之神與吾身之神同出於道安有異哉玄牝二字有以牝爲物之所生而不見其所以生之者故以玄言蓋因列子之引黄帝書謂此爲天地之能生生者言之也有以玄牝爲吾身之玄牝者即修養家所指者是知以理言之則空谷之有響斯答寂然不動感而遂通而聲之出者常在是蓋能生而不見其所以生也故曰谷神不死是謂玄牝若以吾身之神居天谷者言之則天谷之神所以不死者以玄牝有以生之也玄牝之門是謂天地根玄牝之門是謂天地根二說不同以理言之則程泰之之說是也若以吾身之玄牝言之則有以人之二腎爲玄牝者有以二腎之間爲玄牝者有以口鼻爲玄牝者有以鼻二竅爲玄牝者要之二腎之間之說近之口鼻乃玄牝出入之門通乎天地之氣者也綿綿若存用之不勤以理言之則綿綿若存者天地之氣生生不已未嘗間斷綿綿不絶以其不絶故曰綿綿若存用之不勤以不見其迹故曰若存用之不勤者用之不勞也若以人身之玄牝言之則玄牝之門天地之氣往來乎鼻息之間使之綿綿不絶存若不存息微氣定則上通天谷下通玄牝而谷神常不死矣用之不勤者常寬舒而不當急迫勤勞也道德眞經集義卷之十一
