body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正道可道章詹秋圃曰道可道至之門道可得而名言其道此非常乆自然之道名可得而定名此非常乆可貴之名道不可以抑揚立論於是上言無能名者天地混沌之始有可名者萬物生育之母故常無欲而動心於内自足以觀其要妙常有欲而動情於外但足以觀其趣徼此兩者同出於道而微顯異名故同謂之玄玄之又玄而無不通是可以造其衆妙之門户矣道妙難名故此章内則以有名而爲生物之母以常有欲而爲觀妙之徼以同出謂玄玄之又玄而爲造妙之門夫曰母曰徼曰門豈非由精達粗由體道而達妙用也歟張沖應曰道可道至之門大道無形生育天地大道無名長養萬物人不能體此自然之道而尚經術政教之道以希榮顯利達之名所謂道者世所可得而道非長乆不可磨滅之道也所謂名者世所可得而名非遠乆不可形容之名也體其不可名之道則爲無名體其可名之道則爲有名無名則其道大猶天覆地載混然其初而人不知其覆載之原有名則道小猶萬物萌拆善善惡惡而各有所名其善惡之根是謂無名天地之始有名萬物之母也人生天地間以血肉爲軀心統五官運乎此體體道之際有能即我無欲而靜之中以觀不可道不可名之妙即有人欲而動之外以觀可道可名之徼則我得其要而知夫人之所趣徼者矣此人我有無之欲同出於此心而異其名同謂之玄也我視無欲貴之爲玄人視有欲亦貴之爲玄觀人有欲之玄反觀我無欲之玄是爲進修大道之要地斯曰衆妙之門張靈應曰無名天地之始有名萬物之母道本無名以炁化而得名炁出於無則無所可名天清地寧道從此始炁結爲有則有所可名枝葉種類各宗其母炁以化物物以寓道人也只是一物原其始守其母這便是入道處白玉蟾曰道如此而已可道非常道可說即不如此名强名曰道可名非常名謂之道已非也無此即道已名天地之始道生一即是天地之初有一生二二生三三生萬物故有名萬物之母一無生萬有萬有歸一無故常無虚心無念欲以觀其妙見物知道知道見心常有守中抱一欲以觀其徼身有生死心無生死此兩者萬有一無一無亦無無中不無同出而異名萬法歸一一心本空同謂之玄道非欲虚虚自歸一人能虚心道自歸一玄之又玄虚裏藏眞無中生有衆妙之門悟由此入用之無窮廖粹然曰道元始可道字之曰道非常道不是尋常所言道者名太上可名强名曰道非常名不是汎汎所稱名者無無極名天地之始太初肇生有太極名萬物之母動靜互根常無這柱杖子時時提挈欲以觀其妙黃中通理正位居體美在其中暢於四肢常有只這眥子多守成欲以觀其徼隳肢體黜聰明離形去智同於大道此兩者同一氣所生出而異名前三三後三三同謂之玄其歸一揆玄之又玄如是如是衆妙之門散一成萬聚萬歸一生生不窮之妙陳碧虚曰道可道非常道夫道者杳然難言非神口所能辨故心困焉不能知口辟焉不能議在人靈府之自悟爾謂之無爲自然也今標道者已是强名便屬可道旣云可道有變有遷有言有說是曰教典何異糟粕嘗試舉揚不可沈默且從訓釋曰道通也言萬物得之無所不通無所不逹亦曰道蹈也取道路以爲稱也說文曰所行道也一達謂之道先賢今人體而行之故曰道也至于仁義禮智信五常皆道之用也用則謂之可道可道旣彰即非常道常道者自然而然隨感應變擬物不窮者也不可以言傳不可以智索但體冥造化含光藏暉無爲而無不爲默通其極其嚴君平曰可道之道道德彰而非自然也又曰今之持者畫不操燭者爲日明也夫日明者不道之道常道也操燭可道之道彰也夫著於竹帛鏤於金石可傳於人者可道之道也若乃可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地者常道之道也五千文之藴發揮自此數言實謂淵之又淵神之又神也名可名非常名夫道者體也名者用也用因體生名自道出既標其名即可稱用稱用既立故曰可名可名旣著即非常名常名者謂其應用無方支離其德也嚴君平曰可名之名功名顯而非素眞也夫列子居鄭圃四十年人無識者國君卿大夫視之猶衆庶此眞守常名者也故道常無名此之謂也無名天地之始無名者指其道而言之也夫萬化未作無其强名但妙本之始既降渾淪之朴將離則易之太極生兩儀也嚴君平曰無名無朕與神合體天下恃之莫知所以變於虚無爲天地始此體道者也有名萬物之母有名者指天地而言之也天施地化茂養萬物亭之毒之如母養子故曰有名萬物之母也夫大道杳冥豈繫於有名無名哉且聖人約用立教以明本迹之同異爾凡日新之道皆曰無名是故始萬物者爲無名成萬物者爲有名也嚴君平曰有名者之爲化也尊道德貴神明師太和則天地故爲萬物母此用道者也常無欲以觀其妙常有欲以觀其徼欲者逐境生心也妙者要也又微之極也徼者邊隅也大道邊有小路曰徼又歸也夫虚無之道寂然不動則曰無欲感孕萬物則曰有欲無欲觀妙守虚無也有欲觀徼謂存思也常謂眞常即大道也無欲有欲即道之應用也夫道本無物物感道生且形而上者謂之道形而下者謂之器夫上士知微知彰睹其未然已盡其妙故曰常無欲以觀其妙中士因循任物見其群材乃得其用故有萬不同眞理難測但覘其邊微耳又解曰夫人常體大道之微守清靜之要復性命之極不爲外物所誘則志意虚憺可以觀道之要妙造微之至極嚴君平曰心如金石形如枯木默默隅隅志如駒犢者謂無欲之人復其性命之本也且有欲之人貪逐境物亡其坦夷之道但見邊小之徼迷而不反喪失眞元先賢或以謂無欲者體道内觀化及群品無所思存忘其本迹也謂有欲者從本起用施于可道立教應物成濟衆務見物所終了知歸趣斯乃前以約身爲說後以化民爲言修身治國理無不備也此兩者同此者指上事也兩者謂可道可名無名有名無欲有欲也俱藴于寂然不動湛爾之源體用未彰善惡都泯故云同也出而異者出謂從本降迹可道漸分雖起自一人之心而五常之用殊别賢愚有隔遷變萬端壽夭存亡其名各異故曰出而異名同謂之玄玄之又玄淵者深妙也冥也天也所謂天者自然也言此無名有名無欲有欲皆受氣於天禀性於自然中和濁辱形類萬狀蓋由淵之又淵神之又神所謂自然而然也若乃通悟深妙洞逹冥默者是謂有淵德者也故嚴君平曰玄之又玄此之謂歟衆妙之門謂道域也夫大道曠蕩無所制圍無門無旁四達之皇皇也約身而論出則同衆人入則爲妙本舉教言則衆眞講妙而出群聖藴妙而歸化導無方湛然惟一獨立不改是曰知常既有出入之由故曰門耳莊子曰有乎生有乎死有乎入入出而無見其形是謂天門天門者無有也萬物出乎無有斯亦謂衆妙之門也謝圖南曰道可道至常名何謂道經曰道法自然則道者自然而然非可以使然者也道本無名名之曰道者以其四通八闢可以共行如道路然孟子曰道若大路正謂此爾可道者猶曰可行也可名者猶曰可稱也天下何莫由斯道而百姓日用而不知則可道可名之中又有非常之妙存焉中庸曰夫婦之愚可以與知及其至也聖人有所不知夫婦之不肖可以與行及其至也聖人有所不能此曰非常者其亦不可知不可能者歟無名至之母未有天地先有此道而道之名未立太極旣分天地萬物自道而生有母之義而道之名始顯夫物之生雖有萬不同而爲母一也蓋嘗論之有形者有形形者有化者有化化者形者形矣而形形者未嘗形化者化矣而化化者未嘗化道之名乎後天即先天之未名者也古往今來形生氣化無有紀極是孰使之然哉惚兮恍兮其中有象寂兮寥兮獨立不改無爲而無不爲無在而無不在豈非所謂無名者乎豈非所謂非常者乎吾故曰形形者未嘗形化化者未嘗化故常無至之門道母萬物而人亦天地之一物也人本道以生則道在吾身矣故以有欲無欲反觀乎吾身之道老子此言修身之本也妙者在内也本也徼者在外也末也人之一身所恃以立者惟精與神經曰窈窈冥冥其中有精其精甚眞其中有信方其無欲則寂然不動精神混合故可觀其妙及其有欲則感而遂通精神相離故可觀其徼精生於玄玄者天也天一生水水性潤下自乾爲首而至於坎爲腎此玄實相流通也故曰同出異名由徼入妙則玄之下者復返乎上可與入衆妙之門矣桓凱曰道妙之門實崑崙之上然則當於乾爲首者求之蓋嘗論之一陰一陽之謂道自然而然者也人禀陰陽之氣以生有欲無欲亦其自然者也精神同出本乎一天自妙而徼天者人矣譬之於水天一所生其源本同自源徂流同者始異故徼者其流也妙者其源也玄之又玄則沿流以遡源而與吾之天者一矣昔黃帝西遊歸而失其玄珠使明目人離婁求之不得使罔象求而得之知黄帝之玄珠則知老氏之玄玄矣林膚齋曰道可道至之門此章居一書之首一書之大㫖皆具於此其意蓋以爲道本不容言纔涉有言皆是第二義常者不變不易之謂也可道可名則有變有易不可道不可名則無變無易有仁義禮智之名則仁者不可以爲義禮者不可以爲智有春夏秋冬之名則春者不可以爲夏秋者不可以爲冬是則非常道非常名矣天地之始太極未分之時也其在人心則寂然不動之地太極未分則安有舂夏秋冬之名寂然不動則安有仁義禮智之名故曰無名天地之始其謂之天地者非專言天地也所以爲此心之喻也旣有陰陽之名則千變萬化皆由此而出旣有仁義之名則千條萬端皆自此而始故曰有名萬物之母母者言自此而生也常無常有兩句此老子教人宄竟處處人世之間件件是有誰知此有自無而始若以爲無則又有所謂莽莽蕩蕩招殃禍之事故學道者常於無時就無上究竟則見其所以生有者之妙常於有時就有上究竟則見其自無而來之徼徼即禮記所謂竅於山川之竅也言所自出也此兩欲字有深意欲者要也要如此究竟也有與無雖爲兩者雖有異名其實同出能常無常有以觀之則皆謂之玄玄者造化之妙也以此而觀則老子之學何嘗專尚虚無若專主於無則不可兩者同出矣不曰同謂之玄矣玄之又玄衆妙之門此即莊子所謂有始也者有未始有始也者有未始有夫未始有始也者但贊言其妙而已初無别義若曰一層上又有一層則非其本㫖衆妙即易所謂妙萬物者也門言其所自出也此章人多只就天地上說不知老子之意正要就心上理會如此兼看方得此書之全意范應元曰道可道非常道道者自然之理萬物之所由也可道者謂可言也常者乆也道一而已有體用焉未有不得其體而知其用者也先體立然後用有以行老氏說經先明其體常者言其體也可道者言其用也體用一源非有二道也今夫仁義禮智可言者也皆道之用也人徒知惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也而不知其體之一則是道也分裂四出末流不勝其弊也惟先知其體之一則日用常行隨事著見無有不當皆自然之理也如是則乆而無弊矣故凡道之可以言者非常乆自然之道也夫常乆自然之道有而無形無而有精其大無外故大無不包其小無内故細無不入無不通求之於吾心之初則得之矣人物莫不由此而生聖賢莫不體此而立然此道雖周行乎事物之際相傳乎典籍之中而其妙處事物莫能雜言辯莫能及故人鮮造諸於是老子應運垂教不得已而發明之豈容離乎言哉故首曰道可道非常道意欲使人知常乆自然之道不在言辭當反求諸己而自得之於吾心之初也名可名非常名名者猶人之有名也凡名之可以名字者皆其可道者非常乆自然之道也且如萬物生來未常有名亦只是昔人與之名以分别之爾萬物有形固可以道可以名惟常乆自然之道爲萬物之母而無形故不可道不可名也無名天地之始天地之先元有此道渾淪未判孰得而名有名萬物之母渾淪既判天地人物從此而生聖人見是萬物之母而無形故强字之曰道强爲之名曰大因其無名强爲之名俾一切人假此有名探其無名以復其初也故常無欲以觀其妙常無絶句觀去聲諦視也妙微妙也常乆自然之道自古固存然而無形無聲微妙難窮故謂之常無則欲要使人以觀其微妙也惟人也由此道而生爲萬物之最靈誠能回光反視於吾身之中悟一眞體雖至虚而物無不備則道之微妙可得而觀矣如是乃知一理包乎萬殊凡物凡事不可違自然之理也常有欲以觀其徼常有絶句觀平聲徼循也境也歸也大道自然化生萬物在天則成日月星漢等之象在地則成山川草木等之形在人則成身體髮膚等之質故謂之常有則欲要使人以觀其境也惟人也中天地而立爲三才之一果能仰觀俯察於兩儀之内悟萬物形雖不同而理無不在則道之境致可得而觀矣夫如是乃知萬殊歸於一理凡物凡事固當循自然之理也此兩者至謂之玄兩者常無與常有也玄者深遠而不可分别之義蓋非無不能顯有非有不能顯無無與有同出而異名也以道爲無則萬化由之而出以道爲有則無形無聲常常不變故曰常無常有也無有之上俱著一常宇乃指其本則無有不二深遠難窮故同謂之玄也竊嘗謂有無固不足以論道然自其微妙而言不可不謂之常無自其著見而言不可謂之常有分而言之妙是微徼是顯合而言之無與有同出而異名妙徼皆一道也此老氏所以兼有無貫顯微合同異而爲言也人能如是觀之則妙與徼相通物與我渾融表裏洞然本無留礙亦無差别也玄之又玄衆妙之門常久自然之道亦不可以名言今旣强字之曰道矣且自其微妙而謂之常無又自其著見而謂之常有復自其本之有無不二深遠難窮而同謂之玄是皆不免乎言焉玄之又玄則猶云深之又深遠之又遠非無非有非異非同不知所以然而然終不可得而名言分别之也然萬化由斯而出各各具妙故曰衆妙之門老氏憫夫世人逐末忘本寖失眞源不得已而應機垂訓又恐人溺於言辭弗能内觀故復示人以深意必使反求諸己欲其自得之而入衆妙之門以復其初又能體是而行以輔萬物之自然而同歸于一也唯人爲萬物之最靈誠能反觀則是道也湛然常存夫何遠之有此章直指此心之初自然之理使不惑於有無同異得意忘言昇玄及妙乃入道之門立德之基實一經之總也宜深味之徐君約曰道可道至之門首四句言道不可以言語道說不可以名字題號但古之知道者欲因言語以示人則不得不立爲名字非其本來固有也故次四句承上而言曰無者所以名天地之始曰有者所以名萬物之母始者謂未有天地之先專言形而上之道道不可謂之無然無聲臭無形狀借此而强名之耳夫旣名之曰道矣又曰無名可乎萬物之母謂既有天地之後兼言形而下之器道非至此而後有但既麗於器則有實迹有定位對無而爲言耳若指此爲有名何者爲無名乎以名字絶句義理不通又次四句則言體道之人反求諸己先以故字發之常無欲則純是道理生而靜者也於此而觀其妙妙者微妙而不可見然謂之觀則必有昭然而不昩人所不知而已獨知者常有欲則是人心感物而動者也人自禀生賦形而後耳目口鼻四肢之欲皆有所當然而不能無於此而觀其徼徼者循也亦謂邊境盡處循其心之所欲而極其所至之境有以觀之而不至於淪陷也是道與器不相離人所以異於物處在天地間則謂之無謂之有在人之身則謂之無欲謂之有欲若併以無有字絶句却亦未當此兩者同出而異名同謂之玄其名雖異其出則同也玄者深遠之義而又結之曰玄之又玄衆妙之門者若曰是道也沖漠無朕至深至遠而動靜陰陽之機萬事萬物之變所從出也老子言道先於此章亦莫要於此章但吾聖賢語道曰無聲無臭無體而不直謂之無耳若以下章有物混成者推之彼豈直以道爲無哉言無言有意不相害知道者默而識之然後知無極而太極之言至爲精當百世以俟聖人而不惑也薛庸齋曰道可道非常道寂然不動常道也感而遂通可道也喜怒哀樂未發謂之中常道也發而皆中節謂之和可道也常道體也可道用也自誠而明體之於用也自明而誠用之於體也文玄先生曰讀老子不知體用難與入矣名可名非常名無名之名常名也有名之名可名也無名至萬物之母道本無名失天地故云始道既有名生萬物故云母常無欲至觀其徼無名有名言其道無欲有欲言乎人無欲觀其妙靜而觀其體也有欲觀其徼動而觀其用也不知體用則徼妙皆一偏也此兩者至同謂之玄自其異者視之肝膽楚越也自其同者視之萬物皆一也若使異同一致徼妙兩忘可以謂之玄矣玄也者道之本理之極也玄之又玄衆妙之門玄固難知知則猶有所待故以又玄捐去之若夫玄而不玄物我融然大同萬化皆由此而出矣休休庵曰道可道至非常名虚明湛寂無相無名空而有靈是謂眞空有而無相是謂妙有眞空妙有靈妙無窮大達者尊而稱之曰道道本無言因言顯道可以說也非尋常之道妙道也大道也妙也者大包無外細入無内無爲而普應無私無始而靈妙無竭無相而現一切相無名而立一切名大也者無極無上至尊至貴爲一氣之母是三才之祖名可名者虚明無相故無名也一氣動而清濁判二儀位而陰陽顯三才立焉萬物生焉可得而名矣非常名者妙道也大道也三才之大本也何謂大本靈妙氣清者剛在上成象曰天靈妙氣濁者柔居下成形曰地得靈明至眞中和之氣其剛柔者人也虚明靈妙在人曰心爲一身之主爲萬法之王亦曰性即命也天命之謂性者乆也無名至之母無相而極虚明有靈而無聲色一氣於其中發現是謂天地之元始三才由是而立三生萬物故有名萬物之母世界成矣萬物雖殊承恩一也大道無爲至德顯矣道體也德用也用無體不生體無用不妙無爲而有妙用者道也常無至之門老子以自利之皆普利世人曰常捨諸縁一念不生絶無所欲以觀其妙自妙至玄廓達大道儒以大道曰大本指其要曰喜怒哀樂未發謂之中中宇是寄宣此道也不可以字義倫如標月指也向一念未萌時著眼乃可悟逹釋以大道曰實相曰眞如曰如來地曰無生法忍指其要曰不思善不思惡回光自看忽然悟明三教之㫖見道一也常有欲以觀其徼者舉念之際機將發時見聞覺知中動靜施爲處返觀靈變亦可悟達所謂常無欲是無念從理入常有欲是有念從事入有念無念同出於心而名異矣同謂之玄眞心無相視之不見聽之不聞玄之又玄者極虚明而不可以智知不可以識識絶思議無譬喻眞空妙有陰陽妙此發現三才自此而立萬物自此而生三綱五常法度刑政治世語言工巧伎藝資生之業種種德行出世經書力量神通光明壽量智慧辯才玄機妙用清淨世界濁惡世界總由是而出現故曰衆妙之門褚伯秀曰道可道至之門道本至無不容稱道所可道者御世之迹道本至寂無以命之所可名者强爲之辭人非生知理籍言教因迹明心從權顯實使之進道復常而階乎玄妙也夫道寓於物混成無間此常道也道散爲物辯物制名非常道也常道如日昱乎晝光出自然而無限量可道如燭炳乎夜光出人爲而有盡也可名常名其義亦然世以不變曰常不知能變亦其常無有常而不變無有變而不常究極而言之謂大常無名即常道常名不涉形氣虚極神生是爲天地始有名即可道可名兆萌理具氣見象陳是爲萬物母天地始即道萬物母即天地也人能反觀身中天地之始而得其生生化化之主諸幻旣滅眞常猶存則無欲有欲皆不離道有欲謂最初一念善之始萌萬事萬理所從出也無欲則眞性湛然天理沖徹一塵不立鬼神莫窺者也道之精妙舍此何觀徼猶邊際指成心之初將與物接便當反照以遏其源善念亦不欲況非善乎無欲則寂然不動有欲則感而遂通體用一源機在動靜動靜多寡凡聖分焉夫妙爲道本徼爲物初生化所資不離日用妙非絶無而曠蕩也從虚化氣有一未形者是已徼非實有而充塞由靜而動幾微可測者是巳細論此理有如空虚而忽見鳶飛水靜而忽聞魚躍頓發深省開天之天飛往躍餘見聞何有聲迹雖泯而見見聞聞者未嘗泯此吾之先天太極混元祖師密傳心印也人存常心初於此觀照世念無間可入離徼而純歸乎妙則所謂欲者龜毛兔角耳徼妙同出乎道而理有精粗譬夫源泉出山潤滌灌溉善利非一清泠澄湛其本性也風日有捐恃源無窮常觀二途源可復矣玄者道之至理幽眇精微若存此見猶被法縛法尚應捨始契又玄衆妙之理悉從此出故謂之門此門無關無楗惟知道者能入焉妙雖衆而皆出於玄則衆妙一妙也一妙衆妙也造玄者知之牛妙傳曰道可道至非常名道者視之不見聽之不聞虚無自然者也出於五太之先鴻濛未始惟溟涬大梵遼廓無光莫可測也當此始云太易太易者謂未有氣也漸而云太初太初者謂氣之兆生也漸而云太始太始者謂有氣而未成質也漸而云太素太素者謂有質而未成形也漸而云太極太極者謂形質已具既極則判輕清之氣上昇爲天重濁之氣下凝爲地中和之氣爲人緒餘土苴散而爲萬物其神功妙用廣大恢洪莫可紀極太上說經無言而言故强爲之名曰道也夫道者雖有情而有性然無思而無爲可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深然其用也大得之而成大小得之而成小以言乎邇則周流秋毫而有餘焉以言乎遠則彌綸太虚而不足焉爲聲之聲爲響之響爲形之形爲影之影方者得而靜圓者得而動無適而不通無可無不可故云可道也非者無也常者定也蓋道之爲用應化多端無有常定在天爲天在地爲地在四序爲四序在五行爲五行太空不可言其無品彙不可稱爲有方而不規圓而不矩來者莫見往焉莫追乾以之高坤以之卑雲以之行雨以之施千變萬化無適而不有也老君曰道非在我萬物皆有之昔東郭子問於莊子曰道惡乎在莊子曰無往而不在東郭子曰期而後可曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶曰在瓦甓曰何其愈甚耶曰在屎溺蓋道之爲用無乎不在初無常定故云非常道也名者道也或曰道本無形何名之有然以此而言之則固有是說也以愚之所見豈得無名乎蓋太上說經以明夫道著書立言以啓迪後人不假其名將何以言之蓋名不正則言不順是以名之耳清靜經云大道無形生育天地大道無名長養萬物吾不知其名强名曰道此庸之所以云名者道也蓋本此耳可名者亦道也蓋道之用覆天載地高不可際深不可測植之則塞乎天地横之而彌於四海卷之而不盈一握舒之而幎於六合約而能張幽而能明柔而能剛弱而能强大包無外細入毫芒可久可大隨圓隨方萬物以之各得其宜取之無禁用之不竭此大道之用也蓋道之爲物無往而不在無適而不可以道名之不亦可乎故云可名者亦道也非常名者亦道也蓋道之在天地間萬於事物無有定名在四序則名春夏秋冬在四大則名火風地水於五行則名金木水火土在五常則名仁義禮智信在天文則名日月星辰在地理則名山川河海在日則名爲晝夜晦明在人則名爲視聽言動在萬物則名榮枯消長在一氣則名動靜剛柔名有不可勝數多皆道之發施初無定名故曰非常名也無名天地之始無者道之體也蓋道之爲體出於太空之先隱乎空洞之中無光無象無色無名無形無緒無音無聲玄黃未朕太樸未渾但寂兮寥兮惟恍惟惚耳所以經稱視之不見聽之不聞既云不可見聞於視聽顧非無而何耶老君曰道象無形端恍惚亡若存譬如種木未生時不見枝葉根此皆無之爲說也始者亦道也當其大易太始之時天地未根日月未光幽幽冥冥無祖無宗三色混沌乍存乍亡迨至運推數極三氣開光氣清高澄積陽成天氣結凝漬積滯成地九氣列正日月星宿陰陽五行人民品物並受生成此庸之所以謂天地之始乃道也本此說耳有名萬物之母有者道之用也蓋道之爲用從不有中有夫不有者無也無則必有有者太極是也太極判而然後有天地有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有君臣有君臣然後有上下悉自無而方有自無而有也非道而何耶故云有者道之用也母者道也何以言之易繫曰盈天地之間者萬物且如根荄而植柯葉而茂芽而萌穗而實翼而飛足而走鱗而躍喙而鳴且啄息而食且齧千態萬狀皆自道而生夫諺稱生我者父母今既云萬物之母非道而何内觀經云有以無爲母無以虚爲母虚以道爲母道者萬物之母也是非之謂歟常無欲以觀其妙常無者道之體也蓋大道之體故常於無當其混沌太無之時在上則無高天無曰月無星辰無雲霞無霧露無雷霆無風雨無霜雪不過杳杳而冥冥在下則無厚地無山川無河海無溪谷無草木無獸無禽無人無邦國不過默默而昏昏乃大道之體故云常無也妙者道之體也前所謂常無之說是也常無者謂其寂然不動也然其寂然不動之體淵微莫測藴奥難見此其所以云常無耳然夫此理人皆有之但於妄念頓除之頃默然靜坐之時心若太虚一毫無翳當此之際道即我矣我即道也豈不妙歟欲觀者謂探索其藴奥也常有欲以觀其徼常有者道之用也謂混茫分判天地裁形三光棋布於上穹五緯經躔於分度陰陽升降寒暑往來雨露霑濡風雷號令五行生剋四序推遷至如九州八紘五湖四海國王侯伯鄉社人民草木山川群類萬物常盈於天地之間皆道氣周流不息方能常有故云常有者道之用也徼者道之用也前所謂常有之說是也然則何謂常有哉如天長地乆四時行百物生未嘗有一息愆期故云常有也且人身者號小天地也頭圓象天足方象地目號日月髮爲星辰四時五行陰陽升降卉木叢林萬物皆備人能觀夫道之體道之用而行之則此身即道也道即此身矣此兩者至之玄兩者謂徼妙二字本同一箇道字上流出故立異名以彰其體用故云同謂之玄也然道之爲體雖杳冥無形然有體則必有用也如無極者乃其體也太極乃其用也體者靜也用者動也何以言之濓溪曰無極而太極太極動而生陽動極而靜靜而生陰靜極復動動極復靜一動一靜互爲其根合而言之乃道也故曰同謂之玄也玄之至之門此太上讚道之辭也玄者謂道之爲物微妙難思心困焉不能知口闢焉莫能辯竭西江之水不足以書其善窮宇宙之口不足以稱其玄難議難思至玄至妙一言以蔽故云玄之又玄也衆妙者萬物也門者理也理者道也且夫天地之間凡一物各有一理凡一理各有一門門者出入之户也孔子曰誰能出不由户何莫由斯道也世稱八萬四千門門各有其理獨此一門萬理兼該無物不備稱衆妙之門也楊智仁曰道可道至之門道者本無名字始先天而不爲始終後天而不爲終可道則非也常道者日用常行皆道也飲食衣服卧具醫藥皆道也名者天地未始無名可稱古云唤作一物即不中若可名即非謂道也名者曰天地曰日月曰陰陽曰萬物曰人曰鬼皆謂之常名也無名天地之始者乃無極也無極動而生陽靜而生陰故謂之無極謂之始也有者太極也形象備見是太極判而一生二二生三三生萬物也天無欲而四炁朗清人無欲而湛然常寂此乃返觀之妙也人若有欲者於應機接物之間無忘回光返照此兩者同出而異名者也乃曰用發生動靜之間玄妙備於斯矣莊子曰夫道者有情有性無爲無形可傳而不可受可得而不可見自本自根未有天地自古以固存神鬼神帝生天生地在太極之先而不爲高在六極之下而不爲深先天地而不爲乆長於上古而不爲老天地雖大其化均也萬物雖多其治一也人卒雖衆其主君也君厚於德而成於天故曰玄古之君天下無爲也天德而已矣以道觀言而天下之君正以道觀分而君臣之義明以道觀能而天下之君治以道汎觀而萬物之應備故通於天地者德也行於萬物者道也道德眞經集義卷之三
