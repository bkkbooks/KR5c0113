body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正天下皆知章邵若愚曰天下皆知至不去天下皆知美之者己亦傚之爲美斯惡已皆知善之者己亦倣爲善斯不善己夫何故觀有無互换之相生難易事之相成長短理之相形高下勢之相傾聲音是非之相和前後瓞瓞之相隨世人因著美善事障本心逐境以爲遂生八萬四千煩惱是以處之無心爲之無事所以能齊萬物行之治世可不言而教天下且萬物並作而聖人不以言辭分别者恐民生好惡之情於己無所與於民無事取縁以無事安民故生民不知有君之化雖爲君父而不恃功業成而不居夫惟不居於跡是以德存而不去王志然曰天下皆知至不去夫美惡善否古今對治之術通天下皆知之矣而美者有惡爲之對而善者有不善爲之對知美惡善否之所在則美者自美吾不知其美也惡者自惡吾不知其惡也況善否云乎哉善善惡惡非肆情縱欲之妄有而何且善之不善安有美之不美者焉美之爲美安有善之不善者焉鑑明則塵垢不止心明則善惡自彰而愚者反是莊子曰是非吾謂情者是也吾所謂無情者言人不以好惡内傷其身常因自然而不益生者也夫何世人每陷於對待之境不能自出其所囿不偏諸有則偏諸無不滯諸形則滯諸數故曰有無也難易也長短也高下也音聲也前後也原其所起不謂之無端由也已其必有㫖焉不立一物兹謂常無不廢一物兹謂常有故曰有無之相生嚴君平曰無難無以知其易無易無以知其難古謂先難而後獲經謂多易必多難故曰難易之相成無長無以知其短無短無以知其長御解曰若尺寸是已無高無以知其下無下無以知其高御解曰若山澤是已無聲無以知其音無音無以知其聲六律既協八音旣諧所謂音聲之相和者必矣無前無以知其後無後無以知其前春先而夏從長先而少從所謂前後之相隨者必矣之六者固不出其所位以跡觀之未始不異以道觀之未始不同曾不若聖人治天下槩以無爲之道而處之則無不治矣故曰我無爲而民自化用不言之教教之天下使民不欲以靜默而成之天下口耳之教學譊譊之說將無所開其喙故曰我好靜而民自正聖人無作作則萬物睹有所作則有所治焉生而或有則未能忘我者也爲而或恃則有所託焉者也功成或居則有所繫焉者也惟其不自作不自有不自恃不自居所以與道翱翔於萬物之上而常自若未始或去者矣黃茂材曰天下皆知至斯不善已目美於色耳美於聲口美於味天下之謂美也以此爲美豈不至於惡乎行一善行亦可謂之善矣言一善言亦可謂之善矣雖不足以進爲道然未至於爲惡故曰斯不善已天下之所謂美者不足以爲美天下之所謂善者不足以爲善然則何以爲美且善乎曰淡乎無味斯吾所謂美也處人所惡斯吾所謂善也知乎此者然後可與入道故有無相生至行不言之教有與無對故能相生難與易對故能相成長與短對故能相形高與下對故能相傾聲與音對故能相和前與後對故能相隨天下事物莫不皆然聖人與人混處其中亦豈能捨是哉然觀此理其處事也無爲而爲其行教也不言而言故能不累於物萬物作而不辭至是以不去夫盈於天地之間者無非無也其作之者誰乎其生之者誰乎其爲之者誰乎是必有主宰默運於其間道雖無名不可得而辭其名道雖無跡不可得而辭其跡故曰作而不辭若夫生而有其生之功爲而恃其爲之力其爲道也淺矣聖有體此不有不恃何功之不可成功成不居者生而不有爲而不恃之謂夫如是則與道合而爲一無適不可何用遠去於人哉程泰之曰天下皆知至斯不善矣衆所嘉尚則命以爲美事爲曲當則名以爲善美之與善固可貴矣而不可使人得而明知也我之示彼之見也我固尚之彼必效之羊質虎皮反以亂眞故天下知此之爲善爲美則遂入於不善不美也世或貴遜則必有陰請而陽辭者反假之以濟其貪也世方尚儉則又有羸服弊車自挈壺飱者是又故自菲陋以中上欲非其中心實然也若夫體道之人藏其用而不示使人由而不知則夫至德之世相愛而不知以爲仁端正而不知以爲義者是其效也正如嬰兒之慕駒犢之從不知慕從之爲孝而自與孝合者乃其孝之眞者歟老氏上乎道而言自然者皆此類也故有無至相成誠有是美誠有是善是之謂有詐焉而爲則直無耳積思累行以及美善是之謂難摸其似而放爲之則易也夫眞美不生美而生惡眞善不生善而生不善何也積思累善者難而售僞假眞者易也故表示美善以觀欲天下人從其易者爲之以益其巳之所無而衒世人之所不知其理固相因仍也長短至相傾好胜自衒之心人皆有之上之人昭昭乎揭美善以詔天下彼愧其無有知其難及是從其易者爲之以求益其所無於是恥其短之見形於長也則扶跂其卑以傾人之高此皆善否美惡轉易之本也聲音之相隨聲人聲也音樂之成文者也登歌在上而匏竹受之以爲樂均是其所以爲相和也謂其相和之先後則又常相追逐也莊子曰我固賣之彼固鬻之以此理達諸治道則不止音之和聲而已也一以傳十十以傳百前後之相隨者未已也故上之所向不可使人人知之也是以至之事凡老氏之言無爲所包甚廣而隨事指者不一其地也此之無爲主動化以言也胸中實分當否而外貌全泯形迹美者心固美之而不露其美之之意善者心亦善之而不示其善善之迹此其於作爲之地默行其意而不著其狀是謂無爲之事也夫其爲此者何也正慮夫意向外著而人得習其好以讎其僞也其曰處者立撫於此安而居之不復雜以他事也行不言之教通彼我必以言既曰教矣而無言以喻則人將何所循以爲趍耶此章之指正惡夫好尚外形而人得放而爲僞也名此事之爲美表此人之爲善形諸褒借播諸號令人從其所美所善而摹擬其似則向之眞美眞善皆將轉爲假託矣老子於是究其僞之所起而反之矣其中未嘗不存動化之機而外焉不示抑揚之則使夫游泳其間者莫知夫何者之可以中上欲也則謂道非明民將以愚之此正教焉而不言者也若夫立師資之等列分親生之先後則夫不言之教雖其默如淵而其聲如雷矣萬物作焉至功成不居作者興起而承其教也生如動而徐生之生也教孚於人而善心有萌者是其所以生之也爲者其作爲之地也功者以天下之自化自賔者而歸其傚於己也夫無爲之事不言之教其事其言非家至户到各立一則也放天地不仁之大槩四海而用一撫焉凡能興起而應其所教者歸斯受之未嘗有所却謝也善者吾善之不善者吾亦善之是之謂不辭也善心有萌其教已效而猶不肯自以爲當也是不有且不恃也及其作也生也爲也三者皆底于成則功且遂矣乃又棄而不居則若己未嘗有預也嗚呼其已大矣事之未濟也以爲己任及其已濟也不爲己功此大道之所以不肯爲德也夫惟至不去有形必終於壞有數必終於盡是凡有必趍於無也則其去安可得留也若夫功成而不居則直付之無有是在我者無盈可虧無成可壞則安得而去也春之華物是明以發生之德自居也故其華可代秋而成實是明以揫歛之事自任也故其實可落若元氣行乎四時之表生生而不自生化化而不自化則亘萬古而常然此旣無所於留彼亦無所於往也是謂自古及今其名不去以閲衆甫也論儒者恨民之難覺而老氏恨其不愚故其言曰民之難治以其智多又曰民多利器國家滋昏至其自言待之之道則曰道非明民將以愚之又曰魚不可脱於淵國之利器不可以示於人推此言也則夫力詆聖智仁義而欲棄絶其具者意不專在乎聖智仁義也其曰智慧出有大僞者是其所從立矯之本也蓋禮法之立自義堯始其立也以補結繩之簡也既病其簡故從而祖習者其勢不容不趍於繁及其繁也制度機括布滿暴白民之巧者既有所見亦有所放是上能出智以防民而民亦能放智以亂法也此老氏所爲追咎智慧之多事而欲矯之以無爲也懲明民之啓僞而欲矯之以無迹也夫川實而谷虚丘夷而淵實一彼一此旣已對立則勢不兩大故聖智仁義不容不在棄絶之域也然而聖智仁義老氏終不免取之以寓此道則其所欲棄絶者豈其實理也哉宄終觀敝而咎其播宣利器以明示民焉耳即此兩章而詳味之豈不灼其可見也哉其曰不尚賢也者非賢不肖一律也特不肯表而出之始季徹之謂危其樓觀以招致投迹者耳曰天下皆知美善之爲美善斯入於不美不善正亦默運其迹而不使至於奔趍假託焉耳至其師資兼用而高下有分動靜兩立而情生有機則雖外示兼容而中實有别也旣以兼容之公來天下又以甄别之機動人心此其法出於易之藏用而非老氏之意創也特其施置有淺深焉耳易之言曰顯諸仁藏諸用顯者有具可示之謂也藏者致用之本深密難測之謂也禮樂刑政旣已裁爲治具而猶病夫可使之由而不能使之知也則夫據總體道以制爲此具者雖欲示之亦無由可示也故易之藏用其極致遂至於入神也神云者不疾而速不行而至老氏模之以謂無爲而無不爲者是也特變其語度以自立己則焉耳學者不敢以此議易而皆用此爲老氏譏病則是否何其無定也然其施置不免小異於易者則亦不可掩蓋矣易求顯於用而不可故常恨百姓之愚而不能自同乎仁智之有見也者氏則直欲從而愚之必待其無知無欲然後與取歙張一出於我也此其異也詹秋圃曰天下皆知至不去養身一章始欲相忘於不識不知之表終欲相反相成而不自大其大以居天下之大也故曰天下皆知美之爲美善之爲善適恐好慕乖張至於爲惡爲不善已善事爲字偶對待自相生而極於相隨其反復各以類從爲消長是以聖人處無爲之事行不言之教付萬物於此作彼應而不辭讓生而不自有爲而不自恃雖及功成而弗居必且推之而不去矣蓋善養吾身者能以功成身退自處則居安資深又寧失其肩背乎張沖應曰天下皆知至不去大道惡盈而持謙也才美矣而衆美之終爲起妬名善矣而衆善之終爲起爭妬固害身爭亦害身故龐涓逞其才而中樹下之失韓信貪其名而遭雲夢之誅是皆不足以語玄道者也聖人者出不恃其才之所獨有而常懷見有爲無之心不借其功之所難成而常有見難爲易之念彼短我兮我推之以長而短爲長所覆故曰相形彼高我兮我居之以下而高爲下所抑故曰相傾彼感此應而聲音相和前行後效上下自順處之以無爲之事行之以不言之教以道律身以身闡道眞心固矣萬物作而心不亂貪心絶矣萬物生而心不有志可爲而不逞所爲功已成而不居其位子房所以赤松之遊速鍾離權所以玉洞之去忙皆此養也夫有此養則精長固氣長存神長清而身長生福德在我而不去白玉蟾曰天下皆知美之爲求爲美名美斯惡已不得美名皆知善之爲求爲善人善斯不善已反爲惡人故有無相生無必生有有必生無難易相成先難後易先易後難長短相形道本無形自相長短高下相傾天旋地轉本無高卑音聲相和一風所鳴萬籟皆應前後相隨往古即今來今即古是以聖人處無爲之事貴乎自然行不言之教道寓於物萬物作焉而不辭無必生有安得不生儻若不生安見長存生而不有無非妄幻爲而不恃今日今日而已功成而弗居豈可與夢爲實夫惟弗居忘外而不忘其内也是以不去一我自存也廖粹然曰天下皆知美之爲美人皆以色聲香味觸法喜怒愛惡哀樂欲爲强美吾知則不然夫何故哉斯惡已故好事多魔七情内攻六賊外寇一切貪欲必爲身害吾恒恬憺無爲以學道得道爲强豈不美歟皆知善之爲善亦以爲善最樂或作善功濟人利物皆是善事吾見未然何故斯不善已人非堯舜或未做好事先欲望報賄上留心或生悔吝恐未盡善吾嘗清靜定慧安心養神以守道而成功爲上善豈不樂哉故有無相生此言道德妙用難易相成造化始端長短相形器質法度高下相傾天地變通音聲相和風氣吹嘘前後相隨古今生化此皆道妙無有窮盡是以聖人太上老子得道之名或曰大上曰聖人曰有道之士曰人主曰道者曰心君曰大丈夫隨事稱也處無爲之事此是根本行不言之教太上曰默默默無限神仙從此得萬物作而不辭百姓日用而不知是吾道生而不有生化無窮爲而不恃施恩而不望報功成弗居生成萬物而不爲主夫惟弗居自愛而不自貴是以不去亘古亘今無來無去陳碧虚曰天下皆知至斯不善已天下者舉大凡而言凡在天覆之下也夫美善生於妄情凡人以情之所好爲美而情之所惡爲惡縱己妄情非惡而何以己之所是爲善而己之所非爲不善縱己是非安有美乎莊子曰是非吾所謂情也吾所謂無情者言人之不以好惡内傷其身常因自然而不益生也此謂止於實當也夫聖人豈無美善蓋有而不矜同於無也不矜則德全同無則害遠德全害遠美善盡矣若乃王者以美善化天下使天下知其美之爲美蓋未盡善也故子謂武盡美矣未盡善也經曰上德不德下德不失德也且天下善人少而不善人多若嬌其治迹竊而侮之斯爲惡已豈曰善乎嚴君平曰昭昭不常存冥冥不常然榮華扶疏始於仲舂薺麥陽物生於秋分冬至之日萬物滋滋夏至之日萬物愁悲謂其盛必有衰美必有惡陰陽尚爾況於人乎斯戒其矜誇美善者也故有無之相生至前後之相隨此六事者因矜美善動入有爲有爲既彰偏執斯起偏執則殘賊互生物失其性故結以聖人無爲而淵德不去故有無之相生者謂有無之性本不相生今言有必出於無論無必生於有故曰有無之相生難易之相成者也謂難易之法本不相成譬如陶者易於治埴必難於治木匠人易於治木必難於治埴彼此易則難就各守其工則易成故曰難易之相成也長短之相刑者謂長短之相形本不相形故見鶴則知鳧脛之短觀鳧則識鶴脛之長以此相因物皆如是故曰長短之相形也高下之相傾者謂高下之名本不相傾夫名位不足故有傾奪之心若處高而不驕貴故無下之者在下而不卑辱故無高之者若企羡交馳則遞相傾覆故曰高下之相傾也音聲之相和者謂音聲之鳴本不相和是猶天籟吹物不同使其自已也而世謂音律聲氣合成歌曲以相和鳴故曰音聲之相和也前後之相隨者謂前後之時本不相隨有如日夜相代昨夜是今日之前今日乃昨夜之後又如前後行歩之迹舉足下足何先何後遷易相隨無有窮盡故曰前後之相隨也嚴君平曰無以有亡有以無形難以易顯易以難彰寸以尺短尺以寸長山以谷摧谷以山傾音以聲别聲以音停先以後見後以先明故無无則無以見有無有則無以知无無難則無以知易無易則無以知難無長則無以知短無短則無以知長無山則無以知谷無谷則以無知山無音則無以知聲無聲則無以知音無先則無以知後無後則無以知先凡此數者天地之驗自然之符陳列暴慢然否相隨終始反覆不可别離神明不能遁陰陽不能違由此觀之帝王之事不可以有爲爲也是以聖人至行不言之教此言上古無爲之君不以美善治天下而天下自治也是以者說下以明上也無爲者非拱默閑堂也謂聖人美善都忘滅情復性自然民任其能物安其分上下無擾故云處無爲之事也行不言之教者謂以身帥導正容悟物隨時舉事因資立功理契言忘故曰行不言之教萬物作而不辭作動也聖人在宥天下無事無爲故百姓耕而食織而衣含哺而熙鼓腹而遊樂其性分而動皆善無爲之化也故聖人任之而不辭夫民可使由之而不可使知之此乃上德不德之風也生而不有至功成不居萬物自生卓然獨化不爲己有群品營爲各適其性不恃己德功成事遂道治於物心遊姑射之山不居萬民之上此聖人之全德也夫惟不居是以不去夫聖人功同造化使萬物咸得其極而忘名忘己也不居者不以寳位據爲己有故民莫覺莫知是以其道不喪其德不去也鴻烈解曰楚將子發攻蔡踰之宣王郊迎列田百頃而封之執圭子發辭不受曰治國立政諸侯入賔此君之德也發號施令師未合而敵遁此將軍之威也兵陳戰而勝敵者此庶民之力也夫乘民之功勞而取其爵禄非仁義之道也故辭而弗受故曰功成不居夫惟不居是以不去謝圖南曰天下皆知至善已聖人之治天下善政美化深入人心而人不知其爲善美之迹後世行一政施一令而人善之興一利除一害而人美之非不可也而昭昭在人耳目未必能得人之心故不知者其感深知之者其迹淺深者難窮淺者易露夫苟易露則美之於惡善之於不善特一反掌間爾下文所以及有無難易之戒其㫖深矣故有無至相隨無平不陂無往不復聖人其能必美之不爲惡善之不爲不善乎無生有有復生無難成易易復成難長短高下相形相傾反覆變易初無一定也如聲動而音和之先行而後隨之理之必然勢之必至也是以聖人至不去聖人知天下之情若是其不常也故任物理之自然事處以無爲教行以不言則曰善曰美孰得而知之物當作起不辭其責物當生育不有其利爲無不爲而不恃其能爲成無不成而不居其成功天下各適其適而聖人若無預焉然雖不居其功而天下捨聖人而何往聖人無心於天下而天下自不能無心於聖人此所以爲上古之世歟蓋嘗論之古今世變之盛衰人情物理之消長至不齊也泰之有否益之有損剥之有復蹇之有解既濟之有未濟易固言之矣而聖人通其變神其化常使民出入於不倦之中由行於不知之際此黃帝堯舜所以垂衣裳而天下治也所以不事詔而萬物成也後世縁飾以爲功矯揉以爲能矜善耀美非不動盪人之耳目而譬之剪綵以爲麗汲水以爲深生育流行之意不蓄於中其敗也可立而俟豈足以爲盡善盡美者哉林鬳齋曰天下皆知至是以不去此章即有而不居之意有美則有惡有善則有不善美而不知其美善而不知其善則無惡無不善矣蓋天下之事有有則有無有難則有易有長則有短有高則有下有音則有聲有前則有後相生相成以下六句皆喻上面美惡善不善之意故聖人以無爲而爲以不言而言何嘗以空寂爲事何嘗以多事爲畏但成功而不居耳如天地之生萬物千變萬化相尋不已何嘗辭其勞萬物之生盈於天地而天地何嘗以爲有如爲春爲夏爲生爲殺造化何嘗恃之以爲能故曰生而不有爲而不恃其意只在於功成而不居故以萬物作焉而不辭三句發明之作猶易曰坤作成物也此即舜禹有天下而不與之意自古聖人皆然何特老子夫惟不居是以不去言有其有者不能有而無其有者能有之此八字最有味書曰有其善喪厥善便是此意聲成文謂之故曰音聲相和范應元曰天下皆知至不善已已音以語助自古聖人體此道而行乎事物之間其所以全美盡善而人不知爲美善者蓋事物莫不自然各有當行之路故聖人循其自然之理行而中節不自矜伐以爲美善也儻矜之以爲美伐之以爲善使天下皆知者則必有惡與不善繼之也故有無相生至相隨此以證上文美與惡爲對善與不善爲對是以聖人至之教是以者承上接下之義聖人者純於道者也亦大而化之之稱後皆倣此處無爲之事者體道也道常無爲而無不爲聖人則虚心而應物也行不言之教者配天也天何言哉四時行焉百物生焉聖人則循理而利物無有不當斯不言之教也萬物作焉而不爲始古本王弼楊孚同古本作者動也蓋寂然不動感而遂通者道也聖人體道而立物感而後應故不爲始也生而不有至是以不去傅奕云古本皆是處字萬物之生育運爲皆由於道而道未嘗以爲己有亦未嘗自恃至於功成而未嘗以自處夫惟不以功自處是以物不違也聖人體道而立故亦如是豈有惡與不善繼之哉薛庸齋曰天下皆知至前後之相隨有美則有惡有善則有不善天下之事無非對待此六者舉一隅耳顔子所謂如有所立卓爾者其有對待乎是以聖人至之教爲而不爲者無爲之事也言而不言者無言之教也聖人以此出其對待耳萬物作而不辭至不居天地不仁以萬物爲芻狗聖人則而象之夫惟不居是以不去以其無所居而亦無所去也休休庵曰天下皆知至前後之相隨三才立萬物生光華盛名相顯世間人皆知萬物之美可以濟用以斯爲美者不知生育之恩斯謂惡矣直饒皆知造化運行生成爲善以此爲善者但見三才之德不明大道斯爲不善矣嗚呼昩道而迷德逐末而忘本日見澆漓矣惟人最靈不能返觀虚明靈妙之性具大神通能爲萬象主有無爲妙用却乃逐妄而競作有爲情識持權被五欲八風貪嗔癡愛作亂無而生有有而生無有無相生不已所爲之事有難有易難者生苦易者生樂苦樂難易互相成就事有善惡理有長短長短相形而力有高下互相傾動美惡聲音相和相雜是是非非前者未滅後者隨生孰肯猛省還其淳返其朴是以聖人處無爲之事至是以不去聖人者達大道弘至德之人也釋云斷欲去愛識心達本悟無爲法内無所得外無所求心不繫道亦不結業無念無作非修非證不歷諸位而自崇最名之曰道無爲之道統衆德爍群昏應機濟事扶顛持危有自然之妙如舂行萬國風行太虚大達者不尚有作之功任無爲之道以自然之德等及世間不言而人自化修身齊家治國平天下不可須臾離乎道以道爲體者德合天地高明博厚萬物並作而不辭生育萬物而無我爲萬象主而不恃其尊大功成而不居其位夫惟不居大功不宰者無失也無榮辱絶是非也去者失也褚伯秀曰天下皆知至是以不去外而在物有可美可善人共知而樂趍之内而在己有眞美眞善人罕知而弗究也可美可善出於人欲有時而不美善矣眞美眞善根於天理亘古今而至美善也世所謂美惡善否皆屬妄情彼是此非敦得其正生於後之六對滋蔓無窮有無陰陽消長之類難易事爲成敗之類鶴長然後見鳧短山高然後見澤下聲出而音有屬春先而夏繼之相生相成者猶不能終保美善況相形相傾乎聖人推原救弊以身率之無爲而事自成不言而教自立民樂其俗物遂其性耕鑿播種物之作也我不拒之育養滋息物之生也我不有之任物自爲有不得不爲者何恃於我哉惟其有功不居是以功不可去莊子云我忘天下易使天下兼忘我難信哉或議此章繼道名無有之後何遽及美惡六對之繁雜蓋有道斯有物有物斯有名所謂無者隱矣美惡則物名事爲之迹著而六對不免焉聖人不違物性聽其流行起伏於理或背從而整治之因病施藥各使之瘳病去藥除聖人之心亦虚而已何善惡六對之能免哉牛妙傳曰天下皆知至斯不善矣美者好也善者亦好也惡與不善皆言不好也且如世間一件好事定是變做不好此吉中藏凶安中有危禍福倚伏之機也夫美莫美於事君事君數則辱矣善莫善於朋友朋友數則疏矣抱朴子曰組帳霧合羅幬雲離掇芳華於蘭林之囿弄紅蘤於積珠之池入冥八門之焜耀出驅朱輪之華儀然樂極則哀集至盈必有虧此美惡相縁之事天下之人皆知此理也故有無之相生從不有中有是無中生有不無中無是有生於無有無相生互爲其用此理之然也人常迷惑有無故不知道且夫形動不生形而生影聲動不生聲而生響無動不生無而生有有生而復於無生有形而復於無形不生者非本不生者也無形者非本無形者也生者理之必終者也終者不得不終亦如生者不得不生此皆有無相生之說也難易之相成夫難者易之門易者難之因且天下之事難難易易相倚爲用如有難的一件事若孜孜爲之雖難必成豈非易耶若以易心臨之則其爲難矣古語有云世上無難事只怕有心人又曰有心射山山須透無心射紙紙難穿洞賔曰難難十石芝麻樹上攤易易渾似和衣一覺睡老君曰天下之難事必作於易天下之大事必作於細是以聖人猶難之故終無難此難易相成之說也長短之相形夫物之不齊物之情也是故無長不别短無短不顯長長短之勢相形方别且鶴脛雖長斷之則悲鳧脛雖短續之則憂古人有言曰青松高百尺緑穗低數寸同生大塊間長短各有分如人之才性亦各有長短然各長其長各短其短則鳶飛魚躍各得其所自無長短之非也若稍有片善寸長自以爲能則長短必相形而隨之也非斯之謂歟高下之相傾夫高者尊也下者卑也雖尊卑之禮固有定在然高而不謙尊卑而不安分則相傾之勢由是而生也蓋貴以賤爲本高以下爲基若好高而不爲高則不高矣古語有云墻高耶雨剥而頽之淵卑耶水就而歸之諺曰岸上沙今人擔土舊人家陌上路今人來往昔人墓由是觀之海水桑田之變固有之矣此高下相傾之勢也若以勢而言之則如王公之子歸庶人庶人之子爲王公揚子雲曰朝得權爲卿相夕失勢爲匹夫此皆高下相傾之說也聲音之相和聲者鳴也鳴則有音音必有響響則必應故云音聲相和也且雷霆有聲不動不聞鍾鼓有音不擊不鳴詩云嚶其鳴矣猶求友聲易曰鳴鶴在陰其子和之此聲響之相隨猶形之於影自然而並生俱出而俱没也夫音者本無待於聲也聲發而響隨之耳如人言凶則氣麤聲和則氣悦愛人者人常愛之敬人者人常敬之未嘗不由己出其猶音響之於鳴聲此固然之理也前後之相隨夫身行於前影必隨之後陽唱於前陰必和於後此影形相逐陰陽相和前後相隨此則必然之理也孔叢子曰前譬之古也後譬之今也古今相繼猶前後之相隨初無間然也澄明子曰前者始條理也後者終條理也未聞有前而無後也亦未見有始而無終也前後一理也始終一貫也不由於前而至於後者天下無之此大修行人初以無爲居其前無不爲必繼之於後此自然之道也是以聖人處無爲之事聖人者天下之至人也而曰處無爲之事者何哉夫無爲者簡易也蓋聖人者德並二儀故參乾坤之理而從於簡易也何以知之易曰乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可乆有功則可大可乆則賢人之德可大則賢人之業易簡而天下之理得矣此聖人之所以處無爲之事也行不言之教夫不言者忘言也蓋忘言之中至理存焉謂天下之理盡在不言之中故聖人得其奥理默而行之故云行不言之教也然夫不言之教謂天道也蓋天道不言而善應也孔子曰天何言哉四時行焉百物生焉天何言哉是以聖人觀天之道執天之行故云行不言之教也易曰天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之夫神物變化吉凶圖書亦未嘗有言也而聖人則效法象斯非行不言之教之謂歟萬物作而不辭夫作者言萬物生成之稱也不辭者謙不自矜也中庸曰大哉聖人之道洋洋乎峻極于天易曰聖人作而萬物睹然未嘗聞聖人自以稱能也如昔者仲尼祖述堯舜憲章文武上律天時下襲水土如天地之無不持載無不覆幬如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敦化是以門人弟子有曰夫子聖者歟何其多能也孔子曰聖則吾不能此謙稱不辭之謂也生而不有夫生者仁之稱也何以言之易不云生生不息之謂仁不有者不自有其仁也先儒曰可使天下被聖人之仁不可使天下知聖人之仁被聖人之仁而知聖人之仁則仁之小者也有方而可議也被聖人之仁而不知聖人之仁則仁之大者也無迹而名也此聖人生而不有之說也爲而不恃夫聖人者多才多藝者也而未嘗自以爲能故云爲而不恃也昔陽子居問聖人之治老子曰聖人之治功蓋天下而似不自己化貸萬物而民弗恃有莫舉名使物自喜立乎不測而游乎無有此爲而不恃之說也非斯之義歟功成不居至是以不去不居者不自伐其功也不去者謂其名不去也又云不居者身退也蓋功成身退則其德乃長其名乃彰故云不去也經曰功成名遂身退天之道是也如昔者禹平水土有功舜以天下襌禹禹讓舜之子商均避於陽城是功成不居也而天下之民從是其名不去也非斯之謂乎喻清中曰天下皆知至是以不去美在己不在人善在己不在人今夫積一美而欲使天下之人皆知之則非美已行一善而欲使天下之人皆知之則非善已天下之事有者無之對難者易之對長者短之對高者下之對其相生相成相形相傾猶響之應聲影之隨形聖人一普之以無心而已其事也無爲其教也不言猶之天焉作成萬物而不辭其勞有生之用無生之迹有爲之實忘爲之力吾夫子曰惟天爲大惟堯則之蕩蕩乎民無能名焉聖人之所以法天者功成而不居其功極其至也善積而名顯德彰而身尊我不求名而名自隨雖欲去之如之何去之鬳齋所謂有其有者不能有無其有者能有之可謂說著痛快處去字讀如君子去仁之去先儒謂爲善而避名則天下無可爲之事聖人有心於爲善無心於得名而名之終不可得而去者猶音聲之相和形影之相隨耳合首尾而並觀則一章大㫖脉絡聯屬末復提起兩語曰夫惟弗居是以不去非特作文之妙處而教人之意可謂深切著明也矣胥六虚曰天下皆知至前後之相隨夫福爲禍本吉乃凶源自然之理也人莫之能知故聖人慈憫世之不悟告之曰天下皆知其美善而趨之樂之而不知其惡與不善由此而生也是理也猶有無之相生難易之相成長短之相形高下之相傾音聲之相和前後之相隨自古迄今事事物物皆有反對如環無端若夫超然獨立而無對者其惟聖人乎是以聖人處無爲之事至是以不去是以聖人獨立而無與之反對者蓋其處無爲之事行不言之教也無爲之事非不爲也謂順物自然因而不作感而遂通耳行不言之教非緘默而已謂至誠内修忠信外施天下從之無事辭費也若然者雖日應萬機和而不倡所以不辭勞故曰作而不辭也天下之民生者由其自養而己無所與故曰生而不有也立事建功循其分内爲其當然不恃爲己能故曰爲而不恃也至於功成事遂即退身避位故曰功成不居也夫惟如此法以天道其身全其功存是以千萬世稱譽而不絶矣故曰是以不去拾遺肇曰有無相生其猶有高必有下然則有無雖殊俱未免於有也此乃言象之所以形故借出有無之表者以祛之光曰此六對者物之所以不齊惟喪耦者能同之諸子旁證文子曰老子云道可以弱可以彊可以柔可以剛可以陰可以陽可以幽可以明可以包裹天地可以應待無方知之淺不知之深知之外不知之内知之麤不知之精知之乃不知不知乃知之孰知知之爲不知不知之爲知乎夫道不可聞聞而非也道不可見見而非也道不可言言而非也孰知形之不形者乎故天下皆知善之爲善也斯不善矣知者不言言者不知石潭曰天下皆知美之爲美斯惡已皆知善之爲善斯不善矣故有無相生難易相成長短相形高下相傾音聲相和前後相隨美惡善不善有無難易長短高下皆對待言其無常名也有美則與惡對有善則有不善對故曰天下皆知美之爲美斯惡已皆知善之爲善斯不善矣至於有有則有無對有難則有易對有長則有短對有高則有下對所以相生相成相形相傾也然此皆相反者至於聲音前後非甚相反而併及之何哉蓋言彼之相生相成相形相傾者亦如聲音之相和前後之相隨必然之理也此又以其不相反者形容其必相反也是以聖人處無爲之事行不言之教無爲不言皆所以體夫道之無名者也有名則有爲有言道既無名何待於言且爲乎是以岀於美惡善不善之外夫惟無爲不言也美尚不得而名況惡乎善尚不得而名況不善乎萬物作焉而不辭生而不有爲而不恃功成而弗居萬物作而吾亦不辭聽其作也生而不有我雖生之而未嘗以爲我有以生之也爲而不恃我以無爲而爲而未嘗恃其有所爲也功成弗居雖生之爲之不可謂無功而不居其功也如此則吾雖美而人不知其爲美吾雖善而人不知其爲善矣夫惟弗居是以不去有居則有去我自居以美美名去則爲惡矣我自居以善善名去則爲不善矣惟處無爲之事行不言之教作而不辭生而不有爲而不恃功成而不居是以其名不去也其名不去則吾之名矣此段乃申上無名之義道德眞經集義卷之六
