body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正三十輻章考異河上公作無用章趙實庵作隱顯玄彰義章也唐明皇疏前章明養神愛氣不雜故無疵此章明利有用無相資而功立故乾坤爲大易之韜轅厢成用無之質標器室以爲喻存利用之結成爾杜光庭曰愛氣養神則尚乎清靜用無利有則在彼相資資取也車器室三者皆假其有而取其無以爲用也車以運載器以盛受室以居止心資外有而用中無故能成有用之功爾乾坤爲大易之藴者易繫辭也明易之所立本乎乾坤乾坤不存則易道無由起故云乾坤是易道藴積之根源與易爲川府奥藏也故下文云乾坤成列而易立乎其中矣乾坤毁則無以見易也亦猶輪轂轅厢爲車之質轅厢毁則無以見車將明利用之因故舉三物之喻理國者民存則有國民散則國危理身者神存則有生神逝則身滅利用之道實相資也張沖應曰無者虚也炁非虚則不能運用而化爲神故曰無用三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用河上公曰三十輻共一轂古者卓三十輻法月數也共一轂者轂中有孔故衆輻共凑之治身者當除情去欲使五臟空虚神乃歸之也治國者寡能總衆弱共使强當其無有車之用無謂空虚轂中空虚車得去行轝中空虚人能載其上也埏埴以爲器埏和也埴土也和土以爲飲食之器當其無有器之用器中空虚故得有所盛受鑿户牖以爲室謂作屋室當其無有室之用言户牖空虚人得以出入觀視室中空虚人得以居處是其用故有之以爲利利物也利於形用器中有物室中有人恐其屋破壞腹中有神畏形之消亡也無之以爲用言虚空者乃可用盛受萬物故曰虚無能制有形道者空也王輔嗣曰三十輻至卓之用轂所以能統三十輻者無也以其無能受物之故故能以實統衆也埏埴以爲器至無之以爲用木埴壁所以成三者而皆以無爲用也言無者有之所以爲利皆賴無以爲用也唐明皇曰三十輻至車之用此有無功用相資而立三十輻者明造車共一轂因言少總衆夫轅厢之有共則成車車中空無乃可連用若無轅厢之有亦無所用之車車中若不空無則轅厢之有皆爲棄物矣疏輻三十貫於一轂明少者多之所宗也當其空無方有車之運用明無者有之所利也夫道者何至無至一者也故能動植衆類磅礴羣材適使萬殊區分成之者一象也衆竅互作鼓之者一響則原天下之動用本天下之生成未始離於至無至一者也且就車而論則轅厢有質卓中空無也車中空無乃可運用若無轅厢之有則空無之運用息矣車中若不空無則轅厢之數皆爲棄物矣故乾坤成而易功著萬化流通而道用彰是以借麤喻之用無明至無之利有埏埴以爲器當其無有器之用埏和也埴土也陶匠和土爲瓦𦈢之器也疏埏和也埴黏土也注云陶匠者尚書云範土曰陶此云陶匠範和黏土燒成瓦器亦取其中空虚以用盛受物也鑿户牖至有室之用古者陶穴以爲室宇亦開户牖故云鑿爾疏鑿穿也門傍窗謂之牖古者穴居故詩云陶復陶穴謂穿鑿穴中之土以復覆其上故云鑿爾後代聖人易之以宫室取其室中空虚所以人得居處莊子曰室無空則婦姑勃蹊謂爭路也爾雅宫之之室故有之以爲利無之以爲用有體利無以無爲利無體用有以有爲用且形而上者曰道形而下者曰器將明至道之用約形質以彰故借麤有之利無以明妙無之用有爾疏有之所利利於用用必資無故有以無爲利也無之所用用於體體必資有故無以有爲用也形而上者曰道形而下者曰器者易繫辭文也疏自無則稱道涉有則稱器欲明道用必約形器以彰雖借喻於三翻終用無於一致爾杜光庭曰三十輻至車之用轂總衆輻以成輪車總衆材以成用其所用者用車之中空無之所爾向無輪轂不得成車今得成車又虚中而運載以喻人君内資輔相之謀外委諸侯之助乃能有國如三十輻之凑一轂也既有國矣能虚心體道則天下化成如車中之空也人之身也外資百體之設内仗五氣之和如輻之凑而成於人既爲身矣能虚心體道則元和潜運而致長生矣此明有無利用互得相資也道之眞一無色無聲衆類羣材資之以立動者五靈毛羽鱗甲羽蟲之屬也植者草木之屬也類者狀也材者質也動植材類億萬不同是萬殊也物雖萬殊而長養生成者道也道唯一象爾經曰恍惚中有象即此眞精淳一生化萬殊之物可謂少者多之所宗也衆竅者莊子齊物篇南郭子綦謂子游曰夫大塊噫氣其名爲風是唯無作作則萬竅怒號大木百圍之竅穴似鼻似口似耳似枅激者謞者叱者吸者叫者譹者冷風則小和飄風則大和然則衆竅之聲大小萬殊所鼓之者一風而已矣觀天下之動用者易繫曰聖人有以見天下之動者言聖人有其微妙以見天下萬物動用明天下萬物生成皆禀於淳一微妙之道故云未始離於至無至一者也此覆釋乾坤成而易立乎其中喻轅厢之有以成車中之空無也萬化流通皆禀道用若無萬化道用不彰亦猶轅厢爲車之用乾坤爲易之藴也車者常器人所見焉假此爲喻以喻妙道故云麤喻也埏埴以爲器當其無有器之用和土爲器亦彰因有而用無凡曰器用其形萬殊大小不同方圓各異或巧或拙或賤或珍而其所用皆用器中空無之處爾範土曰陶者尚書之詞也舜側微之時耕於歷山陶於河濱是也列仙傳云陶公與弟子師門皆古之陶者善化五色之火而昇天矣鑿户牖至有室之用未有居室陶其土而復之陶其壤而穴之父子夫婦居謂之家未有寢廟亦未有家室也復者復於地上鑿地曰穴皆如陶焉陶者今之瓦窑也易繫曰上古穴居而野處後代聖人易之以宫室蓋取諸大壯以制造宫室大壯於穴居野處之時故云大壯易言上古者言未造宫宇之前止是夏巢冬穴故制室宇以代之非是後物以替前物故云上古乃在伏羲黄帝之間也莊子盜跖謂夫子上古之人夏栖木上冬拾橡栗是也巢穴之中取其空而可居今宫室所制亦取其中空而居之故云當其無有室之用婦姑勃蹊者蹊路徑也勃戾怒也莊子外物篇所云言室中不空蹊路湫隘則婦姑爭路而行婦合順於姑以爲孝敬今乃爭路忿怒是室中隘狹無所往來以容其私則反戾而闘爭也此謂室隘狹不空則婦姑爭路心壅蔽不虚則嗜欲交侵爾雅曰宫謂之室室謂之宫大小異制也今則禮有降殺聖人所居爲宫通衆所居爲家宅屋宇堂室等也論語皇偘疏云堂之内隔爲内外分爲房室故孔子弟子有升堂者有入室者則堂爲通稱室在堂内復爲分别矣故有之以爲利無之以爲用夫道之無也資有以彰其功無此有則道功不彰矣物之有也資道以禀其質無此道則物不生矣物非道不能生成道非物不顯功用亦猶卓器室三者皆取其因無以利有因有以用無也形而上者道之本清虚無爲處乎上也形而下者道之用禀質流形處乎下也顯道之用以形於物物禀有質故謂之器器者有形之類也聖人法道之用制以爲器畫卦觀象制以文字刳木爲舟剡木爲檝斷木爲杵掘地爲臼弦木爲弧剡木爲矢制爲宫室結爲網罟服牛乘馬負重致遠鑄金爲兵揭竿爲旗斲木爲耜揉木爲耒一事以上以利天下此皆分道之用以爲器物爾皆易繫所稱此乃道是無體之名形是有質之用凡萬物從無而生衆形由道而立先道而後形道在形之上形在道之下故自形而上謂之道自形而下謂之器形雖處道器兩畔之際形在器上不在道也既有形質可爲器用故云形而下者謂之器夫道者無也形者有也有故有極無故長存世人修道當外固其形以寳其有内存其神以宗其無漸契妙無然合於道可以長生爾至一至無道也有象有形器也約器明道復借喻於車器室等謂三翻也其用於無皆一揆耳聖人之理天下也懸賞罰制法度垂教令明上下此皆有也若其端默爲政沖靜率人不言兹化萬物自理雖有賞罰之利制度之設教令之行上下之别而不用之亦可謂假其有而用其無也斯至理也修身之道因經而悟理因悟而忘言了達妙門不執言教亦此義歟宋道君曰三十輻至有室之用有無一致利用出入是謂至神有無異相在有爲體在無爲用陰陽之連萬物之理也車之用在運器之用在盛室之用在虚妙用出於至無變化藏於不累如鑑無象因物顯照至人用心每解乎此故有之以爲利無之以爲用有則實無則虚實故能具貌象聲色而有質虚故能連量酬酢而不窮天地之間道以器顯故無不廢有器以道妙故有必歸無木撓而水潤火燁而金堅土均而布稼穡出焉此有也而人賴之以爲利天之所以連地之所以處四時之所以行百物之所以昌孰尸之者此無也而世莫觀其迹故有用不匱有無之相生老氏於此三者推而明之王介甫曰三十輻共一轂至無之以爲用道有本末本者萬物之所生也末者萬物之所以成也本者出之自然不假乎人之力而萬物之所生也末者涉乎形器故待人力而後萬物以成也夫其不假人之力而萬物以生則是人可以無言也無爲也至乎有待乎人力而萬物以成則是聖人之所以不能無言也無爲也故昔之聖人之在上而萬物爲己任者必四術焉禮樂刑政是也所以成萬物者也故聖人惟務修其成萬物者不言其生萬物者蓋生尸之自然非人力之所得與矣老子者獨不然以爲涉乎形器者皆不足言也不足爲也故大抵去禮樂刑政而惟道之稱焉是不察於理而務高之過也夫道之自然者又何預乎惟其涉形器是以必待於人之言也人之爲也其書曰三十輻共一轂當其無有車之用夫轂輻之用故在於車之無用然工之斲削未嘗及於無者蓋無出於自然人之力可以無與也今之治車者知治其轂輻而未嘗及於無也然而車以成者蓋轂輻具則亦必爲用矣如其知無之爲用而不治轂輻固已疏矣今知無之爲車用無之爲天下用然不知所以爲用也故無之所以爲車用者以其有轂輻也無之所以爲天下者以有禮樂刑政也如其廢轂輻於車廢禮樂刑政於天下而坐求無之爲用也則近於愚矣蘇潁濱曰三十輻共一轂至無之以爲用竭智盡物以爲器而器之用常在無有中非有則無無以致其用非無則有有以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之爲一而不可分則至矣吕吉甫曰三十輻共一轂至無之以爲用三十輻共一轂當其無有車之用車吾所乘也埏填以爲器當其無有器之用器吾所用也鑿户牖以爲室當其無有室之用室吾所居也乘則觀乎車用則觀乎器居則觀乎室其用未嘗不在於無其則不遠矣至於身則不知吾之所以用者何邪故有之以爲利無之以爲用有有之以爲用無無之以爲利則所謂利者亦廢而不用矣有無之爲用而無有之以爲利則所謂用者亦害而不利矣是故聖人入而未嘗有物也所以爲無之之用出而未嘗無物也所以爲有之之利故曰精義入神以致用也利用安身以崇德也陸農師曰三十輻共一轂至無之以爲用有無相用不可以一偏故無無則不足以用有無有則不足以見無以有爲利則或至於止以無爲用則用常至於無窮王元澤曰三十輻共一轂至無之以爲用凡此三物或運轉或貯盛或居處而皆以無有爲用無非有對因有有無於無之中復有妙有不窮之用妙有之功若大有物之有具存形質非能應於不窮者也故因爲利利陰屬也雖然此有無之論耳極而言之則無不離有有亦眞無非有非無乃眞妙有也劉仲平曰三十輻共一轂至無之以爲用有之以爲利無之以爲用聖人之於天下也亦然觀其所有之利然後可以知其所無之用劉巨濟曰三十輻共一轂至無之以爲用轂利轉輻直指相與爲輪者也三十輻以象月埏和也埴摶也陶人和土摶器而後火之車器室皆以有爲利者也而車之利有無室之利有大惟器之利有雖寡且少然而非假有則不成蓋凡利有者無多寡無小大無不出於有故也三十輻共一轂特爲輪而已其利多如此而蓋軫輈尚不在焉故周官曰一器而二聚者車爲多古者穴土爲居鑿户以出入鑿牖以通爲君臣父子宗廟朝廷寢處之制皆以隱於成則利有亦大矣故易曰後世聖人易之以棟宇蓋取諸大壯器則瓦缻甑之類是也而又其間寡有所尚數有所滋圓有規方有矩曲有鉤直有繩莫非利有也而其用則主空無而已老氏歷陳是言者以明無雖假有以彰其用不可去無以獨利故有之體壞而無之性存利用之爲言合則一離則二蓋用有利有不利而以利用爲善此合則一也車之利在輪器之利在埏埴室之用在户牖而其用皆在於空無此離則二也孟子曰故者以利爲本禹之行水也行其所無事而已無之爲用於斯見矣前章言玄德而玄德相於無故次之以三十輻共一轂劉驥曰三十輻共一轂至無之以爲用扁鵲言人身中有五臟眞氣之所會五臟各有六氣故有五六三十之會原猶車之三十輻也流轉不息通於一樞猶三十輻之共一轂也聖人知變化之樞機假有爲之形體以身爲爐三宫爲鼎造化於虚無恍惚之中如所乘之車所用之器所居之室在有爲體在無爲用故有之以爲利無之以爲用世之昩者唯聞捨身之道未達即身之妙此老氏所以引車器室而詳喻之也是猶乾坤成列而易立乎其中乾坤毁則無以見易形體毁則無以保神所以貴乎形神俱妙也聖人假有爲之體鍊無爲之神自有入無以假就眞爾豈直以形色名聲爲足以得彼之情哉故次之以五色也趙實庵曰初示無用爲用祖三一申乾坤往復三十輻共一轂當其無有車之用道以虚而爲用未見用之功因實而方顯物以實而爲體未見虚之之利取虚以爲容一體一用互相發明一有一無方能顯著大率無用之用道理昭然無功之功道妙莫測乃知實不爲用虚則理通假三物以露機試二端而窺測一者丹准月法進退三十日而剥復自然矣一爲轂一雖有而不用三十爲輻一月之數咸周此則以虚運有非轂則輻無所安猶之以道御時非日則月不生體陰虚待實借晦朔以成明陽實函虚養蟾蜍而孕魄此修丹者取乾坤往復明有無之利然爾故道本無象而丹生自然引轂輻彰五六之宗陳有無爲利用之本是知道者虚而應萬物之用實則礙而不通故明無之以爲利有之以爲用輻與轂車之成體也輻之用在轂虚以運物若使轂實輻孰安焉又云車上屋也當其無者謂轂之虚處也以輻實空卓斯用矣至于運載不已則車之利始存焉是以有者爲利無者爲用二指以埏埴埏埴以爲器當其無有器之用埏埴者埏和土埴黏土爲器也今瓶盎之類是也取其虚中以爲用可用則器之利也天地以虚無而生萬物大道以虚無而函天地人以虚心而應萬有埏埴以虚中而受諸物則知埏埴爲有之利虚中爲無之用前舉轂輻之義已明再申埏埴而曉蓋有無體用全道之功其義淵微未易通矣此實性與天道者也故又舉之以次户牖三指以户牖鑿户牖以爲室堂其無有室之用障所以礙明虚故能容物凡以取其虚中爲用也半門爲户交木爲牖户以開閉爲功牖以竇明爲用户牖不鑿堂室奚存去礙者以爲虚室取虚處以爲起居故户牖爲利室爲用蓋户牖有可室之用因之然後能成然非止此三者取虚爲用物物亦然谷以虚故應管籥以虚故聲器皿以虚故容舟船以空故載太上指此三者餘可例之後明有無之用故有之以爲利無之以爲用以器顯道道即明於器中以無爲用用即非於實處然器不可毁毁器則用不可明託物顯言非物則言無所寄是以車虚成運載之功取乾健能生萬物者如之埏埴有虚中之用取坤虚而受萬物者如之户牖有堂室之用比心虚而供萬事之求者如之則知無自有成道因器顯孰謂虚無無用不知終日之用在無止謂形迹爲眞不知形迹之用爲蔽莊子曰空虚不毁萬物爲實利用雙明繫辭曰乾坤毁則無以見易虚實通照然後知樞始得其環中以應無窮者也邵若愚曰三十輻共一轂至無之以爲用老子以車器室明物理有無利用藉有之以爲利便於無之中乃見妙有不窮之用且如車今之十八古之三十輻共凑一轂爲輪藉輪爲有形之利當其無中妙有在於運轉故知無者爲車之用也埏埴摶以爲器藉器爲有形之利當其無中妙用在於盛貯乃知無者爲器之用也古之穴土爲居鑿户而出入爲牖以視外然後君臣父子宗廟寢筵之制以爲室藉室爲有形之利當其無中妙有在於居處乃知無者爲室之用也故見有之以爲利便無之以爲妙用是以藉幻身爲利以無心之心爲用使學人體無理有無而道之利用王志然曰三十輻共一轂至無之以爲用夫人之有生寓形宇内日用之急務有身之所欲斷不可無者有三曰卓馬曰器具曰室居有之以爲利無之以爲用利用稍不得其所安反爲有身之大患也决矣人不能知之者必先揣己之合宜然後從事之可否且車之爲用上自天子下至庶人盍各有分天子之卓必曰萬乘諸侯曰千乘卿大夫曰百乘而庶人不過疋馬單車而已少則不爲不多多則必出乎僣更加飾之雕鞍綉勒而不謂之詭譎亂常而何所以古人尚其質樸乘騎步趨亦必有禮故夫子步亦步夫子趨亦趨君子終日行不離輜重者是也或秣馬脂車似亦嫌其過分馳騁失吾聖人執古御今純素之道至有出爲畋獵携輪折軸終焉不及之繆豈其宜哉若夫埏埴者則範坯黏土陶器之屬是已古人適得則用用已弃之初無愛吝終無厭弃之私民用飲食亦足自樂豈知器具所以美惡如何哉近古以降所尚特異貴富逸豫世無與匹猶晞不貴難得之貨以資口體之適曾莫之知至有自盈傾覆之禍無他焉所失者衽席之上飲食之間戒之失漸矣經曰鑿户牖以爲室以此則上古巢居穴處之謂初避寒暑庇風雨而已而帝堯土階三尺茅茨不剪民則安其居樂其俗天下大治焉五霸與古相去幾何則其雕梁峻宇棟宇橈雲猶狹其所居耻其未盛土木之功赭堊之色無遺巧焉五府爲之虚恬不自覺良由不能以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下不鞭其後之過歟於戲人皆知有用之用而莫知無用之用有之與無虚實相假虚則莫睹其跡跡則因有而有之以無爲論豈知夫跡之所以跡哉故老子推此三者以明有無利用之極致車則善載器則善盛室則善藏設爲形器無非有也失之於無則不能爲用失之於有則不能爲利所以無之與有利之與用雖古大聖人亦取法焉學者不可自蔽者也程泰之曰三十輻共一轂至無之以爲用運藏者車之功用也輻轂皆具然後可以運載則車無輻轂其功用遂無託以自見也然而審求其理則夫碾地發軵者常在體質皆無之外則是車之功用常屬乎無而不屬乎有矣器之可盛也室之可居也用不著乎有而皆出於無其理一也故老氏借而言之以見無之可貴蓋如此也是故造車者必先營致輻轂以爲之資而期其功用在輻轂皆無之地也其曰有之者求以致之也其曰無之者則求以去之也此意蓋喻道學益損而寄其理於體質虚實之間而已也論世之疑老者爲其徒乎無具决不可以治也不知老氏之無蓋欲超乎有以用有而非表裏初終一皆空空也詳在意總臨川王氏之語曰治車者知治其輻轂而未嘗及無也然輻轂具而無必爲用矣如其廢輻轂於車廢禮樂刑政於天下而求其無之爲用則亦近乎愚矣此誤認老意也老氏之論欲致禮法以爲利而超禮法以致用其謂有之無之猶曰益之損之也益之者求以致其所未有也損之者求以化其所已有也此其推車理而致之人事者也方其求有此有即是積信善以充諸己而使之實且大者是也及其求無此有即是取其充實者而損之期其迹泯而用存也有之無之云者夫人致力之地也而王氏之論遂即有無而命其成則是老子不知無輪之車不可推挽也蓋老語離隱難曉雖王氏最嗜其書而猶不免徇言失意也西晋之禍正出此耳彼信老氏矯語而蕩蔑禮法以自附於絶仁棄義之域聞老氏之貴無爲也遂欲不設輻轂而冀車之自行也抑不知矯語之中常存正道無爲之中更有無不爲者在焉特將出輻轂以用其無而未嘗舍輻轂而不資其有也老教之效於治也自漢始也曹參之相孝思文帝之紹高帝以清靜而致寧一以元默而致醇厚則雖未能化有爲無而亦可謂能超形器以集虚者矣而其清靜元默又非付天下於不爲也高帝之創垂在焉蕭何之制作在焉則輻轂之所從具者固已有素故曹參文帝得資其利以爲已用欲靜則可靜欲默則可默也若元無高帝之法蕭何之規而一切付之不屑則西晋已黄茂材曰三十輻至無之以爲用有有中之有有無中之有無中之有其用無窮有中之有其利甚博輻轂以爲車埏埴以爲器户牖以爲室此則有中之有民之賴其利也博矣雖無車而有車之用雖無器而有器之用雖無室而有室之用此則無中之有至人達士資其用也無窮今參同契黄庭經多載是說蓋有所由來矣詹秋圃曰古十輻共一轂至無之以爲用無用章無用中有實用存也凡造車以三十輻而循環共凑於一轂雖當古初無車之始固已有車載之用爲不可廢凡埏埴坯陶以爲器雖當無器之始亦固已有器皿之用爲不可闕又鑿門户窗牖以爲室亦當無室之初已有室處之用尤不可無庇覆以安居此三者利用土木之工各有實用存焉自無而有無非因利而利無之以爲用也張沖應曰三十輻共一轂至無之以爲用天有六氣地有五行六氣陰陽風雨晦明也五行水木火土金也天地始分水爲之先人始成形水爲之本水主腎爲命元其地數六而生木木主肝爲魂其地數八而生火火主心爲神室其地數二而生土土主脾爲意其地數十而生金金主肺爲魄其地數四而復生水五行在地相生之數凡三十此身之炁因之以運行而不悖也故曰三十輻共一轂謂人生而囿形於地五行法地數之三十而運行則六炁流通猶輪轑三十之數以爲一轂之運也或者又謂五行相生六炁相和五六爲三十之數其炁自爲之連皆一說也然轂貴連行非虚其中則不可運矣五行三十之數非虚以相生則六炁何徙而流轉轂以虚連則車以轂連能載而爲用炁以虚連則身以炁連能養而爲用故無中生有而有得以爲用也若夫土之爲器非埏和其水木火金以虚成之則不能以盛其物鑿户牖以爲器非空虚其門庭則不能容其人故曰當其無有車之用當其無有器之用當其無有室之用當也者各當其自然者也車能載物器能盛物室能容人此有之以爲利也有之以爲利又自夫虚無連用之所致也車器之與室其無中之用如是而況人禀五行運此六炁化爲神者乎此章乃老子指墜地之象以發明之也張靈應曰人身上精爲輻炁爲轂炁出於無推動精輻精結爲有相隨連轉炁一升精便降精一升炁便流轉相養不曾停住這炁却不可自虧分毫精亦不可自耗分毫只要有無相用悟此輻轂之用這長生又何難之有蓋精屬陰法地數三十爲三十輻炁屬陽法天數二十五爲一轂輻不得轂如何轉精不得炁如何運其用如此白玉蟾曰三十輻如三十日是也共一轂一月是爾當其無月大月小有車之用雖有月小亦成一月埏埴以爲器陰陽往來而成造化當其無天地無全功聖人無全能有器之用間有不及亦見天工鑿户牖以爲室萬象森羅同乎一天當其無神不守舍五官失衛有室之用聖愚同性志内逐外故有之以爲利得其父母之身爲用無之以爲用存我厥初同然之性無内無外廖粹然曰三十輻此如日月合璧一月一周天共一轂比身中元炁亦月一周天當其無以一貫之有車之用可爲吾之乘輿埏埴以爲器以黄庭陶魂鑄魄以水火煉而成質當其無以道御之有器之用可爲我之大器鑿户牖以爲室闢路爲後門便於水火開窗於尺宅以通神明當其無以比之用有室之用可爲我之神舍故有之以爲利太上言之其詳無之以爲用毋勞重下注脚八字打開兩手分付陳碧虚曰三十輻至有車之用此明有無功用相資而立周禮考工記說車蓋圓以象天輿方以法地三十輻以象一月之數夫月之懸天流行不息車之輾地運轉無窮是故古車以象月也既而三十日共一月亦猶三十輻共一轂耳當其轂中空虚輪得以轉行車中空虚人所以載其上故其空無之處是有轉行容載之用也嚴君平以謂太古聖人之牧民也因天地之所爲不事乎智巧飲則用瓢食則用手萬物齊均無有高下及至王者有爲賦重役煩百姓罷極上求不厭貢獻遼遠男女負載不勝其任故智者作爲推轂駕馬服牛負重致遠解緩民勞後世相承巧作滋生雕琢斑轂朱輪飾以金銀加以翠璣一卓之費足以貧民是以老氏傷創作之害道德明爲善之生禍亂也故舉車器室三事說有無利用之相資因以垂戒云埏埴以爲器當其無有器之用埏和也埴黏土也謂工人範和黏土陶成形器取其器中空無之處是有盛受諸物之用也嚴君平以謂道德衰廢之時憂患攻其内陰陽賊其外民人薄弱羸瘦多疾是故水火齊起五味將形生熟不别乾漬不分故智者埏土爲器以熟酸鹹而遂至田獵奢淫殘賊羣生刳胎殺穀以順君心雕琢珠玉以爲盂盤於乎樸散爲器一至於斯鑿户牖以爲室當其無有室之用鑿穿也半門曰户門傍窗謂之牖門户窗牖亦通稱也古者穴處謂穿鑿穴中之土以覆其上爲户牖居室也取其室中空無之處故人有安存出入之用也嚴君平以謂人心既變萬物怨恨蟲蛇起毒蠚作禽獸害人於是巖穴之中不足以禦患難全性命終天年故智者爲作居室上棟下宇穿窗候望堅關固閉開闔疾利蜂蝱不得入禽獸不得至而後遂至華臺危閣阿房之殿大關守險築城爲固士卒疲倦死者無數然而上世以爲治後世以爲亂者此乃有無利用相因之弊蓋在乎人耳故有之以爲利無之以爲用此解上三事明有無相資俱不可廢故有之以爲利者而利在乎器也無之以爲用者而用在乎空也夫器之爲利也必存其外外資窗用而成空之爲用也必虚其内内藉器利而就故無藉有以爲利而有藉無以爲用也無則同乎道有則成乎器夫形而上者曰道謂道之無形也道雖無形必資有以彰其功若無其有則道之功何由而彰矣形而下者曰器謂器之有體也器雖有體必資無以成其用若亡其無則器之用何由而成矣故器非道不能應用道非器不能顯功亦如轂中有輻器中有物室中有人咸因無以利有因有以用無也且夫治身則神爲存生之利虚爲致神之用故無能致用而有能利物也利物在乎有而致用在乎無夫無者虚靜之謂也有者神明之謂也神明則妙有也虚靜則至無也妙有之爲利而利在乎存生也至無之爲用而用在乎致神也且存生致神之利用不出乎妙有至無也故曰有之以爲利無之以爲用謝圖南曰三十輻至之用車之轉也以轂三十輻共一轂以象三十日爲月之數也物之實者以虚而運輻輳於轂轂轉於虚故當其有者不足以見車之用而無乃有車之用也埏埴以爲器至之用埏陶也埴土也陶土以爲器有用之物也而器之受物在於中虚故當其有者未足以見器之用而無乃有器之用也鑿户牖至之用室人之所居也户牖人之出入也室以中虚故可居户以中虚故可由當其有未足以見室之用而無乃所以爲室之用也故有之至爲用非輻不可以爲卓非埴不可以爲器非户牖不可以爲室故有之者所以爲天下之利而無之者所以爲天下之用實以虚而容有以無而運故也蓋嘗論之形而上者謂之道形而下者謂之器器形於有道隱於無故有不能以運有而無者所以爲有之用惟人亦然四肢之運車之義也胸臆之設室之象也有物有則非器之謂乎而靈臺中虚所以包容於内運動於外而應不窮之用者此也否則塊然一物何益哉林鬳齋曰三十輻共一轂至無之以爲用轂車中之容軸者也輻輪之股也轂惟虚中故可以行車埏埴陶者之器也虚而圓故可以成器户牖室中之通明處也此三者皆是譬喻虚者之爲用故曰有之以爲利無之以爲用車器室皆實有之利也而其所以爲車爲室爲器皆虚中之用以此形容一無字可謂奇筆范應元曰三十輻至有車之用輻車輞也說文輪轑也轂輻所輳也無字絶句此假物以明大道虚通之用也古者制器尚象車之輻有三十者以象一月也車轂虚通然後運行故三十輻共一轂當其無處乃有車之用也埏埴以爲器至有室之用埏和也埴說文黏土也謂埏和黏土以爲器也半門曰户交木曰牖器中虚通則能容受室中虚通則能居處是當其無處乃有器與室之用也莊子曰室無空虚則婦姑勃蹊心無天遊則六鑿相攘此亦假物以明吾心虚通之用也故有之以爲利無之以爲用故凡有形之以爲利者皆無形之以爲用也不特車器室然爾何以驗之吾之身有形也其中有無形者之以爲用也豈特吾身凡天地萬物皆然也薛庸齋曰三十輻共一轂至無之以爲用此三者有無相資以爲用也褚伯秀曰三十輻共一轂至無之以爲用轂輻爲車虚中以載物埏埴爲器虚中以貯物鑿牖爲室虚中以處人其有無利用可見有者器也出於人爲故有成毁無者道也本乎自然故無終窮譬諸人身頭目手足皆形之有必藉其中無形者運之目視耳聽手執足履言動營爲皆有使之者則無之爲用大矣及其終也偃然寢於巨室頭目手足未嘗不具而無復運掉與木偶無殊者神奇逝而土苴存故也然而有無相因不可偏廢假凡軀以修聖果由窒礙而造空無亦何嫌之有大抵有則有盡無則無窮此所以分優劣是章只發明一無字唯無也故能用天下之有以成車器室之功結以有之以爲利無之以爲用則不止乎卓器室而已莊子云得其環中以應無窮皆精於立喻或以三十輻准一月之數於後文殊覺牽强又有以無有作未有解引易繫辭舟楫之利蓋取諸涣服牛乘馬蓋取諸隨以爲證言未有此器之時已有此用之理亦是一說牛妙傳曰三十輻至有車之用夫一車有三十輻一月有三十日其云車轂者謂日月也若以道言之則當其大朴未分已前天地未根日月未光元無日月之用也以器用而言之則上古淳樸民皆無知元無車轂轉輸之用始自黄帝觀轉蓬之象以作車以負重致遠後世奢侈飾以金玉丹朱其轂太上見風俗漸侈淳樸散矣乃作而嘆曰當其無有車之用也埏埴以爲器當其無有器之用埏者和也埴者土也謂和土以爲器也夫器者鼎器也古人以乾坤爲鼎器也以道言之則當其混茫獨立之時元無乾坤安有鼎器之說也以器用而言之則上古之世人在道中性皆質朴飲用瓢食用手後世聖人範金合土以爲器用三代以來朴散淳漓爭尚奢侈飲食器皿琢以犀玉製以金銀刻鏤雕璣崇尚稀詫太上憫其世降乃歎之曰當其無有器之用也鑿户牖以爲室當其無有室之用鑿者開鑿户牖謂窗櫺室乃居室也古人以天地爲神室以日月爲户牖也若以道言之則當其太極未判之前元無天地日月也乃道也以居室而言之則上古之時未有宫室夏則居櫓巢冬則居營窟後世聖人易之以宫室上棟下宇以待風兩中古以來世漸澆漓俗好侈靡宫殿盤鬱樓觀飛驚縱情任意極侈窮奢太上憫其世衰故太息曰當其無有室之用也故有之以爲利無之以爲用夫有者謂有日月運轉以來往寒暑有乾坤鼎器以陶鎔萬物有天下神室以覆載羣倫有車轂荷負以便其轉輸有器皿什物以便夫飲食有居室户牖以易其巢居此皆聖人備物致用以利天下故云有之以爲利也無之以爲用者謂當其天地萬物皆無惟道虚無而已蓋以虚無爲用故云無之以爲用也休休庵曰三十輻至無之以爲用悟達大道謂之得體又須得用得體不得用謂之死物得用不得體謂之弄業識道德體用全謂之達士老子特以造車器鑿户牖爲室譬喻顯無爲而有妙用利濟世間故有道之士所爲皆利益也世間無者得之以爲應用捨道與德何以成人世界楊智仁曰三十輻至無之以爲用喻車輪也三十輻法一月數也機輪也連轉也天以斗爲機人以心爲機使元神輻凑於中宫眞炁流運於一身斡旋造化攢簇五行和合四象皆車之所用也埏埴者作瓦器之轉輪同喻之機輪也若無此輪焉得成器人若機變於中關棙子轉處無所不通户牖者孔竅也喻如混沌之生也塊然而已使之日鑿一竅七日而混沌死矣人有七竅收視於内則生縱之於外則死故有無之說人能爲之若用於無而無所不爲無中生有得其用也有裏生無妙合先天然謂有則謂無弊能於有無之中具一隻眼方是到家底人無之以爲用也莊子曰天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事推而行是意者其有機緘而不得已邪意者其運轉而不能自止邪喻清中曰三十輻至無之以爲用天下之事有不生於有而生於無當其無作一句讀當三十輻之時未有車之利也車之用已存於中矣故曰有車之用當埏埴之時未有器之利也而器之用已存於中矣故曰有器之用當鑿户牖之時未有室之利也而室之用已存於中矣故曰有室之用按周禮考工記車蓋圓以象天輿方以象地三十輻以象一月之數轂車中之容軸者也輻凑而成輪者埏和也埴黏土也陶人運轉以成器者也鑿穿也半門曰户門傍窗曰牖一說無空也虚也當其轂中空虚輪得以轉車中空虚得以容人是空無之處有轉行容載之用也陶成形器外實内虚當其器中空無之處是有盛受諸物之用古者穴居鑿穴中之土以覆其上倣爲户牖之制當其室中空無之處故人有安居出入之用故有之以爲利者利在乎器形也無之以爲用者用在乎空也夫器之爲利也必存乎外外資空用而戊空之爲用也必虚其内内藉器利而就故無藉有以爲利而有藉無以爲用也無以言形而上之道有以言形而下之器道非器不彰器非道不成道器之相資不可舉一而廢一也又一說扁鵲言人身中有五臟眞氣之所會五臟各有六氣故有五六三十之會原猶車之三十輻也流轉不息通於一樞猶三十輻之共一轂也聖人知變化之樞機假有爲之形體以身爲爐三宫爲鼎造化於虚無恍惚之中如所乘之車所用之器所居之室在有爲體在無爲用故有之以爲利無之以爲用按魏伯陽參同契曰以無制有器用者空政是此意諸說皆有理存之以俟明理之君子云胥六虚曰三十輻至以爲用此章聖人言三十輻共一轂至于器室意觀者體物知身之道匪徒事其文也夫車室器之理先賢論之極詳此不復贅若夫體物知身之道言之鮮耳且知身之說頭目耳鼻口體手足共成吾身各有攸司雖然塊然一物耳其運動言笑皆在於吾而求吾之一字竟無所指的處得非無位之吾爲有數之身用哉此經所謂有之以爲利無之以爲用者也讀是經者試詳味之柴元皋曰三十輻共一轂輻輪板也轂貫諸輻者也轂爲體輻爲用如心總萬法當其無有車之用當無車時誰建輻轂之妙用乎埏埴以爲器至有室之用造泥穴壁之妙用皆誰爲之乎故有之以爲利無之以爲用有之時顯其利益無之時顯其妙用以心爲體利爲用也蘇敬靜曰三十輻共一轂至以爲用此章老子之意只在於無轂車中容軸者輻卓之輪股轂惟虚其中故可容軸以推輪而有車之用埏埴陶者之器所謂鈞盤也鈞惟虚圓旋轉故可成器而有器之用鑿户爲牖而後室明牖惟其虚則有室之用轂之虚鈞之虚牖之虚皆無也是三者無以爲體而有用遂有故有車有器有室皆自無而生此亦有生於無之意也本一庵居士曰三十輻至以爲用物有也所以用是物者無也持有以用有是以物而相物耳故無有則無無所寄無無則有無所宰非特卓室器皿爲然自天下言物其徼而道其妙自一人言身其實而心其虚也然無以有爲利有以無爲用兩者未嘗不一也則天下無道外之物亦無心外之身矣此用乃利用之用非體用之用若以體用言則無爲體而有爲用石潭曰三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用三十輻共一轂所以爲卓也然其安軸之處必虚中乃可以運此車苟實而不虚則轂何所用埏埴所以爲器然埏埴以陶必有虚以爲之橐籥而後可以成器若非埏埴以虚爲用則器何以成鑿户牖以爲室然必因其通明然後可以起居苟不虚通則室亦何所用哉故有之以爲利無之以爲用也有之以爲利者車與器與室也無之以爲用者皆資於虚無也以喻人必虚心乃可以受道所謂道集虚者也或以爲器虚然後容受室虚然後可居者却於埏埴户牖即所謂虚也又或以爲未有此車此器此室之前已有此車此器此室之用者亦恐非老子之意道德眞經集義卷之十七
