body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正道可道章喻清中曰道可道至之門道者太極之全體萬理之總名鴻濛肇判鼇極既奠強而名之曰道其所謂道未嘗不可道也而道之精微道之玄妙則非常人之所能道天地亦道中之一物有一物必具一名輕清而上浮者則謂之天重濁而下載者則謂之地昭乎可睹者為日月燦然有象者為星辰人皆得而名之而其所以輕清所以重濁所以久照而不息其理安在常人孰得而名之夫子言性與天道以子貢之聞一知二且不可得而聞況不如子貢者乎聞且不可況得而擬議之乎嗚呼夫子聖人也子貢其常常者耳程伊川嘗指食卓問邵康節曰此卓安在地上不知天地安在何處康節為之極論其理以至六合之外伊川嘆曰平生唯見周茂叔論至此康節之子伯溫記之但云極論而不言所論云何使後之學者竟莫得聞其梗槩此豈常人之所能道常人之所能名耶太極未分沖漠未朕其名未立故曰無名天地之始始者指其初而言也名既立矣陰陽有陰陽之名萬物有萬物之名則千變萬化皆自此而出千條萬端皆自此而生故曰有名萬物之母母者生之所自出也猶坤稱母萬物資生之謂也常無常有是句讀道之為物靜無而動有不於無處不足以見其妙不於有處不足以見其徼妙玄也要也又微之極也徼邊隅也大道邊有小路曰徼徼歸也欲者要如此也善學道者常於無時就無上究竟者蓋欲觀其極致之妙常於有時就有上究竟者蓋欲觀其旁出之徼有無對待同出異名皆謂之玄玄者妙之極不可以言語形容也不特謂之玄而曰玄之又玄亘古今窮天地妙有萬不同出而有出此門也入而無入此門也鬳齋林氏釋此章謂道本不容言才涉有言皆是第二義常者不變不易之謂也可道可名則有變有易不可道不可名則無變無易其説高矣子細玩味謂可道者非常久之道則可謂可名者非常久之名則未可盍於下文有名萬物之母一句微有窒礙故也大槩道字靜而重可道常道二道字動而輕名字亦然此章居一經之首老子示人之大旨學者造道之極功皆基於此談經者宜紬繹之胥六虛曰道可道非常道道開口觸諱了也如未解且聽為蛇畫足矣原夫混混沌沌無形無名開闢以來自古固存大智不能測神口莫能言聖人默而知之不忍後世無聞強以道字為無形無名者之寓使得有可稱而通達於後學也故曰道取其通逹之義雖然此既其文而未既其實耳實之一字須要各人自誠自悟自證其於道也方有實用若然者可與天地並久可與日月並明否則惟事文理言論為至猶寒者説衣綾錦飢者言飽珍羞是則美人聽聞全無實濟其於道也豈能常存乎故經曰道可道非常道可道既非常道則道之一字分曉要人自得之耳名可名非常名夫道之一字亦是無形無名者之名也如不造其實惟徇其名可名之名飄風然驟雨然焉能久而不已哉無名天地之始言天地之始始於無名者也有名萬物之母言自有天地之名事事物物皆由斯道而生母生也此兩則語乃聖人勉人窮理盡性之大旨吁人生與天地一也如母之理奚殊焉胡為不究哉故常無欲至觀其徼此二句聖人為後世開示悟入之門俾學者於此採索必有所造何哉常乃常道也無欲有欲常道之動靜也觀察也妙微妙也徼歸也晏子曰徼也者德之歸也夫寂然間居無思無慮常道之靜也於此可以察見常道微妙之本體故曰常無欲以觀其妙有感即通應事接物常道之動也於此可以察見常道應變功用之所歸故曰常有欲以觀其徼明其體達其用知其歸聖人之學備矣苟不知其歸流而忘返衆人也知體而不知其用一偏之士也未悟其體而能飾其用者理學也體用兩明千轉萬變道無不在者至學也此兩者同出而異名此兩者乃指前有無妙徼也同者同於常道也異名則兩者之名也常道未發無有無妙徼之分是所同也發出則有無妙徼之名列矣是所異也故曰出而異名同謂之玄人能知是兩者未發之同可謂學造深遠矣玄深遠也故曰同謂之玄夫行遠者必有所至今所造雖遠然未有至處則所造未至乎極玄之又玄衆妙之門又玄則所造之至極矣至極則謂之衆妙之門也衆妙之門五千至言無量妙義悉由是出聖人開是門者意其後學有進入之望過門而不入者固不在言倚門而議者常有之也言至于此呵呵踴躍不知手之舞之足之蹈之矣李是從曰道可道至之門道存心中日用平常隨機應變無處不在安靜無為是真常之道也可以别外妄求有為動亂其心執著他事者非其平常之道也道本無名從此一氣生出天地萬物有名為萬物之母也人心未兆無知巧拙造出萬般器物立名是心生為萬物之母也常無欲以觀其妙常有欲以觀其徼者常無愛欲回光返照以觀其本性真妙也常有欲以觀其求生行徑循徼也此兩者同出而異名者無欲入於靜有欲出於動動靜機同其本原故有異名也同謂之玄者同其本心未發彰時難料也玄之又玄者常人之心難測況聖人之心乎機懷深奧探賾不得也衆妙之門者應變萬事從此出妙用則無窮也蘇敬靜曰道可道至非常名道天之道也名道之名也天之道如可指為世人之道則非吾常行之道也道之名如可指為世人之名則非吾常用之名也天道一自然而世人之道則有帝道王道霸道之殊道之名一清靜而世人之名則有仁義禮智信之異老氏道為自然名為清靜固與世人之所謂道所謂名不同也老氏生於衰周蓋見當時王道已衰霸道將起思以天道自然為治見當時禮為忠信之薄而亂之首若仁若義若智若信一是紛紛思以清靜無為為化故有非常道非常名之言其學至漢文曹參用之能致安靜之效寧一之歌西晉不善用之而稔成清談之禍亦各隨其所用之何如耳無名至萬物之母太極渾淪天地且無名非天地之始乎雖未有天地而天地已具於太極之內故曰天地之始天地肇判萬物方有名非萬物之母乎既有天地而萬物即生於天地之間故曰萬物之母常無欲至以觀其妙太極亘古今有理無形無則為妙矣故欲以無而觀其妙天地生萬物亘古今常有有則為徼矣故欲以有而觀其徼徼邊徼也萬物之生當窮其四邊而觀言其生周遍也有生於無無能生有老子為書以有無二字立言蓋見易書詩春秋皆説有吾今説有生於無無能生有固是高矣遠矣却不知墮於虛無然以老氏之書觀之亦未盡為虛無如不見可欲使心不亂如絶巧棄利盜賊無有如以道佐人主不以兵強天下如佳兵者不祥之器如以正治國以奇用兵天下多忌諱而民彌貧民多利器國家滋昏人多技巧奇物滋起法令滋彰盜賊多有如為之於未有治之於未亂如民之飢以其上食稅之多民之難治以其上之有為言皆中理蓋老氏言無而不道於有易詩書春秋言有而或遺於無豈可槩以清靜無為言之哉此兩者至謂之玄兩者有與無也同出於道而有無之名各異同謂之玄玄者玄妙也二者名雖不同皆極其妙無能生有無之妙也有生於無有之妙也其理玄妙同謂之玄則不可以有無論矣玄之又玄衆妙之門泯有無而謂之玄則又不可謂之玄矣謂之玄之又玄可也無能生有有生於無天下萬善衆妙集焉皆從此而出非玄之又玄乎吳環中曰道可道章道果有物乎吾不得而知之也道果無物乎吾亦不得而知之也然則道果何物乎蓋道之大原出於天天即道也天地間惟道為大實在人物未生之前及其生也於是道之名生焉吁道易言乎哉周至昭王時老子著道德五千文傷周之衰人物滋偽世道險巇欲一挽回為粹古之風故於第一章首論道樞有常道常名有無徼妙玄之又玄衆妙之門等語其旨隱而不露其言近而弘深自漢迄今解者不止百家各出己見均不敢妄為異説亦不敢以經子史為證秪就老子書中尋究庶不差誤仁義禮樂政刑兵法財貨求賢治國安民之理諸家解已詳悉大槩老子一書教人於無形無影處加存養體察之功於念頭動處乃生死之機才著念却又不是欲毋意毋我兩至其極此其所以異於吾儒之所謂道也善乎文公朱紫陽之語曰老子一書中涵仙意秪是自家占便宜清靜無為而巳斯言盡老氏之旨矣老子之所謂道非世上尋常之道也其言曰有物混成先天地生又曰迎之而不見其首隨之而不見其後此老子所謂道可道非尋常之道也老子之所謂名非世上尋常之名也故其言曰吾不知其名強為之名又曰視之不見名曰夷聽之不聞名曰希此老子所謂名也可名尋常之名也故繼之曰無名天地之始有名萬物之母既非常道又非常名若有若無有無互用有者不滯於有無者不泥於無無不在先有不在後生而不有為道之母故於無上觀道之妙於有上觀道之徼妙與徼有與無同出而異名同謂之玄玄者幽深之義非取乎色玄之又玄幽深而不可究詰衆妙之所由出門者有無出入之門得其門者寡矣其大無外其小無內惚兮恍兮其中有象恍兮惚兮其中有物道為萬物之奧無有入乎無間豈不為衆妙之門乎老子首章首論道樞以有無二字貫常道常名為一書之旨獨於道字上不十分説破一書間見迭出均反覆沉潛至天得一以清地得一以寧神得一以靈谷得一以盈喟然嘆曰一乎一乎其為道之根柢乎是一也斂之則無散之則有莊周曰人得一萬事畢信斯言也道果生於一矣果能此道矣致虛極守靜篤知雄守雌知白守黑專氣致柔能如嬰兒出入生死入水火貫金石乘虛御風此天下皆謂我道大似不肖此下士聞之大笑也吳筠稱深於道者無如五千文豈欺我哉柴元阜曰道無極而太極體虛用實內約外博可道非常道萬古不變一真悠久曰常道常道無可言者也非無可言也不言之言也不言是體四時行百物生是用這生底行底便是不言之言要知此理須向靜中默會個活潑潑地底是誰方會得不言之主宰修道以性為體以命為用養神則性靈養氣則命固神是默言于中而不能言于外者必假氣以發言也氣是聲言于外而亦密言于中者必忘言以養神也此是虛處做實用口説不成故曰可道非常道若工夫成了時道出來底真是常道名體虛難名可名非常名只唤做道已是強名才有可名便非妙道無名天地之始混沌以前有名萬物之母用從體出母乃用名其用無窮故常無欲以觀其妙至神難名曰妙反觀乎內而無可欲者潛其神也常有欲以觀其徼循小道曰徼動觀乎外而欲有為者施諸用也此兩者至玄之又玄同出體也異名用也體既玄妙用又玄妙衆妙之門此門乾坤闔闢處體用出入處惟無欲而靜觀者方會此門本一庵居士曰道可道至衆妙之門道無在而無不在以為無耶天地萬物出焉以為有耶無方無體之可言所可見者常而已常者無始終無今古非有非無而該乎有無非闔闢往來而行乎闔闢往來者也以可道為道以可名為名何足以盡此常哉既曰道又曰名者道其隱而名其著也又名者所以形此道也謂之無非無其實也無其名而已謂之有非有其實也有其名而已故曰無名天地之始有名萬物之母人之生也資始於父而成形於母故天地萬物亦父於無而母於有妙猶妙有之妙徼歸也列子死者德之徼張湛注謂徼者歸也是也蓋方其未有一物之先森羅萬象之理巳具及萬物散殊之異未有不歸於一本者故體道者常無欲以觀其妙所以存其神而感通天下之故巳會於寂然不動之中常有欲以觀其徼所以觀其復而歸根復命之常已見於藝藝並作之際是以知微知顯反約於博執要以御物而道在我矣體用一源顯微無間故曰此兩者同出而異名玄者深遠之義同謂之玄言聖人與道為一貫精粗兼動靜超於兩而有無不足以名之故寄之玄若曰深矣遠矣而無能名耳此大而化之之事玄之又玄則聖不可知之神矣出入往來奚適而不妙故曰衆妙之門常在釋氏為真常妙在釋氏為妙有常無常有即空色色空之意同謂之玄則所謂不屬有無者也拾遺嚴君平曰有名非道也無名非道也有為非道也無為非道也無名而無所不名無為而無所不為太平光師曰有對則名異絶待則玄同忘玄之玄則曰玄玄秉文曰此章明重玄之極致非但可道非道不可道亦非道莊子語默皆不足以盡道非但道常無名有名無名亦不足以盡道無名者道之似也有無皆不足以盡道故又寄之重玄諸子旁證關尹子曰非有道不可言不可言即道非有道不可思不可思即道天物怒流人事錯錯然若若乎回也戛戛乎鬭也勿勿乎似而非也而爭之而介之而哯之而嘖之而去之而要之言之如吹影思之如鏤塵聖智造迷鬼神不識惟不可為不可致不可測不可分故曰天曰命曰神曰玄合曰道無一物非天無一物非命無一物非神無一物非玄物既如此人豈不然人皆可曰天人皆可曰神人皆可致命通玄不可彼天此非天彼神此非神彼命此非命彼玄此非玄是以善吾道者即一物中知天盡神致命造玄學之循異名析同實得之契同實忘異名陳抱一解曰道可道非常道名可名非常名世之學者罕見關尹子書而多以百家之言及臆説解之愈不能明老子之旨關尹謂使有道不可言則道與言為二惟不可言即道則言與道為一學者驟觀非有道不可言多誤認為有道可言若有道可道則當云有道非不可言不曰非有道不可言也今曰非有道不可言不可言即道是則翻老子之言以明老子言外之旨也此言翻之則曰非有道不可道不可道即道既翻出不可道即道則翻出道可道非道矣道可道非道即是老子道可道非常道也或者猶疑可道為口道之道愚又翻經言以曉之曰如曰空可空非真空使其可空即是有物窒而不空之處豈謂之真空乎知空可空非真空則知道可道非常道矣或者喻曰如心心如性性皆可用功以人為而道獨不可以人為故不可以道道也向非翻言外之言吾終世不能明老子之經旨矣世人又多被常宇轉了將謂老子有非常之道然老子立此常字者政恐世人疑吾所謂道有異乎人也殊不知此乃通天下之常道爾猶強名曰道者通天下之常名爾是道也通天徹地亘古亘今無往而不在才開口言則去道遠矣故曰二也才指此強名之名為可名則非名矣惟不可名故假常名強名之猶曰非有名不可名不可名即名也是則不可言即道不可名即名即老子可道則非常道可名則非常名之意也然則老子大聖人也其言如天之不言之言非有大聖人如關尹子者疇能復以不言之言發明其言外之旨哉然關尹子既發明不可名言之旨矣又恐世人謂道不可名言則可以思而得之故又曰非有道不可思不可思即道與上意同噫可言可思皆人也不可言不可思皆天也然則人與天果何以異觀乎曰人皆可曰天然則人與天果可以同觀乎曰天物怒流人事錯錯然有相若而回者有相夏而鬭者有相勿而似而非者或爭而日以心鬭或介而不交於物或哯而呵叱之或嘖而呼唤之或去而離之或要而合之天物人事不齊如此豈可以同觀哉今欲以人之言思及之譬如吹影鏤塵徒勞心耳是道也聖智造之猶迷鬼神測之不識惟其不可為故曰天不可致故曰命不可測故曰神不可分故曰玄合是四者強名曰道老子言道繼之以常無欲以觀其妙常有欲以觀其徼同謂之玄玄之又玄衆妙之門關尹子恐學者徇異名析同實而並以天命神玄四者異觀之故於此章重言即一物中可以知天盡神致命造玄物物皆然人人本具不可彼天此非天彼神此非神彼命此非命彼玄此非玄也是則或曰妙或曰徼或曰玄亦物物皆然人人本具惟得之者契其同有之實忘其異謂之名至於玄之又玄可以入道矣莊子曰有始也者有未始有始也者有未始有夫未始有始也者有有也者有無也者有未始有無也者有未始有夫未始有無也者俄而有無矣而未知有無之果孰有孰無也今我則已有謂矣而未知吾所謂之其果有謂乎其果無謂乎以本為精以物為粗以有積為不足淡然獨與神明居古之道術有在於是者關尹老聃聞其風而悅之見建之以常無有主之以大一以濡弱謙下為表以空虛不毁萬物為實文子曰夫事生者應變而動變主於時無常之行故道可道非常道也名可名非常名也書者言之所生也言出於智者不知非常道也名可名非藏書者也古者被髮而無卷領以王天下其德生而不殺與而不奪天下非其空同懷其德當此之時陰陽和平萬物蕃息飛鳥之巢可俯而探也走獸可繫而從也及其衰也鳥獸蟲蛇皆為人害故鑄鐵鍛刃以禦其難故民迫其難則求其便因其患則操其備各以其智去其可害就其所利常故不可循器械不可因故先王之法度有變易者也故曰名可名非常名也五常異道而覆天下三王殊事而名立後世因時而變者也譬師曠之調五音也推移上下無常尺寸以度而摩不中者故通於樂之情者能作音有本主於中而知規矩鉤繩之所用者能治人故先王之别不宜即廢末世之事善者即之故聖人之制禮樂者而不制於法故曰道可道非常道振窮補急則名生利起害除積功成世無災害雖聖無所施其德上下和睦雖賢無所立其功故至人之治含德抱道推誠施無窮之智寢説而不言天下莫知貴其不言者故道可道非常道也名可名非常名也著之竹帛鏤之金石可傳於人者皆其粗也三皇五帝三王殊事而同心異路而同歸末世之學者不知道之所體一德之所總要取成事之迹跪坐而言之雖博學多聞不免於亂石潭曰道可道非常道此一段有兩説不同有以首句道可道之道為可得而言之道而常道為不可言之道者有以首句道可道之道為老子之所謂道而常道為常人之所謂道者然首一道字以為可得而言之道則是老子反以世之所謂道者居一篇之首而此道字乃非老子之所謂道也豈老氏以道名篇而首一字却言世所謂道乎若以首一道字為老子之所謂道若曰吾所謂道非常人之所謂道亦似矣然如此則常道兩字乃指世人之所謂道若孔安國書序中所言之常道也但下章有知常曰明之語而本章又有常無欲以觀妙常有欲以觀徼之言豈以常字為常人之常也哉兩説皆似有病今再三絀繹而思之蓋首一道字與下常道字皆是言道之體特可道之道字則指世人所謂道而言之若曰吾所謂道者非世人可以指言之道也若可指言之道則非吾所謂自然之常道矣所謂常者言其無物不有無時不然亘古亘今常存之道也世俗之所謂道者若夫子所謂小道孟子之所謂道二之道也蓋儒者之所謂道乃日用通行之道而老子之所謂道乃專指虛無自然者為道故也名可名非常名此一段亦有兩説或以上名字為世俗之名或以為道之名其意之别亦與前段同今但以前段例之則此上一名宇與下常名字亦如前二句皆言道之名也蓋道本不可得而名今所以名之曰道者乃強名之若其可得而名則其名各有對待如下章所謂美惡難易長短高下不得以為常非吾所謂常名矣故知此二句只是解上二句便是後章強名曰道之意爾無名天地之始有名萬物之母此一段亦有兩説有以無名有名斷句者有以無與有斷句者以無與有斷句似乎高矣然下章有道常無名始制有名之説不知亦可以如此斷句乎是知古人以無名有名斷句者為是蓋大道之體沖漠無朕而萬象森然已具以其沖漠無朕不可得而名故曰無名雖曰無名實為天地之始也以其萬象森然已具其理有可得而名故曰有名既曰有名則為萬物之母矣始者言其所自出有生於無故曰始母者言其已有兆朕如胚胎之已具者也故曰母此始即如易之所謂太始母者如易之所謂成物也但易主乾坤而言此則專主道而言耳故常無欲以觀其妙常有欲以觀其徼此一段亦有兩説有以有無字絶句者有以欲字絶句者以有宇無字絶句者本於莊子蓋莊子天下篇言建之以常無有者正指此段常無常有之説也然老子後章又自有常無欲三字連説者則豈容以無字斷句哉以欲字斷句則於莊子有礙以無字斷句則於後章有礙然莊子最得老子之真者也豈後章無欲字特偶然同於此章不可為例耶然既兩説皆有所本則不容棄一説而取一説也蓋以無宇有字斷句者言道體也言無欲有欲者言人之體道也常道隱於無故於無處可以觀其妙常道顯於有故於有處可以觀其徼妙者言其不可名者也徼者言其有可名者也若欲字斷句則人常能無欲可以見其常無之妙此猶大易所謂寂然不動者也常於有欲處則可以見其常有之徼此猶大易所謂感而遂通者也於無欲而見其寂然不動之妙於有欲而見其感而遂通之徼則道之體用得矣此兩者同出而異名同謂之玄此即儒者所謂體用一源顯微無間之説也兩者有與無也道以無為體以有為用兩者皆出於道所謂一源也而有無異名無即微也有即顯也惟一源故無間也同謂之玄者謂之有不可謂之無亦不可以為有耶則其體似無以為無耶則其用似有故謂之玄玄者有無不可分之謂也玄之又玄衆妙之門莊子曰有有也者有無也者有未始有無也者有未始有夫未始有無也者有名者即莊子所謂有有者也無名者即莊子所謂有無者也玄者有則不可謂之有無亦不可謂之無既不可謂之無則未始有無者也既玄矣又玄焉則莊子所謂未始有夫未始有無者也玄者不可以有無言玄之又玄則又不可以玄言焉雖玄之又玄矣然一理之中萬理寓焉衆理之妙無不由兹而出故謂之門夫以一理而出萬理此似與儒者之道同矣而與儒者之道卒不同者蓋儒者以事物為主而道寓於器此則以虛無為主專以道為精而超乎事物之粗故也道德真經集義卷之四
