body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正道德經考異河上公本分道德焉二篇今從玉輔嗣本道君曰道者人之所共由德者心之所同得道者亘萬世而無弊德者充一性而常存老子當周之末道降而德衰故著書九九篇以明道德之常而謂之經其辭簡其㫖遠學者當識而深造之黃茂材曰道也者莫不由之以生也德也者莫不得之以養也天地以此生養萬物故不窮至人以此生養一身故不死道與德雖有二名實相為用不可離也今世學者乃分上經為道下經為德甚非作書之㫖當總謂之道德經可也石潭曰老子之解多矣以學儒者解之多以儒之所謂道者言之若程泰之林竹溪之類是也以學釋者解之多以釋之所謂性者言之如蘇潁濱本來子之類是也皆不得其本意蓋儒者之所謂道乃日用常行事物中之道而老氏則以虛無自然者為道豈可强以合之於儒釋氏之所謂性者乃露倮倮赤灑灑之性老氏之所謂道者乃形神俱妙之道豈可强而合之於釋雖曰天下無二道聖人無兩心然仁者見之謂之仁智者見之謂之智其所指地頭則不可不明辨之也蓋老子專指虛無為道而儒者則謂形而上者之道不離乎形而下者之器釋氏專指真空為性而不雜乎形氣而老子則欲形神俱妙而與道合真此其所以不同也若各據本教而言之不惟失老子之宗指亦自失其宗指矣至於道家之解如白玉蟾之類固是本色然但一向好高而務簡徑其辭多不可曉反成郭象之注莊子焉故今之為解一以老子本教言之庶不失老子之本意又不敢如玉蟾輩好高而辭意不明焉學者詳之道可道章考異河上公作體道章趙實庵作顯理會真義章今從明皇本唐明皇疏此章明妙本之由起萬化之宗源首標虛極之强名將明衆妙之歸趣故可道可名者明體用也無名有名者明本迹也無欲有欲者明兩觀也同出異名者明朴散而為器也同謂之玄者明成器而復朴也玄之又玄者辨兼忘也衆妙之門者示人行了出也所謂進修之階漸體悟之大方也杜光庭廣聖義釋明皇注疏明者皎淨之義顯出之謂也妙本者道也居經之首明道之由由從也起興也萬者數之大也化者應變之謂也言萬有變化從道而興也宗主也源本也萬化既從道而興則知道為萬化之宗本也起自此章出生諸法如水之源流注無竭也虛極妙本也强名道也此章先標可道為體可名為用末篇歸衆妙之門攝迹歸本趣向也復歸向於大道之本也就此門中分為七别第一可道可名者明體用也體用者相資之義也體無常體用無常用無用則體不彰無體則用不立或無或有或實或權或色或空或名或象互為體用轉以相明是知體用是相明之義也第二無名有名者明本迹也本迹者相生之義也有本則迹生因迹以見本無本則迹不可顯無迹則本不可求迹隨事而立以為本迹本者根也迹者末也迹者履之所出而迹豈履哉迹出於履以迹為履而復使人履之愈失道矣明迹為末也第三明有欲無欲兩觀不同也觀者所行之行也以自所見為觀以神所鑒為觀息見於外凝神於內內照一心外忘萬象所謂觀也為習道之階修真之漸先資觀行萬入妙門夫道不可以名得不可以形求故以觀行為修習之徑謂有欲歸於死無欲契於生也是觀其生死歸趣不同也第四同出而異名者明朴散而為器也大朴者道也道散為神明流為日月分為五行生為萬物器者有形用也易曰形而上者曰道形而下者曰器也第五同謂之玄者明成器而復朴也神明日月五行萬物有形有器皆合於道故云復朴也第六玄之又玄者辨兼忘也為器之時必在其朴復朴之後此朴亦忘乃契於道爾故謂玄之又玄也兼忘者器朴俱忘也第七衆妙之門者示人行了出也器朴兩忘了然契道復歸生化之始衆妙之門也人與萬物同禀於道有為有欲則失道傷生除欲守和則歸根復本是謂之道要之門户也了出者出世也張沖應曰道者自然之道天至高而不知所覆天道之自然地至厚而不知所載地道之自然人參天地而立有目能視猶天之日月有口能聲猶天之雷霆吹之有風呵之有霧唾咳若雨露聰覺猶神明天道之自然我有之矣至於四體備具猶四嶽之盤固靈骨冠頂猶中嶽之鎮聳血流脉運猶江河之周流地道之自然我亦有之矣誠能體天地自然之道而進修之則濁者清凡者仙而賢者聖矣是以體道為道經之首章道可道非常道名可名非常名無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門考異明皇本無故宇今從河上公本河上公曰道可道謂經術政教之道也非常道非自然長生之道也常道常以無為養神無事安民含光藏暉滅迹匿端不可稱道名可名謂富貴尊榮萬世之名也非常名非自然常在之名也常名如嬰兒之未言雞子之未分明珠在蚌中美玉處石間內雖昭昭外如愚頑無名天地之始無名者謂道道無形故不可名也始者道本也吐氣布化出於虛無為天地本始也有名萬物之母有名謂天地天地有形位陰陽有剛柔是其有名也萬物母者天地含氣生萬物長大成熟如母之養子故常無欲以觀其妙妙要也人常能無欲則可以觀道之要要謂一也一出布名道讚叙明是非也常有欲以觀其徼徼歸也常有欲之人可以觀世俗之所歸趣也此兩者同出而異名兩者謂有欲無欲也同出者同出人心也而異名者所名各異也名無欲者長存名有欲者亡身也同謂之玄玄天也言有欲之人與無欲之人同受氣於天玄之又玄天中復有天也禀氣有厚薄得中和滋液則生賢聖得錯亂汗辱則生貪淫也衆妙之門能知天中復有天禀氣有厚薄除情去欲守中和是謂知道要之門户也王輔嗣曰道可道至非常名可道之道可名之名指事造形非其常也故不可道不可名也無名至萬物之母凡有皆始於無故未形無名之時則為萬物之始及其有形有名之時則長之育之亭之毒之為其母也言道以無形無名始成萬物以始以成而不知其所以玄之又玄也故常無欲以觀其妙妙者微之極也萬物始於微而後成始於無而後生故常無欲空虛其懷可以觀其始物之妙常有欲以觀其徼徼歸終也凡有之為利必以無為用欲之所本適道而後濟故常有欲可以觀其終物之徼也此兩者至衆妙之門兩者始於母也同出者同出於玄也異名所施不可同也在首則謂之始在終則謂之母玄者冥也默然無有也始母之所出也不可得而名故不可言同名曰玄而言謂之玄取於不可得而謂之然也謂之然則不可以定乎一玄而已謂是名則失之遠矣故曰玄之又玄也衆妙皆從同而出故曰衆妙之門也唐明皇曰道可道至非常名道者虛極之妙用名者物得之所稱用可於物故云可道名生於用故云可名應用且無方則非常於一道物殊而名異則非常於一名是則强名曰道而道常無名疏道者虛極妙本之强名也訓通訓徑首一字標宗也可道者言此妙本通生萬物是萬物之由徑可稱為道故云可道非常道者妙本生化用無定方强為之名不可偏舉故或大或逝或遠或返是不常於一道也故云非常道名者稱謂即物得道用之名也首一字亦標宗也可名者言名生於用可與立名也非常名者在天則曰清在地則曰寧在神則曰靈在谷則曰盈得一雖不殊約用則名異是不常於一名也故云非常名無名至萬物之母無名者妙本也妙本見氣權輿天地天地資始故云無名有名者應用也應用匠成茂養萬物物得其養故有名矣疏無名者萬化未作無强名也妙本之始無有無名從本降氣開闢天地天地相資以為本始故云無名天地之始則易之太極生兩儀也注云權輿者按爾雅云權輿始也有名者應用匠成有强名也萬化既作品物生成妙本旁通以資人用由其茂養故謂之母也母以茂養為義然則無名有名者聖人約用以明本迹之同異而道不繫於有名無名也常無欲以觀其妙常有欲以觀其徼人生而靜天之性感物而動性之欲若常守清淨解心釋神返照正性則觀乎妙本矣若不性其情逐欲而動性失於欲迷乎道源欲觀妙本則見邊徼矣欲者性之動謂逐境而生心也言人常無欲正性清靜返照道源則觀見妙本矣若常有欲逐境生心則性為欲亂以欲觀本既失沖和但見邊徼矣徼邊也又解云欲者思存之謂言欲有所思存而立教也常無欲者謂法性清淨不於言說無所思存則見道之微妙也常有欲者謂從本起用因言立教應物遂通化成天下則見衆人之所歸趣矣徼歸也此兩者同出而異名如上兩者皆本於道故云同也動出應用隨用立名則名異也此者指上事也兩者謂可道可名無名有名無欲有欲各自其兩故云兩者俱禀妙本故云同自本而降隨用立名則名異矣同謂之玄出則名異同則謂玄玄深妙也玄深妙也自出而論則名異是從本而降迹也自同而論則深妙是攝迹以歸本也歸本則深妙故謂之玄玄之又玄衆妙之門意因不生則同乎玄妙猶恐執玄為滯不至兼忘故寄又玄以遣玄耳明無欲於無欲能如此者萬法由之而了出故云衆妙之門也攝迹歸本謂之深妙若住斯妙其迹復存與彼異名等無差别故寄又玄以遣玄欲令不滯於玄本迹兩忘是名無住無住則了出矣注云意因者西升經云同出異名色各自生意因今不生意因是同於玄妙無欲於無欲者為生欲心故求無欲欲求無欲本離欲心既無有欲亦無無欲遣之又遣所謂都忘正觀若斯是謂衆妙其妙雖衆皆出此門故云衆妙之門杜光庭廣聖義道可道非常道道者至虛至極非形非聲後劫運而不為終先天地而不為始圓通澄寂不始不終聖人以通生之用可彰尋迹而本可悟故以通生之德强名為道也標宗一字是無為無形道之體也可道二字是有生有化道之用也三字之中自立體用體則妙不可極用則廣不可量故為虛極之妙本也散為萬物不拘一方故用無定方也但宗一道故明萬物皆資道化故不在遍舉高而無上無不包容大也高而無上不滯於上大而無外不滯於外逝也逝往也窮於無窮無所不通遠也虛心守一道復歸之返也返還也此引道經第二十五有物混成章以證此義以此推之不常厥所是為非常道也名可名非常名名者正言也標宗一字為名之本可名二字為名之迹迹散在物稱為萬殊由迹歸本乃合於道是知道為名之本名為道之末本末相生以成化也無用則道凝有用則名立天得道垂象清明地得道確然安靜神得道變化不歇谷得道盈滿無虧此引下經第二章以明其義名散無極是為非常名也無名天地之始無名者虛極妙本未立强名也妙本之始無有無名從本降迹生天生地天地資始故曰無名天地之始大道吐氣布於虛始為天地之本始無有無名者莊子天地篇曰泰初有無無有無名言泰初者無之始也無既無名不可詰之以道不可詰之以名混漠寂寥邈為化主元氣資之以為始玄化禀之而得生故曰無名天地始無名無氏然後降迹漸分兆形由此而天地生氣象立矣太極者形質巳具也形質既具遂分兩儀人生其中乃為三才也有名萬物之母萬化者舉其多也品物者衆物也衆物之中道無不在秋毫之細道亦居之故能生三才母萬物萬物道存則生道去則死含養之至不曰母乎大道無異無同無本無迹强立言教而本迹彰矣常無欲至以觀其徼夫機械之心藏於胸中即純白不粹神德不全存身者不和此有欲也若欲害之心忘於中即虎尾可履而況於人乎此無欲也有欲者任耳目以視聽勞心慮以為理視聽愈迷為理愈亂可謂見邊徼矣無欲者神合於虛氣合於無無所不達無所不通與天地同功乃合乎大道可謂觀其妙矣觀者外以目周覽內以神照微目覽則辨乎有無神照則契乎冥寂矣人生而靜天之性者樂記篇之語也言性本清靜無欲無營為物所感因境生欲感於外而動於內得不慎其所感哉故聖人制法以檢其邪制禮以檢其亂制刑以檢其過制樂以檢其淫以道制欲所以教民之崇德務善也此兩者同出而異名夫一氣分而萬化生形兆立而萬有作三者之變各而兩之有出於無斯之謂矣道顯而名立名立而欲生此乃有道可言有名可謂有欲之機興於此矣是迹從本而生也者攝迹者棄欲忘名復歸妙本於道忘道於名忘名是謂還本矣徇情者逐欲忘本以至淪滑能返乎物初可與言乎至道矣同謂之玄有欲無欲之人同受氣於天地禀中和滋液則賢聖而無為禀濁亂之氣則昏愚而多欲苟能洗心易慮澄欲含虛則攝迹歸本之人也人皆修鍊俗變淳和則返朴之風可臻太古矣玄之又玄衆妙之門夫攝迹忘名已得其妙於妙恐滯故復忘之是本迹俱忘又忘此忘吻合乎道有欲既遣無欲亦忘不滯有無不執中道是以都忘之者爾衆妙門者天門也天門者萬法所生之總名也無有也言萬物出乎無有入乎無有聚散隱顯故有出入之名爾徒有其名實無其門故謂之無為之門則無門也無門無旁四達之皇皇是歸於妙道矣正觀者因修之漸證道之階也前所謂目見者為觀覽之觀也神照者觀行之觀也道亦以三乘之法階級化人從初發心至於極道捨凡證聖故有一十四等觀行之門小乘初開有三觀法第一假法觀謂對待也第二實法觀謂心照也第三遍空觀入無為也中乘法門觀行有四第一無常觀第二入常觀第三入非無常觀第四入非常觀大乘門中觀行亦四第一妙有觀第二妙無觀第三重玄觀第四非重玄觀聖行門中復有三觀第一真空觀第二真洞觀第三真無觀以此觀行修鍊其心從有入無階粗極妙得妙而忘其妙乃契於無為之門爾無為有為可道常道體用雙舉其理甚明今於體用門中分為五别第一以無為體以有為用可道為體道本無也可名為用名涉有也第二以有為體以無為用室車器以有為體以無為用用其無也第三以無為體以無為用自然為體因緣為用此皆無也第四以有為體以有為用天地為體萬物為用此皆有也第五非有非無為體非有非無為用道為體德為用也又於本迹門中分為二别以無為本以有為迹無名有名也以有為本以無為迹互相明也萬物自有而終歸於無也夫以玄源澄寂妙本杳冥非言象可求非有無可質固亦討論理絶擬議道窮而設教引凡示兹階級然在於冥心感契漸頓隨機不可滯教執文拘於學相沐心浴德之士勤乎勉哉道君曰道可道至非常名無始曰道不可言言而非也又曰道不當名可道可名如事物焉如四時焉當可而應代廢代興非真常也常道常名自本自根未有天地自古以固存伏義氏得之以襲氣母西王母得而坐乎少廣莫知其始莫知其終無名至萬物之母道常無名天地亦待是後生莊子所謂生天生地是也未有天地孰得而名之故無名天地之始有天地然後萬物生焉故有名萬物之母常無欲至以觀其徼莊子曰建之以常無有不立一物兹謂常無不廢一物兹謂常有常無在理其上不徼天下之至精也故觀其妙常有在世其下不昧天下之至變也故觀其徼有無二境微妙寓焉大智並觀乃無不可恍惚之中有象與物小智自私蔽於一曲棄有著空徇末忘本道術於是為天下裂此兩者至同謂之玄道本無相敦為徼妙物我同根是謂一氣故同謂之玄世之惑者捨妄求真去真益遠殊不知有物者特名之異耳玄之又玄衆妙之門素問曰玄生神易曰神也者妙萬物而為言者也小而妙之謂玄玄者天之色也色之所色者彰矣而色色者未嘗至玄之又玄所謂色色者也玄妙之理萬物具有天之所以運地之所以處人之所以靈百世之所以昌皆妙也而皆出於玄故曰衆妙之門孔子之作易至說卦然後言妙而老子以此首篇聖人之言相為終始王介甫曰道可道非常道常者莊子謂無古無今無終無始也道本不可道若其可道則是其迹也有其迹則非吾之常道也名可名非常名道本無名道有可名則非吾之常名蓋名生於義故有名也無名至萬物之母無所以名天地之始有所以名其終故曰萬物之母全義無者形之上者也自太初至於太始自太始至於太極太始生天地此名天地之始有形之下者也有天地然後生萬物此名萬物之母母者生之謂也雜說無名者太始也故為天地之父有名者太極也故為萬物之母天地萬物之合萬物天地之離於父言天地則萬物可知矣於母言萬物則天地亦可知矣常無欲至觀其徼道之本出於無故常無所以自觀其妙道之用常歸於有故常有得以自觀其徼字說王育曰天屈西北為無蓋制字或以上下言之或以東西南北言之或以左右言之或以先後言之王育之言無是也蓋乾位西北萬物於是乎資始方其有始也則無而已矣引而伸之然後為有常無欲以觀其妙常有欲以觀其徼兩者同謂之玄玄之又玄衆妙之門蓋不能常無也無以觀其妙不能常有也無以觀其徼能觀其妙又觀其徼則知夫有無者同出之玄矣全義道一也而為說有二所謂二者何也有無是也無則道之本而所謂妙者也有則道之末所謂徼者也故道之本出於沖虛杳眇之際而其末也散於形名度數之間是二者其為道一也而世之蔽者常以為異何也蓋沖虛杳眇者常存於無而言形名度數者常存乎有有無不能以並存此所以蔽而不能自全也夫無者名天地之始而有者名萬物之母此為名則異而未嘗不相為用也蓋有無者若東西之相反而不可以相無故非有則無以見無而無無則無以出有有無之變更出迭入而未離乎道此則聖人之所謂神者矣易曰無思也無為也寂然不動感而遂通天下之故此之謂也蓋昔之聖人常以其無思無為以觀其妙常以感而遂通天下之故以觀其徼徼妙並得而無所偏取也則非至神其孰能與於此哉然則聖人之道亦可見矣觀其妙所以窮神觀其徼所以知化窮神知化則天地之道有復加乎此兩者至同謂之玄兩者有無之道而同出於道也言有無之體用皆出於道世之學者常以無為精有為粗不知二者皆出於道故云同謂之玄此兩者同出而異名者同出乎神而異者有無名異也聖人能體是以神明其德故存乎無則足以見其妙存乎有則足以知其徼而卒離乎有無之名也其上有以知天地之本下焉足以應萬物之治者凡以此字說么而覆入之者玄也故玄從么從入兩者同謂之玄兩者謂有無也玄又為黑而有赤色北方黑為陰玄為陽故易曰坤於地為黑又曰天玄而地黃舜曰玄德此聖人之在下者玄德言乎其幽也蘇潁濱曰道可道非常道莫非道也而可道者不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以為義而禮不可以為智可道之不可常如此惟不可道然後在仁為仁在義為義在禮為禮在智為智彼皆不常而道常不變不可道之能常如此名可名非常名道不可道而況可得而名之乎凡名皆其可道者也名既立則圓方曲直之不同不可常矣無名天地之始至觀其徼自其無名形而為天地天地位而名始立矣自其有名播而為萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以為天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於其徼而不知其妙則粗而不神矣留於其妙而不知其徼則精而不通矣此兩者至同謂之玄以形而言有無則信兩矣安知無運而為有有復而為無未嘗不一哉其名雖異其本則一知本之一也則玄矣凡遠而無所至極者其色必玄故老子常以玄寄極也玄之又玄衆妙之門言玄則至矣然猶有玄之心在焉玄之又玄則盡矣不可以有加矣衆妙之所從出也吕吉甫曰道可道非常道凡天下之道其可道者莫非道也而有時乎殆則非常道也凡天下之名其可名者莫非名也萬物藝藝各歸其根歸根曰靜靜曰復命復命曰常為道而至乎常則心凝形釋物我皆忘夫孰知道之可道而名之可名哉則常道者固不可道也故曰道乃久沒身不殆常名者固不可名也故曰自古及今其名不去不殆不去是之謂常道無名至萬物之母常無名則無名者道也而天地之所自而始故曰無名天地之始太初有無無有無名有無則一亦不可得以有無名則一之所起有一而未形也既謂之一則雖未有形且巳有名夫名為一而名之者為二二與一為三萬物紛紛自此生矣故曰有名萬物之母常無欲至觀其徼知常曰明明則無所不見也故唯常為可以觀方其無欲也則滌除玄覽而無疵於以觀其妙故曰常無欲可名於小矣方其有欲也則萬物並作而藝藝於以觀其徼故曰萬物皆往歸焉而不知主可名於大矣此兩者至同謂之玄惟小所以見其妙惟大所以見其徼此兩者其出則同故其名異而已其名異也其實未嘗異則有欲之與無欲求其所出皆不可得不可得則其所出也故同謂之玄玄之為色黑與赤同乎一也天之色玄陰與陽同乎一也同乎一固妙矣然妙乎一矣未妙乎多也妙乎我矣未妙乎物也玄之至之門玄之又玄則同者亦不可得同者不可得則一之與多我之與物莫不皆妙也萬物之所以妙出於此而已陸農師曰道可道至非常名常名以無方為體常道以無體為用無方者無乎不在無體者無乎不為有所可道則非所謂無方有所可名則非所謂無體無名至萬物之母太初有無無有無名無名者太始也太始者天地之父故曰無名天地之始天地者萬物之母故曰有名萬物之母言母則知始之為父言始則知母之為主故上言天地之始下言萬物之母常無欲至觀其徼妙道本也徼道末也聖人之於妙也觀之以常無聖人之於徼也觀之以常有妙在中粗在徼言妙則知徼之為粗言徼則知妙之為中故上言欲以觀其妙下言欲以觀其徼此兩者至之玄無者對有之無而常無者非無之無而不為有對也有者對無之有而常有者非有之有而不為無對也不為無對者非有也不為有對者非無也故常無者真無是也而非無常有者妙有是已而非有故兩者同出而同謂之玄也玄之至之門玄者妙之體妙者玄之用其道至玄人為衆妙之門户而出入於其間莊子曰開天之天不開人之天開天之天自然也開人之天使然也玄之又玄莊子所謂精乎精衆妙之門莊子所謂神乎神王元澤曰道可道非常道道者萬物之所道在體為體在用為用無名無迹而無乎不在者是也故聖人之言常在其一曲雖在一曲而異乎諸子百家者不失理而當於時而巳可道之道適時而為時徙不留道亦應變蓋造化密移未嘗暫止息之所是今已非矣而曲士攬英華為道根指蘧廬為聖宅老氏方將祛其蔽而問以至理故以此首篇明乎此則方今之言猶非常也名可名非常名名生於實實有形數形數既具衰敗隨之其可常乎唯體此不常乃真常也無名至之母受命於無而成形於有故曰天地之始萬物之母易曰有天地然後有萬物此言與易之序同據覆載之間方生之物故以天地為先物與天地本無先後推而極之有無同體始母之言亦筌蹄也且天地雖大而受命成形未離有無而此獨言萬物之母然則老氏之言姑盡性而已常無欲至觀其徼易之陰陽老之有無以至佛之色空其實一致說有漸次耳世之言無者舍有以求無則是有外更有安得為無故方其有時實未嘗有此乃真無也有無之體常一而有有以觀者但見其徼欲觀其妙當知本無而本無之無未嘗離有也既曰常無又曰常有者以名有無之不相代無即真有有即真無耳言微則知妙之為奧言妙則知徼之為粗此法言之體同謂之玄有無本一未有二名自學者言之則有不如無之精既得其道則兩皆至理初無彼此也衆妙之門道有二物自形而下則陽尊而陰卑自形而上則陰先而陽後故道之至處曰妙曰玄妙德也玄色也言色則至矣而蓋有非色所及故曰又玄萬物皆有妙處皆出於此故曰衆妙之門道一也而為說有二所謂二者何也則有無是也無則道之本而所謂妙者也有則道之末而所謂徼者也故道之本出乎沖虛杳渺之際而其末也散於形名度數之間是二者其為道一也而世之蔽者常以為異何也蓋沖虛杳渺者常存乎無而言形名度數者常存乎有有無不能並存此其所以蔽而不得其全也夫無名者天地之始而有名者萬物之母此為名則異而未嘗不相為用也蓋有無者若東西之相反而不可以相無故非有則無以見無而無無則無以出有有無之變更出迭入而未嘗離乎道此則聖人之所謂神者矣易曰無思也無為也寂然不動感而遂通天下之故此之謂也蓋昔之聖人常以其無思無為以觀乎妙常以其感而遂通天下之故以觀其徼徼妙並得而無所偏取也則非神其孰能與於此哉然則聖人之道亦可見矣觀乎妙所以窮神而觀乎徼所以知化窮神知化則天地之道豈有以復加乎雖然觀乎妙者惟以窮神而已而非所以為神也若夫神則未嘗離乎此二者而此二者亦不足以為名也故曰兩者同出而異名同者同出乎神而異者有無之名異也聖人者能體是以神明其德故存乎無則足以見妙而存乎有則足以知徼而卒離乎有無之名也其下則有以知天地之本而下焉則有以應萬物之治者凡以此嗚呼老子之言可謂協於易矣然而卒不與孔孟並者何也蓋聖人之於道未嘗欲有所言也凡所以言者皆出於應天下之變而為中才之不知者言耳以其道雖有無並載而及其言也務詳於有而略於無蓋詩書禮樂春秋之文皆所以明有而及其所謂無則獨易嘗言之而巳矣然其說也又必寓之爻象彖繫吉凶悔吝之間而使世之學者自上觀之則見其詳乎事物而得其所以有自下而觀之則見其外乎器用而得其所以無所以賢者觀之愈有以自信而愚者窺之亦不至乎疑而得也蓋其心嘗慮曰彼道妙者非中才之所能及彼能及之者又將不言而自諭苟為不度其如此而惟妙之欲言也則是使學者坐而惑之老子者知有無之相為因而以為無有者本也故其言詳於無而略於有夫無者無言可也而可以詳言乎彼老子者既以異乎孔孟矣而王弼又失孔子之㫖蓋其說以無名也天地之始夫神者天地之至難名者也而天下既名之以神矣然物豈有無名者乎又以為常有欲也以觀其徼夫欲者性之害者也易曰懲忿窒欲而老子亦曰不見可欲使心不亂苟為有欲矣則將沉溺轉徙喪我以逐物而莫知所守矣又何徼之能觀乎此之不察而曰吾知天地之全古人之大體也吁可笑哉劉仲平曰道可道至之母太極之所待者道也天地之所待者萬物也萬物之所待者天地也夫有所待者非所謂道乃道之積也至無而無名者道也離無而無名者太極也入有而有名者天地也太極冥乎神而名不可得而識者也乃道之妙也天地著乎象而名可以載者也乃道之徼也二者皆出乎言也常無欲者之所觀見乎妙而已矣常有欲者之所觀見乎徼而已矣惟無欲者之所觀可以通於玄也或曰非此之謂也謂無者所以名天地之始而有者名萬物之母也謂常無者欲以觀其妙而常有者欲以觀其徼也曰非也讀之者誤也謂有者可以名萬物之母而謂無者豈可名天地之始乎謂常有者可以觀其徼而謂常無者豈特觀其妙而已乎夫有始則有終而不可命之無常無則至無而不可命之有噫知此則其知玄矣常無欲以至之門常無常有言有無相用不可偏而不舉也常無者欲以觀其道之妙常有者欲以觀其道之徼妙言本徼言末末與本俱能觀之然後見其道矣常名以無方為體常道以無體為用無方者無乎不在無體者無乎不為無乎不為有所可道則非所謂無方有所可名則非所謂無體故曰道可道非常道名可名非常名太初有無無有無名無有無名者太始也太始者天地之父故曰無名天地之始天地者萬物之母故曰有名萬物之母言母則知始之為父言始則知母之為生故上言天地之始而下言萬物之母然天下之理有道有常道有名有常名所謂太初有無者無而已矣所謂無有無名者名而已矣蓋有無則有名之名矣故無名者天地之始而已而其上又有祖也妙者道之本徼者道之末聖人之妙也觀之以常無聖人之徼也觀之以常有故曰常無欲以觀其妙常有欲以觀其徼妙在中粗在徼言妙則知徼之為粗言徼則知妙之為中故上言欲以觀其妙下言欲以觀其徼蓋夫無者對有之無而常無者非無之無而不為有對也有者對無之有而常有者非有之有而不為無對也不為無對者非有也不為有對者非無也故常有者真無是已而非無常有者妙有是已而非有故此兩者同出而同歸之玄也莊子曰建之以常無有言之以太一蓋周讀為常無常有常無也欲以觀其妙常有也欲以觀其徼為其欲以觀其妙也故建以常無為其欲以觀其徼也故建以常有若夫徼妙俱忘而無欲觀之則所謂建之以常無有者冥之而巳矣夫是之謂又玄而非特同謂之玄玄之又玄衆妙之門玄者妙之體妙者玄之用妙者同出乎非玄也劉巨濟曰道可道非常道道接於言則其為道也可而巳非常道也常道無可所謂常無欲是也道無不可所謂常有欲是也世道交喪而老子治一救之則其適物為可不主故常以通天下之變而已名可名非常名强名之曰大則此名者大是也大名也道字也常名無可無可則無名可名無不可無不可則有名名字之玄其在兹乎無名至之母此特言名而不言道也以名及宇故見無名亦可也天地之始廓然冥同則所謂名字者果安在乎既有名字則適物為可物因可生而無有不可至於有可此道所以為萬物之母也常無欲至觀其徼常無欲即前常道也常有欲即前可道也於常無可則謂之常無欲於常無不可則謂之常有欲蓋下文言常無名而不言常無欲言我無欲而不言欲無欲有欲莫非常也以常無欲以觀妙則天地之始是也以常有欲以觀徼則萬物之母是也所謂觀者心有眼焉非持目力而巳此兩者至謂之玄無欲有欲兩者異名而其實同出於道蓋無可與常皆道故也玄者晦冥深渺道之色也黃帝曰在天為玄在人為道道視之不見而有色者王觀其妙觀其徼而言故也既曰同謂之玄玄則可道常道迭相待而已玄之又玄衆妙之門又玄形色非色莫得而觀焉玄之玄與又玄之玄非色亦迭相待而已非以前玄為纍而遺之也衆妙者謂萬物之妙也萬物皆有妙而皆出於道則道妙萬物也於此不言徼者以妙及徼亦非以前徼為纍而遺之者也劉驥曰道可道至之門道言其體名言其用可道可名猶百家衆技也各有所長時有所用不該不遍非真常也言道常名自本自根未有天地自古以固存神鬼神帝生天生地者是矣孰知道之可道名之可名哉經以謂大道無形生育天地方其未有天地孰得而名之故無名天地之始經所謂大道無名長養萬物及其既有萬物則有形之可名故有名萬物之母無名者道之妙則無為無形故常無欲以觀其妙有名者道之徼則有情有信故常有欲以觀其徼學者當自有以入無由徼以至妙原始要終未嘗不同故出而異名同謂之玄玄者天之色所謂遠而無所至極者也玄之又玄則神之又神深之又深入無窮之門遊無極之野與虛無同其功萬物之妙皆由此出故曰衆妙之門乃萬物之所係一化之所待也誰能出不由户何莫由斯道也民可使由之不可使知之知之淺矣不知深矣知之外矣不知內矣故次之以天下皆知道德真經集義卷之一
