body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正道可道章趙實庵曰初顯常二一絶相顯真道可道非常道道可道形而下者之謂也非常道形而上者之謂也形而下者道散於形名度數之間形而上者道隱於空虛寂寥之地蓋即物以求道道固不可得以其不可得形器非道也離物以觀道道亦無所有以其無所有神妙無方也心為道之體道與心無殊性者心之生心與性不異心之與性無狀之狀道之與心無物而物心也性也道也謂之一而分三有也無也同也裂於三而會一一即云數道豈數乎一妙而神道豈離數妙則無矣道者豈得而言哉用即顯明物物無非於道矣所以形而下者雖可道即非常之道存焉形而上者雖非常之道而可道之道著矣若夫形乎真僞真為常道而僞為可道託以虛實道為實性而物為虛妄且以事理形容庶幾有得雖云常也變實在焉所以言常者常即性之地心即道之用合而言之總謂之常常之體取其不變以其不變故謂之常真常之中流出萬有又常者大也由是觀之常豈不大乎常者聖人之照用也言常不必言道言道不必言常所謂常者道也道者常也必欲言道而不言常非常豈能定一必欲言常而不言道非道豈能顯通常則常存常存者不變通則通物通物者無窮本一體而非二用即一體而具變常且若天豈不常乎陽九之極天有時而變地豈不常乎百六之極地有時而發日豈不常乎日有時而虧月豈不常乎月有時而蝕乾之上九則無首鵬至六月乃云息則知麗乎形者墮乎數者必有窮惟常則無形無形則無數無數則不生不生則不滅自天地至於萬物皆形數者也豈同吾之真常乎故曰可道者非吾之常道常豈不變也不變謂之常可乎變豈不常也不常謂之變可乎物之生也常與之俱生物之化也常與之俱化生生而不生常固無迹也化化而不化常固自若也自生自化無真常而生化者其能爾乎常生常化本真常而生化不停者也行流散徙不主故常消息盈虛不常故主即萬形而不見在一性以常存窮則變變則通大人之適時者以此可則因否則革聖人之知化者以此用之為天下者號曰神器行之以利萬物者乃曰明權思之以至元極者謂之微妙運之以因陰陽者故曰神機至於堯用之而仁舜用之而孝禹用之而决江河湯用之而躋聖敬雖然用之不同其實一也惟有道之君子不與聖人同憂者為能體常二絶名顯實名可名非常名以名可命者必有形也道既無形烏得而名焉經所謂非常名可名者非吾之常名則常亦有名也常惟不生生即是物是物皆可名也常惟不用用即為事是事皆可名也而欲究其生物之本用事之祖了不可見列子曰用之彌滿六虛廢之莫知其所且道有合散性有交辨以無合無無有入無間神飛電掣豈可迹哉此不可名也故合則同體此之合者合於太虛也散則成始以無出有不生者能生生精含氣育豈可昧邪此之散者散於萬物而成形此可名也生陽於子子美見於東南斯道之出而交物也生陰於午午美盡於西北此道之復而辨物也交物其顯乎顯則萬物之名自著矣辨物其隱乎隱則一真之元莫睹矣以無可睹者為常名可名者且不得而同也以所睹者為可名則常名者亦不得而遁矣出冥入冥至道其神乎且敦名也哉孰不名也哉次分有無二一太虛肇一無名天地之始以道在至無玄眇之地湛若常存不與一物為纍凡有相者皆非吾之常道次言非常名以名者在乎形質分量之間隨其美惡未有一物而無名凡可名者皆非吾之常名無名天地之始有名萬物之母前言非常名則是常者未離乎名也今言無名以無字破常字也無名天地之始無名者即常道也常道者即無名也夫何一理而兩言之謂道不可言言之者終莫能至道本無名名之者終不及質當以非常之常言之固兩言也常道常名即言其妙無名有名即言其用無名者生天地有名者子萬物凡以顯其用也原夫至道之體湛如太虛一物不生無名可得至靜之極靜極生動所以一氣肇生為物之始謂之觸而非觸謂之感而非感本乎虛化神神生氣生生之理於是乎恢張道生一一為始萬象之靈於是乎均賦有非有也是有一而未形無非無也即太始之形始如月魄之在艮類涓流之發源漸始乾坤誰尸造化此乃不為而為者也今也以無為妙萬法歸休以有為非凡夫自味道隱則無用而致用致用者一氣為先法生則用法而不窮元始無極一雖墮數通乎數則長生始則有形鍊其形而不死夫一水二火三木四金五土則五行之生數九木三火七金五水十土則五行之始初若得其初則知金木之承元合其成則曉水火之生死木隨子復申宫而始住其胞乾天屬金東方而稱其用事故六爻皆九與木得以同原寄體金方實一家之妙用至于金來乘襲居寅位以氤氲七氣之天處三陽而受孕至于火從兊出亥位得三水土艮興巽方朕兆乃見寅申巳亥女台曰始而不凝氣形質全由此修生而不斷故義殊洪範生數有克而有合理出仙經一則循元而不終故云始也出自無名二太極生三有名萬物之母夫始者造端也未見其生也生者母也物生而後有象象而後有滋滋而後有數此有名也經以無名者始之有名者生之是無出而為有矣爾雅曰肇祖元胎始也坤卦以地道妻道臣道母道也乾始之坤生之是故配夫婦然後有男女有男女則母之名始彰矣故先言始而後言母凡有四說焉一以陰陽言二以天地言三以父母言四以有無言夫陰陽者氣也氣也者分陰陽也一氣初肇本無陰陽太極既生一氣自析輕清者上升而為天重濁者下降而為地又開天經云天氣已足餘氣為地夫言足者乃見陰陽有定數數足而後分以混元之時雖有陰陽纏鍊未極混而未分則列子所謂氣形質貝而未相離故曰渾淪是也又曰元始以玄元始三氣上生三十六天下生三十六地上下合德以為陰陽又曰清者濁之源見乎清靜經陰者陽之澤見乎生神章由是觀之陰陽本乎一氣而自分為二故曰合而分天地之始生也本無父母生於太虛空洞之中結於混沌一氣之內狀如雞子內黃外白其未分也天地孕於靈源及其分也上下判為天地三合成德積九為陽九陽既升餘氣為地故天有九天地有九地大羅三十六天金火土宫三合之數成也中羅三十六天合三十二天四始之數生也救苦經曰天上三十六地下三十六是天之生地之成合天地之數總七十二以為節候成始而成終也天地者道之垂象道無所寓寓於天地天地無所寓寓於乾坤故以天為父地為母天地以一氣合而生萬物為父為母始之者則歸之乾生之者則歸於坤始之生之其道一也豈天之形為男地之形為女邪凡得意忘象得象忘言苟未得意象豈盡之是故以一氣而論天地猶坎一之分精神此合而分也由是觀之道為天地之母天地為萬物之母乃可知也此分而合乾為天為父坤為地為母自天至地八萬四千里自地至天亦然也以卦象論之自復之泰為三陰三陽乾下坤上為天地交泰之時也易曰男女合精萬物化生是也泰者中和也於是中有沖氣焉窈冥恍惚會至真於其中是萬物含生之意也然天地以八萬四千里准之以陰中陽半為春分陽中陰半為秋分亦男女交合之象也雖天之遠地地之遠天非以氣而交和奚有父母之名生生之理也故未分則謂之混沌既分則辨為陰陽異姓則合為男女婚娉則合為夫妻易曰有男女然後有夫婦也故取母以言生夫有而空者物之反無而神者真之原即無名者真空之原也即有名者妙以應物之用也然則真無者豈待有而欲顯其妙乎一氣自析三才自分萬物自植孰主張是孰綱維是是謂自然若論使然有自而然無自不然豈免天運地成陰交陽接不有母也寧顯其生不有生也孰認為母經曰道生之道即萬物之母也入而無出而有若有機緘而不能自已有無二致非道而誰立母之名出虛為實立始之目出實背虛一有一無道之妙用無元之一當識太虛返還之功必自於母天地之數離五坎十五五為母散而生萬物者謂之妙有如六戊加坎六己加離生生之理於是可見三辨體二一靜照常體常無欲以觀其妙自道可道非常道名可名非常名指常道常名為盡妙也視之不見聽之不聞使人絶視聽於名言之外此非有心者可得惟無心者可了乃謂之常道者是也次曰無名天地之始有名萬物之母言道有妙用前四句言妙後二句顯用蓋言妙而不言用道無所顯言用不言妙事或障理且萬物受命於無而成形於有理之必然而聖人睹之存乎見見夫道無色相真絶名言究心必徹於無心諸趣必窮於實趣既虛無之是道何有物之相因不絶見聞寧歸清淨夫清淨者性之本也色相者名之因也性本湛然非名非相離性而相為妄為虛所以名從體相而生相自念心而起真僞兩立道本難原故作經者必主於虛無窮理者當觀於色相緣虛見實從幻妄以知歸有自無生精想塵而成就物無自性所以言虛道乃無名以其非色此莊子所謂未始有夫未始有無也者二即常致用常有欲以觀其徼道本不生生無非道道降在物物無非真及乎物來歸之道未嘗主此道之真常脫然無纍奈何虛玄泛景一氣自生混沌凝真三才具體著象於天則六氣之回薄成形於地則五行之生成陰陽總其大數八卦定乎四時准則有常變化不已一生一滅在物理之固然不死不生因陰陽而致妙通乎此道必屬至人未達生原徒歸幻滅故常為大本變乃通神自爾不窮造化直指休浮不知死乎數者物失其神通乎數者形豈自纍所以有無同妙二理俱玄正陳性命之因豈得有為為妄他教則無餘盡物此道見之者昌觀徼則在理為粗入妙則即理即事愚嘗探天機陽無陰陰無陽二者相索而始合或言龍無虎有龍見虎而二俱無形或言汞無鉛有鉛見汞同而為鬼隱所以言無言有性命同歸一陰一陽是之謂道造其至妙然後有不測之神此道德之玄玄也故伏羲畫卦知無中之有而其象乃陳孔子繫辭達有中之無而惟神不測相因有無不二徼妙四玄同一權實雙顯此兩者同出而異名經自無名天地之始有名萬物之母顯道降而為物自常無欲以觀其妙常有欲以觀其徼分有分無顯出顯入謂道本一致妙用玄彰使人直認本原先以有無二致摽之後以同出異名一貫其義此兩者一有一無也同出者同出於道而二名也易大傳所謂殊塗而同歸百慮而一致且智徹為明悟有無之一體疑其有二執有物以非無未可立談蓋衆人之情動輒有礙礙即不通說有者不容言無說無者不容言有依此疑中乃分順逆順觀者衆人也指物為有有為見存天高地下川融嶽固五色之粲然音聲之嘈雜名利之崇榮富貴之顯大天倫之結固萬法之鋪張舉皆實有若有人焉指此云虛謂此非實彼方膠固未以色空認妄為真一切衆生隨境易流固名為順指真空為實幻化為虛死生為一富貴為他聲色為邪根親戚為偶聚四大為和合知空本不空知色本不色此逆觀者之所為也蓋順以易如水之就下從之也去而不返逆則難如策蹇以登山雖苦也而至之則樂此天人之界畔見覺之宗由初分之而恐其異見終合之而使彼同觀有無同出於一天出殁共為之終始莊子曰自其同者視之萬物皆一也自其異者視之肝瞻楚越也又豈可與之論大同哉二事理兼融同謂之玄前言有無同出於一體使人不得以有無而殊觀是圓融至理也後密嚴其教故曰同謂之玄同之字從一從一口彼亦一是非此亦一是非所以不同一口則是非同矣故大同者離人焉離人則入乎天入乎天則同乎道同謂之玄是大同也且有無二理同謂之玄以無為玄則妙而不可見故玄也以有為可見豈得同謂之玄邪夫萬物於無中出有有中含無本一性也又何假以不同而同之性理自破色空為初玄離有無為重玄則義漸明矣悟則頭頭是道迷則見見皆殊直以死生為一條可不可為一貫平等性智方可造入御解曰妙而小之謂玄玄者天之色書義曰小而妙之謂玄大而敏之謂俊德藏之則妙而小顯之則大而敏故於聖人在下則稱玄於在上則稱俊妙而小之謂玄誠難言也夫道無形相孰分小大道大天大豈得云小其在物也於小奚分謂之隱以其不形謂之奧以其不測蓋聖人之心體道則妙也出而應物在理則隱在事則顯事小而反為大者注人之耳目也道大而反居小者處心之淵微也小則右右則陰以相之藏妙而不藏用也大則左左則君以臨之顯事而不顯理也故曰妙而小之之謂玄五讃美一諸法體妙玄經自常無欲以觀其妙常有欲以觀其徼復次同出而異名同謂之玄是結前二句義合有無歸於一致又曰玄之又玄初謂見覺相照悟此有無玄同一致乃深識也及又玄之義又非前理可畢經意次第言之也有無生於道道所以司有無者也而有者自有非道之有無者自無非道之無此道主之而不主者也然無亦出於道有亦出於道無體既玄有體不得不玄也蓋無出而為象為數象數入而為滅為無列子曰自生自化是也如是則有無不干於道明矣而有無皆自道出二者所以各得玄也譬如一父二子父子之姓同一豈以父之姓子長而不子少乎此顯道之玄而有無不得不同玄也及用之在人道生乎一一數也始也抱始一之義歸之太無然後見身中用事也豈直以虛言載之邪龍虎交而成聖胎聖胎靈而見真人真人出而乘神光莊子曰上乘神光與形滅亡二妙先衆法又玄諸法從道而生粗之與精一一皆有玄理曰體玄也體之玄未脫乎迹去體之玄離體之用造形而上斯又玄也楞嚴曰妙常寂有無二無無二亦滅此言性也前云經以次第言之次第者即分頓漸頓漸即分大小乘大小乘分列果位如海空智藏論有無之義至妙有妙無為究竟也如性宗論內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空無變異空本性空自相空共性空一切法空不可得空無性自性空理猶未極不可得空方又玄也又玄之宇嘆道之深遠二邊不立中道不安言默匪窮謂之實際則步不躡虛始為真一則存乎有得所謂微妙者也今分頓漸二門三乘階次以證玄之又玄義今夫混元之前無名無象混元既判有象與名自無名已前直悟其理則謂之頓若從有名之後攝有歸無則謂之漸蓋頓則不立一法漸則始於修為修為之門自言教得所謂日益益而能損至於又損乃證又玄者也在性如是在命亦然衛生之經初自於養生次至於長生終至於飛仙頓漸之理各有攸趣重玄之義非中小乘本際言太上道君曰非空不空亦不空空非法非非法非物非非物非人非非人非因非非因非果非非果非始非非始非終非非終非末非非末而為一切諸法根本無造無作名曰自然自然而然不可使然不可不然又曰所言玄者四方無著乃盡玄義由是行者於空於有無所滯著名之為玄又遣此玄都無所得故名重玄衆妙之門今立頓教名為又玄其義焕矣又以大乘及無上乘言之玉清之教為大乘泯迹三清為無上乘且如太清九品上仙是入玄者也九品上真至玄者也九品上聖又玄者也三清俱泯無量玄玄也此皆以性明之以道會之經之大意存乎此矣故當部謂之圓教性命該攝夫德入而為道性融而為命此之命者盡性至命與長生之命又不同也夫養生之命非特盡性而已必有深根固蒂者存焉又依長生宗分玄之又玄列為二門玄者萬物之理具有也出器入覺用中顯妙妙中通神此皆謂之玄也玄常隱矣以隱為祕祕而不傳故華堂內禁之書而測之在入也能測之者是謂見機易曰探賾索隱鉤深致遠然物之隱玄未若人身之隱玄人身之玄即天機也老君曰人身微妙凡世難言謂一切人貴遠賤近不知身中之玄而徒欲窮物於外夫身中之玄聖人察陰陽之微而法象乾坤為九丹之訣長生之宗謂道要玄微天機深遠非至至者不能言焉此法出於三皇而傳及黃帝厥後繼聖頗多而遺文則略獨魏伯陽作參同契正取周易爻象繫辭配合乾坤六子運動天地玄機發其閫奧辭曰夫修金液太丹先尋天地混元之根宄陰陽造化之本明水火克復為夫妻認金水之情相生為子母故有男兼女體則鉛內産砂女混男形則砂中産汞曰者陽也曰中有烏陰含陽也月者陰也月中有兔陽含陰也故有陰陽反復之道水火相需之理造化之道明矣既知其位復知其根乃天地混元之根也既取其根又取其象乃陰陽匹配之象也既得其象復詢動靜動靜既明須知其數既知其數乃依刻漏刻漏既分須明進退進退既明乃分龍虎則南北之界分焉金水之形合焉則大丹可修復有法象內外水火有燥濕焉有鼎室焉有胞胎焉有進退焉有爻象焉有水火之候焉有抽添之則焉有諸卦模樣焉有離合之形焉如上所舉一一皆隱玄妙於其中也須以智窮仍須師授若謂玄關祕密置而勿言則長生之宗又安在也向謂無名天地之始有名萬物之母言始與母不言終者以意逆志是謂得之至於畢法定三成之理載金誥玉書之文傳道述五仙之宗辨九還七返之要此搜括玄玄者也至如小成之人為初玄中成為至玄大成為玄玄此見乎修身養命服氣鍊丹終以超脫飛升升玄究竟皆有漸也如彼其性自妄空以至於真空如此其命自修生以至于登真玄之又玄其義如此夫能無也未能無無也則未可為衆妙之門能養氣也未能鍊神也未可為又玄之理性存於空命存於實方顯妙門豈自妙也曰衆而已六統象德也衆妙之門字說以三人為衆此非三而止也自天地至於萬物自有情以至於無情咸所統焉故為衆妙之門也蓋至於玄是為盡性盡性則一而已矣又玄則是為至命至命則入乎不死不生然則道者無門無旁四達之皇皇今以門而言之則道者果有所乎是不然也以門言者不在乎所以道言之性有返動以其返動則以出入而言凡出入而言未見成性也至於成性則無可成者孰出孰入如此然後能會萬有於至虛之地妙一性為不測之神易曰成性存存道義之門故出生入死陰符所謂天生天殺道之理也出機入機艮象所謂時止即止時行即行也有出而不懼者則體道也有入而不欣者通玄也又有出入而不知所以為出入者盡妙也則知門者通萬物生殺之理顯衆甫歸焉之宗且萬物受命於無是自無而出有也受命於道者皆妙也故曰衆妙妙如何哉猶之水也犯者必濡凡有道而生者皆有妙也次以謂我從衆妙門而出得乎一也一在我矣我將負此妙而返入歸根復命體乎又玄亦能妙衆者也猶之火也自我而明向物皆明自我而化萬物皆化始也道之妙我也終焉我亦妙物也一至于此道果妙我乎我果妙物乎終進乎不知也邵若愚道可道至衆妙之門大道者至虛至靜無形無名不可以視聽求不可以思議知不可以語言及此無始無終常存不改之道自虛無始化一氣因有一氣之跡是故可道既云可道則非常存之道既有氣之名可名則非常存之名未現一氣已前無形無名之時此即天地之始此不可言之道緣有一氣之名為生萬物之母此可言之道乃知我身從一而有人能以一為法悟入而見大道夫大道者人之真心也一氣者心生之欲也夫真心本來虛靜元無生滅因真心動而為有其名曰欲念也智也幾也識也緣心起欲故隨欲受生既生之後受納好惡攀緣不息著五色殢五音恃强梁居寵辱迷妄為心因執妄心蓋覆一心不明一氣之道若人捨妄去欲便是一心此心持之則為正得之則為靈為萬物之母乃生死之根緣其存欲蓋覆真心所以有生有死人能無欲無欲則虛靜乃同無名之始便能出離死生故老子云常無欲以觀其天地之始此乃出離生死之妙又云常有欲以觀其一氣之道故為徼邊也淺之意不可將心求心為有欲不可將心滅心為無欲此有無兩者同攝為一緣出言為教而分有無之異名有無混同謂之玄釋氏謂之不二法門又謂之中道玄之門以中為法設喻如筌然法從心起既起於心繫著在中則非虛靜老子恐中道法縛不能捨筌故將又玄以釋之學人但不著有無亦不居玄之中道實際理地不受一塵則心虛靜乃是無為故不須推照以無所得故始是無欲所以纎塵不立故名清靜都無作用故名無為無修無證故名自然都無一物故名虛靜自在無礙故名逍遙一味平常故名恬淡是故心無欲則離諸分别離分别故無煩惱心無欲則觸事無我無我則無爭故無咎心無欲則離諸善惡離善惡故不拘因果心無欲則不著萬物故無生無生故無死夫心常無欲者乃衆妙之門王志然道可道至衆妙之門道不可言言而非也道不可名名而非也謂之曰道可得無言乎可道之道非常道之自然可名之名非常名之自出常道常名如環之無端如四時之行焉未始有極未始有始而乍起乍滅代廢代興非吾所謂真常者也常無欲以觀其妙者道之體常有欲以觀其徼者道之用而體用每寓之於恍惚有無精粗微妙之間固不可以智知不可以識識以至視聽迎隨皆不可得云何得之有學而知之者未有不學而知之者也易曰無思也無為也寂然不動感而遂通天下之故楊子曰耕道而得道獵德而得德孟子曰自得之自得之則左右逢其原為學至於左右逢原之後則何所往而不將而所謂得之者得此者也於戲道之妙足以盡萬物之性道之徼足以窮萬物之理理性玄同而所謂有無者槩可並觀而雙泯之或謂有有無有無無有無者何也此言有無相代之如此無即真有有即真無有無相因未始有異經曰此兩者同出而異名同謂之玄者玄之為色幽而眇赤而黑陰陽混蒸同乎一也易曰一陰一陽之謂道陰陽不測之謂神而陰與陽有與無同乎一也同乎一矣未妙乎一也妙乎一矣未妙乎多也妙乎多矣未妙乎我與物也故曰神也者妙萬物以為言者是也玄之又玄則一之與多我之與物莫不皆妙者也此其所謂衆妙之門故老子以此首篇重玄之義至至之理深矣遠矣不可以有加矣學者所宜盡心者焉程泰之道可道至非常名無彼此今昔之間以莫不然則其能常者也能乎此不能乎彼昔嘗如是今不如是則不得謂之常矣道之未為德也混然茫然函萬有而一之其中所藴能剛能柔能實能虛能短能長隨所感以出有萬不同之應而非因所應以附麗於一事一物也則亦何所感而不能何所施而不遂也故無彼此今昔之異也知道者得其以而明言之故遂指其無或不然者而命以為常也及夫道出而為德德著而為名曰仁曰義曰禮曰智固皆道之所寓而迹傳於事事立之名於是有所麗而有所局矣此之德既不可以通諸他德而此之名又不可命為他名也故凡道之可道者已不得謂之常道則名之可名者自應不得謂為常名也無名天地之始天地也者總司造化開闔作復在域中既極其大矣而老氏又即天地之上别立一目而名之曰無且曰此之無者可以名為天地之始也諸如此類皆儒流疑以為虛誇無實者也然而易之兩儀即天地也而生兩儀者實為太極太極也者非天非地而能該天地以立於總於是時也無儀可放無數可數故老氏易其名而命以為無也凡老之謂無約其等級則與太極正相應也極之言至也太極者能極天地之所不至者也無之立名則以未兆為義也未有天地故也名雖異而理正同也其徒亦知後世必疑乎此矣故列子自作之問而自為之答其言曰有形生於無形則天地安從生然則謂無之能始天地也雖列子亦知夫人之必疑矣而自釋其以則曰天地未生之前其於無中有象凡四也太易太初太始太素是其序也是皆氣形質具而未離者第可目為渾淪而已也又動又變而後輕清者乃始為天重濁者乃始為地則夫太極也者正其居虛而包清濁以自立於無為無匹之地夫非渾淪而無者耶則老氏立名為無而先乎天地者正應易理也有名萬物之母後章曰天下之物生於有有生於無當其無也則直空然窅然而已而凡有由之以生則謂無之能始天地者尚其可明也及其既入於有則與物何異而反能生物也曰此蓋無之已動而未成其為物者也揆其分際正渾淪者欲動而未及於出者也方欲名以為無則既異於無矣方欲謂之為物則又未著形質也故參研其哀而名以為有也至號物之盈而名為萬物者則皆形象已凝體質已具者也天地日月雨露山川草木人禽器物皆其明有形質不止僅可名有而已也老氏之形容此有則凡三易其名而實同一理也借數言之則為一一者謂其可以生萬而未至為萬也倣形而言則為象對器而言則為朴曰象曰朴又皆可以為形為器而其形器未及凝結者也是故上之已不為無而下之未至為物則此之謂有者無古今彼此之間而常為物生之祖也故後章又曰天下有始以為天下母也莊子物初之論蓋亦由此而立矣老子亦自知此理之難遽解也又嘗由總及散而槩申之曰有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道强名之曰大夫混成也者渾淪不分之謂也即有無兩者方同而未出之初也先天地生則天地固嘗於此受始矣獨立周行而槩為天下之母則信乎無物而不為其子也此三者極天下之事事物物所從生起皆總是也凡老氏之書於六經之所以言者則略之而不竟至六經之所未究者則必曲致其詳也六經言治至於道則極矣而老氏自道母天地之上更有數級則無也玄也又玄也皆其地也而分際在此三者已上則皆不可得而道亦不可得而名者也夫既無名可稱而欲從此地立言以啓未悟則將何所寄語也哉於是超乎可道可名者而創立有無二目以寓其指也此其立教之總也此二者既立名義而其話言所及人人悉可循想矣言及乎無則知其所指必在天地之先也言及乎有則又知其所指必在萬物之表也故其書之縱橫曲折條目不勝其多而皆不出乎有無二義也然而有也無也六經實已言之而其與老語不同者六經未嘗單言有無也易之無思無為無方無體之類固嘗言無矣而思為方體僅相綴屬未嘗捐棄所附而單立一無也老氏之創此模也正從造化未有形著之時言之則並與夫思為方體者皆未著兆朕也此其意指殆將自居於無而處六經於既巳為物之地也要求其歸則誠高矣遠矣疑世無其事而寓其言矣然其分際甚明前後具有義例悉可稽覆而儒流語脉亦相灌注非如世之訓釋其書者不分道器取甚淺之理駕而入之高妙其實荒忽無見也則其尊而抗之乃所以汨而亂之也且彼何不淺而驗之以事也張良之恬淡曹參之清靜文帝之元默是老教之不行乎周而肇效乎漢者也其於用老則萬世之稱首矣然此一君二臣者豈其於世事而嘗少少去心也哉特不肯以人欲自纍故其貴無之力雖未盡道亦足以集虛鎮擾而不入於名事也矣至於西晋之世遺棄禮樂刑政專為無有而紀綱法度蕩然不存晋室因以大亂故讀老者必知夫無為之中有無不為者在焉而後可以知漢晋之治同所出而異所效也若夫妄言無行之徒以道流自名而依並虛無以文荒誕僞為飛升禍福之說則皆老語之所無也推原其所始則神仙之說起於戰國禱祠報應盛於兩漢而八十一章未始有此也世之學老者其當以八十一章本語為是乎抑以末世增飾誕語為是也凡君若臣其常以張良曹參文帝為準乎抑以西晋之放蕩與夫末流之怪傳為可準也此其當鑒當戒昭著而易見者也常無欲至觀其徼無之能生有而不自為有者乃能常其無也有之能生物而不自為物者乃能常其有也何者未著形體中無間斷故可常也若夫因造化而得形質出大道而為德仁義禮則皆物也此之為物常凝不散則可名以有散之則無矣故自有已為物之後則凡其嘗著形體者則皆不能自主其有也萬物之並作而藝藝也其歸根而枯秃者可立待也此其巳有者既不可留則復命而靜者一旦土膏春溢凡其藝藝而出亦不能自遏而藏處於無也凡道學之失得與夫輻轂户牖之具否皆一理也則合世間之有無皆不足以循求大道之表裏也若夫常無也者道之藴而未出者也常有也者道之已動而向乎出者也是皆物物而不物於物故能總生化而不入於生化也以其居總而體該故大道之本末可以即是而求也其曰妙者居造化之奧而萬有之所自出也是常無所總之地也其曰徼者邊際也如邊境處中國之四隅也蓋無之已出為有而有又將出而為物者也故不得為奧而遂常為際也二義立而道之表裏有稽矣得常無而即之則可以宄萬有所出而見其裏得常有而即之則又可以窮萬物之所生而見其表故老子所以貴夫常無常有者道之表裏於此乎可想也莊子曰睹有者昔之君子睹無者天地之友即是理也易曰形而上者謂之道形而下者謂之器道即器也器即道也特所形有上下而非判然二物也此之妙徼即易之上下矣其捨上下而名妙徼者正欲自成一家而其指歸未嘗少有不同也天下之物安有下無載承而能空立其上者耶亦安有有裏而無其表者也此道器有無之相須而明白易曉者也故借之以喻使人知其談妙之中未嘗遺徼也此兩者同出而異名常有於常無為徼而常無於常有為妙當其已出也則有之與無固可分矣而其未出則混合無間也故曰此兩者同也同即一也一即未為一三可以生萬而未至為萬者也易暨五經論孟皆嘗言一而未嘗言其何以為一也老氏之師弟子則於此特詳矣曰混成曰渾淪曰渾沌皆言其未分為二也從其未出而命之以同從其無與匹對而命之以獨自其無或不然者而命以為常則皆主其總而明其以也及其無己出有而未至為物則又立為名稱以明示人曰一曰朴曰象又皆取其函萬為一者隨所寓而名之故也故老氏言道於此特為詳委是以枝葉雖甚戾儒而儒者不能不資其妙也故夫知道者尚能即異以資其同而淺於道者至謂孔者不為一家則是過其門而不知其中有堂有室者也同謂之玄五色以黑為玄天之色以無所致極為玄太玄指罔之直冬物皆歸根復命而不見畦畛者名之以玄則玄云者窈然深遠之謂也列子之謂易無形埒正訓此也同謂之玄則有與無合渾淪未相判别是可謂窈然深遠也矣若其朕兆微見則無者真隱於無有者實形於有分際既萌不得復謂之玄矣玄之又玄衆妙之門萬有之冥於無則既極矣今也進而上之更有玄焉無進而玄則益深矣而玄之上更有又玄焉其理何也曰列莊固嘗有所發明矣其在列子則曰有太易者有太初者有太始者有太素者皆氣形質之所資始也凡四降其序而始及夫輕清之天重濁之地則循其序而觀之有之進也為無無之又進也為玄玄之又進而加玄也其次第可想也莊子曰有有也者有無也者是老氏之常無常有也又曰有未始有夫有無也者是老氏之玄也又曰有未始有夫未始有無也者是玄之又玄者也皆心見其理而世無其名出意想而强言之也老之言曰寂寥窈冥則實形容夫玄及又玄之狀者也而莊子益復廣之以為昏默溟涬也夫惟常無既可以總會萬有之妙則玄之又玄固其當為衆妙之所出也後章之衆甫也莊子之百昌也衆美也又皆倣此之妙而與之為明也論自有書契以來聖智仁義之機發於易而孚乎五三六經之治自始及今天下賴以為命如五穀布帛得之則生不得則死决無可以易而他之之理老氏則設一教必欲絶棄聖智仁義而復諸結繩之始世之以六經為業者相與協合排擯至指其書以為異教然而五千言者常與六經並行終不可廢是獨何也六經明禮法故其所書皆器也而於道則略老氏窮道未故常遺器不言二者詳略雖異而器實載道道實生器不可折而二之也世之求道者必皆自下學以求上達而上達六經不肯究言也老氏則嘗罄底藴而暢達之矣故凡學道而微有所見其在六經無語可為質驗則皆並老語以攄發其理故其立教若甚相悖而道常並行蓋有以也嗚呼此理微矣難猝以一語會而通之也大昌今取古今日用最淺而最切者明之則人人可解矣農者天下大本而其業至粗也六經之教則與之言耕耘收斂之候耒耜鎛銍之具其可謂形而愈下者矣然而四時之化於此器乎託體焉百穀之種於此器乎成實焉則雖天地元氣其妙入於不可名者亦皆託此以著其用豈容以其具在器而云道不在是也若夫老氏之於道也窮極要妙則有之矣東作西成之政老氏固已絶口不道矣及其著諸書也雖萬物作復藝藝歸根者不勝其變也種穫養伐悉有其具而老氏曾無一語以及也至於談微闡妙則天地生化之樞道德藴藏之始尚猶指以為淺直欲究天地之何以得為天地玄無之何以能為玄無乃為稱愜其意則此一教似不與六經相麗矣然大昌嘗由其言以探其所不言由其不肯明言以求其所不容不言則德仁義禮未嘗不存賦稅兵刑雞犬舟車未嘗不具則其言雖嘗貴無而未嘗遺有也此之首章極於玄之又玄則又超衆妙而司其出矣而有之觀徼也亟與妙且無者對出而偶立則是有也器也何嘗相二也聖智仁義亦何嘗可棄也用此而讀老語則至無之中實常該有造妙之初必由踐迹不可誣也黃茂材曰道可道至非常名常之為言長也久也道與天地相終始其為長久豈人所能言哉若使可得而道可得而名則是世人之見何足以為常經曰吾不知其名宇之曰道道惟有一而已何以與名對老子之意欲詳以長久之道示人者耶無名至萬物之母天地之始其果無乎若其果無孰從而始無名非名無非無也不可得而名故爾及其既有其果有乎示强為之名爾經曰惚兮恍其中有象恍兮惚其中有物又曰有物混成皆强名也母者謂其能生物也有天地然後有萬物故先天地後及萬物其言次序如是常無欲至同謂之玄經言不欲寡欲可欲多矣今若曰無欲有欲則與經之言相符然無欲謂之常可也有欲謂之常可乎曰自有物以來九竅者胎生八竅者卵生皆因為欲生復生生寧有盡時故有欲亦謂之常人知無之出於道而不知有之亦出於道夫豈知有無同出於玄者哉玄之又玄衆妙之門南伯子葵謂女偊曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞之洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之玄冥玄冥聞之參寥參寥聞之疑始夫道愈微而愈有愈窮而不可盡女偊聞而至疑始玄之又玄可見於此所以為衆妙之門也歟道德真經集義卷之二
