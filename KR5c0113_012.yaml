body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正天長地乆章考異河上公作韜光章趙實庵作生生不生義章唐明皇疏前章明谷神虚應虚應即不窮此章明天地無私無私故長乆首則標天地以爲喻次則舉聖人以轉明結以無私成私義將欲勸勤此行杜光庭曰前章明玄牝運氣天地任之以自然此標天長地乆以契任自然之用聖人以理亦當體天地之用則人安國寜天地不以其私故能長乆聖人無私用道萬物所歸矣張沖應曰韜藏也亦養也謂韜養其晦然運其道不發見其光明於外則其道有成此章引天地及聖人不自生以成身其說深有奥㫖天長地乆天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私考異河上公嚴君平本以其無私王弼古本作不以其無私邪開元御本作非以其無私邪河上公曰天長地乆說天地長生久壽以喻教人也天地所以能長至不自生天地所以獨長且乆者以其安靜施不望報不如人居處汲汲求自饒之利奪人以自與故能長生以其不求生故能長生不終也是以聖人後其身先人而後己者也而身先天下敬之先以爲長外其身薄己而後人也而身存百姓愛之如父母神明祐之若赤子故身常存非以其無私邪聖人爲人所愛神明所祐非以其公正無私所致乎故能成其私人以爲私者欲以厚己也聖人無私而己自厚故能成其私也王輔嗣曰天長地乆至不自生自生則與物爭不自生則物歸也故能長生至成其私無私者無爲於身也身先身存故曰能成其私也唐明皇曰天長地乆標天地長乆者欲明無私無心則能長能乆結喻成義在乎聖人後身外身無私成私爾疏此標章問也天以氣象故稱長地以形質故稱久天地所以能長至故能長生天地生物德用甚多而能長且久者以其資禀於道不自矜其生成之功故爾疏前句標問此假答云天地所以能長且久者以其覆載萬物長養群材而皆資禀於妙本不自矜其生成之功用以是之故長能生物又解云不自生者言天地但生養萬物不自饒益其生故能長生是以聖人至而身存後身則人樂推故身先外身則心忘澹故身存疏是以聖人傚天地覆載必均養而無私故推先與人百姓欣頼爲下所仰故身先也不自矜貴而外薄其身天下歸仁則無畏害故身存也非以其無私邪故能成其私天地忘生養之功是無私而能長且乆是成私聖人後外其身是無私而能先能存是成其私也疏天地所以長乆聖人所以先存者非以其無自私之心故能成此長乆先存之私乎杜光庭曰天長地久老君將明天地長久之義以教理世之君故於章首自舉其問天以氣象者列子云天積氣也無氣無氣地積塊也無處無塊積氣爲象象虚也積塊爲形形實也易繫辭曰在天成象在地成形變化見矣上象下形故能變化孳生萬物也天地所以能長至故能長生老君將明此長久之義自設其問亦如文章家亡是公子烏有先生東都主人之例也立題發問自答之以顯其事爾爲前句既問天長地久此句方答云以天地運元和沖用之氣生育群品群品得生天地不恃其德不有其功故能長乆若恃其功則功細矣若恃其德其德薄矣不恃故德廣功大萬物歸宗而天地長久也人君理國當法天行化任物無爲衆庶熙熙自臻平泰理身無勞心役慮之事無矜名徇欲之功神安於中氣和於内如此則國祚長遠身壽遐延亦如天地無私乃能長久也是以聖人至而身存理國不矜貴以有爲不勞人以自奉所謂後身外身也太古之君志包天地澤及天下而不知其誰氏其生無爵不有其位也其死無謚不名其功也其實不聚其名不立天下樂推萬物欣戴可謂後身而身先外身而身存也世之衰也其君則不然恣身之欲而役於人殫人之力以奉其己人勞政弊天下去之此所謂失外身後身之道也豈若碎琥珀之枕焚雉頭之裘罷一臺之費却千里之馬德垂當代名光竹帛乎修身之士不嗜榮爵外其身也不爲躁進後其身也如此則身存而德充德充則人服可謂身先身存矣反於此者道遠乎哉非以其無私耶故能成其私聖人之理也任自然之化無獨見之專不厚其生不伐其善不爲天下之先故能處人之上不爲天下之貴故能享祚乆長所以億兆宅心夷蠻稽顙干戈止息宗廟安寧此之爲私也大矣由其不以私爲私故成此光大理身則德充人服道契神明身壽長生其私大矣亦由其不以徇私逐欲成就此大私也靈寳經云居世之人貪歡逐欲前樂後苦何哉極其逸樂而墜於三塗也學道之士絶利忘名寒栖鍊行終得仙道先苦後樂何者積其功行升乎九天也宋道君曰天長地乆至故能長生天穹窿而位乎上經爲日月緯爲星辰而萬物覆焉地磅礴而位乎下結爲山嶽融爲川澤而萬物載焉萬物覆載於天地天地無心於萬物故天確然而常運地隤然而常處所以能長且乆也天地有心於萬物則天俄而可度其覆物也淺矣地俄而可測其載物也薄矣若是則有待也而生烏能長生是以聖人至而身存天運乎上地處乎下聖人者位乎天地之中達而爲三才者有相通之用辨而爲三極者有各立之體交而爲三靈者有元妙之神然天地之與聖人咸得乎道而聖人所以治其身者亦天地而已故此章先言天地之不自生而繼之以聖人不自有其身也人皆取先己獨取後曰受天下之垢是謂後其身則不與物爭而天下莫能與之爭故曰後其身而身先枉塗不爭險易之利冬夏不爭陰陽之和外生死遺禍福而神未嘗有所困也是謂外其身而身存夫聖人之所以治其身者如此況身外之事物乎遭之而不運過之而不守體性抱神以遊古俗之間人將自正物我爲一先天地生而不爲乆長於上古而不爲老此其效歟非以其無私耶故能成其私天地之大德曰生聖人之大寳曰位道者爲之公天地體道故無私無私故長乆聖人體道故無私無私故常存自營爲私未有能成其私者也王介甫曰天長地乆至故能長生長者言其遠也乆者言其恒也以其不自生故能長生天地所以長乆者以其不自生任萬物之所生既任萬物之所生乃能長生萬物而無生之累也又曰於天言長於地言乆則重於乆可知也是以聖人至而身先聖人無我也有我則與物構而物我相引矣萬物敵我也吾不與之敵故後之外其身而身存萬物莫不累我也吾不與之累故外之也故曰外其身而身存非以其無私耶故能成其私字說韓非曰自營爲私背公爲私夫自營者未有能成其私者也故其字爲自營而不周之形故老子曰夫非以無私也故能成其私私從禾從厶厶自營也厶不能不自營然自營而不害於利物則無怨於私矣蘇潁濱曰天長地乆天地雖大而不離於形數則其長乆蓋有量矣然老子之言長乆極於天地蓋以人所見者言之耳若夫長乆之至則所謂天地始者是矣天地所以能長至成其私天地生萬物而不自生立於萬物之外故能長生聖人後其身而先人外其身而利人處於衆人之表故能先且存如使天地與物競生而聖人與人爭得則天地亦一物耳聖人亦一人耳何以大過之哉雖然彼其無私非以求成私也而私以之成道則固然耳吕吉甫曰天長地久至故能長生長短形也久近時也天以時行者也嫌不足於形故以長言之地以形運者也嫌不足於時故以久言之天地之根出於玄牝玄牝之體立於谷神不死不死則不生不生者能生生天地之所以能長且乆者以其不自生不自生故能長生猶谷神而已矣是以聖人至而身先聖人豈以有其身爲累哉縁於不得已而物莫之上外其身而身存立於無何有而物莫之能害故曰外其身而身存非以其無私耶故能成其私身者吾之私也後其身外其身則公而無私矣無私也故能成其私陸農師曰天長地乆至故能長生貪生者不生遺生者不死故曰天長地久天地之所以能長且久者以其不自生故能長生是以聖人至而身存聖人者天地之合也屈己而已以之先忘我而我之以存故曰聖人至而身存非以其無私耶故能成其私非以其無私也故能成其私然而屈己而易忘王元澤曰天長地乆至故能長生自生則有其生有其生則生既喪矣惟無以生爲則生未嘗生生未嘗生則所寓之形雖生而無生之累宜其長且乆也天地之不自生非利乎長乆而然道固如此而已所謂長乆者亦瞬息之間耳唯蓋載傾陷而未嘗壞者乃其眞也是以聖人後其身而身先聖人雖聖而形與物齊唯體天道而不爭乃能獨異於衆使其立己而與衆敵則匹夫匹婦皆足以勝之外其身而身存有我而存之則物皆吾敵夫惟超然自喪不有吾身者物莫能傾之非以其無私即故能成其私聖人無私未嘗有我故也使計而爲之則私孰甚焉劉巨濟曰天長地乆至故能長生天地燮之和也物物我生也矣不能不衰以敝惟不我其生爲以成理造物則能長生矣天積氣也以遠爲幸故言長地積塊也以固爲幸故言乆不言乆生者以長乆之故也積氣積塊雖理無不壞有存焉知天地之有壞遂以長乆者爲妄者觀有而已是以聖人至而身存聖人與天地同則後身則身猶之不自生也身生身存猶之長生也後身謂屈己也外身謂忘我也屈己則人下之故先忘我故以外其身爲存非以其無私耶故能成其私天地不自生與聖人之後外其身皆無私也然天地以此長生而聖人以此存則皆成其私者也然不私之爲私大矣莊子曰無私焉乃私也前章言天地根故次以長乆劉驥曰天長地乆至故能成其私天無爲以之清故能確然而常運地無爲以之寧故能隤然而常處皆以其不自生故能長生若有心於自生則智有所不周力有所不及烏能長且乆也人處天地之中與天地分一氣而治所以不能與天地同其長乆者以其有爲有欲而貪生太厚故也是以聖人後其身而不敢有爲外其身而不敢有欲人皆求福己獨曲全人皆取先己獨取後是謂後其身也忘其肝膽遺其耳目外死生遺禍福是謂外其身也後其身而不先外其身而不有芒然彷徨乎塵垢之外逍遥乎無爲之業隳支體黜聰明離形去智同於大通與道同乆則身不期先而先不期存而存非以其無私邪故能成其私聖人之後其身外其身以濡弱謙下爲表以虚空不毁萬物爲實故次之以上善若水趙實庵曰初示因有三一舉天地長生之理天長地乆道因象顯而不知其終火以薪傳而不知其盡物生而有象道與之俱生而生生者未嘗生火傳而爲明薪化而火隱焉昭昭者未嘗昩故前章示谷神不死是謂玄牝玄牝之門是謂天地根而其致不死之理在不勤故也繼之天地長乆取其徵也二明本無心生於物天地所以能長且乆者一炁既分兩儀奠位雖有高卑之間同乎得一之靈以天得一固自長也以地得一固自久也長之與久義同一體天何以長言地何以久言蓋天以氣言故言長也地以形言故言久也清氣升而上有形而同乎無形也蒼蒼者其正色邪濁氣降而下有氣而不能逃形也廣大者其自任邪然天地者道之所生大道無形生育天地天地以無形者爲之父母無形則無名無名天地之始原天地之本以虚受性以性化虚此從有入無也以虚化氣以氣生形此從無入有也所謂得一者眞元也眞元者一氣也以其能長且乆者二氣交合不失於常也故能生生而不窮苟以交合變化爲無動無靜則天有時而裂地有時而發當其一闔一闢一動一靜運日月以分晝夜變温凉而定寒暑凡以綿綿若存故列子曰一氣不頓進一形不頓虧是其有節也非虚極而運神靜篤而專氣其能與道同流乎天以氣運故穹窿而在上地以形處故磅礴而在下此天地自然之位也乾其靜也專坤其動也闢此天地自然之德也以萬物爲芻狗此天地自然之公也以應物爲橐籥此天地自然之理也然天以運言則運居乎中而六氣爲之用動者未嘗不靜焉地以處言則隤然不動而含洪爲之德靜者未嘗不動焉然天地之所專者專乎氣而未嘗專乎物氣專則物自遂矣夫何容心哉道法自然天地亦爾故生者自生化者自化萬物植植吾且生而不有之萬事總總吾且爲而不恃之兹所以爲長時生化之道也故曰天地所以能長且乆者以其不自生故能長生能者指人而對天地也何以知其然邪天地無爲而無不爲無能與不能有能與不能者指人也謂天地能者不自有其生故長生謂人有不能者認物爲己有故喪生所以天地能長且乆也又何以言且乎夫形之大者莫大於天地壽之永者敦過於乾坤且者且而已然天地雖大以道觀之未離乎形有形者不能以長存有數者不能以固乆大劫之交必歸變壞然而未壞者特曰且而已夫不壞者天地之性形虧者天地之數觀乎𣏌國之憂答者未及于此三故無終窮以其不自生故能長生仙經曰形以道立神以空生蓋人之生與天地同得一氣而人不能與天地長存者守之不得其道也天地自然還丹以鉛龍汞虎卯酉隱藏上升下降天陽地陰兩至之所歸坤艮之所會行之有度運之有時坤巽行乎天乾艮歷乎地乃自然還返也故天長而地乆夫人者一體之中五藏之内上法天地中合六氣無不合乎此道也所失之由在乎不能專氣以自御守氣以自持行氣以合道終日馳逐妄境蹷趨之不正則氣亡矣焉能與天地同爲長生邪黄庭曰氣亡液漏非己形是使人内不失其氣外不失其形形以化神神以化道則形不失道氣不失神二明忘己而顯德是以聖人至而身存前二句先以天地得長生之道在乎不自生不自生者專氣而不專物專氣則靜定靜定則能應神不勞而用有餘也天地生化之道如斯而已太上欲顯聖人後身之義先明天地而繼之聖人是以字牒前故也夫智徹爲明天下不見其智而見其明位極而尊天下不知其尊而見其位聖人於此每每藏其明而隱其智賤其位而卑其身則明者不爲物所蔽尊者不爲卑所逾如是則智愈遠而明愈博位愈固而身愈安此持後處先之道也列子曰天下有常勝之道曰柔若夫處物之先以謂天下莫我及尊我之身以謂天下莫我逾則爭者起而爲敵矣賤者僣而逾尊矣位且不固身亦危然此太上欲聖人明謙下之義使天下莫先焉此存身之道也孔子曰有禮則安無禮則危謙下者禮也又曰君使臣以禮亦足以鋤驕人之色也然則此義初以天地長存往不生後以聖人乆於其道在謙遜先言後其身是不敢爲天下先後言外其身不私於己也聖人處己臨物舍此而不可非徒治己道由此而寧亦可以致長生符天地之妙用矣後結成其志也非以其無私邪故能成其私御注曰自營爲私非以其無私邪即聖人之成能爾以後其身而先其身外其身而存其身是也私者機也機者微也事謀於心則微微顯於用則機機微者心之私也私出於事始事成而爲公私之爲用在心謀之以成在身身顯而後公名立焉言聖人我欲成聖道不以我身而先人此私也動容周旋不失謙遜之禮人反推之以爲先也是用後而取先豈不私邪至於外身而身存夫不外其身則置身於可欲之地欲勝則害生害生則傷身今外其身者是欲其身而不欲於物然後能存其身存其身者是以身爲私也至於身無所害而得長存乃爲公也夫聖人之所行不當言私而以私者原其初不敢正言之故曰邪邪者疑似之也經所以指聖人之私謂非以其無私邪勿謂聖人無私以私故能成公故之字謂以後身外身而成私許由不受無爲之名後其身也許由得其私鮑叔有分財之義外其身也鮑叔成其公然天地之私者又在乎不自有其生而孰知道者爲之公歟邵若愚曰天長地久至故能成其私天長地乆而不知虹蜺雲霧風雨四時積氣成乎天山嶽江海金石草木積形成乎地夫有形者豈得不壞天地所以能長而且久者四時之運禀道爲生化之主天地以其不自生故能長生是以聖人效之處謙下不敢自尊後其身而身反在人先以世利皆爲身外之物縁外其身不爲物累而能身存得乆夫聖人後其身外其身非以其無私耶傚天地爲而無爲故能成其私王志然曰天長地乆至故能成其私道貫四大者也四大中得道而大者莫大乎天地聖人焉而夫得一以清穹窿而位乎上以乾爲體剛健中正萬物資始確然而常運莊子曰天道運而無所積也易曰示人以易矣地得一以寧磅礴而位乎下以坤爲貞承天厚載萬物資生隤然而常處莊子曰地道運而無所積也易曰示人以簡矣以言乎天地之間則備矣乾則天之象坤則地之象夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉故天得之所以長清地得之所以乆寧天地既得夫至簡至易之道故歷浩劫以長存亘萬世而無壞而老子所謂天長地乆者以其不自生故能長生欲以聖人況天地然天地能長且乆蓋本之於眞一自然之妙氣與道同體故能覆載萬物長養萬物成就萬物斡化四時運量無窮以至生之畜之長之育之成之熟之養之覆之初不容心功成自去未嘗自有其功及其生也亦未嘗知其所以生之者而聖人體天地造化而位乎中達而爲三才辨而爲三極交而爲三靈俯視天下而無兩心常以百姓心爲心而百姓仰視聖人而無二道常以聖人道爲道天下無爲而自治聖人果不得已而臨涖天下是以後其身未嘗先人而身自先外其身未嘗先物而天下樂推而不厭詩所謂自東自西自南自北無思不服是也於戲天地之大德曰生聖人之大寳曰位天無私覆地無私載然天能覆不能載地能載不能覆是亦天地之功未全也以人觀之天地能長且乆固不可得而擬議以道觀之天地之長乆如此亦猶瞬息之間耳是以聖人亦不世出之才藏大有爲之用至公無私謙以自牧遊心於世俗吉凶與民同患繼之以聖人不自有其身是果有私也耶果無私也耶莊子曰無爲無形如無私焉有情有信如有私焉故曰非以其無私耶故能成其私學者其謂如何哉黄茂材曰天長地乆至故能成其私萬物莫不資天地以生而天地實未嘗生之人自生人獸禽魚草木自生禽魚草木天地何與焉生生者不生萬物所以代謝相仍不生者不死天地所以長乆不已人能同於天地豈不長生乎是以聖人至而身存後其身者所以處世也外其身者所以體道也今有人焉卑遜廉退鄉里推之朝廷高之則夫離形去智遺世獨立必能長存亦可知矣非以其無私耶故能成其私天無私覆地無私載聖人與天地合德人皆亡己獨存物皆夭己獨壽豈非能成其私乎程泰之曰天長地乆至故能長生後章謂人之能長生乆視者以其得年而永也若天地之長生則豈長年之謂哉易曰生生之謂易本有是生而易又生之是謂生生也以類推之生爻生耆生大業凡曰生者皆謂能增益其所無也天地不自生而能長出此生者即列子謂生生者不生不生者其道不可窮也正以敷暢此語也天下之物生於有有生於無天地之能生萬物者本常有而出之耳而未嘗自入於生也蒼然隤然能使萬不同之種類受其氣以爲形而天地也者萬古無所增加是故所有者無損而已得者不壞也夫是以能生天下之生而無有窮已也列子又曰生之所生者死矣而生生者未嘗終形之所形者實矣而形形者未嘗有則又推此理而竟之者也是以聖人至而身先後章固嘗明言此理而曰聖人欲上人以其言下之欲先人以其身後之是以處上而人不重處前而人不害是以天下樂推而不厭則後其身而身先者皆其自損而致益者也亦其不爭而人莫能與爭者也此理所出即天地之不自生而能乆長其生者也外其身而身存人之自愛其身無貴賤賢愚一也然愛之而無其道則欲益反損老子曰人之輕死以其生生之厚謂其重之營養而不惜犯死也又曰益生曰祥謂其役有涯之智而務生之所無以爲也若夫生生而失於厚有生而求以益生二者之於愛身可謂不遺餘力矣然從榮養而推之可以犯死從益生而推之可以致禍正惟不知致曲之理而求以直遂焉耳若夫聖人之存身則有道矣知生之來不可却其去不可止故棄世事而使之無累從無累而得正平正平之道不偏倚不健羡而莊子達生之論明矣夫下之不至於傷生上之不至於益生則向所謂來不可却者不於我乎舍而將安往則其能外此身者乃其所以致存也老子深明道奥凡其話莫非形而上者既不容一見遽曉而又不肯直辭徑達故常寫其眞於言内而藏其意於言外有類後世之設隱也非驁世也舉一隅不以三隅反則雖提耳諄諄愈無益也他皆倣此非以其無私耶故能成其私天下之理槩乎衆則爲公偏於己則爲私不必侵人以自利乃始爲私也處其身於人後外其身如無有不自私其身者也自後而人先之若無意焉而生理自存則不自私者乃所以遂其私歟詹秋圃曰天長地乆至故能成其私韜光章言韜晦所以養明而延其光也故天地所以長且乆者以其不自私於大德曰生乃能長生是以聖人體法天地自後其身而身居先自外其身而身固存此非以其不自私乃能私於吾身乎皆韜光不自矜眩而然也張沖應曰天長地乆至故能成其私天清能蓋而長存地厚能載而乆固何也蓋天長存而不自生其天則天忘其爲天之象而能蓋之道常默運而不盈天自然而長存矣地乆固而不自生其地則地忘其爲地之形而能載之道常默運而不息地自然而乆固矣所謂不自生者謂道自生於我默運無窮而我不求其所自生故天以無象而成象地以無形而成形則天地之所以長乆也聖人者世之成道者也知夫天地之所以長乆故以身運道不以道爲身尊乎人而不尊乎己則人尊而己自尊厚諸人而不厚諸己則人厚而己自厚自卑自薄而乃先乎其人存乎其身韜晦不生之功也晦而行之若出乎無私反而觀之成就乎我則日之所以者實私乎我矣學道者要當反推其韜晦之妙白玉蟾曰天長地乆湛然無爲天地所以能長且乆者心亦如是以其不自生此心長存故能長生本無生滅是以聖人我也後其身而身先無乎不在外其身而身存今古如此非以其無私耶天地與我同根萬物與我同體故能成其私我即天地天地即我廖粹然曰天長地乆神生於形形能成神形神合同綿延不絶天地所以能長且久者形神同仙以其不自生形不得神不生神不得形不成故能長生故能更相生更相成自古及今其名不去是以聖人主人會事吾亦如然後其身而身先謙尊而光外其身而身存退藏於密如雞抱卵非以其無私耶本自無心侣百情得故能成其私公事辦則私事辦也形神俱妙與道合眞陳碧虚曰天長地乆標也天以氣象廣覆今古不傾故稱長也地以形質厚載終始永固故言乆也結喻成義在乎下文天地所以能長且乆者問也以其不自生釋也故能長生結義也夫天所以長清地所以乆寧者以其覆載萬物長育群材而皆資禀於妙本反其沖虚復其杳冥不自矜其生成之功而守其常德故能長生也又解曰天地萬物卓然獨化咸禀自然而不求饒益其生故能長生此垂誡也是以聖人至而身存聖人無爲身在廟堂而心游姑射法天地之覆載而均養無私大有處謙而不敢爲天下先其百姓欣戴而不重樂推而不厭故身先也又能忘功忘名外身寡欲其天下愛之如父母神明祐之若赤子故身存也非以其無私耶故能成其私天地生育萬物而聖人外己全民皆不以仁恩自博豈有自私之心乎實無私也無私故能長能乆以其長乆故知能成其私者也李約曰夫能不私於己而私於人人之私未必成而己之私己成矣鴻烈解曰公儀休相魯而嗜魚一國獻魚公儀休不受其弟子諫曰夫子嗜魚弗受何也答曰夫唯嗜魚故弗受夫受魚而免於相雖嗜魚不能自給魚無受魚而不免於相則能長自給魚此明於爲人爲己者也故曰非以其無私耶故能成其私謝圖南曰天長地久至故能長生天之高也地之厚也生乎太極至乎無極可謂長且久矣所以然者天地以生物爲心未嘗自生此所以能長生也是以聖人至而身存聖人法天地以生養萬民爲心後其身不自爲也而身常先外其身不自有也而身常存此所以可與天地並立也非以其無私耶故能成其私天地不自生是無私也而日月星辰繫焉華嶽河海載焉非能成其私乎聖人不爲己是無私也而國家天下安焉宗廟社稷享焉非能成其私乎至公一理不可磨滅是乃長乆之道天地聖人皆不外此蓋嘗論之天下之理惟公而已天無私覆地無私載王者奉無私以勞天下經曰公乃王王乃天天乃道道乃乆然則天地聖人皆以至公一理並立域中所以長乆而不窮也後世剥下以奉上瘠人而肥己暴秦鞭笞六合而混一宇内孤隋并吞群盜而奄有中原可謂得志矣然不再傳而亡宗廟不保社稷丘墟則公之與私其得失亦可見矣林鬳齋曰天長地久至故能成其私此章以天地喻聖人無容心之意天地之生萬物自然而然無所容心故千萬歲猶一日也聖人之修身無容心於先後無容心於内外故莫之先而常存是以其無私而能成其私也此一私字是就身上說來非公私之私也若以私爲公私之私則不得謂之無容心矣此語又是老子誘人爲善之意及釋氏翻出來則無此等語矣故謂之眞空實有眞空便是無私之意實有便是能成其私之意但說得來文高似一層范應元曰天長地乆至故能長生有形之長乆者莫如天地天地均由道而生所以能長且乆者以其安於無私而不自益其生故能長生也河上公曰謂天地長生乆壽以喻教人是以聖人至而身存聖人謙下不與人爭先而人自然尊之聖人無爭不與物爲敵而物莫能害之非以其無私耶故能成其私謂聖人謙下無爭非以其無私邪此言其實無私也而人自然尊之物莫能害之蓋以其無私故能成其私也聖人成其私者非私曲也非私邪也謂衆人之自益其生所以不能得先且存而聖人之謙下無爭所以獨能得先且存也薛庸齋曰天長地乆至故能成其私形數既具成壞便分天地豈長乆者耶所以能長乆者以其生生而不自生故能長生也謙尊而光卑而不可踰後其身而身先也不以死生富貴累其心則神全外其身而身存也堯讓天下於許由舜讓天下於善卷以其無私故能成其私也休休庵曰天長地乆至故能成其私有相之物難逃成住壞空四劫惟天地所以能長乆者非自生也一氣發而現二儀眞氣運行無始無終故能長生聖人者天地位後始現有相之身三才顯而世界成矣身先者靈明眞性在太極前而有已外其身而身存者人能建立世界而不滯著謂之物外身世界有壞眞性無壞非以其無私邪眞性異於物故善能成其私褚伯秀曰天長地乆至故能成其私粤自渾沌肇分輕清上浮重濁下墜有無道器相依而立亘古今而生化不息所以長乆敦使之然以其不自生故也自生則私己而不能生物惡能長生聖人所以後身外身者不過去私徇公效天法地以養民育物而已凡謙卑處下不敢爲先辭功讓能退身曲全皆後身之謂而天下樂推之不得不先焉凡萍食蓬居守眞志我覺夢生死土木形骸皆外身之謂而賢於貴生不得不存焉夫君子爲善分所當盡豈有求而然天之估善亦無一毫私意以類而從如谷答響聖人體天無私法道生育唯恐一物失所是以天相神估諸福畢集以人事觀似成其私而實出天之至公其得福慶亦無愧矣君子得慶豈己榮哉移以福斯民廣天地之大德而已苟爲善而懷一毫私利之心則非眞善其末流趨乎惡者有之可不謹其始牛妙傳曰天長地乆至故能長生夫天者積陽而成其能職覆亘古不磨故云長也地者積陰而成其能職載歷劫不壞故云乆也然其既長且乆者夫何故哉蓋天地不自以爲能長乆所以長乆不自以爲能長生所以長生也列子曰有生不生不生者能生生生者不能不生故常生常生者無時不生不生者疑獨疑獨其道不可窮也非是謂歟是以聖人至而身先聖人者謙謙君子也夫何故哉孔子不曰聖人吾不得而見之得見君子者斯可矣之說邪不敢居先而後其身者非謙謙君子之謂歟老君曰不敢爲天下先故能成器長孔子亦曰先行其言而後從之昔壼丘子林謂列子曰子知持後則可以知持身矣列子曰願聞持後曰顧若影則知之矣古人以你稱若列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈伸任物而不在我此之謂持後而處先也非是之說耶外其身而身存夫身者乃天地之委形也故道包四大而德備五常稱物中之最靈善貴其身者置功名於度外存天理於胸中則可以保身可以全生可以盡年也若逞其才能邀其功名則不免爲身之患古人有言曰直木先伐甘井先竭象以牙喪身熏以芳自焚莊子曰功成者隳名遂者虧敦能去功與名還與衆人同老君曰外天地者有天地外其身者壽命長此之謂也今世俗君子多危身棄生豈不悲哉非以其無私邪故能成其私此蓋言聖人後外其身之事非所謂出於無心也迨至身先身存以成夫聖人之政者實由心私操履而然也所以稱故能成其私也夫無私者謂無爲也成其私者有爲也且天下之事未有不行而至不爲而成也無爲者聖人之體也有爲者聖人之用也體用兩全方成聖人之道豈可偏執無私而礙成其私邪若人而無私則土木偶人奚以異也老子曰若說無心即是道無心猶隔一重山此蓋言知體而不知用也楊智仁曰天長地乆至故能成其私天之虚極故長地之厚載故乆以其不自生者因日月旋轉而生故能長生天不運轉日月不明地若枯竭萬物不生夫人之身本性曰天元命曰地若性命兩全依法修之可以與天地同其長久也是以君子謙讓卑退而後其身人皆敬之而身先也能修身外之身能知神中之神性中之性道中之道者乃能外其身而得長存者也聖人非以其公正無私所致乎故無私而自厚成其私也中庸曰至誠無息不息則久久則徵徵則心悠乆悠乆則博厚博厚則高明博厚所以載物也高明所以覆物也悠久所以成物也博厚配地高明配天悠久無疆如此者不見而彰不動而變無爲而成天地之道可一言而盡也喻清中曰天長地乆至故能成其私天以一元之氣運於亭毒之表無間斷無止息故曰長地以隤然之形厚載萬物而常存無虧欠無傾倚故曰久而其所以長乆者何哉以其生物而不自爲功也萬物不能自生必資天地以生之天地不以生物爲功而與萬物俱生是生萬物者天地也與萬物俱生者天地之所以生生也生曰長生言長則乆在其中矣天地之心公溥之心也聖人體天地公溥之心身在天地後心在天地先後其身而身先也不自有其有所以全其有外其身而身存也豈非無私而後能若是邪無私公溥也天下惟無私者爲能成其私天命之人歸之不期然而自然雖私也實公也胥六虚曰天長地乆至故能長生天長地乆此一章之大㫖以下乃注釋之義然以其不自生推之謂天地能長且乆者以其不自謀生自然得其長乆使天地有心謀其生焉能得其長乆歟是以聖人至而身存聖人後其身而身先者法天地不自生執謙持後故天下推尊爲先也外其身者聖人知身非我有不以生生之厚淡漠虚靜物莫之傷身自外之其非用意外之也是故得其身存矣非以其無私邪故能成其私夫聖人得其身先身存者由其法天地不自生而致之非以私意爲而得之也是故能成其身先身存之私耳柴元皋曰天長地乆不變天地所以能長至故能長乆惟盡覆載之職而已賦形肖貌縱其自然是以聖人至而身存薄己厚人人自尊之舍己利物不爲物盜非以其無私至其私忘我之私心遂物之私望此聖人所以合天地長乆之道也蘇敬靜曰天長地乆至成其私亘古今言長乆者莫知天地然豈知天長地乆者太極之道實生之而天地不自生若使其與萬物同生則亦一物耳安能長生天地惟立於萬物之表而不與物競故能長生聖人知其然每先天下後其身每内天下而外其身先天下如民之飢則我不敢厭飫求先飽如民之寒則我不敢重襲求先暖内天下則親之若父子而不敢疏待之若兄弟而不敢外聖人雖後其身而天下必先之雖外其身而天下必存之即天地之不自生而能長乆其生也聖人後其身外其身不敢私於爲己也而民之待聖人必欲先其身必欲存其身聖人固欲後而民固先之聖人固欲外而民固存之非成其私耶以此知不自私者乃所以能成其私也本一庵居士曰天長地乆至故能成其私成物者即所以成己世之人物我異見故汲汲然欲成其私然自私者卒未見其益而無私者適所以自成理固然也今夫天地之於物風散雨潤鼓之以雷霆烜之以日月凡以生物而已而運行往來其機不息乃所以爲長乆也聖人之治損上益下舍己從人然百姓足君孰與不足未有仁而遺其親義而後其君利孰大焉人知乎此亦可擴無我之見弘大公之心矣石潭曰天長地乆天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私此段解者不同古以爲天地之所以長生者謂天地之長且久如人之長生久視也近世解者則以爲生物之生謂天地但生物而不自生所謂不生者能生生也然以後段推之則二說各有所長所謂後其身外其身則是生物之生所謂身先身存則長生乆視之生以其無私言則是生物之生以成其私言則是長生乆視之生今一以貫之則所謂不自生者乃生物之生長生二字則是長生乆視之生雖造化不可以生死之生言然其長存即長生也以是評之則老子之意正謂天地生物而無己私所以長存人能無私己以求生則亦能常存耳雖然老子之教正欲長生今乃爲是言何哉大抵此言與後卷出生入死章相貫蓋人之求生每每揠苗助長反致傷生所謂動之死地也惟綿綿若存用之不勤如上谷神章之所指則雖不孜孜以求生爲事而自能長生耳道德眞經集義卷之十二
