body:
  text: 凝遠大師常德路玄妙觀提點觀事劉惟永編集前朝奉大夫太府寺簿兼樞密院編修丁易東校正上善若水章考異河上公作易性章趙實庵作柔順利正義章唐明皇疏前章明天地無私生成則長久此章明至人若行柔弱故無尤首標若水示三能之近道次云居地盡七善之利物結以不爭勸守柔以全勝也杜光庭曰夫水之為德也柔弱平和居順處下隨時壅决任器方圓流作泉源散為霧露凡物失之則死得之則生擊之無傷執之無有所以不及於道者水有形而道無形也雖有形為礙其於利物之德謙沖之用近於道矣老君舉水為喻以勸修道之人欲令體七善三能修身理國兼以不銷之德故無尤過之事張沖應曰此性乃人既長所為之性也人禀天地氣生本來未有不善自生而長為情所亂則五欲動而性多不善矣故人所以遺道陷身而不知反此章蓋勉夫人改易其長而所為之性不致於縱則進於其道矣其善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫唯不爭故無尤考異而不爭一作又不爭處衆人一作居衆人故幾於道一道下有矣宇政善治一作正又作政善理河上公曰上善若水上善之人如水之性水善利萬物而不爭水在天為霧露在地為泉源也處衆人之所惡衆人惡卑濕垢濁水獨靜流居之也故幾於道水性幾與道同居善地水性善喜於地草木之上即流而下有似於牝動而下人也心善淵水深空虛淵深清明與善仁萬物得水以生與虛不與盈也言善信水內影照形不失其情也政善治無有不洗清且平也事善能能方能圓曲直隨形動善時夏散冬凝應期而動不失天時夫唯不爭壅之則止决之則流聽從人也故無尤水性如是故天下無有怨尤水者也王輔嗣曰上善若水至衆人之所惡人惡卑也故幾於道道無水有故曰幾也居善地至故無尤言水皆應於此道也唐明皇曰上善若水將明至人上善之功故舉水性幾道之喻也疏上善標人也若水者喻也至人虛懷於法無住忘善而善之上上善若水行如水之能具在下文皆含法喻也水善利至衆人之所惡疏水性甘深散灑一切被其潤澤蒙利則長故云善利此一能也天下柔弱莫過於水平可取法清能鑒人乘流侑坎與之安順在人所引嘗不競爭此二能也惡居下流衆人恆趣水則就卑受濁處惡不辭此三能也故幾於道幾近也疏利物明其弘益不爭表其柔弱處惡示其含垢此水之三能唯聖人之一貫其行如此去道不遐故云近爾居善地上善之人處身柔弱亦如水之居下潤益一切地以卑用水好流下疏至人所居善能弘益如水在地利物則多又地道用卑水好流下同至人之謙順幾道性之柔弱故云居善地心善淵用心深靜亦如水之泉渟也疏至人之心善於安靜如水之性湛爾泉渟水靜則清明心間則了悟泉深靜也故云心善淵與善仁施與合乎至仁亦如水之潤澤品物也疏至仁弘濟常以與人善施之功合乎仁行如水潤澤無心愛憎故云與善仁言善信發言信實亦如水之行險不失其信矣疏上善之人言必真實引化凡庶善信不欺如彼泉流豈殊坎險故云言善信政善理從政善理亦如水之洗滌群物令其清淨也疏政正也至人於事動合無心正容悟物物因從正正則自理非善而何如彼水性洗滌群物令其清淨故云善理事善能於事善能因任亦如水之性方圓隨器不滯於物疏至人圓明於物無礙凡有運動在事皆通通則善能是明照了如彼水性决之為川壅之為地浮舟涵虛無所不為是善能也動善時物感而應不失其時亦如水之春泮冬凝矣疏至人之心喻彼虛谷方之鏡像物感斯應如彼水性春泮冬凝與時消息故云動善時夫唯不爭故無尤上善之人虛心順物如彼水性壅止决流既不違逆於物故無尤過之地疏尤過也至人善行與物無傷虛心曲全未曾爭競波流頽靡委順若斯曾不違逆於物故無尤過之地矣杜光庭曰上善若水上善之士體道修心應變隨時縱橫利物老君欲顯上善之德以勸後學之人以水與道相鄰故舉水為喻上善有善而忘其善如水之不矜其功水不矜功其功益大善不伐善其善益彰既大且彰為善之上矣上惟南面之主下洎棲巖之人能如水焉必得道矣法喻者以水為喻以道為法以上士為能行之人也水善利至衆人之所惡甘者水之味也深者水之體也水為氣母王於北方以潤下為德其色黑其性智其味鹹其數六北方者陽德之始陰氣之終也生數一與道同也道亦為一即無一之一水亦為一即有一之一也無一之一為道之體有一之一為道之用則明水者道之用也一切物類皆資潤澤而得生成以能潤故而生萬物故處三能之首也柔弱者水之德也德經第四十一章云天下柔弱莫過於水重舉水德以勸守柔矣夫其水也居平則不流法以平恕為本故可取法也水之不流靜能鑒物故曰人莫鑒於流水而鑒於止水以其清且靜也水性平也故值不平則逝值坎澤則止東西南北隨引所行不與人爭無所不可校量衆德又云不及生物之功故次二能也人之性也徇常者衆謙順者寡好居上位惡處下流唯夫水也處下不爭居汙不辱比前之德前德為勝故為三能也故幾於道以前三能故近於道人君能宣弘益之德秉謙沖之心體含垢之行則天下太平矣理身者功務及物柔以制性處濁順俗委跡謙光則神仙可冀矣居善地此明處下樂卑為安國存身之道也天之清浮故用其高地以濁厚故安其下易曰天尊地卑卑高以陳又云地道卑而上行則水順下而處卑同至人之謙德矣心善淵此明澄靜清虛為潔己洗心之術也臣心如水臣門如市斯之謂歟與善仁此明潤澤品物為博施濟衆之行也既以為人己愈有既以與人己愈多亦斯義矣言善信此明信實無欺為真常審諦之教也行險不失其信者周易坎卦曰習坎重險也水流而不盈行險而不失其信也夫理國長民率身從道言必信實可以動天地感神明所以善惡之詞興於一室之中應乎千里之外此信之至也孔子云去食去兵而存乎信至哉言乎政善理此明真正化物為革凡成聖之法也正容悟物者莊子田子方篇子方名無擇侍坐於魏文侯文侯師子夏而友子方子方數稱溪工之道文侯以為溪工子方之師也子方曰非也無擇之里人耳稱道數當故無擇稱之無擇之師東郭順子也其為人也真人貌而天虛緣葆真清而容物物無道正容以悟之使人之意也銷無擇何足以稱之此所謂物之失道東郭順子正其容儀心冥于道物睹自悟邪志盡銷亦可謂不言而化不化而行真道也哉事善能此明因機任物為變應圓通之用也水以方圓任器壅决隨時故能習海浮天且廣且大人君垂裳理物委任賢良用之不疑各得其職可以無為而理臻乎泰寧矣動善時此明出處從時為守道保生之戒泮散也春布陽和層冰釋散冬有寒沍流水堅凝水之順時也理國之道理身之方舒卷任時因物之性則至理矣則保生矣夫唯不爭故無尤不爭之德德之先也凡人之性不能無爭為爭之者其事衆也亂逆必爭暴慢必爭忿恚必爭奢泰必爭矜伐必爭勝尚必爭違擾必爭進取必爭勇怯必爭愛惡必爭專恣必爭寵嬖必爭王者有一於此則興師海內諸侯有一於此則兵交其國卿大夫有一於此賊亂其家士庶人有一於此則害成於身皆起於無思慮愆禮法不畏懼不容忍爭乃興焉故爭城者殺人盈城爭地者殺人滿野必當察起爭之本塞為爭之源無不理矣語曰君子無所爭又曰在醜不爭下經曰聖人之道為而不爭不爭之德何過之有哉虛心者虛心無欲也曲全者曲己全人也波流者任性自適也頽靡者放曠無滯也波流者莊子應帝王篇云變化頽靡世事波流無往不同矣委順者委心順道也體兹上善遵彼三能國泰長生之要也宋道君曰上善若水易曰一陰一陽之謂道繼之者善也莊子曰離道以善善名既立則道之體虧然天一生水離道未遠淵而虛靜而明是謂天下之至精故上善若水水善利至故幾於道融為雨露萬彙以滋凝為霜雪萬寶以成流為江河聚為沼沚泉深海大以汲以藏以裕生殖萬物皆往資焉而不匱以利物萬物孰善於此善利萬物萬物蒙其澤受其施而常處於柔弱不爭之地納汙受垢不以自好纍乎其心故於道為近幾近也居善地行於地中流而不盈心善淵測之而益深窮之而益遠與善仁兼愛無私施而無擇言善信避礙而通諸海行險而不失其信政善治汙者潔之險者夷之順物自然無容心焉故無不治事善能因地而為曲直因器而為方圓趨變無常而常可以為平無能者若是乎動善時陽釋之而泮陰凝之而冰决諸東方則東流决諸西方則西流動而不括宜在隨時而已夫惟不爭故無尤聖人體道則治身為長久之存兼善則利物處不爭之地莊子曰有而為之者其易邪易之者皥天不宜夫無為而寡過者易有為而無患者難既利物而有為則其於無尤也難矣上善利物若水之性雖利物而不擇所利不與物爭而物莫能與之爭故無尤矣故曰天下莫柔弱於水而攻堅强者莫之能先王介甫曰上善若水善者可以繼道而未足以盡道故上善之人若水矣水善利至故幾於道水之性善利萬物萬物因水而生然水之性至柔而弱故曰不爭衆人好高而惡卑而水處衆人之所惡也居善地居善地下也心善淵淵靜也與善仁施而不求報也言善信萬折必東也政善治至柔勝天下之至剛事善能適方則方適圓則圓動善時春則泮也冬則凝也蘇潁濱曰上善若水至故幾於道易曰一陰一陽之謂道繼之者善也成之者性也又曰天以一生水蓋道運而為善猶氣運而生水也故曰上善若水二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而既已麗於形則於道有間矣故曰幾於道矣然而可名之善未有若此者也故曰上善居善地至動善時避高趨下未嘗有所逆善地也空虛靜默深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止决必流善信也洗滌群穢平准高下善治也遇物賦形而不留於一善能也冬凝春泮涸溢不失節善時也夫唯不爭故無尤有善而不免於人非者以其爭也水唯不爭故兼七善而無尤吕吉甫曰上善若水一陰一陽之謂道繼之者善也謂之繼則已離道而非道之體矣上善者道之所謂善者也非天下皆知善之為善也故若水焉水善利至故幾於道蓋水善利萬物而不爭處衆人之所惡而上善亦然則未足以為道幾於道矣居善地江海所以為百谷王者以其下之也故以居則善地心善淵鯢桓之審為淵止水之審為淵流水之審為淵故以心則善淵與善仁言善信注然而不滿酌然而不竭故以與則善仁行險而不失其信故以言則善信政善治其派為川谷其委為瀆海足以政則善治事善能善治天下莫柔弱於水而攻堅强者莫之能先故以事則善能動善時源泉混混不舍晝夜盈科而後進夫唯不爭故無尤要之出不爭而以居地為本故曰夫惟不爭則天下莫與之爭先王元澤曰上善若水水者五行之首方出空無而入實有者也離道未遠故其性最近道蓋離道則善名立上善若水物理自然水善利至故幾於道人有心心為火火騰上而明故好爭惟志心體道能離物而無心勝物也居善地趨下而流心善淵深靜而平內明而晦政善治任理而不任情積柔而蒙重大事善能惟變所適故無不能動善時决之則流壅之則止不先物動亦不失時夫惟不爭故無尤水體一而物莫能遏故能兼此諸善蓋有德於物而常下物是以有德使有心於為德則不能成其德矣故篇終又言之劉仲平曰上善若水離無入有處惡不爭而與物為利水之用於此為近上善者有心體此而名已立故於水為若而已矣與善仁至政善治然水之為物未嘗有政也而曰言善信政善治何也方此因論善人若水故以言政及於善人也動善時德性體乎水而盡乎在我之善者善者善也是以居善安其地心善存乎淵與善均其仁言善行其信事善施其能動善隨其時雜說動善時蓋因時而動動之善也而書亦曰慮善以動動惟厥時詩美南仲薄伐西戎而言喓喓草蟲躍躍阜螽者以其動而則應也自非因時而動敦能至於此乎劉巨濟曰上善若水易曰繼道者善莊子曰離道以善皆謂自道而降莫近於善故也善不有其善為上善如上德之善水善利至故幾於道道生一一生水則亦以水近道故也水以潤為德之謂利善時之謂不爭就下之謂處惡善加於人而不伐猶之利物而不爭也自處以下猶之處衆人之所惡也道亦利萬物而不爭處衆人所惡而水如之水如道則上善如水矣此所以近道也居善地善以處下為居水以就下為地在善得之水地故曰居善地心善淵善以安靜為心水以深靜為淵在善則得水之淵故曰心善淵與善仁言善信善以教人為與水以利物為仁在善則得水之仁故曰與善仁善以不欺為言水以行險不失於信在水則得水之信故曰言善信政善治善以正己物正為政水以激揚清濁為治在善則得水之治故曰政善治事善能善以和同為事水以圓方而不滯為能在善得水之能故曰事善能也動善時水以冬凝春泮為時在善得水之時故曰動善時也夫惟不爭故無尤言上善當如水以不爭為善也以不爭為利乃能兼此七者而為天所祐人所助也何過之有乎前章言聖人後身外身之事而六善不爭故次之以六善劉驥曰上善若水至故無尤易曰繼道者善也莊子亦曰離道以善皆言自道以降莫近於善天一生水亦去道未遠故上善若水水善利萬物至柔弱而不爭處衆人之所惡故幾於道居善地者自處以下也心善淵者以靜則明也與善仁者利物而不求報也言善信者行險而不失信也决之則流雍之則止政善治也盈科而進萬折必東事善能也源泉混混不舍晝夜動善時也兼此七善而不與物爭故無尤此其所以幾於道唯道集虛而水就下自然無盈滿之纍故次之以持而盈之趙實庵曰初舉喻二一柔順繼道上善若水前章言非以其無私邪故能成其私明天地與聖人以私而成公也夫能以私而成公則善探天人之機無所往而不適焉兹上善也故次之曰上善若水夫仁善為元義善為臧禮善為嘉信善為穀智善為淑各有其善而未盡善也惟水之德通具七善所謂智周萬物故稱為上善者歟善事事也事事則有備此其所以為盡善也故上善若水御注引莊子曰離道以善善名立則道之體虧然天一生水離道未遠兹又見上善之義也二正指水德水善利至故幾於道前以善而譬水此正言水之善五行以金生水金所生處水繼體而前包是不離其母也然水生於坎坎位居子黃宫育氣乃正位也所包之地乃應神在己也洪範以天一生水地二生火火自水生精一也神在於精神應次二三陽生於水水下而風上三陰生於風風上而水下陰陽合德交神應用雖曰一陰一陽一風一水而其所自天一為元故水者上蒸而為雲雲化而為雨百物滋水而生水之利利天下也故曰水善利萬物又不爭又者一言不能盡其善故再言之也不爭者水之性柔也柔則順順則不逆於物則無所不通孟子曰决諸東方則東流决諸西方則西流引之則達皆柔之所致也然水之性就下人之情好上好上者惡下惡下者衆人之情就下者處卑處卑者上善之德夫不能處卑則好爭好爭則先人先人則不能外身外身則能謙處是義猶牒前也故曰處衆人之所惡故幾於道幾近也御注曰易曰一陰一陽之謂道繼之者善也則知繼道者莫如善然道大故似不肖天下不敢臣微乎不可摶萬物無足擬惟水之卑下乃能幾之次舉七德七一申合德居善地二水與土同包及其分也土靜而水動土性克水水泛濫則土為之隄防土爰稼穡水灌溉則土以之成功初同一氣則兄弟也既分其胎則夫妻也蓋不克則不生一六合則水乃生成也故水於地而行則水之利在地也地卑也水下也水土同德不可以須臾離二者所以合德合德則反其本矣異夫道不同不相為謀者矣故地平者平水土則知水之居善其地也御注曰居於地中流而不盈二澄明為體心善淵夫有性者有心無情者無心水無情也焉得有心經所以言心者以人之心而況之水也夫心者道也道生於心心寂法滅故淵乎其虛不可得而見及乎心動神生道散為物烏能盡其用邪淵深也亦曰淵虛也心之虛故有善淵之理焉故測之而益深窮之而益遠莊子曰淵而虛靜而明其水之心乎夫不動則清莫撓則平眉鬚於是乎燭焉重濁在下清明在上衆止於是乎止焉此皆善淵之義也三滋生為德與善仁有心者與之不偏無心者施之則平水之不仁也而仁之至矣水無擇也而德之流行易曰坎有孚惟心亨以一陽居二陰之中苟不能進德修業以離乎險且何以見其至誠而不已方其在坎也一陽來復復其見天地之心天地之心本於生物復則止矣方復而止以向於生夫兼愛者聖人之心也不體乎道未免躄躄而為仁量乎澤若焦豈若時雨降天之謂乎所以博施濟衆堯舜其猶病諸若夫水之仁與道同德兼愛無私施而無擇也庸有不被乎故曰與善仁四中有所主言善信根荄者物之本也性命者道所生也本其所自來因其所常性其於理也有所不違矣夫五行以水主智土主信水何以信言邪觀乎復以七日來復氣傳中孚中孚信也坎居復卦得自中孚言主信也太玄以一陽乘一統萬物資形中水准中孚中陽氣潜明於黃宫信無不在乎中蓋先天之靈者妙乎一氣肇萬緒之端者始乎智源信得智以不二於言智行信而不失於物智不主信在事也遲豫而悔生信非智行在性也則鬱勃而留滯所以藴中為性形外為事至言去言大信不約故首尾可信非庳虛無因而大受者也則知言者非信而行之則失其本矣易曰行險而不失其信謂是故也五循理而行政善治大道以理性為主政事在文學之先自有天地以來君臨萬方者未有不窮理盡性而能化民者也三皇以神化道五帝以仁同天而天下言治又孰知其本柔如水與物無忤而成其化彼有自立其德以亂大常者蓋不知治本豈免困吝歟夫水之性趨乎卑濕行乎地中萬折而注東避礙而通海此水之理也而政之本人情者如之以灌以溉動植待之以生以雨以露枯槁資之以潤此水之功也政之原民生者如之滌除穢汙而易之以潔受納衆汙而易之以清者水之德也政之善格民俗者如之隄可以緒而江河不可犯防可以止而湍急不可禦者水之勢也政以柔道勝天下如之源泉混混其流浩浩愈汲而愈清彌出而彌新者水之本也政以日新化天下者如之水有是數者政皆兼而有之兹其為善治明矣嗚呼莫非水也波波而非惡湛湛而非美雖浪而不失其為良净之而非止作之而非起濤而不失其為壽太上以謂上善若水取諸此矣而聖人體以為治豈私智哉六隨器方圓事善能無為而寡過者易有為而無患者難天下之事未有靜而不動者也方其動也而應之使適當莫匪聰明睿智者為能斷焉水之性自天一發源涓流不息及乎盈科而後進放于四海觀其在二陰之中則能處險一陽居中則心亨雖陽而處陰雖陷而出險未離乎險流而不盈習而出之其用大矣然未嘗與物爭因地而為曲直曲不為枉而直不為肆因器而為方圓方不剸裁而圓無定體應萬物之變而不失其為常適時之用而不失乎信實無能也而無不能也上善之功尤見乎此七流結有常動善時天下之事君子觀之以為進退在乎一出一處也出以其時則聖人作而萬物睹處以其道潜龍巽而憂悶違當出而處卷而懷之者失乎不仁當處而出勉而行之則失乎不智知進退之道不失其時動斯得也書曰慮善以動動惟厥時若夫水之動也陽釋之而泮陰凝之而冰在一體則內陽而外陰於春冬則有動而有靜故順以動者應乎豫之時則善也明以動者應乎豐之時則善也險以動者應乎解之時則善也剛以動者應乎大壯之時則善也昔之人藏器於身則欲待時進德修業則欲及時修身慎行則欲俟時明於適來則欲安時晦入冥息則欲隨時以時之所運天且弗違至於善養生者則迫而後應能交合者則進退有時苟若在世而不知出處修真而不識浮沉且何以達善時之義哉後結成二一總結柔順夫唯不爭水之性禀乎柔弱水之德善乎不爭不爭之利見乎七事其治身也則不以剛勝人其處身也適足以柔自守若可犯也狎而侮之則溺若可汙也濁而辱之則忍侮者自溺濁而徐清終莫能勝其柔也豈可以水之勢就下而為衆人之所惡曾不知居於下而用於上豈可以水之性柔弱而為强者之所勝曾不知積於柔而用之則剛方其養也而涓涓及夫汹湧也而莫制不爭之道鮮能用之二無人道之患故無尤剛强凌弱衆暴寡皆以强自取也至於柔道以順動人亦無疵焉邵若愚曰上善若水至故無尤衆人好爭老子以不爭為上善喻若水謂水無心欲善利萬物而不爭是處衆人之所惡也以水之德故幾於道夫爭從心起無心則善為不爭以無心為法而能利於萬物是故居無心則善其地心無心則善其淵與無心則善其仁言無心則善其信政無心則善其治事無心則善其能動無心則善其時夫唯無心善於不爭故無尤矣王志然曰上善若水至故無尤太極生兩儀兩儀生四象四象生五行而五行之變化大矣在天為五星在地為五嶽在人謂之五常在身謂之五臟施諸色謂之五彩施諸樂謂之五音舌嗜之謂五味鼻嗅之謂五香各極其用謂之五材相生相殺更旺更廢而善利萬物而不爭處衆人之所惡而不辭功用難名故幾於道者唯水能然何也以其水之性能柔能剛能圓能方能曲能直能短能長融為川流凝為冰霜聚為江河散為雲霧萬彙資之以生萬寶得之以成源泉混混資焉不匱天一始生離道未遠既標上善之名萬物藝藝孰善於此故曰天下莫柔弱於水而攻堅强者莫之能先其不爭善勝如此若夫行流散徙不擇地而安平中准而用納汙受垢滿而不溢此所謂居善地者也人莫鑑於流水而鑑於止水唯止能止衆止止則靜靜則明反本歸源太沖莫勝此其所謂心善淵也兼愛無私智周莫及以仁為恩不亦自小此其所謂與善仁者也正言若反淡乎無味不期而會不約而至此其所謂言善信者也削曾史之行鉗楊墨之口人含其智則天下不惑矣人含其德則天下不僻矣此其所謂政善治者也絶聖棄智大盜乃止絶巧棄利民利百倍隨時舉事事無不濟此其所謂事善能者也春泮冬凝時之使然因地為利勢之使然壅之則止决之則流使民以時動合其宜此所謂動善時者也居善必能安而處心善必能淵而靜與善必能仁而施言善必能信而立政善必能治而定事善必欲盡其能動善必欲隨其時此聖人所以體之行之以治天下國家憂則與民同其憂樂則與民同其樂無為而寡欲者易有為而無尤者難苟能兼善若水之利上善水之性澤及萬世而不知所以利之為利與物無爭而物亦莫能與之爭故無尤矣黃茂材曰上善若水至故無尤水有上善下善七利物不爭處衆人之所惡者上善也人能體此可幾於道其小善七居善地者潴而為澤心善淵者靜可以鑒與善仁者濟物之功博也言善信者其流聲不息也政善治者可以濯垢汙也事善能者因器而為方圓也動善時者冬凝春則泮也比七者能其上亦可以為善人而未若不爭之為上不爭故無尤程泰之曰上善若水至而不爭凡天下可以利人之事我得擅而為之則與我配對者必有所奪我之奪彼之失也彼我立而爭始於此矣水之德不求利人而亦不辭於為利者也能烹能溉能濯能載時其可而始為之故利出於此而害不移於彼無所爭也上善者善之又善者也處衆人至幾於道道之未動也為無其既出而行乎萬有之上也為虛虛之遇事而發見也為不肯自滿而濡弱卑下也濡弱卑下也者固未為道然能沖而用之不入於盈則是能致其虛而善向於無者也此其趨道為差近也夫天下亦有知謙弱之益者矣而私心未克驕夸好勝綦以上人則安肯屈折耐辱以行謙弱之道也惟水也善下而不爭納汙而不辭以方人事則凡泄辱可耻者皆能忍而容之故雖未得為道而中虛無我正求道者之要路也居善地居者其所止聚之處也窪下之為居則大國下流是也故曰善地心善淵未嘗不動而深靜停平者乃其心也與善仁施豫所及莫非潤澤言善信人之於事有當言而不言者有當大而少貶者有當淺而張之者皆非其當然而然者也水之停積者無聲而世以淵默命之則夫遇激而有聲者其言也大激則大鳴小激則小嗚每遇皆然是之謂信政善治政者正彼之不正者也一經滌濯外垢去本質見是其治也事善能中準之平內景之明其能之遇事而見者也動善時遇坎固止而盈科則不辭於進值寒則凝而凍解則亦遂順下而逝善當其可者也夫唯不爭故無尤應而不倡行其所無事利雖及物而非奪之於人故所為而莫或害之則上之七善不獨水之才力也己既不爭而人莫之尤則其上善亦易以遂也論八十一章其申言不爭之益者凡六曰不自伐故有功不自矜故長夫唯不爭故天下莫能與之爭是其一也欲上人而下之欲先人而後之以其不爭故天下莫能與之爭則其二也天道不爭而善勝三也聖人之道為而不爭四也戰而不武勝而不與是謂不爭之德五也與此之不爭無尤者凡六也夫其謂爭者非必至於鬥且戰也彼己四對兩不相下斯為爭矣天之陰陽至神而無著也然常以冬夏二至而爭蓋己居其地者未退而方來待代者欲前此之謂爭故爭者對起而不退聽之謂也有得乎道者則不然矣知雄守雌是能為而能不為者也功能可以加人而付之無有智力足以蓋世而韜藏不用其所操藴常不肯為天下先則安得有爭也哉蓋列子嘗言常勝常不勝之道矣曰古之言强先不己若者至於若己而殆矣夫若己而殆是好勝而必遇其敵者也會必至於不勝也又曰言柔先出於己者亡所殆矣是不與之爭而彼自無所與爭也此其勝所以可必也用此理也推而極之則雖兩陳相加己戰而勝猶得謂之不爭也主柔以待須其可斃而後從而乘之則皆名為不爭此所以為常勝之道也雖然此之謂常勝者主我而言也利則進不利則姑自保己是重於獨善而輕於為人者也其在老語雖其深妙者亦常先存此身不殆之理乃肯出身而任事不然則否蓋古之為是學者必已多矣故晨門之譏孔子曰是知其不可而為之者歟荷蕢者亦曰鄙哉硜硜乎莫己知也斯已而已矣此二子者非無憂世之意而度天下莫與己合則舍之而聽其自然爾凡此類疑皆治道家語而不肯任事者也乃若孔子之規模則不然矣既聞荷蕢之語則自歎曰果哉末之難矣夫愛一身而忘天下此豈孔子不能哉蓋重於救世寧有不可即而即之未有可即而不即者也此五就五去與夫七十二聘者皆能任天下於其身者也故夫老氏之見雖不失為道而孔子之所忍也若揆之其身則重於為己者禍辱决不能及也故削迹伐木老氏之所不遭也詹秋圃曰上善若水至故無尤易性章欲以吾性而易利物之水性故曰上善若水水善利萬物而不爭然水利萬物而水溢水涸亦害物惟善處衆人之所惡則幾近於道何則人善處身於平土而居心善淵深而靜與博施以仁立言善主以信善治本乎正善能辦乎事善動順乎時無非兼利物我而安便所以天下自無怨尤且人性本善上善何取於水此又不易之易而持以類求之耳張沖應曰上善若水至故無尤水之為性卑下而柔順也探之而虛視之而明運之於天則為雨為露運之於地則為江為河動者以之而浮植者以之而生汙者以之而潔剛者以之而柔萬物藉之以有成也是以萬物歸之咸被其澤而無此可入彼不可入之爭辨也衆人者謂世之衆人敦不歸尊而視卑恃持剛而侮柔殊不知夫水之所以卑下而柔順其中有妙用存焉此無物不為水之所制也人生而長所為之性有如水之性則為上善之人矣故其妙幾微而日進於道凡見之所居則潤澤滂流而居善地矣運之於心則虛明沉深而心善淵矣交之於物則物因以成而與善仁矣發之於言則真實不妄而言善信矣用以正人則彼非此是自然明白而正善治矣用以處事則方圓曲直泛應而當而事善能矣晨昏晝夜升降消息不耗不為動有其時矣七善既備默運於中惡性易而善性生斯不校於人亦無所尤於人則進於其道深矣斯曰夫唯不爭故無尤白玉蟾曰上善若水性猶水也水善不為物所忤而已利萬物而不爭初何心哉處衆人之所惡於我何有故幾於道心亦如此居善地無所擇也心善淵有所養也與善仁無分彼此言善信真實正善治無往不正事善能無為無所不為動善時與時偕行夫唯不爭方寸不競故無尤亦不以為福也廖粹然曰上善若水大道妙用如水之行水善利萬物而不爭以柔弱故任人所為處衆人之所惡百姓日用而不知是道體故幾於道可謂真常居善地故能處平心善淵方寸澄徹常能清淨與善仁利濟一切言善信謂能中正正善治常主公平事善能清淨道氣動善時行止有節夫唯不爭任人所使何嘗逆人故無尤終無怨憾人若如之故能成道也陳碧虛曰上善若水上善者標人也若水者舉喻也夫至人虛懷無欲應變隨時不逆諸緣處善忘善故曰上善夫水能方圓疑釋深淺浮沉順道涵虛咸有其理唯聖人兼而通之故曰若水且水藴三能之近道七善之利物謂下文也水善利萬物至故幾於道此三能之近道也夫水性平靜散潤一切故天無水則陽旱地無水則塵飛利澤萬物故曰善利此一能也天下柔弱莫過於水去實歸虛背高趨下壅之則止决之則流聽從於人故曰不爭此二能也人之情惡處下流好居上位而水則就卑受濁處惡不亂令物潔白獨納汙辱故曰處衆人之所惡此三能也幾近也夫水利物則其仁廣大不爭則其德謙光處惡則其量忍垢舉水性之三能唯至人之一貫德行如斯去道不遐故曰近爾又解曰水為氣母王於北方其數六北方者陽德之始陰氣之終也生數一與道同也道亦謂之一道一者即無一之一也水一者即有一之一也無一之一為道之體有一之一為道之用明水者道之用也故曰幾於道也居善地至動善時至人所居善執謙下順物自然化及鄉黨如水在地善就卑下滋潤群物故曰居善地此一善也至人之心善保虛靜洞鑒幽微湛然通徹如水淵澄波流九變不失明靜故曰心善淵此二善也至人若與善行仁慈惠及天下不懷親愛如水膏潤善能升降無不霑濟故曰與善仁此三善也至人之言善守誠信不與物期自然符契如水影物妍醜無差流滿輒移行險不失故曰言善信此四善也至人從政善治於民正容悟物物自順從如水清平善定高下滌蕩群物使無塵穢故曰政善治此五善也至人臨事善能任物隨器授職不失其材如水柔性善事方圓能隨形器無用不成故曰事善能此六善也聖人動靜善觀其時出處應機能全其道如水之動善隨時變冬凝夏液不差其節故曰動善時此七善也夫唯不爭故無尤唯獨也此結上三能七善之辭也夫至人之所用心行事出處語默皆全于妙道合乎物宜而常守雌靜不與物爭物既不爭安有尤過之地又尤怨也言天下獨有不爭之人無所怨尤之者謝圖南曰上善若水至幾於道大學之道在止於至善此曰上善其至者夫孟子曰性無有不善水無有不下經曰江海所以能為百谷王者以其善下之也則以水喻善皆取其能下者人惟能下所以衆善歸之水惟能下所以衆流歸之其趨一也水能滋利萬物而不爭其利利物而不自利者也衆人之所惡者卑汙窪下之地而水樂處之行乎自然無所决擇故可幾及於道此雖言水其實為善人言之也居善地至故無尤高下不擇地故居善於地澄清不可撓故心善於淵隨取隨足故與善於仁不平則鳴故言善於信可鑒妍醜故正善於治載沉載浮故事善於能流行不息故動善於時利若是其廣功若是其大而未嘗與物有爭焉又何尤怨之有此雖言水之善而實言人之善也善也水也無非道之所存也蓋嘗論之天一生水水為五行之宗尊莫尊於水矣水行地中水為萬物之利大莫大於水矣尊而不居其尊大而不有其大此所以為善而不爭也所以不爭而無尤也善人之為善也友一鄉之善以為未足友一國之善猶以為未足友天下之善則可以為上善矣而方宜善與人同若决江河善世不伐同流合汙不矜不伐而天下莫與之爭則人之善則水之善也水之善即道之善也道在吾身反而求之育德於蒙泉通氣於咸澤而收功於既濟未濟之水火終焉則善在吾身水在吾身吾善用之可與斯道同其久矣不然水哉水哉何取於水也林鬳齊曰上善若水至故無尤此章又以水喻無容心之意上善者至善也謂世間至善之理與水一同水之為善能利萬物而何嘗自以為能順流而不逆不爭也就卑就濕不以人之所惡為惡也以此觀水則近於道矣幾者近也居善地言居之而安也心善淵言其定而靜也與善仁言其仁以及物也言善信言出口皆實理也政善治以之正國則必治也事善能以之處事則無不能也動善時隨所動而皆得其時也此七句皆言有道之士其言如此而不自以為能故於天下無所爭而亦無尤怨之者此即汝惟不爭天下莫與汝爭能解者多以此為水之小善七故其多說牽强非老子之本㫖范應元曰上善若水至故幾於道幾近也水之為物得天一之氣無定形而靡不通故潤萬物者莫潤乎水乃善利也遇方則方遇圓則圓何爭之有上善之人則微妙玄通常善利於人物而不爭故善亦如水衆人好高而惡下水獨處之上善之人常謙下也有此之德故近於道易六十四卦惟謙卦有吉而無凶悔吝河上公曰上善之人如水之性故曰上善若水水者自然而始成形故其理同道無所不在無所不利而水亦然然而既已麗於形則於道有間矣故曰幾於道然而可名之善未有若此者也故曰上善居善地至故無尤居善地者可止則止心善淵者中常湛靜與善仁者稱物平施言善信者聲不妄發政善治者德惟無私事善能者無所不通動善時者可行則行有是德而有是善夫惟不爭是以無過而全德盡善也薛庸齊曰上善若水至動善時上善之士性明而德清故若水也雨露滋養源泉灌溉利萬物也流濕潤下停汙止坎處衆人之所惡也水生天一道自無一故言其近也界而為國之寶决而為國之利善地也鑑於止水測之益深善淵也滋榮萬物為而不恃善仁也百川學海而至於海善信也穢汙以滌之高下以平之善治也在盤則方在盂則圓善能也冬則凝然春則融然善時也夫惟不爭故無尤天下柔弱莫過於水故不爭既不爭復何尤之有休休庵曰上善若水至故無尤道之至德謂之上善喻之若水水能利益萬物而不與物爭功無我也水能就下是謂處衆人之所惡水無心而有德故幾於道幾者近也抱道有至德者動靜一如居善地也量包無外心善淵也博施濟衆而不矜與善仁也出語可法言善信也道德之化風行草偃政善治也無為妙用不勞而辦事善能也非理不言非道不行動善時也種種任道物我無爭夫唯不爭故無過尤矣褚伯秀曰上善若水至故無尤人能利物不爭謙卑處下皆行之善者上善則善中之最積久而成猶云上德上仁之類夫天一生水五行之首離無入有之始從氣化形之初有形若無不可持捉儲積既久勢莫禦焉人之積小善而成上善理亦若此水之善利不爭納汙藏垢世間何物得以及之衆人所惡者穢汙下濕水則逶迤曲就而不辭又於其中洗滌淘澄化為清淨此所以為善之上而近於道也居善地所處而安心善淵志存深靜與善仁施恩不吝言善信不與行違政善治庶務畢理事善能通乎適宜動善時應機而發槩叙上善利物條目或指為水之七善牽强求合若然則經之宜云水若上善矣言有宗事有君觀者當求立言本意以衆善論之不爭為善之上所以成衆善也外而物無怨尤內而己無過咎入道之要莫先乎此牛妙傳曰上善若水至萬物而不爭夫善而又善故謂之上善云若水者謂天下之至善莫若水也且萬物之生皆從陰濕而生故云水善利萬物也夫水之性去留隨機不擇好惡器之大小方圓盛之俱得其㫖任天下取與未嘗相拒故云不爭也然則人之性善者亦猶水焉其能隨方逐圓辭高就下海涵川納不與世爭亦猶水之性在天地間無往而不入矣處衆人之所惡故幾於道夫衆人之所惡者惡居下流且天下萬物之生皆沖而上之水之德不好居高惟能處下昔仲尼亟稱於水曰水哉水哉何取於水也孟子曰源泉混混不舍晝夜盈科而後進放乎四海有本者如是此其水之為德也然則何謂幾於道耶夫幾者近也道者淵也蓋水之用在世間猶道之在天下無物而不被霑霈無往而不被潤澤故云幾於道也雖云水之性無有不下然人之性亦無有不善孟子曰人性之善猶水之就下惡得而不幾於道哉居善地謂水之為德其有七善居五行之首為百谷之王不决之不行不盈科不進地稍峻則無回瀾既倒之說地稍高則有川流不息之義惟平穩處方停注故云居善地也心善淵心者謂水之中也如江海之中淵源浩渺攪之不濁澄之愈清其能容納百川靡所不載隨形見影鑑物無私故云心善淵也與善仁仁者生生不息之謂也蓋水之德周流不息運化無窮泛地載形浮天浴日取之無禁用之不竭其德可並天地生生不息之機故云與善仁也言善信言其水之為德不約而信古人稱大信不約是也觀其為用則有東海中去西海中來往來循環未嘗愆忒如尾閭泄水之運上流銀漢下至海隅一年一周靡有失於信也故云言善信也政善治夫水之為德其能泛十洲於物外浮六合於寰中幾更變於桑田屢遷移於島嶼洪纖兼納淨穢靡遺稱天下之至柔騁天下之至堅無有入於無間故云政善治也事善能謂水之為用柔而能剛弱而能强霈澤群生霑濡九有周流天地貫穿堅剛轉陸為沉鑽崖透石移高作下汰濁留清乾坤資運載之功動植荷潤渥之賜故云事善能也動善時蓋水之為用無時不流無時不動古人稱流水不腐豈不善耶經稱天下柔弱莫過於水而攻堅强莫之能勝其無以易之如海水之潮必待時而至如人水火之濟亦待時而動也故云動善時也夫唯不爭故無尤夫唯語助尤悔吝也此言水之德不與物爭故無悔吝也昔子貢問君子見大水必觀焉何也孔子曰大水似乎德似道似勇似怯似正似察似志似善化水之德有若此者是故君子必觀焉由是之言何悔尤之有哉楊智仁曰上善若水至故無尤謂抱道君子其性若水善濟人民善利萬物撓之而不濁澄之而不清性能就下而傲上盛之斗則方盛之盂則圓江河因斯而長五行因斯而立化書云水竇可以下溺者故幾於道能長養萬物居善地深而空明心善淵萬物得水而生與善仁影照其形不失其情言善信清且平順政善治能方能圓能曲能直事善能夏散冬凝動善時夫唯不爭其道淵深故無尤也孟子曰人性之善也猶水之就下也人無有不善水無有不下也喻清中曰上善若水至故無尤水曰潤下處至卑至濕之地衆人之所惡也水無情之物也天下之至平者莫如水上善之人實似之上善者上德至善之人也按舊說水藴三能之近道七善之利物何謂三能水性平靜散潤一切天無水則亢旱地無水則枯竭利澤萬物故曰善利此一能也天下柔弱莫過於水舍實歸虛背高趨下壅之則止决之則流聽命於人故曰不爭此二能也凡人之情而惡居下流水則處卑就濕令物潔鮮自納汙穢故曰處衆人之所惡此三能也幾近也天一生水一者道也道一者即無一之一水一者為有一之一無一之一為道之體有一之一為道之用故曰幾於道何謂七善至人所居善執謙下順物自然化及鄉黨如水在地善就卑下滋潤群物故曰居善地此一善也至人之心洞鑒幽微湛然通徹如水淵澄不失明靜故曰心善淵此二善也至人施與慈惠及衆不間邇遐如水膏潤普霑群物無有限止故曰與善仁此三善也至人之言誠慤不移與物符契如海潮應候晝夜盈虛不差時刻故曰言善信此四善也至人從政平心待物自然順從無有不治如水清平善定高下好醜自别物無遁形故曰政善治此五善也至人臨事善能任物隨器授職各當其材如水柔性方圓長短惟器是適無施不可故曰事善能此六善也至人動靜與世推移出處應機不滯於物如水之動隨時變遷冬凝夏液不爽其節故曰動善時此七善也凡物之不平者取决於水而爭心息又何尤焉觀水有術可謂善於形容矣孔子觀於東流之水子貢問曰君子所見大水必觀焉何也孔子曰以其不息夫水似乎德其流也則卑下据邑必修其理此似義浩浩乎無屈止之期此似道流行赴百仞溪而不懼此似勇至量必平此似其盛而不求溉此似正綽約微達此似察發源必東此似志以出以入萬物就以化此似善化也水之德若此故君子必觀焉古人有取於水良有以也夫胥六虛曰上善若水至故幾於道言夫有道者謂之上善上善者謂其善無以加唯水可喻也故曰上善若水水之善利潤萬物而不爭舍高趨下而自若不爭者謂無大小高下之二天下之人出幽谷遷喬木乃其所喜舍其高趨於下乃其所惡水獨居之是故近於道故曰幾於道居善地至動善時水固幾於道聖人則之又推而擴之以明夫有道者之善略言有七居善地謂有道之士平險方圓所遇皆適若水之居善地也鑒照萬象湛然不擾若水之心善淵也懷抱慈愛親疏平施若水之與善仁也至誠內修號令外發若水之言善信也操守公平賞罰善惡若水之政善治也利濟日用為而不辭若水之事善能也否泰有數行藏無必若水之動善時也夫唯不爭故無尤尤罪過也夫唯有道之士若水之善也而不與物爭故天下亦無可責其過矣柴元皋曰上善若水水德無以加水善利萬物而不爭澤潤而就下處衆人之所惡凡有穢惡皆從而潔之故幾於道去道幾微之間居善地止坎就下心善淵澄湛鑒照與善仁濟物利用言善信潮候及時政善治平則無聲事善能灌溉有功動善時春生秋涸夫惟不爭故無尤以善為體以不爭為用故每用無過蘇敬靜曰上善若水至故無尤矣此章老子之意只在不爭上善者世間第一最善之理也譬之物莫如水萬物皆以得水而生是善利萬物而水何嘗爭言利邪人惡居下流惟水流濕處衆人所惡之地而不嫌人能如水有濟世潤澤之利而無好高慕遠之心則為上善亦幾近於有道矣有道之士如之何能與水同為善哉所居必就下如水濟物存心必淵靜如水渟涵所與必博施濟衆如水灌溉枯槁立信必務信實如水衝激必作聲為治必有修理如水順流下處處事必任才能如水湍流迅快動必善識時如水夏漲秋涸此七者皆如水之善矣而未如水之善也水之上善其在不爭言利乎夫惟不爭故亦無愆尤此即禹惟不矜天下莫與禹爭能禹惟不伐天下莫與禹爭功非天下之上善而何老氏之學莫切於不爭曰不尚賢使民不爭曰夫惟不爭故天下莫能與之爭曰是謂不爭之德曰天道不爭而善勝曰聖人之道為而不爭與此不爭無尤者凡六心聲之發自不能掩凡泄辱可恥皆能忍而容之是能為而能不為者也功能可以加人而付之無有智力足以蓋世而韜藏不用其所操藴常不肯為天下先則安得有爭哉宜其為上善也本一庵居士曰上善若水至故無尤無善之可名至矣有善之可名而若水之安行乎自然則善之上也夫能利萬物則有功有功則必爭有功而不爭難矣然且居衆人之所惡不以為凂豈不又難乎曰幾於道者次於至道無名也居也心也與也言也政也事也動也七者人事也善地者水之高下因地也善淵者水之靜深不撓也善仁者水之利澤無窮也善信者水之行止不欺也善治者水之洗滌無滯也善能者水之能流能勝也善時者水之時盈時涸也人之七事兼水之七善而又持之以水之不爭然後為善若有七善而不能去一爭能無尤乎石潭曰上善若水水善利萬物而不爭處衆人之所惡故幾於道居善地心善淵與善仁言善信正善治事善能動善時夫惟不爭故無尤上善若水以水之善喻人之善也水善利萬物物得水而無不生也不爭者水雖有利於萬物而未嘗與物為競也處衆人之所惡者水性潤下人則惡居下也惟其不爭而居人所惡之下故近於道人能居善地如水之能濟物心善淵如水之止而不波言善信如潮之應候不失其期政善治如水之鑒物高下妍醜無有遺形事善能如水之於器方圓曲直隨其所適動善時如水之春盈秋涸不爽其節是皆各任其自然而與物無競者所以未嘗有一毫之愆尤也此章自居善地以下本謂人之上善與水相似若但於水求之則於所謂言所謂政不通矣上文水善利萬物而不爭故幾於道是言水之善也居善地等七善是以人之善如水之善者言也其大意則在於不爭而已道德真經集義卷之十三
